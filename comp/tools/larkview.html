LkPat \" + name + \" = { .kind=PAT_VAR, .var=\" + ecCStr(n) + \" };\"))\n      | PLit(v) => (name, emitLine(em0, \"static const LkPat \" + name + \" = { .kind=PAT_LIT, .lit={\" + ecLitInit(v) + \"} };\"))\n      | PCon(n, args) =>\n          match args with\n          | Nil => (name, emitLine(em0, \"static const LkPat \" + name + \" = { .kind=PAT_CON, .con={\" + ecCStr(n) + \", NULL, 0} };\"))\n          | Cons(_, _) =>\n              match emitPatList(em0, args) with\n              | (ns, em1) =>\n                  match emitPtrArray(em1, \"LkPat\", ns) with\n                  | (arr, em2) => (name, emitLine(em2, \"static const LkPat \" + name + \" = { .kind=PAT_CON, .con={\" + ecCStr(n) + \", \" + arr + \", \" + int_to_string(ecLen(args)) + \"} };\"))\n                  end\n              end\n          end\n      | PTuple(es) =>\n          match emitPatList(em0, es) with\n          | (ns, em1) =>\n              match emitPtrArray(em1, \"LkPat\", ns) with\n              | (arr, em2) => (name, emitLine(em2, \"static const LkPat \" + name + \" = { .kind=PAT_TUPLE, .tup={\" + arr + \", \" + int_to_string(ecLen(es)) + \"} };\"))\n              end\n          end\n      end\n  end\n\n\n(* ── Declarations ─────────────────────────────────────────────────────────── *)\n\n(* Returns the LkMethod initialiser strings (skips a no-param method, like the\n   oracle's `if not params: continue`). *)\nfn emitImplMethods(em : Emit, methods : List(IMethod)) : (List(String), Emit) =\n  match methods with\n  | Nil => (Nil, em)\n  | Cons(IMethod(mname, params, body), rest) =>\n      match params with\n      | Nil => emitImplMethods(em, rest)\n      | Cons(p0, ptail) =>\n          match emitExpr(em, ecWrap(ptail, body)) with\n          | (bn, em1) =>\n              match emitImplMethods(em1, rest) with\n              | (inis, em2) => (Cons(\"{ \" + ecCStr(mname) + \", \" + ecCStr(ecParamName(p0)) + \", &\" + bn + \" }\", inis), em2)\n              end\n          end\n      end\n  end\n\nfn emitDecl(em : Emit, d : Decl) : (List(String), Emit) =\n  match d with\n  | FnDecl(_, fnName, _, params, _, body) =>\n      match params with\n      | Nil => (Nil, em)                                  (* the oracle raises; unreachable on valid input *)\n      | Cons(p0, rest) =>\n          match emitExpr(em, ecWrap(rest, body)) with\n          | (bn, em1) =>\n              match freshD(em1) with\n              | (dn, em2) => (Cons(dn, Nil), emitLine(em2, \"static const LkDecl \" + dn + \" = { .kind=DECL_FN, .name=\" + ecCStr(fnName) + \", .fn={\" + ecCStr(ecParamName(p0)) + \", &\" + bn + \"} };\"))\n              end\n          end\n      end\n  | LetDecl(_, name, _, val) =>\n      match emitExpr(em, val) with\n      | (vn, em1) =>\n          match freshD(em1) with\n          | (dn, em2) => (Cons(dn, Nil), emitLine(em2, \"static const LkDecl \" + dn + \" = { .kind=DECL_LET, .name=\" + ecCStr(name) + \", .let_val=&\" + vn + \" };\"))\n          end\n      end\n  | TypeDecl(_, name, _, tbody) =>\n      match tbody with\n      | Alias(_) => (Nil, em)                             (* type alias — no runtime representation *)\n      | Variants(vs) =>\n          match freshA(em) with\n          | (varr, em1) =>\n              let em2 = emitLine(em1, \"static const LkVariant \" + varr + \"[] = { \" + ecVariantInits(vs) + \" };\") in\n              match freshD(em2) with\n              | (dn, em3) => (Cons(dn, Nil), emitLine(em3, \"static const LkDecl \" + dn + \" = { .kind=DECL_TYPE, .name=\" + ecCStr(name) + \", .type_={\" + varr + \", \" + int_to_string(ecLen(vs)) + \"} };\"))\n              end\n          end\n      end\n  | TraitDecl(_, _, _, _) => (Nil, em)                    (* traits carry no runtime rep (dropped, as in infer.py) *)\n  | ImplDecl(traitName, _, forTy, methods) =>\n      match emitImplMethods(em, methods) with\n      | (inits, em1) =>\n          match inits with\n          | Nil => (Nil, em1)\n          | Cons(_, _) =>\n              match freshA(em1) with\n              | (marr, em2) =>\n                  let em3 = emitLine(em2, \"static const LkMethod \" + marr + \"[] = { \" + ecComma(inits) + \" };\") in\n                  match freshD(em3) with\n                  | (dn, em4) => (Cons(dn, Nil), emitLine(em4, \"static const LkDecl \" + dn + \" = { .kind=DECL_IMPL, .name=\" + ecCStr(ecForType(forTy)) + \", .impl={\" + ecCStr(traitName) + \", \" + marr + \", \" + int_to_string(ecLen(inits)) + \"} };\"))\n                  end\n              end\n          end\n      end\n  end\n\nfn emitDecls(em : Emit, decls : List(Decl)) : (List(String), Emit) =\n  match decls with\n  | Nil => (Nil, em)\n  | Cons(d, rest) =>\n      match emitDecl(em, d) with\n      | (ns, em1) =>\n          match emitDecls(em1, rest) with\n          | (ns2, em2) => (ecApp(ns, ns2), em2)\n          end\n      end\n  end\n\n\n(* ── Top-level render ─────────────────────────────────────────────────────── *)\n\nfn emitProgram(basename : String, prog : Prog) : String =\n  match prog with\n  | Prog(_, _, decls) =>\n      match emitDecls(Emit(0, 0, 0, 0, Nil), decls) with\n      | (declNames, Emit(_, _, _, _, revlines)) =>\n          let hdr =\n            Cons(\"/* Auto-generated from \" + basename + \" */\",\n            Cons(\"/* Do not edit — regenerate with emit_c_ast.py */\",\n            Cons(\"\",\n            Cons(\"#include \\\"cek.h\\\"\",\n            Cons(\"#include <stddef.h>\", Nil))))) in\n          let tail =\n            Cons(\"\",\n            Cons(\"static const LkDecl* _prog_decls[] = { \" + ecAmp(declNames) + \" };\",\n            Cons(\"\",\n            Cons(\"LkProg lk_program = { .decls = _prog_decls, .n_decls = \" + int_to_string(ecLen(declNames)) + \" };\", Nil)))) in\n          ecJoinNL(ecApp(hdr, ecApp(ecRev(revlines, Nil), tail)))\n      end\n  end\n\n\n(* ── Smoke driver (stripped at MAIN_MARKER by the differential harness) ─────── *)\n\nfn main(io : IO) : IO =\n  print(io, \"emit_c.lark is a component — run tests/emit_c_difftest.py\")\n"}, {"path": "repo/self/lark/infer.lark", "group": "repo/self/lark", "name": "infer.lark", "text": "(* infer.lark — Lark's type checker, written in Lark.\n   (the port of oracle/infer.py.)\n\n   Hindley-Milner inference (Algorithm W) with affine (linear) use tracking and\n   trait-bound checking for `show`.  This is the mountain: it consumes parse.lark's\n   syntactic AST (Prog/Decl/Expr/Pat/Ty), the type vocabulary of types.lark\n   (Mono/Scheme/apply/unify/…), and the typed AST of tast.lark (TExpr/TDecl/…),\n   and produces, per top-level decl, its inferred signature.\n\n   Design notes\n   ────────────\n   • NO MUTATION, NO EXCEPTIONS.  infer.py mutates a `fresh` counter, a `tracked`\n     dict, and an `env` dict, and raises TypeError/AffineError/TraitBoundError.\n     Here everything is threaded functionally:\n        - `fresh`   : an Int, threaded in and out of every inference function.\n        - `tracked` : an assoc list List((String, Int)) (name → use count).\n        - errors    : each inference function returns a Result-like ADT\n                      (IResult / PatR / …) whose Err arm carries the message.\n        - `env`     : an assoc list List((String, Scheme)), rebuilt as it grows.\n     A substitution `Subst` is types.lark's Int-keyed red-black tree (empty =\n     SLeaf, was Nil); `Ok`/`Err` come from the built-in Result.\n   • CONCATENATION, not import: the type checker's pipeline is one module\n     (lex + parse + types + tast + infer) — a known wart of the language.  Every function is\n     fully annotated so infer's own Pass 1.5 pre-registers the (heavily) mutually\n     recursive groups here (infer ↔ inferApply ↔ inferArms ↔ inferPat ↔ …).\n   • The observable output is `checkProgram`: a normalised top-level signature\n     block (module line + one line per decl), OR \"type error: <msg>\" on reject.\n     Type-variable names are canonicalised by first occurrence (α, β, γ …) so the\n     differential is independent of fresh-allocation order.\n\n   Run:  harness/infer_difftest.py  (make infertest)   *)\n\nmodule Infer\n\n\n(* ── Small result / option ADTs (functional error + state threading) ──────── *)\n\ntype IntOpt    = | IONone | IOSome of Int\ntype SchemeOpt = | SNone  | SJust of Scheme\n\n(* infer(...) result: typed expr, its type, the subst, the next fresh, the tracked. *)\ntype IResult =\n  | IErr of String\n  | IOk  of TExpr, Mono, Subst, Int, List((String, Int))\n\n(* inferPat(...) result: typed pat, its type, the local env, the subst, next fresh. *)\ntype PatR =\n  | PErr of String\n  | POk  of TPat, Mono, List((String, Scheme)), Subst, Int\n\n(* a list of expressions inferred in sequence (tuples): typed, raw types, s, f, tr. *)\ntype ListR =\n  | LErr of String\n  | LOk  of List(TExpr), List(Mono), Subst, Int, List((String, Int))\n\n(* application arguments: typed args, s, f, tr. *)\ntype ApplyArgsR =\n  | AErr of String\n  | AOk  of List(TExpr), Subst, Int, List((String, Int))\n\n(* match arms: typed (pat,body) pairs, s, f, tr. *)\ntype ArmsR =\n  | ArmErr of String\n  | ArmOk  of List((TPat, TExpr)), Subst, Int, List((String, Int))\n\n(* a checked fn/let decl: the typed decl, its generalised scheme, next fresh. *)\ntype FnDeclR  = | FDErr of String | FDOk of TDecl, Scheme, Int\ntype LetDeclR = | LDErr of String | LDOk of TDecl, Scheme, Int\n\n(* optional-return-annotation continuation: resolved type, subst, next fresh. *)\ntype RetR = | RErr of String | ROk of Mono, Subst, Int\n\n(* fnTypeFromAnnotations helper: all params annotated?  monos + tvar env + fresh. *)\ntype PMRes =\n  | PMNone of Int\n  | PMSome of List(Mono), List((String, Int)), Int\n\n(* pass 2 accumulators. *)\ntype Pass2R    = | P2Err  of String | P2Ok  of List(String), List((String, Scheme)), Int\ntype Pass2OneR = | P2OErr of String | P2OOk of Maybe(String), List((String, Scheme)), Int\n\nimpl Copy for IntOpt     = {}\nimpl Copy for SchemeOpt  = {}\nimpl Copy for IResult    = {}\nimpl Copy for PatR       = {}\nimpl Copy for ListR      = {}\nimpl Copy for ApplyArgsR = {}\nimpl Copy for ArmsR      = {}\nimpl Copy for FnDeclR    = {}\nimpl Copy for LetDeclR   = {}\nimpl Copy for RetR       = {}\nimpl Copy for PMRes      = {}\nimpl Copy for Pass2R     = {}\nimpl Copy for Pass2OneR  = {}\n\n\n(* ── Generic list length (consumes; safe — see the occurs-check note) ── *)\n\nfn listLen(xs : List(a)) : Int =\n  match xs with\n  | Nil        => 0\n  | Cons(_, r) => 1 + listLen(r)\n  end\n\n\n(* ── Environment: assoc list name → Scheme (dict semantics: newest wins) ──── *)\n\nfn envRemove(env : List((String, Scheme)), name : String) : List((String, Scheme)) =\n  match env with\n  | Nil => Nil\n  | Cons((k, v), rest) =>\n      if strEq(k, name) then envRemove(rest, name)\n      else Cons((k, v), envRemove(rest, name))\n  end\n\nfn envPut(env : List((String, Scheme)), name : String, sc : Scheme) : List((String, Scheme)) =\n  Cons((name, sc), envRemove(env, name))\n\nfn envGet(env : List((String, Scheme)), name : String) : SchemeOpt =\n  match env with\n  | Nil => SNone\n  | Cons((k, v), rest) => if strEq(k, name) then SJust(v) else envGet(rest, name)\n  end\n\nfn envHas(env : List((String, Scheme)), name : String) : Bool =\n  match envGet(env, name) with | SNone => false | SJust(_) => true end\n\nfn applyEnv(s : Subst, env : List((String, Scheme))) : List((String, Scheme)) =\n  match env with\n  | Nil => Nil\n  | Cons((k, sc), rest) => Cons((k, applyScheme(s, sc)), applyEnv(s, rest))\n  end\n\nfn appendEnv(a : List((String, Scheme)), b : List((String, Scheme))) : List((String, Scheme)) =\n  match a with | Nil => b | Cons(x, r) => Cons(x, appendEnv(r, b)) end\n\n(* merge with `over` shadowing `base` (== {**base, **over}). *)\nfn mergeEnv(base : List((String, Scheme)), over : List((String, Scheme))) : List((String, Scheme)) =\n  appendEnv(over, base)\n\nfn envFreeVars(env : List((String, Scheme))) : List(Int) =\n  match env with\n  | Nil => Nil\n  | Cons((_, sc), rest) => unionInts(freeVarsScheme(sc), envFreeVars(rest))\n  end\n\n\n(* ── Affine tracking: assoc list name → use count ─────────────────────────── *)\n\nfn trkGet(t : List((String, Int)), name : String) : IntOpt =\n  match t with\n  | Nil => IONone\n  | Cons((k, c), rest) => if strEq(k, name) then IOSome(c) else trkGet(rest, name)\n  end\n\nfn trkRemove(t : List((String, Int)), name : String) : List((String, Int)) =\n  match t with\n  | Nil => Nil\n  | Cons((k, c), rest) =>\n      if strEq(k, name) then trkRemove(rest, name)\n      else Cons((k, c), trkRemove(rest, name))\n  end\n\nfn trkSet(t : List((String, Int)), name : String, c : Int) : List((String, Int)) =\n  Cons((name, c), trkRemove(t, name))\n\n\n(* ── Generalise / instantiate ─────────────────────────────────────────────── *)\n\nfn freshSubst(qs : List(Int), f : Int) : (Subst, Int) =\n  match qs with\n  | Nil => (SLeaf, f)\n  | Cons(q, rest) =>\n      match freshSubst(rest, f + 1) with\n      | (s, f2) => (subInsert(s, q, MVar(f)), f2)\n      end\n  end\n\nfn instantiate(f : Int, sc : Scheme) : (Mono, Int) =\n  match sc with\n  | Scheme(qs, body, cv) =>\n      match qs with\n      | Nil => (body, f)\n      | _   => match freshSubst(qs, f) with | (s, f2) => (apply(s, body), f2) end\n      end\n  end\n\nfn generalise(env : List((String, Scheme)), t : Mono) : Scheme =\n  Scheme(diffInts(freeVars(t), envFreeVars(env)), t, Nil)\n\n\n(* ── Syntactic type (parse.lark Ty) → monotype, threading tvar-env + fresh ── *)\n\nfn isLowerStr(s : String) : Bool =\n  if string_length(s) == 0 then false\n  else let c = string_index(s, 0) in c >= 97 and c <= 122\n\nfn tvGet(tv : List((String, Int)), name : String) : IntOpt =\n  match tv with\n  | Nil => IONone\n  | Cons((k, i), rest) => if strEq(k, name) then IOSome(i) else tvGet(rest, name)\n  end\n\nfn synToMono(t : Ty, tv : List((String, Int)), f : Int) : (Mono, List((String, Int)), Int) =\n  match t with\n  | TName(n) =>\n      if strEq(n, \"()\") then (MCon(\"()\"), tv, f)\n      else if isLowerStr(n) then\n        match tvGet(tv, n) with\n        | IOSome(i) => (MVar(i), tv, f)\n        | IONone    => (MVar(f), Cons((n, f), tv), f + 1)\n        end\n      else (MCon(n), tv, f)\n  | TApply(n, args) =>\n      match synToMonoList(args, tv, f) with\n      | (ms, tv2, f2) => (MApp(n, ms), tv2, f2)\n      end\n  | TFn(p, r) =>\n      match synToMono(p, tv, f) with\n      | (mp, tv1, f1) =>\n          match synToMono(r, tv1, f1) with\n          | (mr, tv2, f2) => (MFn(mp, mr), tv2, f2)\n          end\n      end\n  | TUnit => (MCon(\"()\"), tv, f)\n  | TTuple(es) =>\n      match synToMonoList(es, tv, f) with\n      | (ms, tv2, f2) => (MTup(ms), tv2, f2)\n      end\n  end\n\nfn synToMonoList(ts : List(Ty), tv : List((String, Int)), f : Int) : (List(Mono), List((String, Int)), Int) =\n  match ts with\n  | Nil => (Nil, tv, f)\n  | Cons(t, rest) =>\n      match synToMono(t, tv, f) with\n      | (m, tv2, f2) =>\n          match synToMonoList(rest, tv2, f2) with\n          | (ms, tv3, f3) => (Cons(m, ms), tv3, f3)\n          end\n      end\n  end\n\n\n(* ── Literal / operator types ─────────────────────────────────────────────── *)\n\nfn litType(v : Val) : Mono =\n  match v with\n  | VUnit     => MCon(\"()\")\n  | VBool(_)  => MCon(\"Bool\")\n  | VInt(_)   => MCon(\"Int\")\n  | VFloat(_) => MCon(\"Float\")\n  | VStr(_)   => MCon(\"String\")\n  end\n\nfn numOp(f : Int) : (Mono, Int) = (MFn(MVar(f), MFn(MVar(f), MVar(f))), f + 1)\nfn cmpOp(f : Int) : (Mono, Int) = (MFn(MVar(f), MFn(MVar(f), MCon(\"Bool\"))), f + 1)\n\nfn binopType(op : String, f : Int) : (Mono, Int) =\n  match op with\n  | \"+\"  => numOp(f) | \"-\"  => numOp(f) | \"*\"  => numOp(f) | \"/\"  => numOp(f)\n  | \"==\" => cmpOp(f) | \"!=\" => cmpOp(f) | \"<\"  => cmpOp(f) | \"<=\" => cmpOp(f)\n  | \">\"  => cmpOp(f) | \">=\" => cmpOp(f)\n  | \"and\" => (MFn(MCon(\"Bool\"), MFn(MCon(\"Bool\"), MCon(\"Bool\"))), f)\n  | \"or\"  => (MFn(MCon(\"Bool\"), MFn(MCon(\"Bool\"), MCon(\"Bool\"))), f)\n  | _    => numOp(f)\n  end\n\n\n(* ── apply subst to typed AST nodes (port of _apply_tpat / _apply_texpr) ──── *)\n\nfn applyTPatList(s : Subst, ps : List(TPat)) : List(TPat) =\n  match ps with | Nil => Nil | Cons(p, r) => Cons(applyTPat(s, p), applyTPatList(s, r)) end\n\nfn applyTPat(s : Subst, p : TPat) : TPat =\n  match p with\n  | TPWild(t)        => TPWild(apply(s, t))\n  | TPVar(n, t)      => TPVar(n, apply(s, t))\n  | TPLit(v, t)      => TPLit(v, apply(s, t))\n  | TPCon(n, args, t) => TPCon(n, applyTPatList(s, args), apply(s, t))\n  | TPTuple(es, t)   => TPTuple(applyTPatList(s, es), apply(s, t))\n  end\n\nfn applyTExprList(s : Subst, es : List(TExpr)) : List(TExpr) =\n  match es with | Nil => Nil | Cons(e, r) => Cons(applyTExpr(s, e), applyTExprList(s, r)) end\n\nfn applyTArms(s : Subst, arms : List((TPat, TExpr))) : List((TPat, TExpr)) =\n  match arms with\n  | Nil => Nil\n  | Cons((p, b), r) => Cons((applyTPat(s, p), applyTExpr(s, b)), applyTArms(s, r))\n  end\n\nfn applyTParams(s : Subst, ps : List((String, Mono))) : List((String, Mono)) =\n  match ps with | Nil => Nil | Cons((n, t), r) => Cons((n, apply(s, t)), applyTParams(s, r)) end\n\nfn applyTExpr(s : Subst, e : TExpr) : TExpr =\n  match e with\n  | TLit(v, t)          => TLit(v, apply(s, t))\n  | TVar(n, t)          => TVar(n, apply(s, t))\n  | TCon(n, t)          => TCon(n, apply(s, t))\n  | TTupleExpr(es, t)   => TTupleExpr(applyTExprList(s, es), apply(s, t))\n  | TApp(fnx, args, t)   => TApp(applyTExpr(s, fnx), applyTExprList(s, args), apply(s, t))\n  | TBinOp(op, l, r, t) => TBinOp(op, applyTExpr(s, l), applyTExpr(s, r), apply(s, t))\n  | TUnaryOp(op, o, t)  => TUnaryOp(op, applyTExpr(s, o), apply(s, t))\n  | TLetExpr(n, v, b, t) => TLetExpr(n, applyTExpr(s, v), applyTExpr(s, b), apply(s, t))\n  | TIfExpr(c, th, el, t) => TIfExpr(applyTExpr(s, c), applyTExpr(s, th), applyTExpr(s, el), apply(s, t))\n  | TMatchExpr(sc, arms, t) => TMatchExpr(applyTExpr(s, sc), applyTArms(s, arms), apply(s, t))\n  | TLambda(ps, b, t)   => TLambda(applyTParams(s, ps), applyTExpr(s, b), apply(s, t))\n  end\n\n\n(* ── Show-bound check (port of _show_satisfies / _check_show_bounds) ───────── *)\n\nfn tTypeOf(e : TExpr) : Mono =\n  match e with\n  | TLit(_, t) => t | TVar(_, t) => t | TCon(_, t) => t\n  | TTupleExpr(_, t) => t | TApp(_, _, t) => t | TBinOp(_, _, _, t) => t\n  | TUnaryOp(_, _, t) => t | TLetExpr(_, _, _, t) => t | TIfExpr(_, _, _, t) => t\n  | TMatchExpr(_, _, t) => t | TLambda(_, _, t) => t\n  end\n\nfn showSatisfies(t : Mono, show : List(String)) : Bool =\n  match t with\n  | MVar(_)   => false\n  | MCon(n)   => memberStr(n, show)\n  | MApp(h, _) => memberStr(h, show)\n  | MFn(_, _) => false\n  | MTup(_)   => false\n  end\n\nfn combineMaybe(a : Maybe(String), b : Maybe(String)) : Maybe(String) =\n  match a with | Just(_) => a | Nothing => b end\n\nfn showCheckCall(args : List(TExpr), show : List(String)) : Maybe(String) =\n  match args with\n  | Nil        => Nothing\n  | Cons(a0, _) =>\n      if showSatisfies(tTypeOf(a0), show) then Nothing\n      else Just(\"no Show instance for \" + pretty(tTypeOf(a0)))\n  end\n\nfn showBoundsList(es : List(TExpr), show : List(String)) : Maybe(String) =\n  match es with\n  | Nil => Nothing\n  | Cons(e, r) => combineMaybe(showBounds(e, show), showBoundsList(r, show))\n  end\n\nfn showArms(arms : List((TPat, TExpr)), show : List(String)) : Maybe(String) =\n  match arms with\n  | Nil => Nothing\n  | Cons((_, b), r) => combineMaybe(showBounds(b, show), showArms(r, show))\n  end\n\nfn showBounds(e : TExpr, show : List(String)) : Maybe(String) =\n  match e with\n  | TApp(fnx, args, _) =>\n      let base = match fnx with\n                 | TVar(nm, _) => if strEq(nm, \"show\") then showCheckCall(args, show) else Nothing\n                 | _ => Nothing\n                 end in\n      combineMaybe(base, combineMaybe(showBounds(fnx, show), showBoundsList(args, show)))\n  | TTupleExpr(es, _)   => showBoundsList(es, show)\n  | TBinOp(_, l, r, _)  => combineMaybe(showBounds(l, show), showBounds(r, show))\n  | TUnaryOp(_, o, _)   => showBounds(o, show)\n  | TLetExpr(_, v, b, _) => combineMaybe(showBounds(v, show), showBounds(b, show))\n  | TIfExpr(c, th, el, _) => combineMaybe(showBounds(c, show), combineMaybe(showBounds(th, show), showBounds(el, show)))\n  | TMatchExpr(sc, arms, _) => combineMaybe(showBounds(sc, show), showArms(arms, show))\n  | TLambda(_, b, _)    => showBounds(b, show)\n  | TLit(_, _)          => Nothing\n  | TVar(_, _)          => Nothing\n  | TCon(_, _)          => Nothing\n  end\n\n\n(* ── Pattern inference (port of infer_pat) ────────────────────────────────── *)\n\nfn splitFn(t : Mono) : (List(Mono), Mono) =\n  match t with\n  | MFn(p, r) => match splitFn(r) with | (fs, res) => (Cons(p, fs), res) end\n  | _         => (Nil, t)\n  end\n\nfn snocMono(xs : List(Mono), x : Mono) : List(Mono) =\n  match xs with | Nil => Cons(x, Nil) | Cons(y, r) => Cons(y, snocMono(r, x)) end\n\nfn snocTPat(xs : List(TPat), x : TPat) : List(TPat) =\n  match xs with | Nil => Cons(x, Nil) | Cons(y, r) => Cons(y, snocTPat(r, x)) end\n\nfn applySchemeEnv(s : Subst, env : List((String, Scheme))) : List((String, Scheme)) =\n  applyEnv(s, env)\n\n(* merge a sub-pattern's bindings, rejecting a repeated variable. *)\nfn mergePatEnv(local : List((String, Scheme)), add : List((String, Scheme))) : Result(List((String, Scheme)), String) =\n  match add with\n  | Nil => Ok(local)\n  | Cons((k, v), rest) =>\n      if envHas(local, k) then Err(\"repeated pattern variable: '\" + k + \"'\")\n      else mergePatEnv(Cons((k, v), local), rest)\n  end\n\nfn inferPat(pat : Pat, f : Int, env : List((String, Scheme))) : PatR =\n  match pat with\n  | PWild => let t = MVar(f) in POk(TPWild(t), t, Nil, SLeaf, f + 1)\n  | PVar(n) => let t = MVar(f) in POk(TPVar(n, t), t, Cons((n, Scheme(Nil, t, Nil)), Nil), SLeaf, f + 1)\n  | PLit(v) => let t = litType(v) in POk(TPLit(v, t), t, Nil, SLeaf, f)\n  | PCon(n, args) =>\n      match envGet(env, n) with\n      | SJust(sc) =>\n          match instantiate(f, sc) with\n          | (conT, f1) =>\n              match splitFn(conT) with\n              | (fields, conResult) =>\n                  if listLen(fields) == listLen(args) then\n                    inferPatConFields(fields, args, env, f1, SLeaf, Nil, Nil, conResult, n)\n                  else inferPatGeneric(args, env, f1, n)\n              end\n          end\n      | SNone => inferPatGeneric(args, env, f, n)\n      end\n  | PTuple(elems) => inferPatTuple(elems, env, f, SLeaf, Nil, Nil, Nil)\n  end\n\nfn inferPatConFields(fields : List(Mono), args : List(Pat), env : List((String, Scheme)),\n                     f : Int, s : Subst, local : List((String, Scheme)),\n                     typed : List(TPat), conResult : Mono, n : String) : PatR =\n  match (fields, args) with\n  | (Nil, Nil) =>\n      let resultT = apply(s, conResult) in\n      POk(TPCon(n, typed, resultT), resultT, applySchemeEnv(s, local), s, f)\n  | (Cons(ft, fr), Cons(a, ar)) =>\n      match inferPat(a, f, env) with\n      | PErr(m) => PErr(m)\n      | POk(tp, pt, env2, s2, f2) =>\n          let sc = compose(s2, s) in\n          match unify(apply(sc, pt), apply(sc, ft)) with\n          | Err(e) => PErr(e)\n          | Ok(s3) =>\n              let s4 = compose(s3, compose(s2, s)) in\n              match mergePatEnv(local, applySchemeEnv(s4, env2)) with\n              | Err(e2) => PErr(e2)\n              | Ok(local2) => inferPatConFields(fr, ar, env, f2, s4, local2, snocTPat(typed, applyTPat(s4, tp)), conResult, n)\n              end\n          end\n      end\n  | _ => PErr(\"constructor arity mismatch\")\n  end\n\nfn inferPatGeneric(args : List(Pat), env : List((String, Scheme)), f : Int, n : String) : PatR =\n  inferPatGenFold(args, env, f + 1, SLeaf, Nil, Nil, MVar(f), n)\n\nfn inferPatGenFold(args : List(Pat), env : List((String, Scheme)), f : Int,\n                   s : Subst, local : List((String, Scheme)),\n                   typed : List(TPat), resultT : Mono, n : String) : PatR =\n  match args with\n  | Nil => POk(TPCon(n, typed, resultT), resultT, local, s, f)\n  | Cons(a, ar) =>\n      match inferPat(a, f, env) with\n      | PErr(m) => PErr(m)\n      | POk(tp, pt, env2, s2, f2) =>\n          let s3 = compose(s2, s) in\n          match mergePatEnv(local, env2) with\n          | Err(e) => PErr(e)\n          | Ok(local2) => inferPatGenFold(ar, env, f2, s3, local2, snocTPat(typed, tp), resultT, n)\n          end\n      end\n  end\n\nfn inferPatTuple(elems : List(Pat), env : List((String, Scheme)), f : Int,\n                 s : Subst, local : List((String, Scheme)),\n                 typed : List(TPat), etypes : List(Mono)) : PatR =\n  match elems with\n  | Nil => let t = MTup(etypes) in POk(TPTuple(typed, t), t, local, s, f)\n  | Cons(e, er) =>\n      match inferPat(e, f, env) with\n      | PErr(m) => PErr(m)\n      | POk(tp, pt, env2, s2, f2) =>\n          let s3 = compose(s2, s) in\n          match mergePatEnv(local, env2) with\n          | Err(e2) => PErr(e2)\n          | Ok(local2) => inferPatTuple(er, env, f2, s3, local2, snocTPat(typed, tp), snocMono(etypes, pt))\n          end\n      end\n  end\n\n\n(* ── Expression inference (port of infer) ─────────────────────────────────── *)\n\nfn curryFn(avs : List(Mono), res : Mono) : Mono =\n  match avs with | Nil => res | Cons(a, r) => MFn(a, curryFn(r, res)) end\n\nfn allocVars(n : Int, f : Int) : (List(Mono), Int) =\n  if n <= 0 then (Nil, f)\n  else match allocVars(n - 1, f + 1) with | (rest, f2) => (Cons(MVar(f), rest), f2) end\n\nfn infer(env : List((String, Scheme)), tracked : List((String, Int)), expr : Expr,\n         f : Int, copy : List(String)) : IResult =\n  match expr with\n  | Lit(v) => let t = litType(v) in IOk(TLit(v, t), t, SLeaf, f, tracked)\n  | Var(n) =>\n      match envGet(env, n) with\n      | SNone => IErr(\"unbound variable: '\" + n + \"'\")\n      | SJust(sc) =>\n          match instantiate(f, sc) with\n          | (t, f1) =>\n              match trkGet(tracked, n) with\n              | IONone => IOk(TVar(n, t), t, SLeaf, f1, tracked)\n              | IOSome(c) =>\n                  if c + 1 > 1 then IErr(\"affine variable '\" + n + \"' used more than once\")\n                  else IOk(TVar(n, t), t, SLeaf, f1, trkSet(tracked, n, c + 1))\n              end\n          end\n      end\n  | Con(n) =>\n      match envGet(env, n) with\n      | SNone => IErr(\"unbound constructor: '\" + n + \"'\")\n      | SJust(sc) => match instantiate(f, sc) with | (t, f1) => IOk(TCon(n, t), t, SLeaf, f1, tracked) end\n      end\n  | TupleExpr(elems) =>\n      match inferSeq(env, tracked, elems, f, copy) with\n      | LErr(m) => IErr(m)\n      | LOk(tes, ts, s, f2, tr) => let tupT = MTup(applyList(s, ts)) in IOk(TTupleExpr(tes, tupT), tupT, s, f2, tr)\n      end\n  | Apply(fnE, args)         => inferApply(env, tracked, fnE, args, f, copy)\n  | BinOp(op, l, r)          => inferBinOp(env, tracked, op, l, r, f, copy)\n  | UnaryOp(op, x)           => inferUnary(env, tracked, op, x, f, copy)\n  | LetExpr(n, ann, val, body) => inferLet(env, tracked, n, ann, val, body, f, copy)\n  | IfExpr(c, th, el)        => inferIf(env, tracked, c, th, el, f, copy)\n  | MatchExpr(scrut, arms)   => inferMatch(env, tracked, scrut, arms, f, copy)\n  | Lambda(params, body)     => inferLambda(env, tracked, params, body, f, copy)\n  end\n\n(* infer a sequence of exprs, threading env-apply, subst, fresh, tracked. *)\nfn inferSeq(env : List((String, Scheme)), tracked : List((String, Int)), es : List(Expr),\n            f : Int, copy : List(String)) : ListR =\n  inferSeqAcc(env, tracked, es, f, copy, SLeaf)\n\nfn inferSeqAcc(env : List((String, Scheme)), tracked : List((String, Int)), es : List(Expr),\n               f : Int, copy : List(String), s : Subst) : ListR =\n  match es with\n  | Nil => LOk(Nil, Nil, s, f, tracked)\n  | Cons(e, rest) =>\n      match infer(applyEnv(s, env), tracked, e, f, copy) with\n      | IErr(m) => LErr(m)\n      | IOk(te, t, s2, f2, tr2) =>\n          let s3 = compose(s2, s) in\n          match inferSeqAcc(env, tr2, rest, f2, copy, s3) with\n          | LErr(m) => LErr(m)\n          | LOk(tes, ts, s4, f4, tr4) => LOk(Cons(te, tes), Cons(t, ts), s4, f4, tr4)\n          end\n      end\n  end\n\nfn inferApply(env : List((String, Scheme)), tracked : List((String, Int)), fnE : Expr,\n              args : List(Expr), f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, fnE, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tf, fnT, s, f1, tr1) =>\n      match allocVars(listLen(args), f1) with\n      | (argVars, f2) =>\n          let resV = MVar(f2) in\n          let expected = curryFn(argVars, resV) in\n          match unify(apply(s, fnT), expected) with\n          | Err(e) => IErr(e)\n          | Ok(s2) =>\n              let s3 = compose(s2, s) in\n              match inferApplyArgs(env, tr1, argVars, args, f2 + 1, copy, s3) with\n              | AErr(m) => IErr(m)\n              | AOk(targs, s4, f4, tr4) => let finalT = apply(s4, resV) in IOk(TApp(tf, targs, finalT), finalT, s4, f4, tr4)\n              end\n          end\n      end\n  end\n\nfn inferApplyArgs(env : List((String, Scheme)), tracked : List((String, Int)), avs : List(Mono),\n                  args : List(Expr), f : Int, copy : List(String), s : Subst) : ApplyArgsR =\n  match (avs, args) with\n  | (Nil, Nil) => AOk(Nil, s, f, tracked)\n  | (Cons(av, avr), Cons(arg, argr)) =>\n      match infer(applyEnv(s, env), tracked, arg, f, copy) with\n      | IErr(m) => AErr(m)\n      | IOk(ta, at, s3, f3, tr3) =>\n          match unify(apply(s, at), apply(s, av)) with\n          | Err(e) => AErr(e)\n          | Ok(s4) =>\n              let s5 = compose(s4, compose(s3, s)) in\n              match inferApplyArgs(env, tr3, avr, argr, f3, copy, s5) with\n              | AErr(m) => AErr(m)\n              | AOk(rest, s6, f6, tr6) => AOk(Cons(ta, rest), s6, f6, tr6)\n              end\n          end\n      end\n  | _ => AErr(\"application arity mismatch\")\n  end\n\nfn inferBinOp(env : List((String, Scheme)), tracked : List((String, Int)), op : String,\n              l : Expr, r : Expr, f : Int, copy : List(String)) : IResult =\n  match binopType(op, f) with\n  | (opT, f1) =>\n      match infer(env, tracked, l, f1, copy) with\n      | IErr(m) => IErr(m)\n      | IOk(tl, lt, s1, f2, tr2) =>\n          match infer(applyEnv(s1, env), tr2, r, f2, copy) with\n          | IErr(m) => IErr(m)\n          | IOk(trE, rt, s2, f3, tr3) =>\n              let s = compose(s2, s1) in\n              let resV = MVar(f3) in\n              let expected = MFn(apply(s, lt), MFn(apply(s, rt), resV)) in\n              match unify(apply(s, opT), expected) with\n              | Err(e) => IErr(e)\n              | Ok(s3) => let s4 = compose(s3, s) in let t = apply(s4, resV) in IOk(TBinOp(op, tl, trE, t), t, s4, f3 + 1, tr3)\n              end\n          end\n      end\n  end\n\nfn inferUnary(env : List((String, Scheme)), tracked : List((String, Int)), op : String,\n              x : Expr, f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, x, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(te, t, s, f1, tr1) =>\n      match op with\n      | \"not\" =>\n          match unify(apply(s, t), MCon(\"Bool\")) with\n          | Err(e) => IErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in IOk(TUnaryOp(op, te, MCon(\"Bool\")), MCon(\"Bool\"), s3, f1, tr1)\n          end\n      | _ =>\n          let resV = MVar(f1) in\n          match unify(apply(s, t), resV) with\n          | Err(e) => IErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in let rt = apply(s3, resV) in IOk(TUnaryOp(op, te, rt), rt, s3, f1 + 1, tr1)\n          end\n      end\n  end\n\nfn inferLet(env : List((String, Scheme)), tracked : List((String, Int)), n : String,\n            ann : Maybe(Ty), val : Expr, body : Expr, f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, val, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tv, vt, s1a, f1, trV) =>\n      let vt2a = apply(s1a, vt) in\n      match ann with\n      | Nothing => letFinish(env, trV, n, tv, vt2a, s1a, f1, copy, body)\n      | Just(annTy) =>\n          match synToMono(annTy, Nil, f1) with\n          | (annT, _, f2) =>\n              match unify(vt2a, annT) with\n              | Err(e) => IErr(e)\n              | Ok(s2) => let s1 = compose(s2, s1a) in letFinish(env, trV, n, tv, apply(s1, annT), s1, f2, copy, body)\n              end\n          end\n      end\n  end\n\nfn letFinish(env : List((String, Scheme)), trV : List((String, Int)), n : String,\n             tv : TExpr, vt2 : Mono, s1 : Subst, f : Int,\n             copy : List(String), body : Expr) : IResult =\n  let sc = generalise(applyEnv(s1, env), vt2) in\n  let env2 = envPut(env, n, sc) in\n  let oldc = trkGet(trV, n) in\n  let t1 = trkRemove(trV, n) in\n  let t2 = if isCopy(vt2, copy) then t1 else trkSet(t1, n, 0) in\n  match infer(env2, t2, body, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tb, bt, s3, f3, trB) =>\n      let t3 = trkRemove(trB, n) in\n      let t4 = match oldc with | IOSome(c) => trkSet(t3, n, c) | IONone => t3 end in\n      let s = compose(s3, s1) in\n      let t = apply(s, bt) in\n      IOk(TLetExpr(n, tv, tb, t), t, s, f3, t4)\n  end\n\nfn inferIf(env : List((String, Scheme)), tracked : List((String, Int)), c : Expr,\n           th : Expr, el : Expr, f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, c, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tc, ct, s1, f1, tr1) =>\n      match unify(apply(s1, ct), MCon(\"Bool\")) with\n      | Err(e) => IErr(e)\n      | Ok(s2) =>\n          let sA = compose(s2, s1) in\n          match infer(applyEnv(sA, env), tr1, th, f1, copy) with\n          | IErr(m) => IErr(m)\n          | IOk(tt, ttt, s3, f2, tr2) =>\n              let sB = compose(s3, sA) in\n              match infer(applyEnv(sB, env), tr2, el, f2, copy) with\n              | IErr(m) => IErr(m)\n              | IOk(teE, ett, s4, f3, tr3) =>\n                  let sC = compose(s4, sB) in\n                  match unify(apply(sC, ttt), apply(sC, ett)) with\n                  | Err(e) => IErr(e)\n                  | Ok(s5) => let sD = compose(s5, sC) in let t = apply(sD, ttt) in IOk(TIfExpr(tc, tt, teE, t), t, sD, f3, tr3)\n                  end\n              end\n          end\n      end\n  end\n\nfn inferMatch(env : List((String, Scheme)), tracked : List((String, Int)), scrut : Expr,\n              arms : List(Arm), f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, scrut, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(ts, st, s, f1, tr1) =>\n      let resV = MVar(f1) in\n      match inferArms(env, tr1, arms, st, resV, f1 + 1, copy, s) with\n      | ArmErr(m) => IErr(m)\n      | ArmOk(tarms, s2, f2, tr2) => let t = apply(s2, resV) in IOk(TMatchExpr(ts, tarms, t), t, s2, f2, tr2)\n      end\n  end\n\nfn inferArms(env : List((String, Scheme)), tracked : List((String, Int)), arms : List(Arm),\n             st : Mono, resV : Mono, f : Int, copy : List(String), s : Subst) : ArmsR =\n  match arms with\n  | Nil => ArmOk(Nil, s, f, tracked)\n  | Cons(Arm(pat, body), rest) =>\n      match inferPat(pat, f, env) with\n      | PErr(m) => ArmErr(m)\n      | POk(tp, pt, patEnv, sPat, f1) =>\n          let sa = compose(sPat, s) in\n          match unify(apply(sa, st), apply(sa, pt)) with\n          | Err(e) => ArmErr(e)\n          | Ok(s2) =>\n              let sb = compose(s2, sa) in\n              let armEnv = mergeEnv(applyEnv(sb, env), applySchemeEnv(sb, patEnv)) in\n              match infer(armEnv, tracked, body, f1, copy) with\n              | IErr(m) => ArmErr(m)\n              | IOk(ta, at, s3, f2, trA) =>\n                  match unify(apply(s3, apply(sb, at)), apply(s3, apply(sb, resV))) with\n                  | Err(e) => ArmErr(e)\n                  | Ok(s4) =>\n                      let sc = compose(s4, compose(s3, sb)) in\n                      match inferArms(env, trA, rest, st, resV, f2, copy, sc) with\n                      | ArmErr(m) => ArmErr(m)\n                      | ArmOk(tarms, s5, f5, tr5) => ArmOk(Cons((tp, ta), tarms), s5, f5, tr5)\n                      end\n                  end\n              end\n          end\n      end\n  end\n\nfn buildFnType(pts : List((String, Mono)), ret : Mono, s : Subst) : Mono =\n  match pts with\n  | Nil => ret\n  | Cons((_, pt), rest) => MFn(apply(s, pt), buildFnType(rest, ret, s))\n  end\n\nfn inferLambda(env : List((String, Scheme)), tracked : List((String, Int)), params : List(Param),\n               body : Expr, f : Int, copy : List(String)) : IResult =\n  match inferLambdaParams(params, env, tracked, f, copy) with\n  | (paramTypes, env2, tracked2, f1) =>\n      match infer(env2, tracked2, body, f1, copy) with\n      | IErr(m) => IErr(m)\n      | IOk(tb, bt, s, f2, _) =>\n          let fnT = buildFnType(paramTypes, apply(s, bt), s) in\n          IOk(TLambda(applyTParams(s, paramTypes), tb, fnT), fnT, s, f2, tracked)\n      end\n  end\n\nfn inferLambdaParams(params : List(Param), env : List((String, Scheme)), tracked : List((String, Int)),\n                     f : Int, copy : List(String)) : (List((String, Mono)), List((String, Scheme)), List((String, Int)), Int) =\n  match params with\n  | Nil => (Nil, env, tracked, f)\n  | Cons(Param(nm, ann), rest) =>\n      match ann with\n      | Just(annTy) => match synToMono(annTy, Nil, f) with | (pv, _, f1) => lambdaParamCont(nm, pv, rest, env, tracked, f1, copy) end\n      | Nothing => lambdaParamCont(nm, MVar(f), rest, env, tracked, f + 1, copy)\n      end\n  end\n\nfn lambdaParamCont(nm : String, pv : Mono, rest : List(Param), env : List((String, Scheme)),\n                   tracked : List((String, Int)), f : Int, copy : List(String)) : (List((String, Mono)), List((String, Scheme)), List((String, Int)), Int) =\n  let env2 = envPut(env, nm, Scheme(Nil, pv, Nil)) in\n  let tracked2 = if isCopy(pv, copy) then tracked else trkSet(tracked, nm, 0) in\n  match inferLambdaParams(rest, env2, tracked2, f, copy) with\n  | (pts, envF, trF, fF) => (Cons((nm, pv), pts), envF, trF, fF)\n  end\n\n\n(* ── Declaration checking (port of check_fn_decl / check_let_decl) ─────────── *)\n\nfn checkFnParams(params : List(Param), localEnv : List((String, Scheme)), tracked : List((String, Int)),\n                 tvenv : List((String, Int)), f : Int, copy : List(String))\n    : (List((String, Mono)), List((String, Scheme)), List((String, Int)), List((String, Int)), Int) =\n  match params with\n  | Nil => (Nil, localEnv, tracked, tvenv, f)\n  | Cons(Param(nm, ann), rest) =>\n      match ann with\n      | Just(annTy) => match synToMono(annTy, tvenv, f) with | (pv, tvenv2, f1) => fnParamCont(nm, pv, tvenv2, rest, localEnv, tracked, f1, copy) end\n      | Nothing => fnParamCont(nm, MVar(f), tvenv, rest, localEnv, tracked, f + 1, copy)\n      end\n  end\n\nfn fnParamCont(nm : String, pv : Mono, tvenv : List((String, Int)), rest : List(Param),\n               localEnv : List((String, Scheme)), tracked : List((String, Int)), f : Int, copy : List(String))\n    : (List((String, Mono)), List((String, Scheme)), List((String, Int)), List((String, Int)), Int) =\n  let env2 = envPut(localEnv, nm, Scheme(Nil, pv, Nil)) in\n  let tracked2 = if isCopy(pv, copy) then tracked else trkSet(tracked, nm, 0) in\n  match checkFnParams(rest, env2, tracked2, tvenv, f, copy) with\n  | (pts, envF, trF, tvF, fF) => (Cons((nm, pv), pts), envF, trF, tvF, fF)\n  end\n\nfn checkFnRet(ret : Maybe(Ty), tvenv : List((String, Int)), bt : Mono, s : Subst, f : Int) : RetR =\n  match ret with\n  | Nothing => ROk(apply(s, bt), s, f)\n  | Just(retTy) =>\n      match synToMono(retTy, tvenv, f) with\n      | (annT, _, f1) =>\n          match unify(apply(s, bt), annT) with\n          | Err(e) => RErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in ROk(apply(s3, annT), s3, f1)\n          end\n      end\n  end\n\n(* is every parameter annotated? *)\nfn allParamsAnn(ps : List(Param)) : Bool =\n  match ps with\n  | Nil => true\n  | Cons(Param(pn, ann), rest) =>\n      match ann with\n      | Nothing => false\n      | Just(t) => allParamsAnn(rest)\n      end\n  end\n\n(* the scheme the function's own name gets while its body is checked.\n\n   A complete signature is a licence to recurse polymorphically.  Pass 1.5 has\n   already registered the annotated type under `name`; generalise it, so that each\n   recursive call instantiates it afresh.  Bound to a bare monotype var instead,\n   every recursive call would have to agree about one unknown — and a polymorphic\n   function that recurses on its own result could not be typed at all. *)\nfn recScheme(env : List((String, Scheme)), name : String, params : List(Param),\n             ret : Maybe(Ty), recVar : Mono) : Scheme =\n  let annotated = match ret with\n                  | Nothing => false\n                  | Just(rt) => allParamsAnn(params)\n                  end in\n  if annotated then\n    match envGet(env, name) with\n    | SNone    => Scheme(Nil, recVar, Nil)\n    | SJust(sc) =>\n        match sc with\n        | Scheme(qs, body, cvs) => generalise(envRemove(env, name), body)\n        end\n    end\n  else Scheme(Nil, recVar, Nil)\n\nfn checkFnDecl(decl : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : FnDeclR =\n  match decl with\n  | FnDecl(exported, name, bounds, params, ret, body) =>\n      let recVar = MVar(f) in\n      let localEnv0 = envPut(env, name, recScheme(env, name, params, ret, recVar)) in\n      match checkFnParams(params, localEnv0, Nil, Nil, f + 1, copy) with\n      | (paramTypes, localEnv, tracked, tvenv, f1) =>\n          match infer(localEnv, tracked, body, f1, copy) with\n          | IErr(m) => FDErr(m)\n          | IOk(tbody, bt, s, f2, _) =>\n              match checkFnRet(ret, tvenv, bt, s, f2) with\n              | RErr(e) => FDErr(e)\n              | ROk(bt2, s5, f3) =>\n                  let fnT1 = apply(s5, buildFnType(paramTypes, bt2, s5)) in\n                  match unify(apply(s5, recVar), fnT1) with\n                  | Err(e) => FDErr(e)\n                  | Ok(s6) =>\n                      let s7 = compose(s6, s5) in\n                      let fnT = apply(s7, fnT1) in\n                      let sc = generalise(applyEnv(s7, env), fnT) in\n                      let typedParams = applyTParams(s7, paramTypes) in\n                      let tbody2 = applyTExpr(s7, tbody) in\n                      match showBounds(tbody2, show) with\n                      | Just(e) => FDErr(e)\n                      | Nothing => FDOk(TFnDecl(name, typedParams, tbody2, sc, exported), sc, f3)\n                      end\n                  end\n              end\n          end\n      end\n  | _ => FDErr(\"not a function declaration\")\n  end\n\nfn checkLetAnn(ann : Maybe(Ty), t : Mono, s : Subst, f : Int) : RetR =\n  match ann with\n  | Nothing => ROk(t, s, f)\n  | Just(annTy) =>\n      match synToMono(annTy, Nil, f) with\n      | (annT, _, f1) =>\n          match unify(t, annT) with\n          | Err(e) => RErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in ROk(apply(s3, annT), s3, f1)\n          end\n      end\n  end\n\nfn checkLetDecl(decl : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : LetDeclR =\n  match decl with\n  | LetDecl(exported, name, ann, value) =>\n      match infer(env, Nil, value, f, copy) with\n      | IErr(m) => LDErr(m)\n      | IOk(tv, t0, s, f1, _) =>\n          match checkLetAnn(ann, apply(s, t0), s, f1) with\n          | RErr(e) => LDErr(e)\n          | ROk(t2, s2, f2) =>\n              let sc = generalise(applyEnv(s2, env), t2) in\n              let tv2 = applyTExpr(s2, tv) in\n              match showBounds(tv2, show) with\n              | Just(e) => LDErr(e)\n              | Nothing => LDOk(TLetDecl(name, tv2, sc, exported), sc, f2)\n              end\n          end\n      end\n  | _ => LDErr(\"not a let declaration\")\n  end\n\n\n(* ── Type / trait / impl registration (port of the Pass-1 registrars) ─────── *)\n\nfn allocParamVars(params : List(String), f : Int) : (List((String, Int)), Int) =\n  match params with\n  | Nil => (Nil, f)\n  | Cons(p, rest) => match allocParamVars(rest, f + 1) with | (pv, f2) => (Cons((p, f), pv), f2) end\n  end\n\nfn pvarMonos(pvars : List((String, Int))) : List(Mono) =\n  match pvars with | Nil => Nil | Cons((_, id), rest) => Cons(MVar(id), pvarMonos(rest)) end\n\nfn buildResultT(name : String, pvars : List((String, Int))) : Mono =\n  match pvars with | Nil => MCon(name) | _ => MApp(name, pvarMonos(pvars)) end\n\nfn curryFields(fields : List(Mono), res : Mono) : Mono =\n  match fields with | Nil => res | Cons(ft, rest) => MFn(ft, curryFields(rest, res)) end\n\nfn registerOneVariant(vn : String, payload : List(Ty), pvars : List((String, Int)),\n                      resultT : Mono, env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match payload with\n  | Nil => (envPut(env, vn, Scheme(freeVars(resultT), resultT, Nil)), f)\n  | _ =>\n      match synToMonoList(payload, pvars, f) with\n      | (fieldMonos, _, f2) =>\n          let conT = curryFields(fieldMonos, resultT) in\n          (envPut(env, vn, Scheme(freeVars(conT), conT, Nil)), f2)\n      end\n  end\n\nfn registerVariants(vs : List(Variant), pvars : List((String, Int)), resultT : Mono,\n                    env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match vs with\n  | Nil => (env, f)\n  | Cons(Variant(vn, payload), rest) =>\n      match registerOneVariant(vn, payload, pvars, resultT, env, f) with\n      | (env2, f2) => registerVariants(rest, pvars, resultT, env2, f2)\n      end\n  end\n\nfn registerTypeDecl(decl : Decl, env : List((String, Scheme)), f : Int, copy : List(String)) : (List((String, Scheme)), Int, List(String)) =\n  match decl with\n  | TypeDecl(exported, name, params, body) =>\n      match body with\n      | Alias(_) => (env, f, copy)\n      | Variants(vs) =>\n          match allocParamVars(params, f) with\n          | (pvars, f1) =>\n              match registerVariants(vs, pvars, buildResultT(name, pvars), env, f1) with\n              | (env2, f2) => (env2, f2, copy)\n              end\n          end\n      end\n  | _ => (env, f, copy)\n  end\n\nfn registerTraitMethods(methods : List(TMethod), pvars : List((String, Int)),\n                        env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match methods with\n  | Nil => (env, f)\n  | Cons(TMethod(mname, ty), rest) =>\n      match synToMono(ty, pvars, f) with\n      | (methodT, _, f2) => registerTraitMethods(rest, pvars, envPut(env, mname, Scheme(freeVars(methodT), methodT, Nil)), f2)\n      end\n  end\n\nfn registerTraitDecl(decl : Decl, env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match decl with\n  | TraitDecl(exported, name, params, methods) =>\n      match allocParamVars(params, f) with\n      | (pvars, f1) => registerTraitMethods(methods, pvars, env, f1)\n      end\n  | _ => (env, f)\n  end\n\nfn forTypeName(forty : Ty) : String =\n  match forty with | TName(n) => n | TApply(n, _) => n | _ => \"?\" end\n\nfn paramMonos(params : List(Param), tvenv : List((String, Int)), f : Int) : PMRes =\n  match params with\n  | Nil => PMSome(Nil, tvenv, f)\n  | Cons(Param(nm, ann), rest) =>\n      match ann with\n      | Nothing => PMNone(f)\n      | Just(annTy) =>\n          match synToMono(annTy, tvenv, f) with\n          | (m, tvenv2, f1) =>\n              match paramMonos(rest, tvenv2, f1) with\n              | PMNone(f2) => PMNone(f2)\n              | PMSome(ms, tvenv3, f2) => PMSome(Cons(m, ms), tvenv3, f2)\n              end\n          end\n      end\n  end\n\nfn fnTypeFromAnnotations(decl : Decl, f : Int) : (Maybe(Mono), Int) =\n  match decl with\n  | FnDecl(exported, name, bounds, params, ret, body) =>\n      match ret with\n      | Nothing => (Nothing, f)\n      | Just(retTy) =>\n          match paramMonos(params, Nil, f) with\n          | PMNone(f2) => (Nothing, f2)\n          | PMSome(monos, tvenv, f2) =>\n              match synToMono(retTy, tvenv, f2) with\n              | (retT, _, f3) => (Just(curryFields(monos, retT)), f3)\n              end\n          end\n      end\n  | _ => (Nothing, f)\n  end\n\n\n(* ── Initial environment (port of _initial_env) ───────────────────────────── *)\n\nfn eCons(name : String, sc : Scheme, rest : List((String, Scheme))) : List((String, Scheme)) =\n  Cons((name, sc), rest)\n\nfn initialEnv(dummy : Int) : (List((String, Scheme)), List(String)) =\n  let a = MVar(0) in\n  let b = MVar(1) in\n  let io = MCon(\"IO\") in\n  let str = MCon(\"String\") in\n  let int = MCon(\"Int\") in\n  let flt = MCon(\"Float\") in\n  let bool = MCon(\"Bool\") in\n  let env =\n    eCons(\"print\",           Scheme(Nil, MFn(io, MFn(str, io)), Nil),\n    eCons(\"read\",            Scheme(Nil, MFn(io, MTup(Cons(io, Cons(str, Nil)))), Nil),\n    eCons(\"read_all\",        Scheme(Nil, MFn(io, MTup(Cons(io, Cons(str, Nil)))), Nil),\n    eCons(\"show\",            Scheme(Cons(0, Nil), MFn(a, str), Nil),\n    eCons(\"int_to_float\",    Scheme(Nil, MFn(int, flt), Nil),\n    eCons(\"float_to_int\",    Scheme(Nil, MFn(flt, int), Nil),\n    eCons(\"float_to_bits\",   Scheme(Nil, MFn(flt, int), Nil),\n    eCons(\"int_to_string\",   Scheme(Nil, MFn(int, str), Nil),\n    eCons(\"float_to_string\", Scheme(Nil, MFn(flt, str), Nil),\n    eCons(\"int_abs\",         Scheme(Nil, MFn(int, int), Nil),\n    eCons(\"float_abs\",       Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"float_sqrt\",      Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"float_floor\",     Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"float_ceil\",      Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"string_length\",   Scheme(Nil, MFn(str, int), Nil),\n    eCons(\"string_index\",    Scheme(Nil, MFn(str, MFn(int, int)), Nil),\n    eCons(\"string_slice\",    Scheme(Nil, MFn(str, MFn(int, MFn(int, str))), Nil),\n    eCons(\"char_to_string\",  Scheme(Nil, MFn(int, str), Nil),\n    eCons(\"string_to_int\",   Scheme(Nil, MFn(str, tResult(int, str)), Nil),\n    eCons(\"string_to_float\", Scheme(Nil, MFn(str, tResult(flt, str)), Nil),\n    eCons(\"Nil\",  Scheme(Cons(0, Nil), tList(a), Nil),\n    eCons(\"Cons\", Scheme(Cons(0, Nil), MFn(a, MFn(tList(a), tList(a))), Nil),\n    eCons(\"Ok\",   Scheme(Cons(0, Cons(1, Nil)), MFn(a, tResult(a, b)), Nil),\n    eCons(\"Err\",  Scheme(Cons(0, Cons(1, Nil)), MFn(b, tResult(a, b)), Nil),\n    eCons(\"True\",  Scheme(Nil, bool, Nil),\n    eCons(\"False\", Scheme(Nil, bool, Nil),\n    Nil)))))))))))))))))))))))))) in\n  (env, Cons(\"Int\", Cons(\"Float\", Cons(\"Bool\", Cons(\"String\", Cons(\"()\", Cons(\"List\", Nil)))))))\n\n\n(* ── Passes (port of typecheck) ───────────────────────────────────────────── *)\n\nfn pass1One(d : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String))\n    : (List((String, Scheme)), Int, List(String), List(String)) =\n  match d with\n  | TypeDecl(_, _, _, _) => match registerTypeDecl(d, env, f, copy) with | (e2, f2, c2) => (e2, f2, c2, show) end\n  | TraitDecl(_, _, _, _) => match registerTraitDecl(d, env, f) with | (e2, f2) => (e2, f2, copy, show) end\n  | ImplDecl(tname, _, forty, _) =>\n      if strEq(tname, \"Copy\") then (env, f, Cons(forTypeName(forty), copy), show)\n      else if strEq(tname, \"Show\") then (env, f, copy, Cons(forTypeName(forty), show))\n      else (env, f, copy, show)\n  | _ => (env, f, copy, show)\n  end\n\nfn pass1(decls : List(Decl), env : List((String, Scheme)), f : Int, copy : List(String), show : List(String))\n    : (List((String, Scheme)), Int, List(String), List(String)) =\n  match decls with\n  | Nil => (env, f, copy, show)\n  | Cons(d, rest) =>\n      match pass1One(d, env, f, copy, show) with\n      | (env2, f2, copy2, show2) => pass1(rest, env2, f2, copy2, show2)\n      end\n  end\n\nfn pass15One(d : Decl, env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match d with\n  | FnDecl(_, name, _, _, _, _) =>\n      if envHas(env, name) then (env, f)\n      else match fnTypeFromAnnotations(d, f) with\n           | (Nothing, f2) => (env, f2)\n           | (Just(annT), f2) => (envPut(env, name, Scheme(Nil, annT, Nil)), f2)\n           end\n  | _ => (env, f)\n  end\n\nfn pass15(decls : List(Decl), env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match decls with\n  | Nil => (env, f)\n  | Cons(d, rest) => match pass15One(d, env, f) with | (e2, f2) => pass15(rest, e2, f2) end\n  end\n\nfn checkImplMethods(methods : List(IMethod), env : List((String, Scheme)), f : Int,\n                    copy : List(String), show : List(String)) : Result(Int, String) =\n  match methods with\n  | Nil => Ok(f)\n  | Cons(IMethod(mname, params, body), rest) =>\n      match checkFnDecl(FnDecl(false, mname, Nil, params, Nothing, body), env, f, copy, show) with\n      | FDErr(m) => Err(m)\n      | FDOk(_, _, f2) => checkImplMethods(rest, env, f2, copy, show)\n      end\n  end\n\nfn sigOfFnLet(name : String, sc : Scheme) : String = name + \" : \" + normSchemeStr(sc)\n\nfn pass2One(d : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : Pass2OneR =\n  match d with\n  | FnDecl(_, name, _, _, _, _) =>\n      match checkFnDecl(d, env, f, copy, show) with\n      | FDErr(m) => P2OErr(m)\n      | FDOk(_, sc, f2) => P2OOk(Just(sigOfFnLet(name, sc)), envPut(env, name, sc), f2)\n      end\n  | LetDecl(_, name, _, _) =>\n      match checkLetDecl(d, env, f, copy, show) with\n      | LDErr(m) => P2OErr(m)\n      | LDOk(_, sc, f2) => P2OOk(Just(sigOfFnLet(name, sc)), envPut(env, name, sc), f2)\n      end\n  | TypeDecl(_, name, _, _) => P2OOk(Just(\"type \" + name), env, f)\n  | TraitDecl(_, _, _, _) => P2OOk(Nothing, env, f)\n  | ImplDecl(tname, _, forty, methods) =>\n      match checkImplMethods(methods, env, f, copy, show) with\n      | Err(m) => P2OErr(m)\n      | Ok(f2) => P2OOk(Just(\"impl \" + tname + \" for \" + forTypeName(forty)), env, f2)\n      end\n  end\n\nfn pass2(decls : List(Decl), env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : Pass2R =\n  match decls with\n  | Nil => P2Ok(Nil, env, f)\n  | Cons(d, rest) =>\n      match pass2One(d, env, f, copy, show) with\n      | P2OErr(m) => P2Err(m)\n      | P2OOk(mline, env2, f2) =>\n          match pass2(rest, env2, f2, copy, show) with\n          | P2Err(m) => P2Err(m)\n          | P2Ok(lines, envF, fF) =>\n              match mline with\n              | Just(l) => P2Ok(Cons(l, lines), envF, fF)\n              | Nothing => P2Ok(lines, envF, fF)\n              end\n          end\n      end\n  end\n\n\n(* ── Normalised signature printer (var ids → α,β,γ by first occurrence) ───── *)\n\nfn appendInt(xs : List(Int), x : Int) : List(Int) =\n  match xs with | Nil => Cons(x, Nil) | Cons(y, r) => Cons(y, appendInt(r, x)) end\n\nfn addVar(acc : List(Int), i : Int) : List(Int) =\n  if memberInt(i, acc) then acc else appendInt(acc, i)\n\nfn collectVarsList(ts : List(Mono), acc : List(Int)) : List(Int) =\n  match ts with | Nil => acc | Cons(t, rest) => collectVarsList(rest, collectVars(t, acc)) end\n\nfn collectVars(t : Mono, acc : List(Int)) : List(Int) =\n  match t with\n  | MVar(i)    => addVar(acc, i)\n  | MCon(_)    => acc\n  | MApp(_, as_) => collectVarsList(as_, acc)\n  | MFn(p, r)  => collectVars(r, collectVars(p, acc))\n  | MTup(es)   => collectVarsList(es, acc)\n  end\n\nfn indexOfInt(x : Int, xs : List(Int), k : Int) : Int =\n  match xs with | Nil => 0 | Cons(y, r) => if x == y then k else indexOfInt(x, r, k + 1) end\n\nfn pnArgs(ts : List(Mono), ids : List(Int)) : String =\n  match ts with\n  | Nil          => \"\"\n  | Cons(t, Nil) => pnP(t, ids, false)\n  | Cons(t, rest) => pnP(t, ids, false) + \", \" + pnArgs(rest, ids)\n  end\n\nfn pnInner(t : Mono, ids : List(Int)) : String =\n  match t with\n  | MVar(i)    => greek(indexOfInt(i, ids, 0))\n  | MCon(n)    => n\n  | MApp(h, as_) => match as_ with | Nil => h | _ => h + \"(\" + pnArgs(as_, ids) + \")\" end\n  | MFn(p, r)  => pnP(p, ids, true) + \" -> \" + pnP(r, ids, false)\n  | MTup(es)   => \"(\" + pnArgs(es, ids) + \")\"\n  end\n\nfn pnP(t : Mono, ids : List(Int), paren : Bool) : String =\n  match t with\n  | MFn(p, r) => if paren then \"(\" + pnInner(t, ids) + \")\" else pnInner(t, ids)\n  | _         => pnInner(t, ids)\n  end\n\nfn normSchemeStr(sc : Scheme) : String =\n  match sc with | Scheme(qs, body, cv) => pnP(body, collectVars(body, Nil), false) end\n\n\n(* ── Entry point ──────────────────────────────────────────────────────────── *)\n\nfn joinLines(ls : List(String)) : String =\n  match ls with\n  | Nil           => \"\"\n  | Cons(l, Nil)  => l\n  | Cons(l, rest) => l + \"\\n\" + joinLines(rest)\n  end\n\nfn checkProgram(prog : Prog) : String =\n  match prog with\n  | Prog(modName, imports, decls) =>\n      match initialEnv(0) with\n      | (env0, copy0) =>\n          let show0 = Cons(\"Int\", Cons(\"Float\", Cons(\"Bool\", Cons(\"String\", Nil)))) in\n          match pass1(decls, env0, 0, copy0, show0) with\n          | (env1, f1, copy1, show1) =>\n              match pass15(decls, env1, f1) with\n              | (env2, f2) =>\n                  match pass2(decls, env2, f2, copy1, show1) with\n                  | P2Err(m) => \"type error: \" + m\n                  | P2Ok(lines, _, _) => joinLines(Cons(\"(module \" + modName + \")\", lines))\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Typed-AST entry: produce a TProgram for the lowerer (port of infer.py's\n      `typecheck`).  checkProgram above only type-checks and prints signatures —\n      it discards the typed decls checkFnDecl/checkLetDecl build.  inferProgram\n      keeps them, assembling the TProgram the middle end (lower→opt→emit_tac_c)\n      consumes.  Mirrors typecheck's Pass 2: FnDecl/LetDecl → the checked TDecl,\n      TypeDecl → TTypeDecl (variants via synToMono — lower reads only the ctor\n      NAMES, so the payload monos need not match the oracle's fresh ids),\n      ImplDecl → TImplDecl with its methods' TFnDecls, TraitDecl → dropped.  No\n      Pass 0 (imports): the assembled compiler is a single module. ───────────── *)\n\ntype ImplCR  = | ICErr of String | ICOk of List(TDecl), Int\ntype Pass2CR = | P2CErr of String | P2COk of List(TDecl), List((String, Scheme)), Int\n\nfn buildVariants(vs : List(Variant), tve : List((String, Int)), f : Int) : (List(TVariant), Int) =\n  match vs with\n  | Nil => (Nil, f)\n  | Cons(Variant(vn, payload), rest) =>\n      match synToMonoList(payload, tve, f) with\n      | (monos, tve2, f2) =>\n          match buildVariants(rest, tve2, f2) with\n          | (tvs, f3) => (Cons(TVariant(vn, monos), tvs), f3)\n          end\n      end\n  end\n\nfn checkImplMethodsC(methods : List(IMethod), env : List((String, Scheme)), f : Int,\n                     copy : List(String), show : List(String)) : ImplCR =\n  match methods with\n  | Nil => ICOk(Nil, f)\n  | Cons(IMethod(mname, params, body), rest) =>\n      match checkFnDecl(FnDecl(false, mname, Nil, params, Nothing, body), env, f, copy, show) with\n      | FDErr(m) => ICErr(m)\n      | FDOk(tdecl, _, f2) =>\n          match checkImplMethodsC(rest, env, f2, copy, show) with\n          | ICErr(m) => ICErr(m)\n          | ICOk(tds, f3) => ICOk(Cons(tdecl, tds), f3)\n          end\n      end\n  end\n\nfn p2cCons(td : TDecl, r : Pass2CR) : Pass2CR =\n  match r with\n  | P2CErr(m) => P2CErr(m)\n  | P2COk(tds, env, f) => P2COk(Cons(td, tds), env, f)\n  end\n\nfn pass2Collect(decls : List(Decl), env : List((String, Scheme)), f : Int,\n                copy : List(String), show : List(String)) : Pass2CR =\n  match decls with\n  | Nil => P2COk(Nil, env, f)\n  | Cons(d, rest) =>\n      match d with\n      | FnDecl(_, name, _, _, _, _) =>\n          match checkFnDecl(d, env, f, copy, show) with\n          | FDErr(m) => P2CErr(m)\n          | FDOk(tdecl, sc, f2) => p2cCons(tdecl, pass2Collect(rest, envPut(env, name, sc), f2, copy, show))\n          end\n      | LetDecl(_, name, _, _) =>\n          match checkLetDecl(d, env, f, copy, show) with\n          | LDErr(m) => P2CErr(m)\n          | LDOk(tdecl, sc, f2) => p2cCons(tdecl, pass2Collect(rest, envPut(env, name, sc), f2, copy, show))\n          end\n      | TypeDecl(exported, name, params, body) =>\n          match body with\n          | Alias(_) => p2cCons(TTypeDecl(name, params, Nothing, exported), pass2Collect(rest, env, f, copy, show))\n          | Variants(vs) =>\n              match buildVariants(vs, Nil, f) with\n              | (tvs, f2) => p2cCons(TTypeDecl(name, params, Just(tvs), exported), pass2Collect(rest, env, f2, copy, show))\n              end\n          end\n      | TraitDecl(_, _, _, _) => pass2Collect(rest, env, f, copy, show)\n      | ImplDecl(tname, _, forty, methods) =>\n          match checkImplMethodsC(methods, env, f, copy, show) with\n          | ICErr(m) => P2CErr(m)\n          | ICOk(tds, f2) => p2cCons(TImplDecl(tname, forTypeName(forty), tds), pass2Collect(rest, env, f2, copy, show))\n          end\n      end\n  end\n\nfn inferProgram(prog : Prog) : Result(TProgram, String) =\n  match prog with\n  | Prog(modName, imports, decls) =>\n      match initialEnv(0) with\n      | (env0, copy0) =>\n          let show0 = Cons(\"Int\", Cons(\"Float\", Cons(\"Bool\", Cons(\"String\", Nil)))) in\n          match pass1(decls, env0, 0, copy0, show0) with\n          | (env1, f1, copy1, show1) =>\n              match pass15(decls, env1, f1) with\n              | (env2, f2) =>\n                  match pass2Collect(decls, env2, f2, copy1, show1) with\n                  | P2CErr(m) => Err(m)\n                  | P2COk(tds, _, _) => Ok(TProgram(modName, tds))\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Smoke driver (concatenated with lex+parse+types+tast — see infer_smoke) ─ *)\n\nfn main(io : IO) : IO =\n  let src = \"module Demo\\n\\nfn double(x : Int) : Int = x + x\\n\\nfn apply2(g : (Int) -> Int, y : Int) : Int = g(g(y))\\n\\nfn main(io : IO) : IO = print(io, int_to_string(apply2(double, 21)))\" in\n  print(io, checkProgram(parseProgram(tokenize(src, string_length(src), P(0, 1, 1)))))\n"}, {"path": "repo/self/lark/lex.lark", "group": "repo/self/lark", "name": "lex.lark", "text": "(* lex.lark — the Lark lexer, written in Lark.  ()\n\n   A faithful port of oracle/lexer.py: a single-pass, hand-written lexer that\n   turns source text into a flat token list.  It walks an Int cursor over the\n   (Copy) source String, classifying each codepoint by range comparison and\n   slicing whole lexemes — exactly the bet, proved out by lex_smoke.lark.\n\n   Design notes\n   ────────────\n   • State is a single Copy value `Pos(pos, line, col)` threaded through `let`\n     (Lark's `let` binds one name and cannot destructure a tuple, so multi-value\n     returns are carried as one ADT value and read back with accessors).  Int is\n     Copy, so position/line/col reuse across branches is free — no affine wart.\n   • The lexer is pure: it builds the whole token list, and `main` prints a dump\n     once.  (The affine checker sums a variable's uses across branches, so `io`\n     may not be threaded through control flow — a known wart of the language.)\n   • Validation is differential against lexer.py — see harness/lex_difftest.py.\n     The `main` here is only a smoke driver; the harness replaces it per file.\n\n   Run (smoke):  python3 oracle/cek.py lark/lex.lark  *)\n\nmodule Lex\n\n\n(* ── Token kinds (names mirror lexer.py's TK enum exactly) ────────────────── *)\n\ntype Kind =\n  | KInt | KFloat | KString | KTrue | KFalse | KUnit\n  | KName | KUpper\n  | KAnd | KElse | KEnd | KExport | KExposing | KFn | KFor | KIf | KImpl\n  | KImport | KIn | KLet | KMatch | KModule | KNot | KOf | KOr | KThen\n  | KTrait | KType | KWith\n  | KPlus | KMinus | KStar | KSlash\n  | KEqEq | KNeq | KLt | KLe | KGt | KGe\n  | KArrow | KFatArrow | KAssign | KPipe | KColon | KComma\n  | KLParen | KRParen | KLBracket | KRBracket | KLBrace | KRBrace\n  | KWildcard | KEof | KErr\n\nimpl Copy for Kind = {}\n\n\n(* A token: kind, raw lexeme text, and 1-based line/col of its first char. *)\ntype Token = | Tok of Kind, String, Int, Int\nimpl Copy for Token = {}\n\n\n(* Cursor state: byte offset, line, column (all 1-based except pos, 0-based). *)\ntype Pos = | P of Int, Int, Int\nimpl Copy for Pos = {}\n\nfn pos_of(st : Pos)  : Int = match st with | P(p, l, c) => p end\nfn line_of(st : Pos) : Int = match st with | P(p, l, c) => l end\nfn col_of(st : Pos)  : Int = match st with | P(p, l, c) => c end\n\n\n(* A read token plus the cursor state after it. *)\ntype Lexed = | Lexed of Token, Pos\nimpl Copy for Lexed = {}\n\n\ntype List a =\n  | Nil\n  | Cons of a, List(a)\n\nimpl Copy for List(Token) = {}\n\n\n(* ── Character classes: codepoint range comparison, no new prims. ─────────── *)\n\nfn is_digit(c : Int) : Bool = c >= 48 and c <= 57\nfn is_lower(c : Int) : Bool = c >= 97 and c <= 122\nfn is_upper(c : Int) : Bool = c >= 65 and c <= 90\nfn is_alpha(c : Int) : Bool = is_lower(c) or is_upper(c)\nfn is_alnum(c : Int) : Bool = is_alpha(c) or is_digit(c)\nfn is_name_cont(c : Int) : Bool = is_alnum(c) or c == 95   (* alnum or '_' *)\nfn is_ws(c : Int) : Bool = c == 32 or c == 9 or c == 13 or c == 10\n\n\n(* ── Cursor advance: consume one char, tracking line/col like lexer._advance. *)\n\nfn adv(src : String, st : Pos) : Pos =\n  let p = pos_of(st) in\n  if string_index(src, p) == 10 then P(p + 1, line_of(st) + 1, 1)\n  else P(p + 1, line_of(st), col_of(st) + 1)\n\n\n(* Scan forward from i while pred holds; return the first index where it fails.\n   Used only for single-line runs (digits, name chars) — no newline tracking. *)\nfn scan_while(src : String, n : Int, i : Int, pred : Int -> Bool) : Int =\n  if i >= n then i\n  else if pred(string_index(src, i)) then scan_while(src, n, i + 1, pred)\n  else i\n\n\n(* ── Skip whitespace and nested block comments  ───────────────────────────── *)\n\nfn scan_comment(src : String, n : Int, st : Pos, depth : Int) : Pos =\n  if depth == 0 then st\n  else\n    let p = pos_of(st) in\n    if p >= n then st                              (* unterminated; clean corpus won't hit *)\n    else\n      let c  = string_index(src, p) in\n      let c2 = string_index(src, p + 1) in\n      if c == 40 and c2 == 42 then                 (* nested opener *)\n        scan_comment(src, n, adv(src, adv(src, st)), depth + 1)\n      else if c == 42 and c2 == 41 then            (* closing delimiter *)\n        scan_comment(src, n, adv(src, adv(src, st)), depth - 1)\n      else scan_comment(src, n, adv(src, st), depth)\n\nfn skip_comment(src : String, n : Int, st : Pos) : Pos =\n  scan_comment(src, n, adv(src, adv(src, st)), 1)   (* consume opener, depth 1 *)\n\nfn skip(src : String, n : Int, st : Pos) : Pos =\n  let p = pos_of(st) in\n  if p >= n then st\n  else\n    let c = string_index(src, p) in\n    if is_ws(c) then skip(src, n, adv(src, st))\n    else if c == 40 and string_index(src, p + 1) == 42 then\n      skip(src, n, skip_comment(src, n, st))\n    else st\n\n\n(* ── Readers: each returns Lexed(token, state-after-token). ───────────────── *)\n\n(* number ::= digit+ ('.' digit+)?  — float only when '.' is followed by a digit *)\nfn read_number(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  let d1   = scan_while(src, n, sp, is_digit) in\n  if string_index(src, d1) == 46 and is_digit(string_index(src, d1 + 1)) then\n    let d2 = scan_while(src, n, d1 + 1, is_digit) in\n    Lexed(Tok(KFloat, string_slice(src, sp, d2), line, col),\n          P(d2, line, col + (d2 - sp)))\n  else\n    Lexed(Tok(KInt, string_slice(src, sp, d1), line, col),\n          P(d1, line, col + (d1 - sp)))\n\n(* string ::= '\"' ( '\\' any | ~'\"' )* '\"'  — text keeps quotes and raw escapes *)\nfn scan_string(src : String, n : Int, st : Pos) : Pos =\n  let p = pos_of(st) in\n  if p >= n then st                                (* unterminated *)\n  else\n    let c = string_index(src, p) in\n    if c == 34 then adv(src, st)                   (* closing quote consumed *)\n    else if c == 92 then                           (* backslash: skip it + next char *)\n      let st2 = adv(src, st) in\n      if pos_of(st2) >= n then st2\n      else scan_string(src, n, adv(src, st2))\n    else scan_string(src, n, adv(src, st))\n\nfn read_string(src : String, n : Int, st : Pos) : Lexed =\n  let start = pos_of(st) in\n  let line  = line_of(st) in\n  let col   = col_of(st) in\n  let endst = scan_string(src, n, adv(src, st)) in  (* adv past opening quote *)\n  Lexed(Tok(KString, string_slice(src, start, pos_of(endst)), line, col), endst)\n\nfn read_name(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  let e    = scan_while(src, n, sp, is_name_cont) in\n  let text = string_slice(src, sp, e) in\n  Lexed(Tok(keyword_kind(text), text, line, col), P(e, line, col + (e - sp)))\n\nfn read_upper(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  let e    = scan_while(src, n, sp, is_name_cont) in\n  Lexed(Tok(KUpper, string_slice(src, sp, e), line, col), P(e, line, col + (e - sp)))\n\nfn read_wildcard(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  if is_name_cont(string_index(src, sp + 1)) then  (* names may not start with '_' *)\n    Lexed(Tok(KErr, \"_\", line, col), P(sp + 1, line, col + 1))\n  else\n    Lexed(Tok(KWildcard, \"_\", line, col), P(sp + 1, line, col + 1))\n\n\n(* ── Symbols and operators ────────────────────────────────────────────────── *)\n\nfn one(k : Kind, text : String, st : Pos) : Lexed =\n  Lexed(Tok(k, text, line_of(st), col_of(st)),\n        P(pos_of(st) + 1, line_of(st), col_of(st) + 1))\n\nfn two(k : Kind, text : String, st : Pos) : Lexed =\n  Lexed(Tok(k, text, line_of(st), col_of(st)),\n        P(pos_of(st) + 2, line_of(st), col_of(st) + 2))\n\nfn read_symbol(src : String, n : Int, st : Pos) : Lexed =\n  let p  = pos_of(st) in\n  let c  = string_index(src, p) in\n  let c2 = string_index(src, p + 1) in\n  if c == 40 then (if c2 == 41 then two(KUnit, \"()\", st) else one(KLParen, \"(\", st))\n  else if c == 45 then (if c2 == 62 then two(KArrow, \"->\", st) else one(KMinus, \"-\", st))\n  else if c == 61 then\n    (if c2 == 61 then two(KEqEq, \"==\", st)\n     else if c2 == 62 then two(KFatArrow, \"=>\", st)\n     else one(KAssign, \"=\", st))\n  else if c == 33 then (if c2 == 61 then two(KNeq, \"!=\", st) else one(KErr, \"!\", st))\n  else if c == 60 then (if c2 == 61 then two(KLe, \"<=\", st) else one(KLt, \"<\", st))\n  else if c == 62 then (if c2 == 61 then two(KGe, \">=\", st) else one(KGt, \">\", st))\n  else if c == 43 then one(KPlus, \"+\", st)\n  else if c == 42 then one(KStar, \"*\", st)\n  else if c == 47 then one(KSlash, \"/\", st)\n  else if c == 124 then one(KPipe, \"|\", st)\n  else if c == 58 then one(KColon, \":\", st)\n  else if c == 44 then one(KComma, \",\", st)\n  else if c == 91 then one(KLBracket, \"[\", st)\n  else if c == 93 then one(KRBracket, \"]\", st)\n  else if c == 123 then one(KLBrace, \"{\", st)\n  else if c == 125 then one(KRBrace, \"}\", st)\n  else if c == 41 then one(KRParen, \")\", st)\n  else one(KErr, char_to_string(c), st)\n\n\n(* ── Main dispatch and the token loop ─────────────────────────────────────── *)\n\nfn lex_step(src : String, n : Int, st : Pos) : Lexed =\n  let c = string_index(src, pos_of(st)) in\n  if is_digit(c) then read_number(src, n, st)\n  else if c == 34 then read_string(src, n, st)\n  else if is_lower(c) then read_name(src, n, st)\n  else if is_upper(c) then read_upper(src, n, st)\n  else if c == 95 then read_wildcard(src, n, st)\n  else read_symbol(src, n, st)\n\nfn tokenize(src : String, n : Int, st : Pos) : List(Token) =\n  let st2 = skip(src, n, st) in\n  if pos_of(st2) >= n then\n    Cons(Tok(KEof, \"\", line_of(st2), col_of(st2)), Nil)\n  else\n    match lex_step(src, n, st2) with\n    | Lexed(tok, st3) => Cons(tok, tokenize(src, n, st3))\n    end\n\n\n(* ── Keyword table (lowercase text -> kind), else KName. ──────────────────── *)\n\n(* NB: keyword lookup uses `match` on string literals, not the `==` operator.\n   String `==` typechecks (Eq is polymorphic) but is unimplemented in the CEK\n   `binop` — only string `+` is.  Literal patterns route through `_val_eq`,\n   which does compare strings.  (A known wart of the language.) *)\nfn keyword_kind(text : String) : Kind =\n  match text with\n  | \"and\"      => KAnd\n  | \"else\"     => KElse\n  | \"end\"      => KEnd\n  | \"export\"   => KExport\n  | \"exposing\" => KExposing\n  | \"false\"    => KFalse\n  | \"fn\"       => KFn\n  | \"for\"      => KFor\n  | \"if\"       => KIf\n  | \"impl\"     => KImpl\n  | \"import\"   => KImport\n  | \"in\"       => KIn\n  | \"let\"      => KLet\n  | \"match\"    => KMatch\n  | \"module\"   => KModule\n  | \"not\"      => KNot\n  | \"of\"       => KOf\n  | \"or\"       => KOr\n  | \"then\"     => KThen\n  | \"trait\"    => KTrait\n  | \"true\"     => KTrue\n  | \"type\"     => KType\n  | \"with\"     => KWith\n  | _          => KName\n  end\n\n\n(* ── Serialization: one canonical line per token (kind line col text). ────── *)\n\nfn kind_name(k : Kind) : String =\n  match k with\n  | KInt => \"INT\" | KFloat => \"FLOAT\" | KString => \"STRING\"\n  | KTrue => \"TRUE\" | KFalse => \"FALSE\" | KUnit => \"UNIT\"\n  | KName => \"NAME\" | KUpper => \"UPPER\"\n  | KAnd => \"AND\" | KElse => \"ELSE\" | KEnd => \"END\" | KExport => \"EXPORT\"\n  | KExposing => \"EXPOSING\" | KFn => \"FN\" | KFor => \"FOR\" | KIf => \"IF\"\n  | KImpl => \"IMPL\" | KImport => \"IMPORT\" | KIn => \"IN\" | KLet => \"LET\"\n  | KMatch => \"MATCH\" | KModule => \"MODULE\" | KNot => \"NOT\" | KOf => \"OF\"\n  | KOr => \"OR\" | KThen => \"THEN\" | KTrait => \"TRAIT\" | KType => \"TYPE\"\n  | KWith => \"WITH\"\n  | KPlus => \"PLUS\" | KMinus => \"MINUS\" | KStar => \"STAR\" | KSlash => \"SLASH\"\n  | KEqEq => \"EQEQ\" | KNeq => \"NEQ\" | KLt => \"LT\" | KLe => \"LE\"\n  | KGt => \"GT\" | KGe => \"GE\"\n  | KArrow => \"ARROW\" | KFatArrow => \"FAT_ARROW\" | KAssign => \"ASSIGN\"\n  | KPipe => \"PIPE\" | KColon => \"COLON\" | KComma => \"COMMA\"\n  | KLParen => \"LPAREN\" | KRParen => \"RPAREN\"\n  | KLBracket => \"LBRACKET\" | KRBracket => \"RBRACKET\"\n  | KLBrace => \"LBRACE\" | KRBrace => \"RBRACE\"\n  | KWildcard => \"WILDCARD\" | KEof => \"EOF\" | KErr => \"ERR\"\n  end\n\n(* Escape a lexeme so each token stays on one line: \\ n t r are the only\n   special cases; mirrors the Python side of the differential harness. *)\nfn escape(s : String, i : Int, n : Int) : String =\n  if i >= n then \"\"\n  else\n    let c    = string_index(s, i) in\n    let rest = escape(s, i + 1, n) in\n    if c == 92 then \"\\\\\\\\\" + rest\n    else if c == 10 then \"\\\\n\" + rest\n    else if c == 9 then \"\\\\t\" + rest\n    else if c == 13 then \"\\\\r\" + rest\n    else char_to_string(c) + rest\n\nfn show_token(t : Token) : String =\n  match t with\n  | Tok(k, text, line, col) =>\n    kind_name(k) + \" \" + int_to_string(line) + \" \" + int_to_string(col)\n      + \" \" + escape(text, 0, string_length(text))\n  end\n\nfn dump(ts : List(Token)) : String =\n  match ts with\n  | Nil          => \"\"\n  | Cons(t, Nil) => show_token(t)\n  | Cons(t, rest) => show_token(t) + \"\\n\" + dump(rest)\n  end\n\n\n(* ── Smoke driver (the harness replaces this main per input file). ────────── *)\n\nfn main(io : IO) : IO =\n  let src = \"fn add(x : Int) : Int = x + 1\" in\n  print(io, dump(tokenize(src, string_length(src), P(0, 1, 1))))\n"}, {"path": "repo/self/lark/parse.lark", "group": "repo/self/lark", "name": "parse.lark", "text": "(* parse.lark — the Lark parser, written in Lark.  ()\n\n   A faithful port of oracle/parser.py + the AST types of oracle/tree.py.\n   Consumes the token list produced by lex.lark (imported as module Lex) and\n   builds a Program AST, then pretty-prints it to a canonical S-expression.\n\n   Design notes\n   ────────────\n   • The token stream is a `List(Token)` threaded through every parse function\n     as a Copy value; each function returns `(Node, List(Token))` — the built\n     node plus the remaining tokens (the functional analogue of parser.py's\n     `self.pos` cursor).  Token / Kind / List / Pos come from `import Lex`.\n   • \"expect a specific token\" is just a structural match on the head token,\n     e.g. `Cons(Tok(KUpper, name, _, _), rest)` grabs an UPPER's text and the\n     tail in one step.  Guaranteed-present tokens (ASSIGN, IN, THEN, …) are\n     dropped with `advance`.  Fallback `_` arms return a placeholder; on the\n     valid corpus they never fire (parser.py raises there instead).\n   • AST value types get `impl Copy` so a node may be reused across `match`\n     arms — the affine checker sums uses across arms (a known wart of the language), and the\n     precedence tails (`left` used in every arm) need that.  Copy impls are\n     name-only in infer, so this is free.\n   • Literals: INT/FLOAT keep the lexeme text (str(int|float) round-trips it —\n     verified over the corpus); STRING carries the *processed* value (escapes\n     resolved, quotes stripped) so it matches parser.py's `tok.value`.\n   • Validation is differential against parser.py — see harness/parse_difftest.py.\n     The `main` here is only a smoke driver; the harness replaces it per file.\n\n   Run (smoke):  python3 oracle/cek.py lark/parse.lark   *)\n\nmodule Parse\n\nimport Lex exposing (Kind, Token, Pos, List, tokenize, escape)\n\n\n(* ── AST types (port of tree.py) ──────────────────────────────────────────── *)\n\n(* Types.  (Named Ty to avoid the `type` keyword; serialized as tree.py names.) *)\ntype Ty =\n  | TName of String\n  | TApply of String, List(Ty)\n  | TFn of Ty, Ty\n  | TUnit\n  | TTuple of List(Ty)\n\n(* Literal payloads.  INT/FLOAT hold the lexeme text; STR holds the value. *)\ntype Val =\n  | VInt of String\n  | VFloat of String\n  | VStr of String\n  | VBool of Bool\n  | VUnit\n\ntype Pat =\n  | PWild\n  | PVar of String\n  | PLit of Val\n  | PCon of String, List(Pat)\n  | PTuple of List(Pat)\n\ntype Expr =\n  | Lit of Val\n  | Var of String\n  | Con of String\n  | TupleExpr of List(Expr)\n  | Apply of Expr, List(Expr)\n  | BinOp of String, Expr, Expr\n  | UnaryOp of String, Expr\n  | LetExpr of String, Maybe(Ty), Expr, Expr\n  | IfExpr of Expr, Expr, Expr\n  | MatchExpr of Expr, List(Arm)\n  | Lambda of List(Param), Expr\n\ntype Arm     = | Arm of Pat, Expr\ntype Param   = | Param of String, Maybe(Ty)\ntype Bound   = | Bound of String, String\ntype Variant = | Variant of String, List(Ty)\ntype TMethod = | TMethod of String, Ty\ntype IMethod = | IMethod of String, List(Param), Expr\n\n(* A type declaration's body is either an alias or a list of variants. *)\ntype TyBody = | Alias of Ty | Variants of List(Variant)\n\ntype Decl =\n  | FnDecl of Bool, String, List(Bound), List(Param), Maybe(Ty), Expr\n  | LetDecl of Bool, String, Maybe(Ty), Expr\n  | TypeDecl of Bool, String, List(String), TyBody\n  | TraitDecl of Bool, String, List(String), List(TMethod)\n  | ImplDecl of String, List(Ty), Ty, List(IMethod)\n\ntype Import = | Import of String, Maybe(List(String))\ntype Prog   = | Prog of String, List(Import), List(Decl)\n\ntype Maybe a = | Nothing | Just of a\n\n\n(* ── Copy impls: let a node be reused across match arms (a known wart of the language). ─────── *)\n\nimpl Copy for Ty       = {}\nimpl Copy for Val      = {}\nimpl Copy for Pat      = {}\nimpl Copy for Expr
