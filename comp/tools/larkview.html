<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>larkview — Lark source viewer</title>
<style>
:root{
  --bg:#ffffff; --panel:#f6f7f9; --border:#e2e5ea; --fg:#1c2024;
  --muted:#71767e; --accent:#4a4496; --sel:#e9e7f6;
  --kw:#8a2f7b; --typ:#1f6d5a; --str:#a3322a; --com:#71767e;
  --num:#8a5a00; --fn:#2b4a9b; --pun:#4a4f57; --ref:#7a5b00;
}
:root[data-theme="dark"]{
  --bg:#15171b; --panel:#1b1e24; --border:#2a2e36; --fg:#dfe3e8;
  --muted:#8a9099; --accent:#a9a2e6; --sel:#2c2960;
  --kw:#e08fce; --typ:#63c7a8; --str:#e7938a; --com:#7f858e;
  --num:#d8a24a; --fn:#8aa6ea; --pun:#9aa0a8; --ref:#d8b45a;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#15171b; --panel:#1b1e24; --border:#2a2e36; --fg:#dfe3e8;
    --muted:#8a9099; --accent:#a9a2e6; --sel:#2c2960;
    --kw:#e08fce; --typ:#63c7a8; --str:#e7938a; --com:#7f858e;
    --num:#d8a24a; --fn:#8aa6ea; --pun:#9aa0a8; --ref:#d8b45a;
  }
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--fg);background:var(--bg);display:flex;height:100vh;overflow:hidden;
}
#side{
  width:300px;min-width:220px;max-width:52vw;flex:0 0 auto;background:var(--panel);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
}
#side h1{
  font-size:14px;margin:0;padding:14px 14px 10px;letter-spacing:.02em;
  display:flex;align-items:center;gap:8px;
}
#side h1 .dot{color:var(--accent)}
#side h1 .count{color:var(--muted);font-weight:400;font-size:12px}
#filter{
  margin:0 12px 10px;padding:7px 10px;border:1px solid var(--border);
  border-radius:7px;background:var(--bg);color:var(--fg);font-size:13px;width:calc(100% - 24px);
}
#filter:focus{outline:2px solid var(--accent);outline-offset:-1px}
#list{overflow:auto;flex:1;padding-bottom:16px}
.grp{padding:9px 14px 3px;font-size:11px;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);position:sticky;top:0;background:var(--panel)}
.file{padding:5px 14px 5px 20px;cursor:pointer;font-size:13px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file:hover{background:var(--sel)}
.file.active{background:var(--sel);color:var(--accent);font-weight:600;
  box-shadow:inset 3px 0 0 var(--accent)}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#bar{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  border-bottom:1px solid var(--border);background:var(--panel);flex:0 0 auto;
}
#bar .name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bar .path{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bar .spacer{flex:1}
.btn{
  border:1px solid var(--border);background:var(--bg);color:var(--fg);
  padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
#view{flex:1;overflow:auto;position:relative}
#drop{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--accent) 12%,transparent);
  border:3px dashed var(--accent);color:var(--accent);font-size:18px;font-weight:600;z-index:5;
}
#drop.show{display:flex}
#empty{color:var(--muted);padding:40px;text-align:center;line-height:1.7}
pre.code{margin:0;padding:16px 16px 40px;font:13px/1.6 "SF Mono",Menlo,Consolas,
  "Liberation Mono",monospace;tab-size:4;display:grid;grid-template-columns:auto 1fr}
pre.code .ln{color:var(--muted);opacity:.55;text-align:right;padding-right:14px;
  user-select:none;white-space:pre}
pre.code .lc{white-space:pre;overflow-wrap:normal}
.t-kw{color:var(--kw);font-weight:600}
.t-typ{color:var(--typ)}
.t-str{color:var(--str)}
.t-com{color:var(--com);font-style:italic}
.t-num{color:var(--num)}
.t-fn{color:var(--fn)}
.t-pun{color:var(--pun)}
.t-ref{color:var(--ref);font-weight:600}
</style>
</head>
<body>
<aside id="side">
  <h1><span class="dot">&#9679;</span> larkview <span class="count" id="count">181 files</span></h1>
  <input id="filter" type="search" placeholder="Filter files…" autocomplete="off">
  <div id="list"></div>
</aside>
<section id="main">
  <div id="bar">
    <div style="min-width:0">
      <div class="name" id="curName">No file open</div>
      <div class="path" id="curPath">Click a file, or drop a .lark file anywhere</div>
    </div>
    <div class="spacer"></div>
    <label class="btn" for="upload">Open file…</label>
    <input id="upload" type="file" accept=".lark" style="display:none" multiple>
    <button class="btn" id="themeBtn" title="Toggle light/dark">&#9681;</button>
  </div>
  <div id="view">
    <div id="drop">Drop .lark file to view</div>
    <div id="empty">
      <p><strong>Pick a file on the left</strong> to see it highlighted,<br>
      or drag a <code>.lark</code> file onto this window.</p>
    </div>
  </div>
</section>

<script>
const FILES = [{"path": "repo/optimize/lark/emit_tac_c.lark", "group": "repo/optimize/lark", "name": "emit_tac_c.lark", "text": "(* emit_tac_c.lark — Lark's TAC → C emitter, written in Lark.\n   (the port of oracle/emit_tac_c.py.)\n\n   This strand builds a self-hosted OPTIMIZING C-compiler.  lower.lark turns the\n   typed AST into flat TAC (tac.lark), opt.lark will rewrite it, and THIS module\n   emits a self-contained C file from that TAC — the missing \"true self-\n   optimizing fixpoint\" backend leg (the optimizer and the C fixpoint share one\n   backend, unlike the RV32 assembler path).\n\n   Pipeline position (per emit_tac_c.py):\n       tast.lark → lower.lark → tac.lark → (opt.lark) → emit_tac_c.lark → C text\n\n   Design notes\n   ────────────\n   • This is a COMPONENT.  It consumes tac.lark's IR (Tmp / ConstVal / Operand /\n     Instr / Function / TAC) and never touches the typed AST — emit_tac_c reads\n     only the TAC's structure, names and literals.  As with the parser, evaluator, C emitter and lowerer, the\n     differential harness assembles the pipeline by CONCATENATION (lex + parse +\n     tac + emit_tac_c + a generated main); it does NOT type-check standalone.\n     Run path: `python3 tests/emit_tac_c_difftest.py`.\n   • PURE, no mutation.  emit_tac_c.py's CEmitter carries one piece of mutable\n     state — `strlits`, the interned string-literal table filled DURING emission\n     and read AFTER (the STR[] table precedes the function bodies in the output).\n     Here it is a threaded `List(String)` in first-seen (= index) order: every\n     emit* that can touch a string Const returns `(…, table)`.  The read-only\n     tables (tag ids, defined-fn names, global names) ride in a `Ctx` record.\n   • BYTE ORDER is the whole game.  The emitter builds all function bodies FIRST\n     (accumulating strlits), THEN renders the STR[] table + its initialiser from\n     the final table, THEN assembles: preamble, STR[] decl, globals, prototypes,\n     strlit init, bodies, main — exactly emit_tac_c.py's `parts` sequence, joined\n     with \"\\n\" (balanced join, to dodge the O(n²) arena wall) + one trailing\n     \"\\n\".  The self-contained C preamble is one verbatim string constant\n     (`etcPreambleRaw`), matching the oracle's `_PREAMBLE` element for element.\n   • The machine word is `intptr_t` (`lkw`); floats are packed as their f32 bit\n     pattern.  A float literal's bits come from `string_to_float` + `float_to_bits`\n     (the same idiom the C emitter uses); an integer Const's digits pass straight through.\n   • NAME MANGLING mirrors `_mang`: any non-[A-Za-z0-9_] byte → `_hh_` (lowercase\n     hex).  C-string escaping mirrors `_cstr`: octal `\\NNN` for bytes outside the\n     printable ASCII range (the self-host corpus is ASCII, where a codepoint IS\n     its byte — the UTF-8/codepoint caveat matches char_to_string's).            *)\n\nmodule EmitTacC\n\n\n(* ── Small generic list helpers ───────────────────────────────────────────── *)\n(* etcLen is polymorphic (List(a) is Copy when a is — infer's is_copy); reused\n   for String / Operand / Function lists alike. *)\n\nfn etcLen(xs : List(a)) : Int =\n  match xs with | Nil => 0 | Cons(_, r) => 1 + etcLen(r) end\n\n(* String-monomorphic reverse: a polymorphic List(a) accumulator-reverse trips\n   the frozen infer's occurs gap (same reason emit_c.lark's ecRev is monomorphic).  etcLen above stays polymorphic — only the reverse pattern bites. *)\nfn etcRev(xs : List(String), acc : List(String)) : List(String) =\n  match xs with | Nil => acc | Cons(x, r) => etcRev(r, Cons(x, acc)) end\n\n\n(* ── String equality / ordering (string `==` is unimplemented in cek.binop) ── *)\n\nfn etcStrEqGo(a : String, b : String, i : Int, n : Int) : Bool =\n  if i >= n then true\n  else if string_index(a, i) == string_index(b, i) then etcStrEqGo(a, b, i + 1, n)\n  else false\n\nfn etcStrEq(a : String, b : String) : Bool =\n  let la = string_length(a) in\n  let lb = string_length(b) in\n  if la == lb then etcStrEqGo(a, b, 0, la) else false\n\n(* Python string `<`: lexicographic by codepoint, a proper prefix is smaller. *)\nfn etcStrLtGo(a : String, b : String, i : Int, la : Int, lb : Int) : Bool =\n  if i >= la then (if i >= lb then false else true)\n  else if i >= lb then false\n  else\n    let ca = string_index(a, i) in\n    let cb = string_index(b, i) in\n    if ca < cb then true\n    else if ca > cb then false\n    else etcStrLtGo(a, b, i + 1, la, lb)\n\nfn etcStrLt(a : String, b : String) : Bool =\n  etcStrLtGo(a, b, 0, string_length(a), string_length(b))\n\nfn etcMember(x : String, xs : List(String)) : Bool =\n  match xs with\n  | Nil          => false\n  | Cons(y, r)   => if etcStrEq(x, y) then true else etcMember(x, r)\n  end\n\n(* nub keeping first occurrence (order irrelevant — always sorted afterward). *)\nfn etcNubGo(xs : List(String), seen : List(String)) : List(String) =\n  match xs with\n  | Nil        => Nil\n  | Cons(x, r) => if etcMember(x, seen) then etcNubGo(r, seen)\n                  else Cons(x, etcNubGo(r, Cons(x, seen)))\n  end\n\nfn etcDedupe(xs : List(String)) : List(String) = etcNubGo(xs, Nil)\n\nfn etcInsert(x : String, xs : List(String)) : List(String) =\n  match xs with\n  | Nil        => Cons(x, Nil)\n  | Cons(y, r) => if etcStrLt(x, y) then Cons(x, Cons(y, r)) else Cons(y, etcInsert(x, r))\n  end\n\nfn etcSort(xs : List(String)) : List(String) =\n  match xs with | Nil => Nil | Cons(x, r) => etcInsert(x, etcSort(r)) end\n\n\n(* ── Hex (name mangling) + octal (C string escapes) ───────────────────────── *)\n\nfn etcHexDigit(d : Int) : String =                    (* lowercase, matches _mang *)\n  if d < 10 then char_to_string(48 + d) else char_to_string(87 + d)\n\nfn etcHexRaw(n : Int) : String =                      (* n >= 0, unpadded *)\n  if n < 16 then etcHexDigit(n)\n  else etcHexRaw(n / 16) + etcHexDigit(n - (n / 16) * 16)\n\nfn etcOctDigit(d : Int) : String = char_to_string(48 + d)\n\n(* 3-digit zero-padded octal; n in 0..511 covers every byte. *)\nfn etcOct3(n : Int) : String =\n  let d0 = n - (n / 8) * 8 in\n  let n1 = n / 8 in\n  let d1 = n1 - (n1 / 8) * 8 in\n  let d2 = n1 / 8 in\n  etcOctDigit(d2) + etcOctDigit(d1) + etcOctDigit(d0)\n\n\n(* ── Name mangling (port of _mang) ────────────────────────────────────────── *)\n\nfn etcIsIdentByte(c : Int) : Bool =\n  (c >= 48 and c <= 57) or (c >= 65 and c <= 90) or (c >= 97 and c <= 122) or c == 95\n\nfn etcMangChar(c : Int) : String =\n  if etcIsIdentByte(c) then char_to_string(c) else \"_\" + etcHexRaw(c) + \"_\"\n\nfn etcMangGo(s : String, i : Int, n : Int) : String =\n  if i >= n then \"\" else etcMangChar(string_index(s, i)) + etcMangGo(s, i + 1, n)\n\nfn etcMang(s : String) : String = etcMangGo(s, 0, string_length(s))\n\n\n(* ── C string literal (port of _cstr; octal-escaped bytes) ────────────────── *)\n\nfn etcCStrChar(c : Int) : String =\n  if c == 34 then \"\\\\\\\"\"            (* \" *)\n  else if c == 92 then \"\\\\\\\\\"       (* \\ *)\n  else if c == 10 then \"\\\\n\"\n  else if c == 9  then \"\\\\t\"\n  else if c == 13 then \"\\\\r\"\n  else if c >= 32 and c < 127 then char_to_string(c)\n  else \"\\\\\" + etcOct3(c)\n\nfn etcCStrGo(s : String, i : Int, n : Int, acc : String) : String =\n  if i >= n then acc\n  else etcCStrGo(s, i + 1, n, acc + etcCStrChar(string_index(s, i)))\n\nfn etcCStr(s : String) : String = \"\\\"\" + etcCStrGo(s, 0, string_length(s), \"\") + \"\\\"\"\n\n(* A float literal's f32 bit pattern (the float_to_bits idiom). *)\nfn etcFloatBits(txt : String) : Int =\n  match string_to_float(txt) with | Ok(f) => float_to_bits(f) | Err(_) => 0 end\n\n\n(* ── Emitter context (the read-only tables) ───────────────────────────────── *)\n\n(* tag ids (assoc name→id, from IAlloc tags), defined-fn names, global names, and\n   the current function's IGetTag-dst tmp names (set per function in etcFnLines;\n   an `==`/`!=` against a string Const whose LHS is one of these is a tag test,\n   otherwise it is a genuine string compare). *)\ntype Ctx = | Ctx of List((String, Int)), List(String), List(String), List(String)\nimpl Copy for Ctx = {}\n\nfn etcCtxTags(c : Ctx)    : List((String, Int)) = match c with | Ctx(t, _, _, _) => t end\nfn ctxDefined(c : Ctx) : List(String)        = match c with | Ctx(_, d, _, _) => d end\nfn ctxGlobals(c : Ctx) : List(String)        = match c with | Ctx(_, _, g, _) => g end\nfn etcCtxTagTmps(c : Ctx) : List(String)     = match c with | Ctx(_, _, _, tt) => tt end\n\nfn etcTagId(pairs : List((String, Int)), name : String, dflt : Int) : Int =\n  match pairs with\n  | Nil              => dflt\n  | Cons((k, v), r)  => if etcStrEq(k, name) then v else etcTagId(r, name, dflt)\n  end\n\n(* C name for a call/def target (port of cfn). *)\nfn etcCfn(ctx : Ctx, name : String) : String =\n  if etcStrEq(name, \"main\") then \"lark_main\"\n  else if etcMember(name, ctxDefined(ctx)) then \"lk_\" + etcMang(name)\n  else name\n\n(* C name for a value (port of vname). *)\nfn etcVname(ctx : Ctx, name : String) : String =\n  if etcMember(name, ctxGlobals(ctx)) then \"g_\" + etcMang(name)\n  else \"v_\" + etcMang(name)\n\nfn etcTmpName(t : Tmp) : String = match t with | Tmp(n) => n end\n\n\n(* ── String-literal interning (port of _strlit; the one threaded table) ───── *)\n\nfn etcIndexOf(xs : List(String), s : String, i : Int) : Int =\n  match xs with\n  | Nil        => 0 - 1\n  | Cons(x, r) => if etcStrEq(x, s) then i else etcIndexOf(r, s, i + 1)\n  end\n\nfn etcIntern(table : List(String), s : String) : (Int, List(String)) =\n  let idx = etcIndexOf(table, s, 0) in\n  if idx == 0 - 1 then (etcLen(table), tacSnocStr(table, s))\n  else (idx, table)\n\n\n(* ── Value expressions (port of vref) ─────────────────────────────────────── *)\n\nfn etcVref(ctx : Ctx, v : Operand, table : List(String)) : (String, List(String)) =\n  match v with\n  | OTmp(t)   => (etcVname(ctx, etcTmpName(t)), table)\n  | OConst(c) =>\n      match c with\n      | CUnit     => (\"(lkw)0\", table)\n      | CBool(b)  => (if b then \"(lkw)1\" else \"(lkw)0\", table)\n      | CInt(s)   => (\"(lkw)(\" + s + \"LL)\", table)\n      | CFloat(s) => (\"(lkw)\" + int_to_string(etcFloatBits(s)) + \"uLL\", table)\n      | CStr(s)   =>\n          match etcIntern(table, s) with\n          | (idx, table1) => (\"((lkw)STR[\" + int_to_string(idx) + \"])\", table1)\n          end\n      end\n  end\n\nfn etcVrefList(ctx : Ctx, ops : List(Operand), table : List(String)) : (List(String), List(String)) =\n  match ops with\n  | Nil          => (Nil, table)\n  | Cons(o, rest) =>\n      match etcVref(ctx, o, table) with\n      | (s, t1) =>\n          match etcVrefList(ctx, rest, t1) with\n          | (ss, t2) => (Cons(s, ss), t2)\n          end\n      end\n  end\n\n\n(* ── Binary operators (port of _binop) ────────────────────────────────────── *)\n\nfn etcOpArith(op : String) : Bool =\n  etcStrEq(op, \"+\") or etcStrEq(op, \"-\") or etcStrEq(op, \"*\") or etcStrEq(op, \"/\") or etcStrEq(op, \"%\")\n\nfn etcOpCmp(op : String) : Bool =\n  etcStrEq(op, \"<\") or etcStrEq(op, \">\") or etcStrEq(op, \"<=\") or etcStrEq(op, \">=\")\n\nfn etcBinop(ctx : Ctx, op : String, l : Operand, r : Operand, table : List(String)) : (String, List(String)) =\n  match etcVref(ctx, l, table) with\n  | (lc, t1) =>\n      if etcOpArith(op) then\n        match etcVref(ctx, r, t1) with | (rc, t2) => (\"(\" + lc + \" \" + op + \" \" + rc + \")\", t2) end\n      else if etcStrEq(op, \"&&\") then\n        match etcVref(ctx, r, t1) with | (rc, t2) => (\"(\" + lc + \" & \" + rc + \")\", t2) end\n      else if etcStrEq(op, \"||\") then\n        match etcVref(ctx, r, t1) with | (rc, t2) => (\"(\" + lc + \" | \" + rc + \")\", t2) end\n      else if etcOpCmp(op) then\n        match etcVref(ctx, r, t1) with | (rc, t2) => (\"(\" + lc + \" \" + op + \" \" + rc + \")\", t2) end\n      else if etcStrEq(op, \"==\") or etcStrEq(op, \"!=\") then\n        (* An `==`/`!=` whose RHS is a string Const is either a constructor-tag test\n           (LHS is an integer tag from IGetTag, RHS names the constructor) or a\n           genuine string-literal comparison (e.g. lexer keyword_kind).  Distinguish\n           by the LHS: a tag test's LHS is always an IGetTag dst (etcCtxTagTmps). *)\n        match r with\n        | OConst(CStr(sv)) =>\n            match l with\n            | OTmp(ln) =>\n                if etcMember(etcTmpName(ln), etcCtxTagTmps(ctx)) then\n                  (* constructor-tag test — mirror asm._instr, tag_ids.get(name,-1) *)\n                  let tid = etcTagId(etcCtxTags(ctx), sv, 0 - 1) in\n                  (\"(\" + lc + \" \" + op + \" \" + int_to_string(tid) + \")   /* tag \" + sv + \" */\", t1)\n                else\n                  match etcVref(ctx, r, t1) with\n                  | (rc, t2) =>\n                      let eq = \"__lark_streq(\" + lc + \", \" + rc + \")\" in\n                      (if etcStrEq(op, \"==\") then eq else \"(!\" + eq + \")\", t2)\n                  end\n            | _ =>\n                let tid = etcTagId(etcCtxTags(ctx), sv, 0 - 1) in\n                (\"(\" + lc + \" \" + op + \" \" + int_to_string(tid) + \")   /* tag \" + sv + \" */\", t1)\n            end\n        | _ =>\n            match etcVref(ctx, r, t1) with | (rc, t2) => (\"(\" + lc + \" \" + op + \" \" + rc + \")\", t2) end\n        end\n      else\n        match etcVref(ctx, r, t1) with | (rc, t2) => (\"(\" + lc + \" \" + op + \" \" + rc + \")\", t2) end\n  end\n\n\n(* ── Instruction emission (port of emit_instr) ────────────────────────────── *)\n\n(* \"    _p[i+1] = <field>;\" lines for IAlloc fields / IAllocClosure captures. *)\nfn etcFieldLines(ctx : Ctx, fields : List(Operand), idx : Int, table : List(String)) : (List(String), List(String)) =\n  match fields with\n  | Nil          => (Nil, table)\n  | Cons(f, rest) =>\n      match etcVref(ctx, f, table) with\n      | (s, t1) =>\n          let line = \"    _p[\" + int_to_string(idx + 1) + \"] = \" + s + \";\" in\n          match etcFieldLines(ctx, rest, idx + 1, t1) with\n          | (more, t2) => (Cons(line, more), t2)\n          end\n      end\n  end\n\nfn etcInstr(ctx : Ctx, ins : Instr, table : List(String)) : (List(String), List(String)) =\n  match ins with\n  | ILabel(lbl) => (Cons(\"  L_\" + etcMang(lbl) + \": ;\", Nil), table)\n  | IJump(lbl)  => (Cons(\"  goto L_\" + etcMang(lbl) + \";\", Nil), table)\n  | ICondJump(c, tl, fl) =>\n      match etcVref(ctx, c, table) with\n      | (cs, t1) =>\n          (Cons(\"  if (\" + cs + \") goto L_\" + etcMang(tl) + \"; else goto L_\" + etcMang(fl) + \";\", Nil), t1)\n      end\n  | IAssign(d, src) =>\n      match etcVref(ctx, src, table) with\n      | (ss, t1) => (Cons(\"  \" + etcVname(ctx, etcTmpName(d)) + \" = \" + ss + \";\", Nil), t1)\n      end\n  | IBinOp(d, op, l, r) =>\n      match etcBinop(ctx, op, l, r, table) with\n      | (e, t1) => (Cons(\"  \" + etcVname(ctx, etcTmpName(d)) + \" = \" + e + \";\", Nil), t1)\n      end\n  | IUnary(d, op, src) =>\n      match etcVref(ctx, src, table) with\n      | (s, t1) =>\n          let e = if etcStrEq(op, \"-\") then \"(-\" + s + \")\" else \"(\" + s + \" ^ 1)\" in\n          (Cons(\"  \" + etcVname(ctx, etcTmpName(d)) + \" = \" + e + \";\", Nil), t1)\n      end\n  | ICall(md, callee, args) =>\n      match etcVrefList(ctx, args, table) with\n      | (argss, t1) =>\n          let call = etcCfn(ctx, callee) + \"(\" + tacJoin(\", \", argss) + \")\" in\n          match md with\n          | Nothing => (Cons(\"  \" + call + \";\", Nil), t1)\n          | Just(d) => (Cons(\"  \" + etcVname(ctx, etcTmpName(d)) + \" = \" + call + \";\", Nil), t1)\n          end\n      end\n  | IClosureCall(d, fv, arg) =>\n      match etcVref(ctx, fv, table) with\n      | (cs, t1) =>\n          match etcVref(ctx, arg, t1) with\n          | (as0, t2) =>\n              let dn = etcVname(ctx, etcTmpName(d)) in\n              (Cons(\"  { lark_ptr _c = (lark_ptr)\" + cs + \";\",\n               Cons(\"    lkw (*_f)(lkw, lkw) = (lkw (*)(lkw, lkw))_c[0];\",\n               Cons(\"    \" + dn + \" = _f((lkw)_c, \" + as0 + \"); }\", Nil))), t2)\n          end\n      end\n  | IReturn(mv) =>\n      match mv with\n      | Nothing => (Cons(\"  return (lkw)0;\", Nil), table)\n      | Just(v) =>\n          match etcVref(ctx, v, table) with\n          | (vs, t1) => (Cons(\"  return \" + vs + \";\", Nil), t1)\n          end\n      end\n  | IAlloc(d, tag, fields) =>\n      let n = 1 + etcLen(fields) in\n      let tagId = if etcStrEq(tag, \"()\") then 0 else etcTagId(etcCtxTags(ctx), tag, 0) in\n      match etcFieldLines(ctx, fields, 0, table) with\n      | (fieldLines, t1) =>\n          let hd = Cons(\"  { lark_ptr _p = __heap_alloc(\" + int_to_string(n) + \");\",\n                   Cons(\"    _p[0] = \" + int_to_string(tagId) + \";\", Nil)) in\n          let tl = Cons(\"    \" + etcVname(ctx, etcTmpName(d)) + \" = (lkw)_p; }\", Nil) in\n          (tacAppendStr(hd, tacAppendStr(fieldLines, tl)), t1)\n      end\n  | IGetTag(d, src) =>\n      match etcVref(ctx, src, table) with\n      | (s, t1) => (Cons(\"  \" + etcVname(ctx, etcTmpName(d)) + \" = ((lark_ptr)\" + s + \")[0];\", Nil), t1)\n      end\n  | IGetField(d, src, idx) =>\n      match etcVref(ctx, src, table) with\n      | (s, t1) => (Cons(\"  \" + etcVname(ctx, etcTmpName(d)) + \" = ((lark_ptr)\" + s + \")[\" + int_to_string(idx + 1) + \"];\", Nil), t1)\n      end\n  | IAllocClosure(d, callee, caps) =>\n      let n = 1 + etcLen(caps) in\n      match etcFieldLines(ctx, caps, 0, table) with\n      | (capLines, t1) =>\n          let hd = Cons(\"  { lark_ptr _p = __heap_alloc(\" + int_to_string(n) + \");\",\n                   Cons(\"    _p[0] = (lkw)&\" + etcCfn(ctx, callee) + \";\", Nil)) in\n          let tl = Cons(\"    \" + etcVname(ctx, etcTmpName(d)) + \" = (lkw)_p; }\", Nil) in\n          (tacAppendStr(hd, tacAppendStr(capLines, tl)), t1)\n      end\n  end\n\nfn etcInstrs(ctx : Ctx, inss : List(Instr), table : List(String)) : (List(String), List(String)) =\n  match inss with\n  | Nil          => (Nil, table)\n  | Cons(i, rest) =>\n      match etcInstr(ctx, i, table) with\n      | (ls, t1) =>\n          match etcInstrs(ctx, rest, t1) with\n          | (more, t2) => (tacAppendStr(ls, more), t2)\n          end\n      end\n  end\n\n\n(* ── Local-temp declarations (port of _emit_fn's locals sweep) ────────────── *)\n\n(* The dst Tmp name an instruction writes, if any (port of _defs). *)\nfn etcDefs(i : Instr) : Maybe(String) =\n  match i with\n  | IAssign(d, _)          => Just(etcTmpName(d))\n  | IBinOp(d, _, _, _)     => Just(etcTmpName(d))\n  | IUnary(d, _, _)        => Just(etcTmpName(d))\n  | ICall(md, _, _)        => match md with | Nothing => Nothing | Just(d) => Just(etcTmpName(d)) end\n  | IClosureCall(d, _, _)  => Just(etcTmpName(d))\n  | IReturn(_)             => Nothing\n  | ILabel(_)              => Nothing\n  | IJump(_)               => Nothing\n  | ICondJump(_, _, _)     => Nothing\n  | IAlloc(d, _, _)        => Just(etcTmpName(d))\n  | IGetTag(d, _)          => Just(etcTmpName(d))\n  | IGetField(d, _, _)     => Just(etcTmpName(d))\n  | IAllocClosure(d, _, _) => Just(etcTmpName(d))\n  end\n\n(* Collect written temps in first-seen order, skipping params and globals. *)\nfn etcLocalsGo(ctx : Ctx, inss : List(Instr), seen : List(String), acc : List(String)) : List(String) =\n  match inss with\n  | Nil          => etcRev(acc, Nil)\n  | Cons(i, rest) =>\n      match etcDefs(i) with\n      | Nothing => etcLocalsGo(ctx, rest, seen, acc)\n      | Just(d) =>\n          if etcMember(d, seen) or etcMember(d, ctxGlobals(ctx)) then etcLocalsGo(ctx, rest, seen, acc)\n          else etcLocalsGo(ctx, rest, Cons(d, seen), Cons(d, acc))\n      end\n  end\n\nfn etcLocalDecls(ctx : Ctx, locals : List(String)) : List(String) =\n  match locals with\n  | Nil        => Nil\n  | Cons(n, r) => Cons(\"lkw \" + etcVname(ctx, n) + \" = 0\", etcLocalDecls(ctx, r))\n  end\n\n\n(* ── Parameter lists / prototypes ─────────────────────────────────────────── *)\n\nfn etcParamDeclList(ctx : Ctx, params : List(String)) : List(String) =\n  match params with\n  | Nil        => Nil\n  | Cons(p, r) => Cons(\"lkw \" + etcVname(ctx, p), etcParamDeclList(ctx, r))\n  end\n\nfn etcParamDecls(ctx : Ctx, params : List(String)) : String =\n  match params with\n  | Nil => \"void\"\n  | _   => tacJoin(\", \", etcParamDeclList(ctx, params))\n  end\n\nfn etcProto(ctx : Ctx, f : Function) : String =\n  match f with\n  | Function(name, params, _, _) =>\n      \"static lkw \" + etcCfn(ctx, name) + \"(\" + etcParamDecls(ctx, params) + \");\"\n  end\n\nfn etcProtos(ctx : Ctx, funcs : List(Function)) : List(String) =\n  match funcs with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(etcProto(ctx, f), etcProtos(ctx, r))\n  end\n\n\n(* ── One function body (port of _emit_fn) ─────────────────────────────────── *)\n\n(* Tmp names that are the dst of an IGetTag (integer constructor tags). *)\nfn etcTagTmps(inss : List(Instr)) : List(String) =\n  match inss with\n  | Nil          => Nil\n  | Cons(i, rest) =>\n      match i with\n      | IGetTag(d, _) => Cons(etcTmpName(d), etcTagTmps(rest))\n      | _             => etcTagTmps(rest)\n      end\n  end\n\nfn etcFnLines(ctx : Ctx, f : Function, table : List(String)) : (List(String), List(String)) =\n  match f with\n  | Function(name, params, body, _) =>\n      let head = \"static lkw \" + etcCfn(ctx, name) + \"(\" + etcParamDecls(ctx, params) + \") {\" in\n      let locals = etcLocalsGo(ctx, body, params, Nil) in\n      let ctx2 = Ctx(etcCtxTags(ctx), ctxDefined(ctx), ctxGlobals(ctx), etcTagTmps(body)) in\n      let declLines =\n        match locals with\n        | Nil => Nil\n        | _   => Cons(\"  \" + tacJoin(\"; \", etcLocalDecls(ctx, locals)) + \";\", Nil)\n        end in\n      match etcInstrs(ctx2, body, table) with\n      | (bodyLines, t1) =>\n          let out =\n            tacAppendStr(Cons(head, Nil),\n            tacAppendStr(declLines,\n            tacAppendStr(bodyLines,\n              Cons(\"  return (lkw)0;\", Cons(\"}\", Nil))))) in\n          (out, t1)\n      end\n  end\n\n(* All bodies, each followed by a blank line (bodies.extend(...); append(\"\")). *)\nfn etcBodies(ctx : Ctx, funcs : List(Function), table : List(String)) : (List(String), List(String)) =\n  match funcs with\n  | Nil        => (Nil, table)\n  | Cons(f, r) =>\n      match etcFnLines(ctx, f, table) with\n      | (lines, t1) =>\n          match etcBodies(ctx, r, t1) with\n          | (more, t2) => (tacAppendStr(lines, Cons(\"\", more)), t2)\n          end\n      end\n  end\n\n\n(* ── Function de-duplication (port of _functions: last-wins, first-position) ─ *)\n\nfn etcFnName(f : Function) : String = match f with | Function(n, _, _, _) => n end\n\nfn dfUpsert(pairs : List((String, Function)), name : String, f : Function) : List((String, Function)) =\n  match pairs with\n  | Nil             => Cons((name, f), Nil)\n  | Cons((k, v), r) => if etcStrEq(k, name) then Cons((name, f), r) else Cons((k, v), dfUpsert(r, name, f))\n  end\n\nfn dfBuild(fns : List(Function), acc : List((String, Function))) : List((String, Function)) =\n  match fns with\n  | Nil        => acc\n  | Cons(f, r) => dfBuild(r, dfUpsert(acc, etcFnName(f), f))\n  end\n\nfn dfValues(pairs : List((String, Function))) : List(Function) =\n  match pairs with | Nil => Nil | Cons((_, v), r) => Cons(v, dfValues(r)) end\n\nfn etcDedupeFns(fns : List(Function)) : List(Function) = dfValues(dfBuild(fns, Nil))\n\nfn etcFnNames(fns : List(Function)) : List(String) =\n  match fns with | Nil => Nil | Cons(f, r) => Cons(etcFnName(f), etcFnNames(r)) end\n\n\n(* ── Constructor-tag collection (port of CEmitter.__init__'s tag scan) ─────── *)\n\nfn etcTagsInstr(i : Instr) : List(String) =\n  match i with\n  | IAlloc(_, tag, _) => if etcStrEq(tag, \"()\") then Nil else Cons(tag, Nil)\n  | _                 => Nil\n  end\n\nfn etcTagsBody(inss : List(Instr)) : List(String) =\n  match inss with\n  | Nil        => Nil\n  | Cons(i, r) => tacAppendStr(etcTagsInstr(i), etcTagsBody(r))\n  end\n\nfn etcTagsAll(fns : List(Function)) : List(String) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => match f with | Function(_, _, body, _) => tacAppendStr(etcTagsBody(body), etcTagsAll(r)) end\n  end\n\nfn etcTagAssocGo(xs : List(String), i : Int) : List((String, Int)) =\n  match xs with | Nil => Nil | Cons(t, r) => Cons((t, i), etcTagAssocGo(r, i + 1)) end\n\nfn etcTagAssoc(sortedTags : List(String)) : List((String, Int)) = etcTagAssocGo(sortedTags, 0)\n\n\n(* ── Global declarations + string-literal table (port of emit's tail) ─────── *)\n\nfn etcGDecls(sortedGlobals : List(String)) : List(String) =\n  match sortedGlobals with\n  | Nil        => Nil\n  | Cons(n, r) => Cons(\"static lkw g_\" + etcMang(n) + \" = 0;\", etcGDecls(r))\n  end\n\nfn etcStrArr(table : List(String)) : String =\n  let n = etcLen(table) in\n  if n == 0 then \"static lark_ptr STR[1];\"\n  else \"static lark_ptr STR[\" + int_to_string(n) + \"];\"\n\nfn etcStrinitGo(table : List(String), i : Int) : List(String) =\n  match table with\n  | Nil        => Nil\n  | Cons(s, r) => Cons(\"  STR[\" + int_to_string(i) + \"] = lark_alloc_string(\" + etcCStr(s) + \");\", etcStrinitGo(r, i + 1))\n  end\n\nfn etcStrinit(table : List(String)) : List(String) =\n  Cons(\"static void __strlit_init(void) {\", tacAppendStr(etcStrinitGo(table, 0), Cons(\"}\", Nil)))\n\nfn etcMainLines(hasGinit : Bool) : List(String) =\n  Cons(\"int main(void) {\",\n  Cons(\"  __strlit_init();\",\n  Cons((if hasGinit then \"  lk___global_init__();\" else \"  /* no top-level lets */\"),\n  Cons(\"  lark_main((lkw)0);\",\n  Cons(\"  return 0;\",\n  Cons(\"}\", Nil))))))\n\n\n(* ── Balanced \"\\n\" join (port of emit_c.lark ecJoinNL — dodges the arena wall) *)\n\nfn etcJoinPairs(ls : List(String)) : List(String) =\n  match ls with\n  | Nil                    => Nil\n  | Cons(a, Nil)           => Cons(a, Nil)\n  | Cons(a, Cons(b, rest)) => Cons(a + \"\\n\" + b, etcJoinPairs(rest))\n  end\n\nfn etcJoinNL(ls : List(String)) : String =\n  match ls with\n  | Nil          => \"\"\n  | Cons(l, Nil) => l\n  | _            => etcJoinNL(etcJoinPairs(ls))\n  end\n\n\n(* ── The self-contained C preamble (verbatim; matches _PREAMBLE) ──────────── *)\n\nlet etcPreambleRaw : String = \"/* Generated by emit_tac_c.py — self-contained; compile with:\n *   clang -O2 -fwrapv out.c -o out\n * (-fwrapv makes signed Int overflow wrap two's-complement, matching the VM.) */\n#include <stdint.h>\n#include <stdio.h>\n#include <string.h>\n#include <stdlib.h>\n#include <math.h>\n\ntypedef intptr_t lkw;      /* machine word: holds ints, float-bits, or pointers */\ntypedef lkw*     lark_ptr;\n\n/* ── Bump heap (no GC) ─────────────────────────────────────────────────────── */\n#ifndef LARK_HEAP_BYTES\n#  define LARK_HEAP_BYTES (256u * 1024u * 1024u)\n#endif\nstatic char*  _heap = 0;\nstatic size_t _hp   = 0;\n\n__attribute__((noreturn)) void __lark_match_fail(void) {\n    fputs(\\\"lark: non-exhaustive pattern match\\\\n\\\", stderr);\n    abort();\n}\n\nlark_ptr __heap_alloc(long n_words) {\n    if (!_heap) { _heap = (char*)malloc(LARK_HEAP_BYTES);\n                  if (!_heap) { fputs(\\\"lark: heap oom\\\\n\\\", stderr); abort(); } }\n    size_t bytes = (size_t)n_words * sizeof(lkw);\n    bytes = (bytes + (sizeof(lkw) - 1)) & ~((size_t)sizeof(lkw) - 1);\n    if (_hp + bytes > LARK_HEAP_BYTES) { fputs(\\\"lark: heap overflow\\\\n\\\", stderr); abort(); }\n    lark_ptr p = (lark_ptr)(_heap + _hp);\n    _hp += bytes;\n    return p;\n}\n\nstatic const char* lark_str_data(lkw s) { return (const char*)(((lark_ptr)s) + 1); }\n\nlark_ptr lark_alloc_string(const char* text) {\n    size_t len = strlen(text);\n    size_t data_words = (len + 1 + sizeof(lkw) - 1) / sizeof(lkw);\n    lark_ptr p = __heap_alloc(1 + (long)data_words);\n    p[0] = (lkw)len;\n    memcpy((char*)(p + 1), text, len + 1);\n    return p;\n}\n\n/* ── Strings ───────────────────────────────────────────────────────────────── */\nstatic lkw __str_concat(lkw a, lkw b) {\n    lark_ptr pa = (lark_ptr)a, pb = (lark_ptr)b;\n    size_t la = (size_t)pa[0], lb = (size_t)pb[0], total = la + lb;\n    size_t data_words = (total + 1 + sizeof(lkw) - 1) / sizeof(lkw);\n    lark_ptr r = __heap_alloc(1 + (long)data_words);\n    r[0] = (lkw)total;\n    char* dst = (char*)(r + 1);\n    memcpy(dst, lark_str_data(a), la);\n    memcpy(dst + la, lark_str_data(b), lb);\n    dst[total] = '\\\\0';\n    return (lkw)r;\n}\nstatic lkw string_length(lkw s) { return ((lark_ptr)s)[0]; }\nstatic int __lark_streq(lkw a, lkw b) {\n    return strcmp(lark_str_data(a), lark_str_data(b)) == 0;\n}\n\n/* ── Float helpers (float32 bits packed in an lkw) ─────────────────────────── */\nstatic float  _lf(lkw b) { uint32_t u = (uint32_t)b; float f; memcpy(&f, &u, 4); return f; }\nstatic lkw    _fl(float f) { uint32_t u; memcpy(&u, &f, 4); return (lkw)u; }\n\nstatic lkw __float_add(lkw a, lkw b) { return _fl(_lf(a) + _lf(b)); }\nstatic lkw __float_sub(lkw a, lkw b) { return _fl(_lf(a) - _lf(b)); }\nstatic lkw __float_mul(lkw a, lkw b) { return _fl(_lf(a) * _lf(b)); }\nstatic lkw __float_div(lkw a, lkw b) {\n    float d = _lf(b);\n    return _fl(d == 0.0f ? __builtin_nanf(\\\"\\\") : _lf(a) / d);\n}\nstatic lkw __float_lt(lkw a, lkw b) { return _lf(a) <  _lf(b) ? 1 : 0; }\nstatic lkw __float_le(lkw a, lkw b) { return _lf(a) <= _lf(b) ? 1 : 0; }\nstatic lkw __float_gt(lkw a, lkw b) { return _lf(a) >  _lf(b) ? 1 : 0; }\nstatic lkw __float_ge(lkw a, lkw b) { return _lf(a) >= _lf(b) ? 1 : 0; }\n\n/* ── Show / conversion ─────────────────────────────────────────────────────── */\nstatic lkw show(lkw n) {\n    char buf[32];\n    snprintf(buf, sizeof(buf), \\\"%lld\\\", (long long)n);\n    return (lkw)lark_alloc_string(buf);\n}\nstatic lkw __show_float(lkw bits) {\n    float f = _lf(bits);\n    char buf[40];\n    snprintf(buf, sizeof(buf), \\\"%.7g\\\", (double)f);\n    char* dot = strchr(buf, '.');\n    if (dot && !strpbrk(buf, \\\"eEni\\\")) {\n        char* end = buf + strlen(buf) - 1;\n        while (end > dot + 1 && *end == '0') *end-- = '\\\\0';\n    }\n    if (!strchr(buf, '.') && !strchr(buf, 'e') && !strchr(buf, 'n') && !strchr(buf, 'i')) {\n        size_t n = strlen(buf);\n        buf[n] = '.'; buf[n+1] = '0'; buf[n+2] = '\\\\0';\n    }\n    return (lkw)lark_alloc_string(buf);\n}\nstatic lkw __show_bool(lkw b) { return (lkw)lark_alloc_string(b ? \\\"true\\\" : \\\"false\\\"); }\nstatic lkw int_to_float(lkw n)   { return _fl((float)(long long)n); }\nstatic lkw float_to_int(lkw b)   { return (lkw)(long long)_lf(b); }   /* trunc toward zero */\nstatic lkw int_to_string(lkw n)  { return show(n); }\nstatic lkw float_to_string(lkw b){ return __show_float(b); }\nstatic lkw float_to_bits(lkw b)  { return (lkw)(uint32_t)b; }\n\n/* ── Math ──────────────────────────────────────────────────────────────────── */\nstatic lkw int_abs(lkw n)    { return n < 0 ? -n : n; }\nstatic lkw float_abs(lkw b)  { return (lkw)((uint32_t)b & 0x7FFFFFFFu); }\nstatic lkw float_sqrt(lkw b) { return _fl(sqrtf(_lf(b))); }\nstatic lkw float_floor(lkw b){ return _fl(floorf(_lf(b))); }\nstatic lkw float_ceil(lkw b) { return _fl(ceilf(_lf(b))); }\n\n/* ── String primitives ─────────────────────────────────────────────────────── */\nstatic lkw string_index(lkw s, lkw idx) {\n    const char* d = lark_str_data(s);\n    long n = (long)((lark_ptr)s)[0], i = (long)idx;\n    return (i >= 0 && i < n) ? (lkw)(unsigned char)d[i] : (lkw)-1;\n}\nstatic lkw string_slice(lkw s, lkw lo, lkw hi) {\n    const char* d = lark_str_data(s);\n    long n = (long)((lark_ptr)s)[0];\n    long a = (long)lo, b = (long)hi;\n    if (a < 0) a = 0; if (a > n) a = n;\n    if (b < 0) b = 0; if (b > n) b = n;\n    long m = (a < b) ? (b - a) : 0;\n    size_t data_words = ((size_t)m + 1 + sizeof(lkw) - 1) / sizeof(lkw);\n    lark_ptr p = __heap_alloc(1 + (long)data_words);\n    p[0] = (lkw)m;\n    if (m > 0) memcpy((char*)(p + 1), d + a, (size_t)m);\n    ((char*)(p + 1))[m] = '\\\\0';\n    return (lkw)p;\n}\nstatic lkw char_to_string(lkw cp) {\n    char buf[2]; buf[0] = (char)((unsigned)cp & 0xFF); buf[1] = '\\\\0';\n    return (lkw)lark_alloc_string(buf);\n}\n\n/* string_to_int/float → 3-word record [tag-slot, flag@1, payload@2] (see\n * lower._lower_string_to_result: it reads flag via IGetField idx 0 → word1,\n * payload via idx 1 → word2, then wraps into Ok/Err). */\nstatic lkw __string_to_int_raw(lkw s) {\n    const char* d = lark_str_data(s);\n    lark_ptr rec = __heap_alloc(3); rec[0] = 0;\n    size_t n = strlen(d); int ok = (n > 0); long long val = 0; size_t i = 0;\n    int neg = 0;\n    if (ok && (d[0] == '+' || d[0] == '-')) { neg = (d[0] == '-'); i = 1; if (i == n) ok = 0; }\n    for (; ok && i < n; i++) {\n        if (d[i] < '0' || d[i] > '9') { ok = 0; break; }\n        val = val * 10 + (d[i] - '0');\n    }\n    if (ok) {\n        long long r = neg ? -val : val;\n        r = (long long)((int32_t)r);        /* wrap to i32, matching the VM */\n        rec[1] = 1; rec[2] = (lkw)r;\n    } else {\n        rec[1] = 0; rec[2] = (lkw)lark_alloc_string(\\\"string_to_int: not an integer\\\");\n    }\n    return (lkw)rec;\n}\nstatic lkw __string_to_float_raw(lkw s) {\n    const char* d = lark_str_data(s);\n    lark_ptr rec = __heap_alloc(3); rec[0] = 0;\n    size_t n = strlen(d), i = 0, before = 0, after = 0; int ok = (n > 0);\n    if (ok && (d[0] == '+' || d[0] == '-')) i = 1;\n    while (i < n && d[i] >= '0' && d[i] <= '9') { i++; before++; }\n    if (before == 0 || i >= n || d[i] != '.') ok = 0;\n    else {\n        i++;\n        while (i < n && d[i] >= '0' && d[i] <= '9') { i++; after++; }\n        if (after == 0 || i != n) ok = 0;\n    }\n    if (ok) { rec[1] = 1; rec[2] = _fl((float)atof(d)); }\n    else    { rec[1] = 0; rec[2] = (lkw)lark_alloc_string(\\\"string_to_float: not a float\\\"); }\n    return (lkw)rec;\n}\n\n/* ── I/O ───────────────────────────────────────────────────────────────────── */\nstatic lkw print(lkw io, lkw s) { puts(lark_str_data(s)); return io; }\nstatic lkw read(lkw io) {\n    char buf[4096];\n    if (!fgets(buf, sizeof(buf), stdin)) buf[0] = '\\\\0';\n    else { size_t n = strlen(buf); if (n && buf[n-1] == '\\\\n') buf[n-1] = '\\\\0'; }\n    lark_ptr str = lark_alloc_string(buf);\n    lark_ptr tup = __heap_alloc(3);\n    tup[0] = 0; tup[1] = io; tup[2] = (lkw)str;\n    return (lkw)tup;\n}\nstatic lkw read_all(lkw io) {\n    size_t cap = 65536, len = 0;\n    char* tmp = (char*)malloc(cap);\n    if (!tmp) { fputs(\\\"lark: read_all oom\\\\n\\\", stderr); abort(); }\n    size_t r; char chunk[65536];\n    while ((r = fread(chunk, 1, sizeof(chunk), stdin)) > 0) {\n        if (len + r + 1 > cap) {\n            while (len + r + 1 > cap) cap *= 2;\n            char* grown = (char*)realloc(tmp, cap);\n            if (!grown) { fputs(\\\"lark: read_all oom\\\\n\\\", stderr); abort(); }\n            tmp = grown;\n        }\n        memcpy(tmp + len, chunk, r);\n        len += r;\n    }\n    tmp[len] = '\\\\0';\n    lark_ptr str = lark_alloc_string(tmp);\n    free(tmp);\n    lark_ptr tup = __heap_alloc(3);\n    tup[0] = 0; tup[1] = io; tup[2] = (lkw)str;\n    return (lkw)tup;\n}\n\"\n\n\n(* ── Whole-program assembly (port of CEmitter.emit) ───────────────────────── *)\n\nfn emitTacC(tac : TAC) : String =\n  match tac with\n  | TAC(functions, globalNames) =>\n      let tags     = etcTagAssoc(etcSort(etcDedupe(etcTagsAll(functions)))) in\n      let defined  = etcFnNames(functions) in\n      let sortedGl = etcSort(etcDedupe(globalNames)) in\n      let ctx      = Ctx(tags, defined, globalNames, Nil) in\n      let funcs    = etcDedupeFns(functions) in\n      match etcBodies(ctx, funcs, Nil) with\n      | (bodyParts, table) =>\n          let protos   = etcProtos(ctx, funcs) in\n          let gdecls   = etcGDecls(sortedGl) in\n          let strArr   = etcStrArr(table) in\n          let strinit  = etcStrinit(table) in\n          let hasGinit = etcMember(\"__global_init__\", defined) in\n          let mainL    = etcMainLines(hasGinit) in\n          let parts =\n            Cons(etcPreambleRaw,\n            Cons(strArr,\n            Cons(\"\",\n              tacAppendStr(gdecls,\n              Cons(\"\",\n              tacAppendStr(protos,\n              Cons(\"\",\n              tacAppendStr(strinit,\n              Cons(\"\",\n              tacAppendStr(bodyParts, mainL)))))))))) in\n          etcJoinNL(parts) + \"\\n\"\n      end\n  end\n\n\n(* ── Smoke driver (stripped at MAIN_MARKER by the differential harness) ─────── *)\n\nfn main(io : IO) : IO =\n  print(io, \"emit_tac_c.lark is a component — run tests/emit_tac_c_difftest.py\")\n"}, {"path": "repo/optimize/lark/infer.lark", "group": "repo/optimize/lark", "name": "infer.lark", "text": "(* infer.lark — Lark's type checker, written in Lark.\n   (the port of oracle/infer.py.)\n\n   Hindley-Milner inference (Algorithm W) with affine (linear) use tracking and\n   trait-bound checking for `show`.  This is the mountain: it consumes parse.lark's\n   syntactic AST (Prog/Decl/Expr/Pat/Ty), the type vocabulary of types.lark\n   (Mono/Scheme/apply/unify/…), and the typed AST of tast.lark (TExpr/TDecl/…),\n   and produces, per top-level decl, its inferred signature.\n\n   Design notes\n   ────────────\n   • NO MUTATION, NO EXCEPTIONS.  infer.py mutates a `fresh` counter, a `tracked`\n     dict, and an `env` dict, and raises TypeError/AffineError/TraitBoundError.\n     Here everything is threaded functionally:\n        - `fresh`   : an Int, threaded in and out of every inference function.\n        - `tracked` : an assoc list List((String, Int)) (name → use count).\n        - errors    : each inference function returns a Result-like ADT\n                      (IResult / PatR / …) whose Err arm carries the message.\n        - `env`     : an assoc list List((String, Scheme)), rebuilt as it grows.\n     A substitution `Subst` is types.lark's Int-keyed red-black tree (empty =\n     SLeaf, was Nil); `Ok`/`Err` come from the built-in Result.\n   • CONCATENATION, not import: the type checker's pipeline is one module\n     (lex + parse + types + tast + infer) — a known wart of the language.  Every function is\n     fully annotated so infer's own Pass 1.5 pre-registers the (heavily) mutually\n     recursive groups here (infer ↔ inferApply ↔ inferArms ↔ inferPat ↔ …).\n   • The observable output is `checkProgram`: a normalised top-level signature\n     block (module line + one line per decl), OR \"type error: <msg>\" on reject.\n     Type-variable names are canonicalised by first occurrence (α, β, γ …) so the\n     differential is independent of fresh-allocation order.\n\n   Run:  harness/infer_difftest.py  (make infertest)   *)\n\nmodule Infer\n\n\n(* ── Small result / option ADTs (functional error + state threading) ──────── *)\n\ntype IntOpt    = | IONone | IOSome of Int\ntype SchemeOpt = | SNone  | SJust of Scheme\n\n(* infer(...) result: typed expr, its type, the subst, the next fresh, the tracked. *)\ntype IResult =\n  | IErr of String\n  | IOk  of TExpr, Mono, Subst, Int, List((String, Int))\n\n(* inferPat(...) result: typed pat, its type, the local env, the subst, next fresh. *)\ntype PatR =\n  | PErr of String\n  | POk  of TPat, Mono, List((String, Scheme)), Subst, Int\n\n(* a list of expressions inferred in sequence (tuples): typed, raw types, s, f, tr. *)\ntype ListR =\n  | LErr of String\n  | LOk  of List(TExpr), List(Mono), Subst, Int, List((String, Int))\n\n(* application arguments: typed args, s, f, tr. *)\ntype ApplyArgsR =\n  | AErr of String\n  | AOk  of List(TExpr), Subst, Int, List((String, Int))\n\n(* match arms: typed (pat,body) pairs, s, f, tr. *)\ntype ArmsR =\n  | ArmErr of String\n  | ArmOk  of List((TPat, TExpr)), Subst, Int, List((String, Int))\n\n(* a checked fn/let decl: the typed decl, its generalised scheme, next fresh. *)\ntype FnDeclR  = | FDErr of String | FDOk of TDecl, Scheme, Int\ntype LetDeclR = | LDErr of String | LDOk of TDecl, Scheme, Int\n\n(* optional-return-annotation continuation: resolved type, subst, next fresh. *)\ntype RetR = | RErr of String | ROk of Mono, Subst, Int\n\n(* fnTypeFromAnnotations helper: all params annotated?  monos + tvar env + fresh. *)\ntype PMRes =\n  | PMNone of Int\n  | PMSome of List(Mono), List((String, Int)), Int\n\n(* pass 2 accumulators. *)\ntype Pass2R    = | P2Err  of String | P2Ok  of List(String), List((String, Scheme)), Int\ntype Pass2OneR = | P2OErr of String | P2OOk of Maybe(String), List((String, Scheme)), Int\n\nimpl Copy for IntOpt     = {}\nimpl Copy for SchemeOpt  = {}\nimpl Copy for IResult    = {}\nimpl Copy for PatR       = {}\nimpl Copy for ListR      = {}\nimpl Copy for ApplyArgsR = {}\nimpl Copy for ArmsR      = {}\nimpl Copy for FnDeclR    = {}\nimpl Copy for LetDeclR   = {}\nimpl Copy for RetR       = {}\nimpl Copy for PMRes      = {}\nimpl Copy for Pass2R     = {}\nimpl Copy for Pass2OneR  = {}\n\n\n(* ── Generic list length (consumes; safe — see the occurs-check note) ── *)\n\nfn listLen(xs : List(a)) : Int =\n  match xs with\n  | Nil        => 0\n  | Cons(_, r) => 1 + listLen(r)\n  end\n\n\n(* ── Environment: assoc list name → Scheme (dict semantics: newest wins) ──── *)\n\nfn envRemove(env : List((String, Scheme)), name : String) : List((String, Scheme)) =\n  match env with\n  | Nil => Nil\n  | Cons((k, v), rest) =>\n      if strEq(k, name) then envRemove(rest, name)\n      else Cons((k, v), envRemove(rest, name))\n  end\n\nfn envPut(env : List((String, Scheme)), name : String, sc : Scheme) : List((String, Scheme)) =\n  Cons((name, sc), envRemove(env, name))\n\nfn envGet(env : List((String, Scheme)), name : String) : SchemeOpt =\n  match env with\n  | Nil => SNone\n  | Cons((k, v), rest) => if strEq(k, name) then SJust(v) else envGet(rest, name)\n  end\n\nfn envHas(env : List((String, Scheme)), name : String) : Bool =\n  match envGet(env, name) with | SNone => false | SJust(_) => true end\n\nfn applyEnv(s : Subst, env : List((String, Scheme))) : List((String, Scheme)) =\n  match env with\n  | Nil => Nil\n  | Cons((k, sc), rest) => Cons((k, applyScheme(s, sc)), applyEnv(s, rest))\n  end\n\nfn appendEnv(a : List((String, Scheme)), b : List((String, Scheme))) : List((String, Scheme)) =\n  match a with | Nil => b | Cons(x, r) => Cons(x, appendEnv(r, b)) end\n\n(* merge with `over` shadowing `base` (== {**base, **over}). *)\nfn mergeEnv(base : List((String, Scheme)), over : List((String, Scheme))) : List((String, Scheme)) =\n  appendEnv(over, base)\n\nfn envFreeVars(env : List((String, Scheme))) : List(Int) =\n  match env with\n  | Nil => Nil\n  | Cons((_, sc), rest) => unionInts(freeVarsScheme(sc), envFreeVars(rest))\n  end\n\n\n(* ── Affine tracking: assoc list name → use count ─────────────────────────── *)\n\nfn trkGet(t : List((String, Int)), name : String) : IntOpt =\n  match t with\n  | Nil => IONone\n  | Cons((k, c), rest) => if strEq(k, name) then IOSome(c) else trkGet(rest, name)\n  end\n\nfn trkRemove(t : List((String, Int)), name : String) : List((String, Int)) =\n  match t with\n  | Nil => Nil\n  | Cons((k, c), rest) =>\n      if strEq(k, name) then trkRemove(rest, name)\n      else Cons((k, c), trkRemove(rest, name))\n  end\n\nfn trkSet(t : List((String, Int)), name : String, c : Int) : List((String, Int)) =\n  Cons((name, c), trkRemove(t, name))\n\n\n(* ── Generalise / instantiate ─────────────────────────────────────────────── *)\n\nfn freshSubst(qs : List(Int), f : Int) : (Subst, Int) =\n  match qs with\n  | Nil => (SLeaf, f)\n  | Cons(q, rest) =>\n      match freshSubst(rest, f + 1) with\n      | (s, f2) => (subInsert(s, q, MVar(f)), f2)\n      end\n  end\n\nfn instantiate(f : Int, sc : Scheme) : (Mono, Int) =\n  match sc with\n  | Scheme(qs, body, cv) =>\n      match qs with\n      | Nil => (body, f)\n      | _   => match freshSubst(qs, f) with | (s, f2) => (apply(s, body), f2) end\n      end\n  end\n\nfn generalise(env : List((String, Scheme)), t : Mono) : Scheme =\n  Scheme(diffInts(freeVars(t), envFreeVars(env)), t, Nil)\n\n\n(* ── Syntactic type (parse.lark Ty) → monotype, threading tvar-env + fresh ── *)\n\nfn isLowerStr(s : String) : Bool =\n  if string_length(s) == 0 then false\n  else let c = string_index(s, 0) in c >= 97 and c <= 122\n\nfn tvGet(tv : List((String, Int)), name : String) : IntOpt =\n  match tv with\n  | Nil => IONone\n  | Cons((k, i), rest) => if strEq(k, name) then IOSome(i) else tvGet(rest, name)\n  end\n\nfn synToMono(t : Ty, tv : List((String, Int)), f : Int) : (Mono, List((String, Int)), Int) =\n  match t with\n  | TName(n) =>\n      if strEq(n, \"()\") then (MCon(\"()\"), tv, f)\n      else if isLowerStr(n) then\n        match tvGet(tv, n) with\n        | IOSome(i) => (MVar(i), tv, f)\n        | IONone    => (MVar(f), Cons((n, f), tv), f + 1)\n        end\n      else (MCon(n), tv, f)\n  | TApply(n, args) =>\n      match synToMonoList(args, tv, f) with\n      | (ms, tv2, f2) => (MApp(n, ms), tv2, f2)\n      end\n  | TFn(p, r) =>\n      match synToMono(p, tv, f) with\n      | (mp, tv1, f1) =>\n          match synToMono(r, tv1, f1) with\n          | (mr, tv2, f2) => (MFn(mp, mr), tv2, f2)\n          end\n      end\n  | TUnit => (MCon(\"()\"), tv, f)\n  | TTuple(es) =>\n      match synToMonoList(es, tv, f) with\n      | (ms, tv2, f2) => (MTup(ms), tv2, f2)\n      end\n  end\n\nfn synToMonoList(ts : List(Ty), tv : List((String, Int)), f : Int) : (List(Mono), List((String, Int)), Int) =\n  match ts with\n  | Nil => (Nil, tv, f)\n  | Cons(t, rest) =>\n      match synToMono(t, tv, f) with\n      | (m, tv2, f2) =>\n          match synToMonoList(rest, tv2, f2) with\n          | (ms, tv3, f3) => (Cons(m, ms), tv3, f3)\n          end\n      end\n  end\n\n\n(* ── Literal / operator types ─────────────────────────────────────────────── *)\n\nfn litType(v : Val) : Mono =\n  match v with\n  | VUnit     => MCon(\"()\")\n  | VBool(_)  => MCon(\"Bool\")\n  | VInt(_)   => MCon(\"Int\")\n  | VFloat(_) => MCon(\"Float\")\n  | VStr(_)   => MCon(\"String\")\n  end\n\nfn numOp(f : Int) : (Mono, Int) = (MFn(MVar(f), MFn(MVar(f), MVar(f))), f + 1)\nfn cmpOp(f : Int) : (Mono, Int) = (MFn(MVar(f), MFn(MVar(f), MCon(\"Bool\"))), f + 1)\n\nfn binopType(op : String, f : Int) : (Mono, Int) =\n  match op with\n  | \"+\"  => numOp(f) | \"-\"  => numOp(f) | \"*\"  => numOp(f) | \"/\"  => numOp(f)\n  | \"==\" => cmpOp(f) | \"!=\" => cmpOp(f) | \"<\"  => cmpOp(f) | \"<=\" => cmpOp(f)\n  | \">\"  => cmpOp(f) | \">=\" => cmpOp(f)\n  | \"and\" => (MFn(MCon(\"Bool\"), MFn(MCon(\"Bool\"), MCon(\"Bool\"))), f)\n  | \"or\"  => (MFn(MCon(\"Bool\"), MFn(MCon(\"Bool\"), MCon(\"Bool\"))), f)\n  | _    => numOp(f)\n  end\n\n\n(* ── apply subst to typed AST nodes (port of _apply_tpat / _apply_texpr) ──── *)\n\nfn applyTPatList(s : Subst, ps : List(TPat)) : List(TPat) =\n  match ps with | Nil => Nil | Cons(p, r) => Cons(applyTPat(s, p), applyTPatList(s, r)) end\n\nfn applyTPat(s : Subst, p : TPat) : TPat =\n  match p with\n  | TPWild(t)        => TPWild(apply(s, t))\n  | TPVar(n, t)      => TPVar(n, apply(s, t))\n  | TPLit(v, t)      => TPLit(v, apply(s, t))\n  | TPCon(n, args, t) => TPCon(n, applyTPatList(s, args), apply(s, t))\n  | TPTuple(es, t)   => TPTuple(applyTPatList(s, es), apply(s, t))\n  end\n\nfn applyTExprList(s : Subst, es : List(TExpr)) : List(TExpr) =\n  match es with | Nil => Nil | Cons(e, r) => Cons(applyTExpr(s, e), applyTExprList(s, r)) end\n\nfn applyTArms(s : Subst, arms : List((TPat, TExpr))) : List((TPat, TExpr)) =\n  match arms with\n  | Nil => Nil\n  | Cons((p, b), r) => Cons((applyTPat(s, p), applyTExpr(s, b)), applyTArms(s, r))\n  end\n\nfn applyTParams(s : Subst, ps : List((String, Mono))) : List((String, Mono)) =\n  match ps with | Nil => Nil | Cons((n, t), r) => Cons((n, apply(s, t)), applyTParams(s, r)) end\n\nfn applyTExpr(s : Subst, e : TExpr) : TExpr =\n  match e with\n  | TLit(v, t)          => TLit(v, apply(s, t))\n  | TVar(n, t)          => TVar(n, apply(s, t))\n  | TCon(n, t)          => TCon(n, apply(s, t))\n  | TTupleExpr(es, t)   => TTupleExpr(applyTExprList(s, es), apply(s, t))\n  | TApp(fnx, args, t)   => TApp(applyTExpr(s, fnx), applyTExprList(s, args), apply(s, t))\n  | TBinOp(op, l, r, t) => TBinOp(op, applyTExpr(s, l), applyTExpr(s, r), apply(s, t))\n  | TUnaryOp(op, o, t)  => TUnaryOp(op, applyTExpr(s, o), apply(s, t))\n  | TLetExpr(n, v, b, t) => TLetExpr(n, applyTExpr(s, v), applyTExpr(s, b), apply(s, t))\n  | TIfExpr(c, th, el, t) => TIfExpr(applyTExpr(s, c), applyTExpr(s, th), applyTExpr(s, el), apply(s, t))\n  | TMatchExpr(sc, arms, t) => TMatchExpr(applyTExpr(s, sc), applyTArms(s, arms), apply(s, t))\n  | TLambda(ps, b, t)   => TLambda(applyTParams(s, ps), applyTExpr(s, b), apply(s, t))\n  end\n\n\n(* ── Show-bound check (port of _show_satisfies / _check_show_bounds) ───────── *)\n\nfn tTypeOf(e : TExpr) : Mono =\n  match e with\n  | TLit(_, t) => t | TVar(_, t) => t | TCon(_, t) => t\n  | TTupleExpr(_, t) => t | TApp(_, _, t) => t | TBinOp(_, _, _, t) => t\n  | TUnaryOp(_, _, t) => t | TLetExpr(_, _, _, t) => t | TIfExpr(_, _, _, t) => t\n  | TMatchExpr(_, _, t) => t | TLambda(_, _, t) => t\n  end\n\nfn showSatisfies(t : Mono, show : List(String)) : Bool =\n  match t with\n  | MVar(_)   => false\n  | MCon(n)   => memberStr(n, show)\n  | MApp(h, _) => memberStr(h, show)\n  | MFn(_, _) => false\n  | MTup(_)   => false\n  end\n\nfn combineMaybe(a : Maybe(String), b : Maybe(String)) : Maybe(String) =\n  match a with | Just(_) => a | Nothing => b end\n\nfn showCheckCall(args : List(TExpr), show : List(String)) : Maybe(String) =\n  match args with\n  | Nil        => Nothing\n  | Cons(a0, _) =>\n      if showSatisfies(tTypeOf(a0), show) then Nothing\n      else Just(\"no Show instance for \" + pretty(tTypeOf(a0)))\n  end\n\nfn showBoundsList(es : List(TExpr), show : List(String)) : Maybe(String) =\n  match es with\n  | Nil => Nothing\n  | Cons(e, r) => combineMaybe(showBounds(e, show), showBoundsList(r, show))\n  end\n\nfn showArms(arms : List((TPat, TExpr)), show : List(String)) : Maybe(String) =\n  match arms with\n  | Nil => Nothing\n  | Cons((_, b), r) => combineMaybe(showBounds(b, show), showArms(r, show))\n  end\n\nfn showBounds(e : TExpr, show : List(String)) : Maybe(String) =\n  match e with\n  | TApp(fnx, args, _) =>\n      let base = match fnx with\n                 | TVar(nm, _) => if strEq(nm, \"show\") then showCheckCall(args, show) else Nothing\n                 | _ => Nothing\n                 end in\n      combineMaybe(base, combineMaybe(showBounds(fnx, show), showBoundsList(args, show)))\n  | TTupleExpr(es, _)   => showBoundsList(es, show)\n  | TBinOp(_, l, r, _)  => combineMaybe(showBounds(l, show), showBounds(r, show))\n  | TUnaryOp(_, o, _)   => showBounds(o, show)\n  | TLetExpr(_, v, b, _) => combineMaybe(showBounds(v, show), showBounds(b, show))\n  | TIfExpr(c, th, el, _) => combineMaybe(showBounds(c, show), combineMaybe(showBounds(th, show), showBounds(el, show)))\n  | TMatchExpr(sc, arms, _) => combineMaybe(showBounds(sc, show), showArms(arms, show))\n  | TLambda(_, b, _)    => showBounds(b, show)\n  | TLit(_, _)          => Nothing\n  | TVar(_, _)          => Nothing\n  | TCon(_, _)          => Nothing\n  end\n\n\n(* ── Pattern inference (port of infer_pat) ────────────────────────────────── *)\n\nfn splitFn(t : Mono) : (List(Mono), Mono) =\n  match t with\n  | MFn(p, r) => match splitFn(r) with | (fs, res) => (Cons(p, fs), res) end\n  | _         => (Nil, t)\n  end\n\nfn snocMono(xs : List(Mono), x : Mono) : List(Mono) =\n  match xs with | Nil => Cons(x, Nil) | Cons(y, r) => Cons(y, snocMono(r, x)) end\n\nfn snocTPat(xs : List(TPat), x : TPat) : List(TPat) =\n  match xs with | Nil => Cons(x, Nil) | Cons(y, r) => Cons(y, snocTPat(r, x)) end\n\nfn applySchemeEnv(s : Subst, env : List((String, Scheme))) : List((String, Scheme)) =\n  applyEnv(s, env)\n\n(* merge a sub-pattern's bindings, rejecting a repeated variable. *)\nfn mergePatEnv(local : List((String, Scheme)), add : List((String, Scheme))) : Result(List((String, Scheme)), String) =\n  match add with\n  | Nil => Ok(local)\n  | Cons((k, v), rest) =>\n      if envHas(local, k) then Err(\"repeated pattern variable: '\" + k + \"'\")\n      else mergePatEnv(Cons((k, v), local), rest)\n  end\n\nfn inferPat(pat : Pat, f : Int, env : List((String, Scheme))) : PatR =\n  match pat with\n  | PWild => let t = MVar(f) in POk(TPWild(t), t, Nil, SLeaf, f + 1)\n  | PVar(n) => let t = MVar(f) in POk(TPVar(n, t), t, Cons((n, Scheme(Nil, t, Nil)), Nil), SLeaf, f + 1)\n  | PLit(v) => let t = litType(v) in POk(TPLit(v, t), t, Nil, SLeaf, f)\n  | PCon(n, args) =>\n      match envGet(env, n) with\n      | SJust(sc) =>\n          match instantiate(f, sc) with\n          | (conT, f1) =>\n              match splitFn(conT) with\n              | (fields, conResult) =>\n                  if listLen(fields) == listLen(args) then\n                    inferPatConFields(fields, args, env, f1, SLeaf, Nil, Nil, conResult, n)\n                  else inferPatGeneric(args, env, f1, n)\n              end\n          end\n      | SNone => inferPatGeneric(args, env, f, n)\n      end\n  | PTuple(elems) => inferPatTuple(elems, env, f, SLeaf, Nil, Nil, Nil)\n  end\n\nfn inferPatConFields(fields : List(Mono), args : List(Pat), env : List((String, Scheme)),\n                     f : Int, s : Subst, local : List((String, Scheme)),\n                     typed : List(TPat), conResult : Mono, n : String) : PatR =\n  match (fields, args) with\n  | (Nil, Nil) =>\n      let resultT = apply(s, conResult) in\n      POk(TPCon(n, typed, resultT), resultT, applySchemeEnv(s, local), s, f)\n  | (Cons(ft, fr), Cons(a, ar)) =>\n      match inferPat(a, f, env) with\n      | PErr(m) => PErr(m)\n      | POk(tp, pt, env2, s2, f2) =>\n          let sc = compose(s2, s) in\n          match unify(apply(sc, pt), apply(sc, ft)) with\n          | Err(e) => PErr(e)\n          | Ok(s3) =>\n              let s4 = compose(s3, compose(s2, s)) in\n              match mergePatEnv(local, applySchemeEnv(s4, env2)) with\n              | Err(e2) => PErr(e2)\n              | Ok(local2) => inferPatConFields(fr, ar, env, f2, s4, local2, snocTPat(typed, applyTPat(s4, tp)), conResult, n)\n              end\n          end\n      end\n  | _ => PErr(\"constructor arity mismatch\")\n  end\n\nfn inferPatGeneric(args : List(Pat), env : List((String, Scheme)), f : Int, n : String) : PatR =\n  inferPatGenFold(args, env, f + 1, SLeaf, Nil, Nil, MVar(f), n)\n\nfn inferPatGenFold(args : List(Pat), env : List((String, Scheme)), f : Int,\n                   s : Subst, local : List((String, Scheme)),\n                   typed : List(TPat), resultT : Mono, n : String) : PatR =\n  match args with\n  | Nil => POk(TPCon(n, typed, resultT), resultT, local, s, f)\n  | Cons(a, ar) =>\n      match inferPat(a, f, env) with\n      | PErr(m) => PErr(m)\n      | POk(tp, pt, env2, s2, f2) =>\n          let s3 = compose(s2, s) in\n          match mergePatEnv(local, env2) with\n          | Err(e) => PErr(e)\n          | Ok(local2) => inferPatGenFold(ar, env, f2, s3, local2, snocTPat(typed, tp), resultT, n)\n          end\n      end\n  end\n\nfn inferPatTuple(elems : List(Pat), env : List((String, Scheme)), f : Int,\n                 s : Subst, local : List((String, Scheme)),\n                 typed : List(TPat), etypes : List(Mono)) : PatR =\n  match elems with\n  | Nil => let t = MTup(etypes) in POk(TPTuple(typed, t), t, local, s, f)\n  | Cons(e, er) =>\n      match inferPat(e, f, env) with\n      | PErr(m) => PErr(m)\n      | POk(tp, pt, env2, s2, f2) =>\n          let s3 = compose(s2, s) in\n          match mergePatEnv(local, env2) with\n          | Err(e2) => PErr(e2)\n          | Ok(local2) => inferPatTuple(er, env, f2, s3, local2, snocTPat(typed, tp), snocMono(etypes, pt))\n          end\n      end\n  end\n\n\n(* ── Expression inference (port of infer) ─────────────────────────────────── *)\n\nfn curryFn(avs : List(Mono), res : Mono) : Mono =\n  match avs with | Nil => res | Cons(a, r) => MFn(a, curryFn(r, res)) end\n\nfn allocVars(n : Int, f : Int) : (List(Mono), Int) =\n  if n <= 0 then (Nil, f)\n  else match allocVars(n - 1, f + 1) with | (rest, f2) => (Cons(MVar(f), rest), f2) end\n\nfn infer(env : List((String, Scheme)), tracked : List((String, Int)), expr : Expr,\n         f : Int, copy : List(String)) : IResult =\n  match expr with\n  | Lit(v) => let t = litType(v) in IOk(TLit(v, t), t, SLeaf, f, tracked)\n  | Var(n) =>\n      match envGet(env, n) with\n      | SNone => IErr(\"unbound variable: '\" + n + \"'\")\n      | SJust(sc) =>\n          match instantiate(f, sc) with\n          | (t, f1) =>\n              match trkGet(tracked, n) with\n              | IONone => IOk(TVar(n, t), t, SLeaf, f1, tracked)\n              | IOSome(c) =>\n                  if c + 1 > 1 then IErr(\"affine variable '\" + n + \"' used more than once\")\n                  else IOk(TVar(n, t), t, SLeaf, f1, trkSet(tracked, n, c + 1))\n              end\n          end\n      end\n  | Con(n) =>\n      match envGet(env, n) with\n      | SNone => IErr(\"unbound constructor: '\" + n + \"'\")\n      | SJust(sc) => match instantiate(f, sc) with | (t, f1) => IOk(TCon(n, t), t, SLeaf, f1, tracked) end\n      end\n  | TupleExpr(elems) =>\n      match inferSeq(env, tracked, elems, f, copy) with\n      | LErr(m) => IErr(m)\n      | LOk(tes, ts, s, f2, tr) => let tupT = MTup(applyList(s, ts)) in IOk(TTupleExpr(tes, tupT), tupT, s, f2, tr)\n      end\n  | Apply(fnE, args)         => inferApply(env, tracked, fnE, args, f, copy)\n  | BinOp(op, l, r)          => inferBinOp(env, tracked, op, l, r, f, copy)\n  | UnaryOp(op, x)           => inferUnary(env, tracked, op, x, f, copy)\n  | LetExpr(n, ann, val, body) => inferLet(env, tracked, n, ann, val, body, f, copy)\n  | IfExpr(c, th, el)        => inferIf(env, tracked, c, th, el, f, copy)\n  | MatchExpr(scrut, arms)   => inferMatch(env, tracked, scrut, arms, f, copy)\n  | Lambda(params, body)     => inferLambda(env, tracked, params, body, f, copy)\n  end\n\n(* infer a sequence of exprs, threading env-apply, subst, fresh, tracked. *)\nfn inferSeq(env : List((String, Scheme)), tracked : List((String, Int)), es : List(Expr),\n            f : Int, copy : List(String)) : ListR =\n  inferSeqAcc(env, tracked, es, f, copy, SLeaf)\n\nfn inferSeqAcc(env : List((String, Scheme)), tracked : List((String, Int)), es : List(Expr),\n               f : Int, copy : List(String), s : Subst) : ListR =\n  match es with\n  | Nil => LOk(Nil, Nil, s, f, tracked)\n  | Cons(e, rest) =>\n      match infer(applyEnv(s, env), tracked, e, f, copy) with\n      | IErr(m) => LErr(m)\n      | IOk(te, t, s2, f2, tr2) =>\n          let s3 = compose(s2, s) in\n          match inferSeqAcc(env, tr2, rest, f2, copy, s3) with\n          | LErr(m) => LErr(m)\n          | LOk(tes, ts, s4, f4, tr4) => LOk(Cons(te, tes), Cons(t, ts), s4, f4, tr4)\n          end\n      end\n  end\n\nfn inferApply(env : List((String, Scheme)), tracked : List((String, Int)), fnE : Expr,\n              args : List(Expr), f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, fnE, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tf, fnT, s, f1, tr1) =>\n      match allocVars(listLen(args), f1) with\n      | (argVars, f2) =>\n          let resV = MVar(f2) in\n          let expected = curryFn(argVars, resV) in\n          match unify(apply(s, fnT), expected) with\n          | Err(e) => IErr(e)\n          | Ok(s2) =>\n              let s3 = compose(s2, s) in\n              match inferApplyArgs(env, tr1, argVars, args, f2 + 1, copy, s3) with\n              | AErr(m) => IErr(m)\n              | AOk(targs, s4, f4, tr4) => let finalT = apply(s4, resV) in IOk(TApp(tf, targs, finalT), finalT, s4, f4, tr4)\n              end\n          end\n      end\n  end\n\nfn inferApplyArgs(env : List((String, Scheme)), tracked : List((String, Int)), avs : List(Mono),\n                  args : List(Expr), f : Int, copy : List(String), s : Subst) : ApplyArgsR =\n  match (avs, args) with\n  | (Nil, Nil) => AOk(Nil, s, f, tracked)\n  | (Cons(av, avr), Cons(arg, argr)) =>\n      match infer(applyEnv(s, env), tracked, arg, f, copy) with\n      | IErr(m) => AErr(m)\n      | IOk(ta, at, s3, f3, tr3) =>\n          match unify(apply(s, at), apply(s, av)) with\n          | Err(e) => AErr(e)\n          | Ok(s4) =>\n              let s5 = compose(s4, compose(s3, s)) in\n              match inferApplyArgs(env, tr3, avr, argr, f3, copy, s5) with\n              | AErr(m) => AErr(m)\n              | AOk(rest, s6, f6, tr6) => AOk(Cons(ta, rest), s6, f6, tr6)\n              end\n          end\n      end\n  | _ => AErr(\"application arity mismatch\")\n  end\n\nfn inferBinOp(env : List((String, Scheme)), tracked : List((String, Int)), op : String,\n              l : Expr, r : Expr, f : Int, copy : List(String)) : IResult =\n  match binopType(op, f) with\n  | (opT, f1) =>\n      match infer(env, tracked, l, f1, copy) with\n      | IErr(m) => IErr(m)\n      | IOk(tl, lt, s1, f2, tr2) =>\n          match infer(applyEnv(s1, env), tr2, r, f2, copy) with\n          | IErr(m) => IErr(m)\n          | IOk(trE, rt, s2, f3, tr3) =>\n              let s = compose(s2, s1) in\n              let resV = MVar(f3) in\n              let expected = MFn(apply(s, lt), MFn(apply(s, rt), resV)) in\n              match unify(apply(s, opT), expected) with\n              | Err(e) => IErr(e)\n              | Ok(s3) => let s4 = compose(s3, s) in let t = apply(s4, resV) in IOk(TBinOp(op, tl, trE, t), t, s4, f3 + 1, tr3)\n              end\n          end\n      end\n  end\n\nfn inferUnary(env : List((String, Scheme)), tracked : List((String, Int)), op : String,\n              x : Expr, f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, x, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(te, t, s, f1, tr1) =>\n      match op with\n      | \"not\" =>\n          match unify(apply(s, t), MCon(\"Bool\")) with\n          | Err(e) => IErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in IOk(TUnaryOp(op, te, MCon(\"Bool\")), MCon(\"Bool\"), s3, f1, tr1)\n          end\n      | _ =>\n          let resV = MVar(f1) in\n          match unify(apply(s, t), resV) with\n          | Err(e) => IErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in let rt = apply(s3, resV) in IOk(TUnaryOp(op, te, rt), rt, s3, f1 + 1, tr1)\n          end\n      end\n  end\n\nfn inferLet(env : List((String, Scheme)), tracked : List((String, Int)), n : String,\n            ann : Maybe(Ty), val : Expr, body : Expr, f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, val, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tv, vt, s1a, f1, trV) =>\n      let vt2a = apply(s1a, vt) in\n      match ann with\n      | Nothing => letFinish(env, trV, n, tv, vt2a, s1a, f1, copy, body)\n      | Just(annTy) =>\n          match synToMono(annTy, Nil, f1) with\n          | (annT, _, f2) =>\n              match unify(vt2a, annT) with\n              | Err(e) => IErr(e)\n              | Ok(s2) => let s1 = compose(s2, s1a) in letFinish(env, trV, n, tv, apply(s1, annT), s1, f2, copy, body)\n              end\n          end\n      end\n  end\n\nfn letFinish(env : List((String, Scheme)), trV : List((String, Int)), n : String,\n             tv : TExpr, vt2 : Mono, s1 : Subst, f : Int,\n             copy : List(String), body : Expr) : IResult =\n  let sc = generalise(applyEnv(s1, env), vt2) in\n  let env2 = envPut(env, n, sc) in\n  let oldc = trkGet(trV, n) in\n  let t1 = trkRemove(trV, n) in\n  let t2 = if isCopy(vt2, copy) then t1 else trkSet(t1, n, 0) in\n  match infer(env2, t2, body, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tb, bt, s3, f3, trB) =>\n      let t3 = trkRemove(trB, n) in\n      let t4 = match oldc with | IOSome(c) => trkSet(t3, n, c) | IONone => t3 end in\n      let s = compose(s3, s1) in\n      let t = apply(s, bt) in\n      IOk(TLetExpr(n, tv, tb, t), t, s, f3, t4)\n  end\n\nfn inferIf(env : List((String, Scheme)), tracked : List((String, Int)), c : Expr,\n           th : Expr, el : Expr, f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, c, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(tc, ct, s1, f1, tr1) =>\n      match unify(apply(s1, ct), MCon(\"Bool\")) with\n      | Err(e) => IErr(e)\n      | Ok(s2) =>\n          let sA = compose(s2, s1) in\n          match infer(applyEnv(sA, env), tr1, th, f1, copy) with\n          | IErr(m) => IErr(m)\n          | IOk(tt, ttt, s3, f2, tr2) =>\n              let sB = compose(s3, sA) in\n              match infer(applyEnv(sB, env), tr2, el, f2, copy) with\n              | IErr(m) => IErr(m)\n              | IOk(teE, ett, s4, f3, tr3) =>\n                  let sC = compose(s4, sB) in\n                  match unify(apply(sC, ttt), apply(sC, ett)) with\n                  | Err(e) => IErr(e)\n                  | Ok(s5) => let sD = compose(s5, sC) in let t = apply(sD, ttt) in IOk(TIfExpr(tc, tt, teE, t), t, sD, f3, tr3)\n                  end\n              end\n          end\n      end\n  end\n\nfn inferMatch(env : List((String, Scheme)), tracked : List((String, Int)), scrut : Expr,\n              arms : List(Arm), f : Int, copy : List(String)) : IResult =\n  match infer(env, tracked, scrut, f, copy) with\n  | IErr(m) => IErr(m)\n  | IOk(ts, st, s, f1, tr1) =>\n      let resV = MVar(f1) in\n      match inferArms(env, tr1, arms, st, resV, f1 + 1, copy, s) with\n      | ArmErr(m) => IErr(m)\n      | ArmOk(tarms, s2, f2, tr2) => let t = apply(s2, resV) in IOk(TMatchExpr(ts, tarms, t), t, s2, f2, tr2)\n      end\n  end\n\nfn inferArms(env : List((String, Scheme)), tracked : List((String, Int)), arms : List(Arm),\n             st : Mono, resV : Mono, f : Int, copy : List(String), s : Subst) : ArmsR =\n  match arms with\n  | Nil => ArmOk(Nil, s, f, tracked)\n  | Cons(Arm(pat, body), rest) =>\n      match inferPat(pat, f, env) with\n      | PErr(m) => ArmErr(m)\n      | POk(tp, pt, patEnv, sPat, f1) =>\n          let sa = compose(sPat, s) in\n          match unify(apply(sa, st), apply(sa, pt)) with\n          | Err(e) => ArmErr(e)\n          | Ok(s2) =>\n              let sb = compose(s2, sa) in\n              let armEnv = mergeEnv(applyEnv(sb, env), applySchemeEnv(sb, patEnv)) in\n              match infer(armEnv, tracked, body, f1, copy) with\n              | IErr(m) => ArmErr(m)\n              | IOk(ta, at, s3, f2, trA) =>\n                  match unify(apply(s3, apply(sb, at)), apply(s3, apply(sb, resV))) with\n                  | Err(e) => ArmErr(e)\n                  | Ok(s4) =>\n                      let sc = compose(s4, compose(s3, sb)) in\n                      match inferArms(env, trA, rest, st, resV, f2, copy, sc) with\n                      | ArmErr(m) => ArmErr(m)\n                      | ArmOk(tarms, s5, f5, tr5) => ArmOk(Cons((tp, ta), tarms), s5, f5, tr5)\n                      end\n                  end\n              end\n          end\n      end\n  end\n\nfn buildFnType(pts : List((String, Mono)), ret : Mono, s : Subst) : Mono =\n  match pts with\n  | Nil => ret\n  | Cons((_, pt), rest) => MFn(apply(s, pt), buildFnType(rest, ret, s))\n  end\n\nfn inferLambda(env : List((String, Scheme)), tracked : List((String, Int)), params : List(Param),\n               body : Expr, f : Int, copy : List(String)) : IResult =\n  match inferLambdaParams(params, env, tracked, f, copy) with\n  | (paramTypes, env2, tracked2, f1) =>\n      match infer(env2, tracked2, body, f1, copy) with\n      | IErr(m) => IErr(m)\n      | IOk(tb, bt, s, f2, _) =>\n          let fnT = buildFnType(paramTypes, apply(s, bt), s) in\n          IOk(TLambda(applyTParams(s, paramTypes), tb, fnT), fnT, s, f2, tracked)\n      end\n  end\n\nfn inferLambdaParams(params : List(Param), env : List((String, Scheme)), tracked : List((String, Int)),\n                     f : Int, copy : List(String)) : (List((String, Mono)), List((String, Scheme)), List((String, Int)), Int) =\n  match params with\n  | Nil => (Nil, env, tracked, f)\n  | Cons(Param(nm, ann), rest) =>\n      match ann with\n      | Just(annTy) => match synToMono(annTy, Nil, f) with | (pv, _, f1) => lambdaParamCont(nm, pv, rest, env, tracked, f1, copy) end\n      | Nothing => lambdaParamCont(nm, MVar(f), rest, env, tracked, f + 1, copy)\n      end\n  end\n\nfn lambdaParamCont(nm : String, pv : Mono, rest : List(Param), env : List((String, Scheme)),\n                   tracked : List((String, Int)), f : Int, copy : List(String)) : (List((String, Mono)), List((String, Scheme)), List((String, Int)), Int) =\n  let env2 = envPut(env, nm, Scheme(Nil, pv, Nil)) in\n  let tracked2 = if isCopy(pv, copy) then tracked else trkSet(tracked, nm, 0) in\n  match inferLambdaParams(rest, env2, tracked2, f, copy) with\n  | (pts, envF, trF, fF) => (Cons((nm, pv), pts), envF, trF, fF)\n  end\n\n\n(* ── Declaration checking (port of check_fn_decl / check_let_decl) ─────────── *)\n\nfn checkFnParams(params : List(Param), localEnv : List((String, Scheme)), tracked : List((String, Int)),\n                 tvenv : List((String, Int)), f : Int, copy : List(String))\n    : (List((String, Mono)), List((String, Scheme)), List((String, Int)), List((String, Int)), Int) =\n  match params with\n  | Nil => (Nil, localEnv, tracked, tvenv, f)\n  | Cons(Param(nm, ann), rest) =>\n      match ann with\n      | Just(annTy) => match synToMono(annTy, tvenv, f) with | (pv, tvenv2, f1) => fnParamCont(nm, pv, tvenv2, rest, localEnv, tracked, f1, copy) end\n      | Nothing => fnParamCont(nm, MVar(f), tvenv, rest, localEnv, tracked, f + 1, copy)\n      end\n  end\n\nfn fnParamCont(nm : String, pv : Mono, tvenv : List((String, Int)), rest : List(Param),\n               localEnv : List((String, Scheme)), tracked : List((String, Int)), f : Int, copy : List(String))\n    : (List((String, Mono)), List((String, Scheme)), List((String, Int)), List((String, Int)), Int) =\n  let env2 = envPut(localEnv, nm, Scheme(Nil, pv, Nil)) in\n  let tracked2 = if isCopy(pv, copy) then tracked else trkSet(tracked, nm, 0) in\n  match checkFnParams(rest, env2, tracked2, tvenv, f, copy) with\n  | (pts, envF, trF, tvF, fF) => (Cons((nm, pv), pts), envF, trF, tvF, fF)\n  end\n\nfn checkFnRet(ret : Maybe(Ty), tvenv : List((String, Int)), bt : Mono, s : Subst, f : Int) : RetR =\n  match ret with\n  | Nothing => ROk(apply(s, bt), s, f)\n  | Just(retTy) =>\n      match synToMono(retTy, tvenv, f) with\n      | (annT, _, f1) =>\n          match unify(apply(s, bt), annT) with\n          | Err(e) => RErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in ROk(apply(s3, annT), s3, f1)\n          end\n      end\n  end\n\n(* is every parameter annotated? *)\nfn allParamsAnn(ps : List(Param)) : Bool =\n  match ps with\n  | Nil => true\n  | Cons(Param(pn, ann), rest) =>\n      match ann with\n      | Nothing => false\n      | Just(t) => allParamsAnn(rest)\n      end\n  end\n\n(* the scheme the function's own name gets while its body is checked.\n\n   A complete signature is a licence to recurse polymorphically.  Pass 1.5 has\n   already registered the annotated type under `name`; generalise it, so that each\n   recursive call instantiates it afresh.  Bound to a bare monotype var instead,\n   every recursive call would have to agree about one unknown — and a polymorphic\n   function that recurses on its own result could not be typed at all. *)\nfn recScheme(env : List((String, Scheme)), name : String, params : List(Param),\n             ret : Maybe(Ty), recVar : Mono) : Scheme =\n  let annotated = match ret with\n                  | Nothing => false\n                  | Just(rt) => allParamsAnn(params)\n                  end in\n  if annotated then\n    match envGet(env, name) with\n    | SNone    => Scheme(Nil, recVar, Nil)\n    | SJust(sc) =>\n        match sc with\n        | Scheme(qs, body, cvs) => generalise(envRemove(env, name), body)\n        end\n    end\n  else Scheme(Nil, recVar, Nil)\n\nfn checkFnDecl(decl : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : FnDeclR =\n  match decl with\n  | FnDecl(exported, name, bounds, params, ret, body) =>\n      let recVar = MVar(f) in\n      let localEnv0 = envPut(env, name, recScheme(env, name, params, ret, recVar)) in\n      match checkFnParams(params, localEnv0, Nil, Nil, f + 1, copy) with\n      | (paramTypes, localEnv, tracked, tvenv, f1) =>\n          match infer(localEnv, tracked, body, f1, copy) with\n          | IErr(m) => FDErr(m)\n          | IOk(tbody, bt, s, f2, _) =>\n              match checkFnRet(ret, tvenv, bt, s, f2) with\n              | RErr(e) => FDErr(e)\n              | ROk(bt2, s5, f3) =>\n                  let fnT1 = apply(s5, buildFnType(paramTypes, bt2, s5)) in\n                  match unify(apply(s5, recVar), fnT1) with\n                  | Err(e) => FDErr(e)\n                  | Ok(s6) =>\n                      let s7 = compose(s6, s5) in\n                      let fnT = apply(s7, fnT1) in\n                      let sc = generalise(applyEnv(s7, env), fnT) in\n                      let typedParams = applyTParams(s7, paramTypes) in\n                      let tbody2 = applyTExpr(s7, tbody) in\n                      match showBounds(tbody2, show) with\n                      | Just(e) => FDErr(e)\n                      | Nothing => FDOk(TFnDecl(name, typedParams, tbody2, sc, exported), sc, f3)\n                      end\n                  end\n              end\n          end\n      end\n  | _ => FDErr(\"not a function declaration\")\n  end\n\nfn checkLetAnn(ann : Maybe(Ty), t : Mono, s : Subst, f : Int) : RetR =\n  match ann with\n  | Nothing => ROk(t, s, f)\n  | Just(annTy) =>\n      match synToMono(annTy, Nil, f) with\n      | (annT, _, f1) =>\n          match unify(t, annT) with\n          | Err(e) => RErr(e)\n          | Ok(s2) => let s3 = compose(s2, s) in ROk(apply(s3, annT), s3, f1)\n          end\n      end\n  e
