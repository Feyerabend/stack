 s) else false\n                  end\n  end\n\nfn optMaybeTmpEq(a : Maybe(Tmp), b : Maybe(Tmp)) : Bool =\n  match a with\n  | Nothing => match b with | Nothing => true | _ => false end\n  | Just(x) => match b with | Just(y) => optTmpEq(x, y) | _ => false end\n  end\n\nfn optMaybeOpEq(a : Maybe(Operand), b : Maybe(Operand)) : Bool =\n  match a with\n  | Nothing => match b with | Nothing => true | _ => false end\n  | Just(x) => match b with | Just(y) => optOperandEq(x, y) | _ => false end\n  end\n\nfn optInstrEq(a : Instr, b : Instr) : Bool =\n  match a with\n  | IAssign(d, s) =>\n      match b with | IAssign(d2, s2) => if optTmpEq(d, d2) then optOperandEq(s, s2) else false | _ => false end\n  | IBinOp(d, op, l, r) =>\n      match b with\n      | IBinOp(d2, op2, l2, r2) =>\n          if optTmpEq(d, d2) then\n            if optStrEq(op, op2) then\n              if optOperandEq(l, l2) then optOperandEq(r, r2) else false\n            else false\n          else false\n      | _ => false end\n  | IUnary(d, op, s) =>\n      match b with\n      | IUnary(d2, op2, s2) =>\n          if optTmpEq(d, d2) then\n            if optStrEq(op, op2) then optOperandEq(s, s2) else false\n          else false\n      | _ => false end\n  | ICall(md, f, args) =>\n      match b with\n      | ICall(md2, f2, args2) =>\n          if optMaybeTmpEq(md, md2) then\n            if optStrEq(f, f2) then optOperandsEq(args, args2) else false\n          else false\n      | _ => false end\n  | IClosureCall(d, fv, ar) =>\n      match b with\n      | IClosureCall(d2, fv2, ar2) =>\n          if optTmpEq(d, d2) then\n            if optOperandEq(fv, fv2) then optOperandEq(ar, ar2) else false\n          else false\n      | _ => false end\n  | IReturn(mv) =>\n      match b with | IReturn(mv2) => optMaybeOpEq(mv, mv2) | _ => false end\n  | ILabel(n) =>\n      match b with | ILabel(n2) => optStrEq(n, n2) | _ => false end\n  | IJump(l) =>\n      match b with | IJump(l2) => optStrEq(l, l2) | _ => false end\n  | ICondJump(c, t, f) =>\n      match b with\n      | ICondJump(c2, t2, f2) =>\n          if optOperandEq(c, c2) then\n            if optStrEq(t, t2) then optStrEq(f, f2) else false\n          else false\n      | _ => false end\n  | IAlloc(d, tag, fs) =>\n      match b with\n      | IAlloc(d2, tag2, fs2) =>\n          if optTmpEq(d, d2) then\n            if optStrEq(tag, tag2) then optOperandsEq(fs, fs2) else false\n          else false\n      | _ => false end\n  | IGetTag(d, s) =>\n      match b with | IGetTag(d2, s2) => if optTmpEq(d, d2) then optOperandEq(s, s2) else false | _ => false end\n  | IGetField(d, s, idx) =>\n      match b with\n      | IGetField(d2, s2, idx2) =>\n          if optTmpEq(d, d2) then\n            if optOperandEq(s, s2) then idx == idx2 else false\n          else false\n      | _ => false end\n  | IAllocClosure(d, f, caps) =>\n      match b with\n      | IAllocClosure(d2, f2, caps2) =>\n          if optTmpEq(d, d2) then\n            if optStrEq(f, f2) then optOperandsEq(caps, caps2) else false\n          else false\n      | _ => false end\n  end\n\nfn optInstrsEq(xs : List(Instr), ys : List(Instr)) : Bool =\n  match xs with\n  | Nil        => match ys with | Nil => true | _ => false end\n  | Cons(x, r) => match ys with\n                  | Nil        => false\n                  | Cons(y, s) => if optInstrEq(x, y) then optInstrsEq(r, s) else false\n                  end\n  end\n\nfn optFnsEq(xs : List(Function), ys : List(Function)) : Bool =\n  match xs with\n  | Nil        => match ys with | Nil => true | _ => false end\n  | Cons(x, r) => match ys with\n                  | Nil        => false\n                  | Cons(y, s) => if optStrEq(optFnName(x), optFnName(y))\n                                  then if optInstrsEq(optFnBody(x), optFnBody(y)) then optFnsEq(r, s) else false\n                                  else false\n                  end\n  end\n\nfn optTacEq(a : TAC, b : TAC) : Bool =\n  match a with | TAC(fa, _) => match b with | TAC(fb, _) => optFnsEq(fa, fb) end end\n\n(* Iterate the whole enabled sweep to a fixpoint (opt.py _MAX_SWEEPS = 8).\n   Fingerprint = optTacEq (injective on name+body; passes touch neither ctr nor\n   globals, so pretty-equality ⟺ opt.py's structural _fingerprint). *)\nfn optSweeps(t : TAC, passes : List(String), site : Int, fuel : Int) : TAC =\n  if fuel <= 0 then t\n  else\n    match optRunPasses(t, passes, site) with\n    | (t1, site1) => if optTacEq(t1, t) then t1\n                     else optSweeps(t1, passes, site1, fuel - 1)\n    end\n\nfn optimizeProg(t : TAC, level : Int) : TAC =\n  let passes = optPassesForLevel(level) in\n  match passes with\n  | Nil => t\n  | _   => optSweeps(t, passes, 0, 8)\n  end\n\n\n(* ══ Smoke driver (concatenated with lex + parse + tac — see opt_smoke)  ═════ *)\n(* The real check is the corpus-wide differential (opt_difftest.py).  This tiny\n   main just exercises const_fold + dce on a hand-built TAC so the smoke main runs end-to-end.  The differential harness strips everything from\n   the `fn main` marker below. *)\n\nfn main(io : IO) : IO =\n  let g0 = Function(\"main\", Nil,\n             Cons(IBinOp(Tmp(\"t0\"), \"+\", OConst(CInt(\"2\")), OConst(CInt(\"3\"))),\n             Cons(IReturn(Just(OTmp(Tmp(\"t0\")))), Nil)), 1) in\n  let prog = TAC(Cons(g0, Nil), Nil) in\n  print(io, tacPretty(optimizeProg(prog, 1)))\n"}, {"path": "repo/optimize/lark/parse.lark", "group": "repo/optimize/lark", "name": "parse.lark", "text": "(* parse.lark — the Lark parser, written in Lark.  ()\n\n   A faithful port of oracle/parser.py + the AST types of oracle/tree.py.\n   Consumes the token list produced by lex.lark (imported as module Lex) and\n   builds a Program AST, then pretty-prints it to a canonical S-expression.\n\n   Design notes\n   ────────────\n   • The token stream is a `List(Token)` threaded through every parse function\n     as a Copy value; each function returns `(Node, List(Token))` — the built\n     node plus the remaining tokens (the functional analogue of parser.py's\n     `self.pos` cursor).  Token / Kind / List / Pos come from `import Lex`.\n   • \"expect a specific token\" is just a structural match on the head token,\n     e.g. `Cons(Tok(KUpper, name, _, _), rest)` grabs an UPPER's text and the\n     tail in one step.  Guaranteed-present tokens (ASSIGN, IN, THEN, …) are\n     dropped with `advance`.  Fallback `_` arms return a placeholder; on the\n     valid corpus they never fire (parser.py raises there instead).\n   • AST value types get `impl Copy` so a node may be reused across `match`\n     arms — the affine checker sums uses across arms (a known wart of the language), and the\n     precedence tails (`left` used in every arm) need that.  Copy impls are\n     name-only in infer, so this is free.\n   • Literals: INT/FLOAT keep the lexeme text (str(int|float) round-trips it —\n     verified over the corpus); STRING carries the *processed* value (escapes\n     resolved, quotes stripped) so it matches parser.py's `tok.value`.\n   • Validation is differential against parser.py — see harness/parse_difftest.py.\n     The `main` here is only a smoke driver; the harness replaces it per file.\n\n   Run (smoke):  python3 oracle/cek.py lark/parse.lark   *)\n\nmodule Parse\n\nimport Lex exposing (Kind, Token, Pos, List, tokenize, escape)\n\n\n(* ── AST types (port of tree.py) ──────────────────────────────────────────── *)\n\n(* Types.  (Named Ty to avoid the `type` keyword; serialized as tree.py names.) *)\ntype Ty =\n  | TName of String\n  | TApply of String, List(Ty)\n  | TFn of Ty, Ty\n  | TUnit\n  | TTuple of List(Ty)\n\n(* Literal payloads.  INT/FLOAT hold the lexeme text; STR holds the value. *)\ntype Val =\n  | VInt of String\n  | VFloat of String\n  | VStr of String\n  | VBool of Bool\n  | VUnit\n\ntype Pat =\n  | PWild\n  | PVar of String\n  | PLit of Val\n  | PCon of String, List(Pat)\n  | PTuple of List(Pat)\n\ntype Expr =\n  | Lit of Val\n  | Var of String\n  | Con of String\n  | TupleExpr of List(Expr)\n  | Apply of Expr, List(Expr)\n  | BinOp of String, Expr, Expr\n  | UnaryOp of String, Expr\n  | LetExpr of String, Maybe(Ty), Expr, Expr\n  | IfExpr of Expr, Expr, Expr\n  | MatchExpr of Expr, List(Arm)\n  | Lambda of List(Param), Expr\n\ntype Arm     = | Arm of Pat, Expr\ntype Param   = | Param of String, Maybe(Ty)\ntype Bound   = | Bound of String, String\ntype Variant = | Variant of String, List(Ty)\ntype TMethod = | TMethod of String, Ty\ntype IMethod = | IMethod of String, List(Param), Expr\n\n(* A type declaration's body is either an alias or a list of variants. *)\ntype TyBody = | Alias of Ty | Variants of List(Variant)\n\ntype Decl =\n  | FnDecl of Bool, String, List(Bound), List(Param), Maybe(Ty), Expr\n  | LetDecl of Bool, String, Maybe(Ty), Expr\n  | TypeDecl of Bool, String, List(String), TyBody\n  | TraitDecl of Bool, String, List(String), List(TMethod)\n  | ImplDecl of String, List(Ty), Ty, List(IMethod)\n\ntype Import = | Import of String, Maybe(List(String))\ntype Prog   = | Prog of String, List(Import), List(Decl)\n\ntype Maybe a = | Nothing | Just of a\n\n\n(* ── Copy impls: let a node be reused across match arms (a known wart of the language). ─────── *)\n\nimpl Copy for Ty       = {}\nimpl Copy for Val      = {}\nimpl Copy for Pat      = {}\nimpl Copy for Expr     = {}\nimpl Copy for Arm      = {}\nimpl Copy for Param    = {}\nimpl Copy for Bound    = {}\nimpl Copy for Variant  = {}\nimpl Copy for TMethod  = {}\nimpl Copy for IMethod  = {}\nimpl Copy for TyBody   = {}\nimpl Copy for Decl     = {}\nimpl Copy for Import   = {}\nimpl Copy for Prog     = {}\nimpl Copy for Maybe(Ty) = {}\n\n\n(* ── Token-stream helper ──────────────────────────────────────────────────── *)\n\n(* Drop the head token (like parser._advance): EOF never advances. *)\nfn advance(ts : List(Token)) : List(Token) =\n  match ts with\n  | Cons(Tok(KEof, _, _, _), _) => ts\n  | Cons(_, rest)               => rest\n  | Nil                         => ts\n  end\n\n\n(* ── String-literal value: mirror lexer._read_string (escapes → value). ───── *)\n\nfn unescapeChar(e : Int) : String =\n  if e == 34 then \"\\\"\"            (* \\\" *)\n  else if e == 92 then \"\\\\\"       (* \\\\ *)\n  else if e == 110 then \"\\n\"      (* \\n *)\n  else if e == 116 then \"\\t\"      (* \\t *)\n  else if e == 114 then \"\\r\"      (* \\r *)\n  else char_to_string(e)          (* unknown escape → the char itself *)\n\nfn strValFrom(s : String, i : Int, n : Int) : String =\n  if i >= n then \"\"\n  else\n    let c = string_index(s, i) in\n    if c == 34 then \"\"                     (* closing quote *)\n    else if c == 92 then                   (* backslash: consume it + next char *)\n      unescapeChar(string_index(s, i + 1)) + strValFrom(s, i + 2, n)\n    else char_to_string(c) + strValFrom(s, i + 1, n)\n\nfn strVal(s : String) : String =\n  strValFrom(s, 1, string_length(s))       (* skip opening quote at index 0 *)\n\n\n(* ── Types ────────────────────────────────────────────────────────────────── *)\n\nfn pType(ts : List(Token)) : (Ty, List(Token)) = pFnType(ts)\n\nfn pFnType(ts : List(Token)) : (Ty, List(Token)) =\n  match pAtomType(ts) with\n  | (left, ts1) =>\n    match ts1 with\n    | Cons(Tok(KArrow, _, _, _), r) =>\n      match pFnType(r) with | (right, ts2) => (TFn(left, right), ts2) end\n    | _ => (left, ts1)\n    end\n  end\n\nfn pAtomType(ts : List(Token)) : (Ty, List(Token)) =\n  match ts with\n  | Cons(Tok(KUnit, _, _, _), r) => (TUnit, r)\n  | Cons(Tok(KUpper, name, _, _), r) =>\n    match r with\n    | Cons(Tok(KLParen, _, _, _), r2) =>\n      match pTypeArgs(r2) with\n      | (args, ts1) =>\n        match ts1 with\n        | Cons(Tok(KRParen, _, _, _), ts2) => (TApply(name, args), ts2)\n        | _ => (TApply(name, args), ts1)\n        end\n      end\n    | _ => (TName(name), r)\n    end\n  | Cons(Tok(KName, name, _, _), r) => (TName(name), r)\n  | Cons(Tok(KLParen, _, _, _), r) =>\n    match pType(r) with\n    | (first, ts1) =>\n      match ts1 with\n      | Cons(Tok(KComma, _, _, _), _) =>\n        match pTypeArgsTail(ts1) with\n        | (rest, ts2) =>\n          match ts2 with\n          | Cons(Tok(KRParen, _, _, _), ts3) => (TTuple(Cons(first, rest)), ts3)\n          | _ => (TTuple(Cons(first, rest)), ts2)\n          end\n        end\n      | Cons(Tok(KRParen, _, _, _), ts2) => (first, ts2)\n      | _ => (first, ts1)\n      end\n    end\n  | _ => (TUnit, ts)\n  end\n\nfn pTypeArgs(ts : List(Token)) : (List(Ty), List(Token)) =\n  match pType(ts) with\n  | (t, ts1) => match pTypeArgsTail(ts1) with | (rest, ts2) => (Cons(t, rest), ts2) end\n  end\n\nfn pTypeArgsTail(ts : List(Token)) : (List(Ty), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pType(r) with\n    | (t, ts1) => match pTypeArgsTail(ts1) with | (rest, ts2) => (Cons(t, rest), ts2) end\n    end\n  | _ => (Nil, ts)\n  end\n\n\n(* ── Patterns ─────────────────────────────────────────────────────────────── *)\n\nfn pPattern(ts : List(Token)) : (Pat, List(Token)) =\n  match ts with\n  | Cons(Tok(KWildcard, _, _, _), r) => (PWild, r)\n  | Cons(Tok(KName, txt, _, _), r)   => (PVar(txt), r)\n  | Cons(Tok(KInt, txt, _, _), r)    => (PLit(VInt(txt)), r)\n  | Cons(Tok(KFloat, txt, _, _), r)  => (PLit(VFloat(txt)), r)\n  | Cons(Tok(KString, txt, _, _), r) => (PLit(VStr(strVal(txt))), r)\n  | Cons(Tok(KTrue, _, _, _), r)     => (PLit(VBool(true)), r)\n  | Cons(Tok(KFalse, _, _, _), r)    => (PLit(VBool(false)), r)\n  | Cons(Tok(KUnit, _, _, _), r)     => (PLit(VUnit), r)\n  | Cons(Tok(KMinus, _, _, _), r) =>\n    match r with\n    | Cons(Tok(KInt, txt, _, _), r2)   => (PLit(VInt(\"-\" + txt)), r2)\n    | Cons(Tok(KFloat, txt, _, _), r2) => (PLit(VFloat(\"-\" + txt)), r2)\n    | _ => (PWild, r)\n    end\n  | Cons(Tok(KUpper, name, _, _), r) =>\n    match r with\n    | Cons(Tok(KLParen, _, _, _), r2) =>\n      match pPatArgs(r2) with\n      | (args, ts1) =>\n        match ts1 with\n        | Cons(Tok(KRParen, _, _, _), ts2) => (PCon(name, args), ts2)\n        | _ => (PCon(name, args), ts1)\n        end\n      end\n    | _ => (PCon(name, Nil), r)\n    end\n  | Cons(Tok(KLParen, _, _, _), r) =>\n    match pPattern(r) with\n    | (first, ts1) => pPatParenTail(first, ts1)\n    end\n  | _ => (PWild, ts)\n  end\n\nfn pPatArgs(ts : List(Token)) : (List(Pat), List(Token)) =\n  match pPattern(ts) with\n  | (p, ts1) => match pPatArgsTail(ts1) with | (rest, ts2) => (Cons(p, rest), ts2) end\n  end\n\nfn pPatArgsTail(ts : List(Token)) : (List(Pat), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pPattern(r) with\n    | (p, ts1) => match pPatArgsTail(ts1) with | (rest, ts2) => (Cons(p, rest), ts2) end\n    end\n  | _ => (Nil, ts)\n  end\n\n(* '(' pattern {',' pattern} ')'  — single element unwraps to that pattern. *)\nfn pPatParenTail(first : Pat, ts : List(Token)) : (Pat, List(Token)) =\n  match pPatArgsTail(ts) with\n  | (rest, ts1) =>\n    match ts1 with\n    | Cons(Tok(KRParen, _, _, _), ts2) =>\n      match rest with\n      | Nil => (first, ts2)\n      | _   => (PTuple(Cons(first, rest)), ts2)\n      end\n    | _ => (first, ts1)\n    end\n  end\n\n\n(* ── Expressions ──────────────────────────────────────────────────────────── *)\n\nfn pExpr(ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KLet, _, _, _), _)   => pLetExpr(ts)\n  | Cons(Tok(KIf, _, _, _), _)    => pIfExpr(ts)\n  | Cons(Tok(KMatch, _, _, _), _) => pMatchExpr(ts)\n  | Cons(Tok(KFn, _, _, _), _)    => pLambda(ts)\n  | _ => pOr(ts)\n  end\n\n(* optional  ':' type  → (Maybe(Ty), rest) *)\nfn pOptAnn(ts : List(Token)) : (Maybe(Ty), List(Token)) =\n  match ts with\n  | Cons(Tok(KColon, _, _, _), r) =>\n    match pType(r) with | (t, ts1) => (Just(t), ts1) end\n  | _ => (Nothing, ts)\n  end\n\nfn pLetExpr(ts : List(Token)) : (Expr, List(Token)) =\n  let r0 = advance(ts) in                    (* LET *)\n  match r0 with\n  | Cons(Tok(KName, name, _, _), r1) =>\n    match pOptAnn(r1) with\n    | (ann, r2) =>\n      let r3 = advance(r2) in                (* ASSIGN *)\n      match pExpr(r3) with\n      | (val, r4) =>\n        let r5 = advance(r4) in              (* IN *)\n        match pExpr(r5) with\n        | (body, r6) => (LetExpr(name, ann, val, body), r6)\n        end\n      end\n    end\n  | _ => (Lit(VUnit), ts)\n  end\n\nfn pIfExpr(ts : List(Token)) : (Expr, List(Token)) =\n  let r0 = advance(ts) in                    (* IF *)\n  match pExpr(r0) with\n  | (c, r1) =>\n    let r2 = advance(r1) in                  (* THEN *)\n    match pExpr(r2) with\n    | (t, r3) =>\n      let r4 = advance(r3) in                (* ELSE *)\n      match pExpr(r4) with\n      | (e, r5) => (IfExpr(c, t, e), r5)\n      end\n    end\n  end\n\nfn pMatchExpr(ts : List(Token)) : (Expr, List(Token)) =\n  let r0 = advance(ts) in                    (* MATCH *)\n  match pExpr(r0) with\n  | (scrut, r1) =>\n    let r2 = advance(r1) in                  (* WITH *)\n    match pArms(r2) with\n    | (arms, r3) =>\n      let r4 = advance(r3) in                (* END *)\n      (MatchExpr(scrut, arms), r4)\n    end\n  end\n\nfn pArms(ts : List(Token)) : (List(Arm), List(Token)) =\n  match ts with\n  | Cons(Tok(KPipe, _, _, _), r) =>\n    match pPattern(r) with\n    | (p, r1) =>\n      let r2 = advance(r1) in                (* FAT_ARROW *)\n      match pExpr(r2) with\n      | (e, r3) =>\n        match pArms(r3) with | (rest, r4) => (Cons(Arm(p, e), rest), r4) end\n      end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pLambda(ts : List(Token)) : (Expr, List(Token)) =\n  let r0 = advance(ts) in                    (* FN *)\n  let r1 = advance(r0) in                    (* LPAREN *)\n  match pParams(r1) with\n  | (params, r2) =>\n    let r3 = advance(r2) in                  (* RPAREN *)\n    let r4 = advance(r3) in                  (* FAT_ARROW *)\n    match pExpr(r4) with\n    | (body, r5) => (Lambda(params, body), r5)\n    end\n  end\n\n(* Precedence: or < and < compare < add < mul < unary < apply *)\n\nfn pOr(ts : List(Token)) : (Expr, List(Token)) =\n  match pAnd(ts) with | (l, r) => pOrTail(l, r) end\nfn pOrTail(left : Expr, ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KOr, _, _, _), r) =>\n    match pAnd(r) with | (rhs, r2) => pOrTail(BinOp(\"or\", left, rhs), r2) end\n  | _ => (left, ts)\n  end\n\nfn pAnd(ts : List(Token)) : (Expr, List(Token)) =\n  match pCompare(ts) with | (l, r) => pAndTail(l, r) end\nfn pAndTail(left : Expr, ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KAnd, _, _, _), r) =>\n    match pCompare(r) with | (rhs, r2) => pAndTail(BinOp(\"and\", left, rhs), r2) end\n  | _ => (left, ts)\n  end\n\nfn pCompare(ts : List(Token)) : (Expr, List(Token)) =\n  match pAdd(ts) with | (l, r) => pCompareTail(l, r) end\nfn pCompareTail(left : Expr, ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KEqEq, _, _, _), r) =>\n    match pAdd(r) with | (rhs, r2) => pCompareTail(BinOp(\"==\", left, rhs), r2) end\n  | Cons(Tok(KNeq, _, _, _), r) =>\n    match pAdd(r) with | (rhs, r2) => pCompareTail(BinOp(\"!=\", left, rhs), r2) end\n  | Cons(Tok(KLt, _, _, _), r) =>\n    match pAdd(r) with | (rhs, r2) => pCompareTail(BinOp(\"<\", left, rhs), r2) end\n  | Cons(Tok(KLe, _, _, _), r) =>\n    match pAdd(r) with | (rhs, r2) => pCompareTail(BinOp(\"<=\", left, rhs), r2) end\n  | Cons(Tok(KGt, _, _, _), r) =>\n    match pAdd(r) with | (rhs, r2) => pCompareTail(BinOp(\">\", left, rhs), r2) end\n  | Cons(Tok(KGe, _, _, _), r) =>\n    match pAdd(r) with | (rhs, r2) => pCompareTail(BinOp(\">=\", left, rhs), r2) end\n  | _ => (left, ts)\n  end\n\nfn pAdd(ts : List(Token)) : (Expr, List(Token)) =\n  match pMul(ts) with | (l, r) => pAddTail(l, r) end\nfn pAddTail(left : Expr, ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KPlus, _, _, _), r) =>\n    match pMul(r) with | (rhs, r2) => pAddTail(BinOp(\"+\", left, rhs), r2) end\n  | Cons(Tok(KMinus, _, _, _), r) =>\n    match pMul(r) with | (rhs, r2) => pAddTail(BinOp(\"-\", left, rhs), r2) end\n  | _ => (left, ts)\n  end\n\nfn pMul(ts : List(Token)) : (Expr, List(Token)) =\n  match pUnary(ts) with | (l, r) => pMulTail(l, r) end\nfn pMulTail(left : Expr, ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KStar, _, _, _), r) =>\n    match pUnary(r) with | (rhs, r2) => pMulTail(BinOp(\"*\", left, rhs), r2) end\n  | Cons(Tok(KSlash, _, _, _), r) =>\n    match pUnary(r) with | (rhs, r2) => pMulTail(BinOp(\"/\", left, rhs), r2) end\n  | _ => (left, ts)\n  end\n\nfn pUnary(ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KMinus, _, _, _), r) =>\n    match pUnary(r) with | (x, r2) => (UnaryOp(\"-\", x), r2) end\n  | Cons(Tok(KNot, _, _, _), r) =>\n    match pUnary(r) with | (x, r2) => (UnaryOp(\"not\", x), r2) end\n  | _ => pApply(ts)\n  end\n\nfn pApply(ts : List(Token)) : (Expr, List(Token)) =\n  match pAtom(ts) with | (e, ts1) => pApplyTail(e, ts1) end\nfn pApplyTail(e : Expr, ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KLParen, _, _, _), r) =>\n    match pArgs(r) with\n    | (args, ts2) =>\n      match ts2 with\n      | Cons(Tok(KRParen, _, _, _), ts3) => pApplyTail(Apply(e, args), ts3)\n      | _ => (Apply(e, args), ts2)\n      end\n    end\n  | _ => (e, ts)\n  end\n\nfn pArgs(ts : List(Token)) : (List(Expr), List(Token)) =\n  match ts with\n  | Cons(Tok(KRParen, _, _, _), _) => (Nil, ts)\n  | _ =>\n    match pExpr(ts) with\n    | (e, ts1) => match pArgsTail(ts1) with | (rest, ts2) => (Cons(e, rest), ts2) end\n    end\n  end\n\nfn pArgsTail(ts : List(Token)) : (List(Expr), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pExpr(r) with\n    | (e, ts1) => match pArgsTail(ts1) with | (rest, ts2) => (Cons(e, rest), ts2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pAtom(ts : List(Token)) : (Expr, List(Token)) =\n  match ts with\n  | Cons(Tok(KInt, txt, _, _), r)    => (Lit(VInt(txt)), r)\n  | Cons(Tok(KFloat, txt, _, _), r)  => (Lit(VFloat(txt)), r)\n  | Cons(Tok(KString, txt, _, _), r) => (Lit(VStr(strVal(txt))), r)\n  | Cons(Tok(KTrue, _, _, _), r)     => (Lit(VBool(true)), r)\n  | Cons(Tok(KFalse, _, _, _), r)    => (Lit(VBool(false)), r)\n  | Cons(Tok(KUnit, _, _, _), r)     => (Lit(VUnit), r)\n  | Cons(Tok(KName, txt, _, _), r)   => (Var(txt), r)\n  | Cons(Tok(KUpper, txt, _, _), r)  => (Con(txt), r)\n  | Cons(Tok(KLParen, _, _, _), r) =>\n    match pExpr(r) with\n    | (first, ts1) =>\n      match ts1 with\n      | Cons(Tok(KComma, _, _, _), _) =>\n        match pArgsTail(ts1) with\n        | (rest, ts2) =>\n          match ts2 with\n          | Cons(Tok(KRParen, _, _, _), ts3) => (TupleExpr(Cons(first, rest)), ts3)\n          | _ => (TupleExpr(Cons(first, rest)), ts2)\n          end\n        end\n      | Cons(Tok(KRParen, _, _, _), ts2) => (first, ts2)\n      | _ => (first, ts1)\n      end\n    end\n  | _ => (Lit(VUnit), ts)\n  end\n\n\n(* ── Parameters and bounds ────────────────────────────────────────────────── *)\n\nfn pParams(ts : List(Token)) : (List(Param), List(Token)) =\n  match ts with\n  | Cons(Tok(KRParen, _, _, _), _) => (Nil, ts)\n  | _ =>\n    match pParam(ts) with\n    | (p, r1) => match pParamsTail(r1) with | (rest, r2) => (Cons(p, rest), r2) end\n    end\n  end\n\nfn pParamsTail(ts : List(Token)) : (List(Param), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pParam(r) with\n    | (p, r1) => match pParamsTail(r1) with | (rest, r2) => (Cons(p, rest), r2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pParam(ts : List(Token)) : (Param, List(Token)) =\n  match ts with\n  | Cons(Tok(KWildcard, _, _, _), r) => (Param(\"_\", Nothing), r)\n  | Cons(Tok(KName, name, _, _), r) =>\n    match pOptAnn(r) with | (ann, r1) => (Param(name, ann), r1) end\n  | _ => (Param(\"?\", Nothing), ts)\n  end\n\nfn pOptBounds(ts : List(Token)) : (List(Bound), List(Token)) =\n  match ts with\n  | Cons(Tok(KLBracket, _, _, _), _) => pBounds(ts)\n  | _ => (Nil, ts)\n  end\n\nfn pBounds(ts : List(Token)) : (List(Bound), List(Token)) =\n  let r0 = advance(ts) in                    (* LBRACKET *)\n  match pBound(r0) with\n  | (b, r1) =>\n    match pBoundsTail(r1) with\n    | (rest, r2) =>\n      let r3 = advance(r2) in                (* RBRACKET *)\n      (Cons(b, rest), r3)\n    end\n  end\n\nfn pBoundsTail(ts : List(Token)) : (List(Bound), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pBound(r) with\n    | (b, r1) => match pBoundsTail(r1) with | (rest, r2) => (Cons(b, rest), r2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pBound(ts : List(Token)) : (Bound, List(Token)) =\n  match ts with\n  | Cons(Tok(KUpper, tr, _, _), r1) =>\n    match r1 with\n    | Cons(Tok(KName, v, _, _), r2) => (Bound(tr, v), r2)\n    | _ => (Bound(tr, \"?\"), r1)\n    end\n  | _ => (Bound(\"?\", \"?\"), ts)\n  end\n\n\n(* ── Declarations ─────────────────────────────────────────────────────────── *)\n\nfn pFnDecl(exported : Bool, ts : List(Token)) : (Decl, List(Token)) =\n  let r0 = advance(ts) in                    (* FN *)\n  match r0 with\n  | Cons(Tok(KName, name, _, _), r1) =>\n    match pOptBounds(r1) with\n    | (bounds, r2) =>\n      let r3 = advance(r2) in                (* LPAREN *)\n      match pParams(r3) with\n      | (params, r4) =>\n        let r5 = advance(r4) in              (* RPAREN *)\n        match pOptAnn(r5) with               (* optional ':' return type *)\n        | (ret, r6) =>\n          let r7 = advance(r6) in            (* ASSIGN *)\n          match pExpr(r7) with\n          | (body, r8) => (FnDecl(exported, name, bounds, params, ret, body), r8)\n          end\n        end\n      end\n    end\n  | _ => (LetDecl(false, \"?\", Nothing, Lit(VUnit)), ts)\n  end\n\nfn pLetDecl(exported : Bool, ts : List(Token)) : (Decl, List(Token)) =\n  let r0 = advance(ts) in                    (* LET *)\n  match r0 with\n  | Cons(Tok(KName, name, _, _), r1) =>\n    match pOptAnn(r1) with\n    | (ann, r2) =>\n      let r3 = advance(r2) in                (* ASSIGN *)\n      match pExpr(r3) with\n      | (val, r4) => (LetDecl(exported, name, ann, val), r4)\n      end\n    end\n  | _ => (LetDecl(false, \"?\", Nothing, Lit(VUnit)), ts)\n  end\n\nfn pTypeDecl(exported : Bool, ts : List(Token)) : (Decl, List(Token)) =\n  let r0 = advance(ts) in                    (* TYPE *)\n  match r0 with\n  | Cons(Tok(KUpper, name, _, _), r1) =>\n    match pTyParams(r1) with\n    | (params, r2) =>\n      let r3 = advance(r2) in                (* ASSIGN *)\n      match r3 with\n      | Cons(Tok(KPipe, _, _, _), _) =>\n        match pVariants(r3) with\n        | (vs, r4) => (TypeDecl(exported, name, params, Variants(vs)), r4)\n        end\n      | _ =>\n        match pType(r3) with\n        | (t, r4) => (TypeDecl(exported, name, params, Alias(t)), r4)\n        end\n      end\n    end\n  | _ => (LetDecl(false, \"?\", Nothing, Lit(VUnit)), ts)\n  end\n\nfn pTyParams(ts : List(Token)) : (List(String), List(Token)) =\n  match ts with\n  | Cons(Tok(KName, n, _, _), r) =>\n    match pTyParams(r) with | (rest, r2) => (Cons(n, rest), r2) end\n  | _ => (Nil, ts)\n  end\n\nfn pVariants(ts : List(Token)) : (List(Variant), List(Token)) =\n  match ts with\n  | Cons(Tok(KPipe, _, _, _), r) =>\n    match r with\n    | Cons(Tok(KUpper, vn, _, _), r2) =>\n      match pVariantPayload(r2) with\n      | (payload, r3) =>\n        match pVariants(r3) with\n        | (rest, r4) => (Cons(Variant(vn, payload), rest), r4)\n        end\n      end\n    | _ => (Nil, r)\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pVariantPayload(ts : List(Token)) : (List(Ty), List(Token)) =\n  match ts with\n  | Cons(Tok(KOf, _, _, _), r) =>\n    match pType(r) with\n    | (t, r1) => match pVariantPayloadTail(r1) with | (rest, r2) => (Cons(t, rest), r2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pVariantPayloadTail(ts : List(Token)) : (List(Ty), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pType(r) with\n    | (t, r1) => match pVariantPayloadTail(r1) with | (rest, r2) => (Cons(t, rest), r2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pTraitDecl(exported : Bool, ts : List(Token)) : (Decl, List(Token)) =\n  let r0 = advance(ts) in                    (* TRAIT *)\n  match r0 with\n  | Cons(Tok(KUpper, name, _, _), r1) =>\n    match pTyParams(r1) with\n    | (params, r2) =>\n      let r3 = advance(r2) in                (* ASSIGN *)\n      let r4 = advance(r3) in                (* LBRACE *)\n      match pTraitMethods(r4) with\n      | (methods, r5) =>\n        let r6 = advance(r5) in              (* RBRACE *)\n        (TraitDecl(exported, name, params, methods), r6)\n      end\n    end\n  | _ => (LetDecl(false, \"?\", Nothing, Lit(VUnit)), ts)\n  end\n\nfn pTraitMethods(ts : List(Token)) : (List(TMethod), List(Token)) =\n  match ts with\n  | Cons(Tok(KRBrace, _, _, _), _) => (Nil, ts)\n  | Cons(Tok(KEof, _, _, _), _)    => (Nil, ts)\n  | _ =>\n    match pTraitMethod(ts) with\n    | (m, r1) => match pTraitMethods(r1) with | (rest, r2) => (Cons(m, rest), r2) end\n    end\n  end\n\nfn pTraitMethod(ts : List(Token)) : (TMethod, List(Token)) =\n  let r0 = advance(ts) in                    (* FN *)\n  match r0 with\n  | Cons(Tok(KName, name, _, _), r1) =>\n    let r2 = advance(r1) in                  (* COLON *)\n    match pType(r2) with | (t, r3) => (TMethod(name, t), r3) end\n  | _ => (TMethod(\"?\", TUnit), ts)\n  end\n\nfn pImplDecl(ts : List(Token)) : (Decl, List(Token)) =\n  let r0 = advance(ts) in                    (* IMPL *)\n  match r0 with\n  | Cons(Tok(KUpper, tname, _, _), r1) =>\n    match pImplArgs(r1) with\n    | (targs, r2) =>\n      let r3 = advance(r2) in                (* FOR *)\n      match pAtomType(r3) with\n      | (forty, r4) =>\n        let r5 = advance(r4) in              (* ASSIGN *)\n        let r6 = advance(r5) in              (* LBRACE *)\n        match pImplMethods(r6) with\n        | (methods, r7) =>\n          let r8 = advance(r7) in            (* RBRACE *)\n          (ImplDecl(tname, targs, forty, methods), r8)\n        end\n      end\n    end\n  | _ => (LetDecl(false, \"?\", Nothing, Lit(VUnit)), ts)\n  end\n\nfn pImplArgs(ts : List(Token)) : (List(Ty), List(Token)) =\n  match ts with\n  | Cons(Tok(KFor, _, _, _), _) => (Nil, ts)\n  | Cons(Tok(KEof, _, _, _), _) => (Nil, ts)\n  | _ =>\n    match pAtomType(ts) with\n    | (t, r1) => match pImplArgs(r1) with | (rest, r2) => (Cons(t, rest), r2) end\n    end\n  end\n\nfn pImplMethods(ts : List(Token)) : (List(IMethod), List(Token)) =\n  match ts with\n  | Cons(Tok(KRBrace, _, _, _), _) => (Nil, ts)\n  | Cons(Tok(KEof, _, _, _), _)    => (Nil, ts)\n  | _ =>\n    match pImplMethod(ts) with\n    | (m, r1) => match pImplMethods(r1) with | (rest, r2) => (Cons(m, rest), r2) end\n    end\n  end\n\nfn pImplMethod(ts : List(Token)) : (IMethod, List(Token)) =\n  let r0 = advance(ts) in                    (* FN *)\n  match r0 with\n  | Cons(Tok(KName, name, _, _), r1) =>\n    let r2 = advance(r1) in                  (* LPAREN *)\n    match pParams(r2) with\n    | (params, r3) =>\n      let r4 = advance(r3) in                (* RPAREN *)\n      let r5 = advance(r4) in                (* ASSIGN *)\n      match pExpr(r5) with | (body, r6) => (IMethod(name, params, body), r6) end\n    end\n  | _ => (IMethod(\"?\", Nil, Lit(VUnit)), ts)\n  end\n\nfn pTopDecl(ts : List(Token)) : (Decl, List(Token)) =\n  match ts with\n  | Cons(Tok(KExport, _, _, _), r) => pDeclBody(true, r)\n  | _ => pDeclBody(false, ts)\n  end\n\nfn pDeclBody(exported : Bool, ts : List(Token)) : (Decl, List(Token)) =\n  match ts with\n  | Cons(Tok(KFn, _, _, _), _)    => pFnDecl(exported, ts)\n  | Cons(Tok(KLet, _, _, _), _)   => pLetDecl(exported, ts)\n  | Cons(Tok(KType, _, _, _), _)  => pTypeDecl(exported, ts)\n  | Cons(Tok(KTrait, _, _, _), _) => pTraitDecl(exported, ts)\n  | Cons(Tok(KImpl, _, _, _), _)  => pImplDecl(ts)\n  | _ => (LetDecl(false, \"?\", Nothing, Lit(VUnit)), ts)\n  end\n\nfn pDecls(ts : List(Token)) : (List(Decl), List(Token)) =\n  match ts with\n  | Cons(Tok(KEof, _, _, _), _) => (Nil, ts)\n  | Nil => (Nil, ts)\n  | _ =>\n    match pTopDecl(ts) with\n    | (d, r1) => match pDecls(r1) with | (rest, r2) => (Cons(d, rest), r2) end\n    end\n  end\n\n\n(* ── Imports and program ──────────────────────────────────────────────────── *)\n\nfn pModule(ts : List(Token)) : (String, List(Token)) =\n  let r0 = advance(ts) in                    (* MODULE *)\n  match r0 with\n  | Cons(Tok(KUpper, name, _, _), r1) => (name, r1)\n  | _ => (\"?\", r0)\n  end\n\nfn pExportName(ts : List(Token)) : (String, List(Token)) =\n  match ts with\n  | Cons(Tok(KName, n, _, _), r)  => (n, r)\n  | Cons(Tok(KUpper, n, _, _), r) => (n, r)\n  | _ => (\"?\", ts)\n  end\n\nfn pExportNames(ts : List(Token)) : (List(String), List(Token)) =\n  match pExportName(ts) with\n  | (n, r1) => match pExportNamesTail(r1) with | (rest, r2) => (Cons(n, rest), r2) end\n  end\n\nfn pExportNamesTail(ts : List(Token)) : (List(String), List(Token)) =\n  match ts with\n  | Cons(Tok(KComma, _, _, _), r) =>\n    match pExportName(r) with\n    | (n, r1) => match pExportNamesTail(r1) with | (rest, r2) => (Cons(n, rest), r2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn pImport(ts : List(Token)) : (Import, List(Token)) =\n  let r0 = advance(ts) in                    (* IMPORT *)\n  match r0 with\n  | Cons(Tok(KUpper, mod, _, _), r1) =>\n    match r1 with\n    | Cons(Tok(KExposing, _, _, _), r2) =>\n      let r3 = advance(r2) in                (* LPAREN *)\n      match pExportNames(r3) with\n      | (names, r4) =>\n        let r5 = advance(r4) in              (* RPAREN *)\n        (Import(mod, Just(names)), r5)\n      end\n    | _ => (Import(mod, Nothing), r1)\n    end\n  | _ => (Import(\"?\", Nothing), r0)\n  end\n\nfn pImports(ts : List(Token)) : (List(Import), List(Token)) =\n  match ts with\n  | Cons(Tok(KImport, _, _, _), _) =>\n    match pImport(ts) with\n    | (i, r1) => match pImports(r1) with | (rest, r2) => (Cons(i, rest), r2) end\n    end\n  | _ => (Nil, ts)\n  end\n\nfn parseProgram(ts : List(Token)) : Prog =\n  match pModule(ts) with\n  | (name, r1) =>\n    match pImports(r1) with\n    | (imps, r2) =>\n      match pDecls(r2) with\n      | (decls, _) => Prog(name, imps, decls)\n      end\n    end\n  end\n\n\n(* ── Serialization: canonical S-expression, mirrored by parse_difftest.py. ─── *)\n\nfn sBool(b : Bool) : String = if b then \"true\" else \"false\"\n\nfn sVal(v : Val) : String =\n  match v with\n  | VInt(t)   => \"(VInt \" + t + \")\"\n  | VFloat(t) => \"(VFloat \" + t + \")\"\n  | VStr(s)   => \"(VStr \\\"\" + escape(s, 0, string_length(s)) + \"\\\")\"\n  | VBool(b)  => \"(VBool \" + sBool(b) + \")\"\n  | VUnit     => \"(VUnit)\"\n  end\n\nfn sTy(t : Ty) : String =\n  match t with\n  | TName(n)        => \"(TName \" + n + \")\"\n  | TApply(n, args) => \"(TApply \" + n + \" \" + sTyList(args) + \")\"\n  | TFn(a, b)       => \"(TFn \" + sTy(a) + \" \" + sTy(b) + \")\"\n  | TUnit           => \"(TUnit)\"\n  | TTuple(es)      => \"(TTuple \" + sTyList(es) + \")\"\n  end\n\nfn sTyItems(ts : List(Ty)) : String =\n  match ts with\n  | Nil           => \"\"\n  | Cons(t, Nil)  => sTy(t)\n  | Cons(t, rest) => sTy(t) + \" \" + sTyItems(rest)\n  end\nfn sTyList(ts : List(Ty)) : String = \"[\" + sTyItems(ts) + \"]\"\n\nfn sMaybeTy(m : Maybe(Ty)) : String =\n  match m with\n  | Nothing => \"_\"\n  | Just(t) => sTy(t)\n  end\n\nfn sPat(p : Pat) : String =\n  match p with\n  | PWild         => \"(PWild)\"\n  | PVar(n)       => \"(PVar \" + n + \")\"\n  | PLit(v)       => \"(PLit \" + sVal(v) + \")\"\n  | PCon(n, args) => \"(PCon \" + n + \" \" + sPatList(args) + \")\"\n  | PTuple(es)    => \"(PTuple \" + sPatList(es) + \")\"\n  end\n\nfn sPatItems(ps : List(Pat)) : String =\n  match ps with\n  | Nil           => \"\"\n  | Cons(p, Nil)  => sPat(p)\n  | Cons(p, rest) => sPat(p) + \" \" + sPatItems(rest)\n  end\nfn sPatList(ps : List(Pat)) : String = \"[\" + sPatItems(ps) + \"]\"\n\nfn sExpr(e : Expr) : String =\n  match e with\n  | Lit(v)              => \"(Lit \" + sVal(v) + \")\"\n  | Var(n)              => \"(Var \" + n + \")\"\n  | Con(n)              => \"(Con \" + n + \")\"\n  | TupleExpr(es)       => \"(TupleExpr \" + sExprList(es) + \")\"\n  | Apply(f, args)      => \"(Apply \" + sExpr(f) + \" \" + sExprList(args) + \")\"\n  | BinOp(op, l, r)     => \"(BinOp \" + op + \" \" + sExpr(l) + \" \" + sExpr(r) + \")\"\n  | UnaryOp(op, x)      => \"(UnaryOp \" + op + \" \" + sExpr(x) + \")\"\n  | LetExpr(n, a, v, b) => \"(LetExpr \" + n + \" \" + sMaybeTy(a) + \" \" + sExpr(v) + \" \" + sExpr(b) + \")\"\n  | IfExpr(c, t, e)     => \"(IfExpr \" + sExpr(c) + \" \" + sExpr(t) + \" \" + sExpr(e) + \")\"\n  | MatchExpr(s, arms)  => \"(MatchExpr \" + sExpr(s) + \" \" + sArmList(arms) + \")\"\n  | Lambda(ps, b)       => \"(Lambda \" + sParamList(ps) + \" \" + sExpr(b) + \")\"\n  end\n\nfn sExprItems(es : List(Expr)) : String =\n  match es with\n  | Nil           => \"\"\n  | Cons(e, Nil)  => sExpr(e)\n  | Cons(e, rest) => sExpr(e) + \" \" + sExprItems(rest)\n  end\nfn sExprList(es : List(Expr)) : String = \"[\" + sExprItems(es) + \"]\"\n\nfn sArm(a : Arm) : String =\n  match a with | Arm(p, e) => \"(Arm \" + sPat(p) + \" \" + sExpr(e) + \")\" end\nfn sArmItems(as : List(Arm)) : String =\n  match as with\n  | Nil           => \"\"\n  | Cons(a, Nil)  => sArm(a)\n  | Cons(a, rest) => sArm(a) + \" \" + sArmItems(rest)\n  end\nfn sArmList(as : List(Arm)) : String = \"[\" + sArmItems(as) + \"]\"\n\nfn sParam(p : Param) : String =\n  match p with | Param(n, a) => \"(Param \" + n + \" \" + sMaybeTy(a) + \")\" end\nfn sParamItems(ps : List(Param)) : String =\n  match ps with\n  | Nil           => \"\"\n  | Cons(p, Nil)  => sParam(p)\n  | Cons(p, rest) => sParam(p) + \" \" + sParamItems(rest)\n  end\nfn sParamList(ps : List(Param)) : String = \"[\" + sParamItems(ps) + \"]\"\n\nfn sBound(b : Bound) : String =\n  match b with | Bound(tr, v) => \"(Bound \" + tr + \" \" + v + \")\" end\nfn sBoundItems(bs : List(Bound)) : String =\n  match bs with\n  | Nil           => \"\"\n  | Cons(b, Nil)  => sBound(b)\n  | Cons(b, rest) => sBound(b) + \" \" + sBoundItems(rest)\n  end\nfn sBoundList(bs : List(Bound)) : String = \"[\" + sBoundItems(bs) + \"]\"\n\nfn sVariant(v : Variant) : String =\n  match v with | Variant(n, payload) => \"(Variant \" + n + \" \" + sTyList(payload) + \")\" end\nfn sVariantItems(vs : List(Variant)) : String =\n  match vs with\n  | Nil           => \"\"\n  | Cons(v, Nil)  => sVariant(v)\n  | Cons(v, rest) => sVariant(v) + \" \" + sVariantItems(rest)\n  end\nfn sVariantList(vs : List(Variant)) : String = \"[\" + sVariantItems(vs) + \"]\"\n\nfn sTMethod(m : TMethod) : String =\n  match m with | TMethod(n, t) => \"(TMethod \" + n + \" \" + sTy(t) + \")\" end\nfn sTMethodItems(ms : List(TMethod)) : String =\n  match ms with\n  | Nil           => \"\"\n  | Cons(m, Nil)  => sTMethod(m)\n  | Cons(m, rest) => sTMethod(m) + \" \" + sTMethodItems(rest)\n  end\nfn sTMethodList(ms : List(TMethod)) : String = \"[\" + sTMethodItems(ms) + \"]\"\n\nfn sIMethod(m : IMethod) : String =\n  match m with\n  | IMethod(n, params, body) => \"(IMethod \" + n + \" \" + sParamList(params) + \" \" + sExpr(body) + \")\"\n  end\nfn sIMethodItems(ms : List(IMethod)) : String =\n  match ms with\n  | Nil           => \"\"\n  | Cons(m, Nil)  => sIMethod(m)\n  | Cons(m, rest) => sIMethod(m) + \" \" + sIMethodItems(rest)\n  end\nfn sIMethodList(ms : List(IMethod)) : String = \"[\" + sIMethodItems(ms) + \"]\"\n\nfn sStrItems(ns : List(String)) : String =\n  match ns with\n  | Nil           => \"\"\n  | Cons(n, Nil)  => n\n  | Cons(n, rest) => n + \" \" + sStrItems(rest)\n  end\nfn sStrList(ns : List(String)) : String = \"[\" + sStrItems(ns) + \"]\"\n\nfn sTyBody(b : TyBody) : String =\n  match b with\n  | Alias(t)     => \"(Alias \" + sTy(t) + \")\"\n  | Variants(vs) => \"(Variants \" + sVariantList(vs) + \")\"\n  end\n\nfn sMaybeNames(m : Maybe(List(String))) : String =\n  match m with\n  | Nothing  => \"_\"\n  | Just(ns) => sStrList(ns)\n  end\n\nfn sDecl(d : Decl) : String =\n  match d with\n  | FnDecl(exp, n, bounds, params, ret, body) =>\n    \"(FnDecl \" + sBool(exp) + \" \" + n + \" \" + sBoundList(bounds) + \" \"\n      + sParamList(params) + \" \" + sMaybeTy(ret) + \" \" + sExpr(body) + \")\"\n  | LetDecl(exp, n, ann, v) =>\n    \"(LetDecl \" + sBool(exp) + \" \" + n + \" \" + sMaybeTy(ann) + \" \" + sExpr(v) + \")\"\n  | TypeDecl(exp, n, params, body) =>\n    \"(TypeDecl \" + sBool(exp) + \" \" + n + \" \" + sStrList(params) + \" \" + sTyBody(body) + \")\"\n  | TraitDecl(exp, n, params, methods) =>\n    \"(TraitDecl \" + sBool(exp) + \" \" + n + \" \" + sStrList(params) + \" \" + sTMethodList(methods) + \")\"\n  | ImplDecl(tn, targs, forty, methods) =>\n    \"(ImplDecl \" + tn + \" \" + sTyList(targs) + \" \" + sTy(forty) + \" \" + sIMethodList(methods) + \")\"\n  end\n\nfn sImport(i : Import) : String =\n  match i with | Import(m, expo) => \"(Import \" + m + \" \" + sMaybeNames(expo) + \")\" end\n\n(* Top level: one line per import and per decl for readable diffs. *)\nfn sImportLines(is : List(Import)) : String =\n  match is with\n  | Nil           => \"\"\n  | Cons(i, rest) => \"\\n\" + sImport(i) + sImportLines(rest)\n  end\n\nfn sDeclLines(ds : List(Decl)) : String =\n  match ds with\n  | Nil           => \"\"\n  | Cons(d, rest) => \"\\n\" + sDecl(d) + sDeclLines(rest)\n  end\n\nfn dumpProg(p : Prog) : String =\n  match p with\n  | Prog(name, imps, decls) =>\n    \"(module \" + name + \")\" + sImportLines(imps) + sDeclLines(decls)\n  end\n\n\n(* ── Smoke driver (the harness replaces this main per input file). ─────────── *)\n\nfn main(io : IO) : IO =\n  let src = \"module Demo\\n\\nfn add(x : Int, y : Int) : Int = x + y * 2\" in\n  print(io, dumpProg(parseProgram(tokenize(src, string_length(src), P(0, 1, 1)))))\n"}, {"path": "repo/optimize/lark/tac.lark", "group": "repo/optimize/lark", "name": "tac.lark", "text": "(* tac.lark — Lark's three-address-code IR, written in Lark.\n   (the port of oracle/tac.py.)\n\n   This strand builds a self-hosted OPTIMIZING C-compiler: lower.lark turns the\n   typed AST (tast.lark) into this flat TAC, opt.lark rewrites it, and\n   emit_tac_c.lark emits C from it.  This slice is the IR vocabulary + its\n   pretty-printer + the Function counter helpers — pure data, no lowering yet.\n\n   Pipeline position (per tac.py):\n       tast.lark  →  lower.lark  →  tac.lark  →  emit_tac_c.lark  →  C text\n\n   Design notes\n   ────────────\n   • RENAMED type: tac.py's value union `Val` (Tmp | Const) becomes `Operand`\n     here.  parse.lark ALREADY owns `type Val` (VInt/VFloat/VStr/VBool/VUnit,\n     the literal payload), and the optimizing pipeline is assembled by CONCATENATION\n     (lex+parse+…+tac), so the two would clash — same reason types.lark\n     M-prefixes its monotypes and tast.lark renamed TApply→TApp (a known wart of the language).\n     The constructor names `Tmp`/`Const` do NOT clash (parse's Val ctors are\n     V-prefixed), so they are kept verbatim.\n   • Const's payload models tac.py's raw scalar union `int|float|bool|str|None`\n     as an explicit ADT `ConstVal` (CInt/CFloat/CStr/CBool/CUnit).  Ints and\n     floats are carried as their SOURCE STRING (as parse.lark's VInt/VFloat do),\n     so pretty-printing an int is passthrough; float repr is the one place the\n     lowerer differential may need canonicalisation (Python `repr(float)` ≠ the raw\n     lexeme in general — flagged, deferred to the lowerer, matches the C emitter's float lesson).\n     CStr covers BOTH string literals AND constructor-tag names — tac.py makes\n     no distinction (`Const(str)`), disambiguating by context at an `==` tag test\n     (see lower.py / emit_tac_c.py); preserving that ambiguity keeps the port\n     faithful downstream.\n   • `dst` fields are a `Tmp` (its own type, as in tac.py's dataclasses), not an\n     Operand; only src/arg/field positions are `Operand`.  Optional results use\n     parse.lark's `Maybe` (ICall dst = Maybe(Tmp); IReturn val = Maybe(Operand)).\n   • Copy impls on every IR type: lower.lark / opt.lark reuse subtrees across\n     match arms and branches, which the affine checker would otherwise reject;\n     Copy impls are name-only (free) — the same move tast.lark/parse.lark make.\n\n   Run (smoke):  see harness/tac_smoke.py   (make tacsmoke)          *)\n\nmodule Tac\n\n\n(* ── Values (port of tac.py Tmp / Const / Val) ────────────────────────────── *)\n\n(* A named temporary — the result of every computation. *)\ntype Tmp = | Tmp of String\n\n(* A compile-time constant.  Mirrors tac.py's raw `int|float|bool|str|None`\n   union; ints/floats keep their source-string form (like parse.lark's Val). *)\ntype ConstVal =\n  | CInt   of String          (* integer literal, rendered as its digits       *)\n  | CFloat of String          (* float literal (see header: repr caveat) *)\n  | CStr   of String          (* string literal OR constructor-tag name        *)\n  | CBool  of Bool            (* rendered \"true\" / \"false\"                      *)\n  | CUnit                     (* the unit constant, rendered \"()\"               *)\n\n(* tac.py's `Val = Union[Tmp, Const]`, renamed to dodge parse.lark's `Val`. *)\ntype Operand =\n  | OTmp   of Tmp\n  | OConst of ConstVal\n\n\n(* ── Instructions (port of tac.py's 13 Instr dataclasses) ─────────────────── *)\n(* Field order follows the dataclasses exactly.  `dst` is always a `Tmp`; other\n   value positions are `Operand`.  ICall's dst is Maybe(Tmp) (Nothing = result\n   unused); IReturn's val is Maybe(Operand) (Nothing = unit return). *)\n\ntype Instr =\n  | IAssign       of Tmp, Operand                    (* dst = src               *)\n  | IBinOp        of Tmp, String, Operand, Operand   (* dst = l op r            *)\n  | IUnary        of Tmp, String, Operand            (* dst = op src            *)\n  | ICall         of Maybe(Tmp), String, List(Operand) (* dst = fn(args)        *)\n  | IClosureCall  of Tmp, Operand, Operand           (* dst = fn(arg), curried  *)\n  | IReturn       of Maybe(Operand)                  (* return val              *)\n  | ILabel        of String                          (* label:                  *)\n  | IJump         of String                          (* goto label              *)\n  | ICondJump     of Operand, String, String         (* if cond goto T else F   *)\n  | IAlloc        of Tmp, String, List(Operand)      (* dst = alloc tag(fields) *)\n  | IGetTag       of Tmp, Operand                    (* dst = tag(src)          *)\n  | IGetField     of Tmp, Operand, Int               (* dst = src[idx]          *)\n  | IAllocClosure of Tmp, String, List(Operand)      (* dst = closure(fn; caps) *)\n\n\n(* ── Function and module (port of tac.py Function / TAC) ───────────────────── *)\n\n(* name, params, body (definition order), fresh-name counter.  tac.py's mutable\n   `fresh`/`label`/`emit` become the pure helpers `tacFresh`/`tacLabel`/`tacEmit`\n   below (they thread an updated Function). *)\ntype Function = | Function of String, List(String), List(Instr), Int\n\n(* The whole program: functions in definition order + the global-name set\n   (List(String) here; only the backend consults it, pretty ignores it). *)\ntype TAC = | TAC of List(Function), List(String)\n\n\n(* ── Copy impls (reuse across match arms / branches — see header) ─────────── *)\n\nimpl Copy for Tmp      = {}\nimpl Copy for ConstVal = {}\nimpl Copy for Operand  = {}\nimpl Copy for Instr    = {}\nimpl Copy for Function = {}\nimpl Copy for TAC      = {}\n\n\n(* ── Small list/string helpers (tac-prefixed to avoid concat collisions) ──── *)\n\nfn tacJoin(sep : String, xs : List(String)) : String =\n  match xs with\n  | Nil           => \"\"\n  | Cons(x, rest) =>\n      match rest with\n      | Nil => x\n      | _   => x + sep + tacJoin(sep, rest)\n      end\n  end\n\nfn tacSnocInstr(xs : List(Instr), x : Instr) : List(Instr) =\n  match xs with\n  | Nil           => Cons(x, Nil)\n  | Cons(h, rest) => Cons(h, tacSnocInstr(rest, x))\n  end\n\nfn tacSnocStr(xs : List(String), x : String) : List(String) =\n  match xs with\n  | Nil           => Cons(x, Nil)\n  | Cons(h, rest) => Cons(h, tacSnocStr(rest, x))\n  end\n\nfn tacAppendStr(a : List(String), b : List(String)) : List(String) =\n  match a with\n  | Nil           => b\n  | Cons(h, rest) => Cons(h, tacAppendStr(rest, b))\n  end\n\n\n(* ── Constant-string repr (Python `repr(str)`) ────────────────────────────── *)\n(* tac.py renders string Consts via `repr()`.  Python's repr chooses its quote\n   character: single quotes by default, but double quotes when the string\n   contains a `'` and no `\"` (so the single quotes need no escaping).  Inside the\n   chosen delimiter it escapes the backslash, the delimiter itself, and \\n/\\t/\\r.\n   We reproduce that quote-selection exactly (09_parser emits `expected ')'`,\n   which Python reprs as \"expected ')'\").  Python additionally \\xNN-escapes\n   non-printable bytes — deferred, no corpus program needs it. *)\n\nfn tacContainsChar(s : String, c : Int, i : Int, n : Int) : Bool =\n  if i >= n then false\n  else if string_index(s, i) == c then true\n  else tacContainsChar(s, c, i + 1, n)\n\n(* escSingle = escape single quotes (true under a '…' delimiter, false under \"…\"). *)\nfn tacReprGo(s : String, i : Int, n : Int, escSingle : Bool) : String =\n  if i >= n then \"\"\n  else\n    let c    = string_index(s, i) in\n    let rest = tacReprGo(s, i + 1, n, escSingle) in\n    if c == 92 then \"\\\\\\\\\" + rest                       (* backslash    *)\n    else if c == 39 and escSingle then \"\\\\'\" + rest     (* single quote *)\n    else if c == 10 then \"\\\\n\" + rest\n    else if c == 9  then \"\\\\t\" + rest\n    else if c == 13 then \"\\\\r\" + rest\n    else char_to_string(c) + rest\n\nfn tacReprStr(s : String) : String =\n  let n    = string_length(s) in\n  let hasS = tacContainsChar(s, 39, 0, n) in\n  let hasD = tacContainsChar(s, 34, 0, n) in\n  let useDouble = if hasS then (if hasD then false else true) else false in\n  if useDouble then \"\\\"\" + tacReprGo(s, 0, n, false) + \"\\\"\"\n  else \"'\" + tacReprGo(s, 0, n, true) + \"'\"\n\n\n(* ── Pretty printer (byte-for-byte port of tac.py pretty / _instr_str) ────── *)\n\nfn showTmp(t : Tmp) : String =\n  match t with | Tmp(n) => n end\n\nfn showConstVal(c : ConstVal) : String =\n  match c with\n  | CUnit     => \"()\"\n  | CBool(b)  => if b then \"true\" else \"false\"\n  | CInt(s)   => s\n  | CFloat(s) => s\n  | CStr(s)   => tacReprStr(s)\n  end\n\nfn showOperand(v : Operand) : String =\n  match v with\n  | OTmp(t)   => showTmp(t)\n  | OConst(c) => showConstVal(c)\n  end\n\nfn showOperands(xs : List(Operand)) : String =\n  match xs with\n  | Nil           => \"\"\n  | Cons(x, rest) =>\n      match rest with\n      | Nil => showOperand(x)\n      | _   => showOperand(x) + \", \" + showOperands(rest)\n      end\n  end\n\nfn showInstr(i : Instr) : String =\n  match i with\n  | ILabel(n)             => n + \":\"\n  | IAssign(d, s)         => \"    \" + showTmp(d) + \" = \" + showOperand(s)\n  | IBinOp(d, op, l, r)   =>\n      \"    \" + showTmp(d) + \" = \" + showOperand(l) + \" \" + op + \" \" + showOperand(r)\n  | IUnary(d, op, s)      => \"    \" + showTmp(d) + \" = \" + op + showOperand(s)\n  | ICall(md, f, args)    =>\n      match md with\n      | Nothing => \"    call \" + f + \"(\" + showOperands(args) + \")\"\n      | Just(d) => \"    \" + showTmp(d) + \" = call \" + f + \"(\" + showOperands(args) + \")\"\n      end\n  | IClosureCall(d, fv, a) =>\n      \"    \" + showTmp(d) + \" = \" + showOperand(fv) + \"(\" + showOperand(a) + \")\"\n  | IReturn(mv)           =>\n      match mv with\n      | Nothing => \"    return\"\n      | Just(v) => \"    return \" + showOperand(v)\n      end\n  | IJump(l)              => \"    jump \" + l\n  | ICondJump(c, t, f)    =>\n      \"    if \" + showOperand(c) + \" jump \" + t + \" else \" + f\n  | IAlloc(d, tag, fs)    =>\n      match fs with\n      | Nil => \"    \" + showTmp(d) + \" = alloc \" + tag\n      | _   => \"    \" + showTmp(d) + \" = alloc \" + tag + \"(\" + showOperands(fs) + \")\"\n      end\n  | IGetTag(d, s)         => \"    \" + showTmp(d) + \" = tag(\" + showOperand(s) + \")\"\n  | IGetField(d, s, idx)  =>\n      \"    \" + showTmp(d) + \" = \" + showOperand(s) + \"[\" + int_to_string(idx) + \"]\"\n  | IAllocClosure(d, f, caps) =>\n      match caps with\n      | Nil => \"    \" + showTmp(d) + \" = closure(\" + f + \")\"\n      | _   => \"    \" + showTmp(d) + \" = closure(\" + f + \"; \" + showOperands(caps) + \")\"\n      end\n  end\n\nfn showInstrs(xs : List(Instr)) : List(String) =\n  match xs with\n  | Nil           => Nil\n  | Cons(x, rest) => Cons(showInstr(x), showInstrs(rest))\n  end\n\n(* One function's parts: header line, then instr lines, then a trailing \"\" —\n   exactly tac.py's per-function `parts.append(...)` sequence.  Joining all\n   parts with \"\\n\" reproduces the blank line between functions + one final \\n. *)\nfn fnParts(f : Function) : List(String) =\n  match f with\n  | Function(nm, ps, body, _) =>\n      let header = \"fn \" + nm + \"(\" + tacJoin(\", \", ps) + \"):\" in\n      Cons(header, tacSnocStr(showInstrs(body), \"\"))\n  end\n\nfn allParts(fs : List(Function)) : List(String) =\n  match fs with\n  | Nil           => Nil\n  | Cons(f, rest) => tacAppendStr(fnParts(f), allParts(rest))\n  end\n\n(* Named `tacPretty` (not `pretty`) so the concatenation can also include\n   types.lark, whose Mono pretty-printer already owns the name `pretty`. *)\nfn tacPretty(t : TAC) : String =\n  match t with\n  | TAC(fns, _) => tacJoin(\"\\n\", allParts(fns))\n  end\n\n\n(* ── Function counter helpers (pure ports of tac.py fresh/label/emit) ─────── *)\n(* Each threads an updated Function.  fresh/label bump the shared counter (the\n   backend relies on labels and temporaries drawing from ONE monotonic counter).  tacEmit appends (tac.py uses list.append); lower.lark may\n   prefer reverse-accumulate to dodge the O(n²) snoc — its choice. *)\n\nfn tacFresh(f : Function, hint : String) : (Tmp, Function) =\n  match f with\n  | Function(nm, ps, body, ctr) =>\n      (Tmp(hint + int_to_string(ctr)), Function(nm, ps, body, ctr + 1))\n  end\n\nfn tacLabel(f : Function, hint : String) : (String, Function) =\n  match f with\n  | Function(nm, ps, body, ctr) =>\n      (\".\" + hint + int_to_string(ctr), Function(nm, ps, body, ctr + 1))\n  end\n\nfn tacEmit(f : Function, i : Instr) : Function =\n  match f with\n  | Function(nm, ps, body, ctr) => Function(nm, ps, tacSnocInstr(body, i), ctr)\n  end\n\n\n(* ── Smoke driver (concatenated with lex + parse — see tac_smoke.py) ──────── *)\n(* Rebuilds, by hand, the exact program captured from tac.py's own pretty()\n   (see tac_smoke.py for the golden bytes) — exercising every Instr shape, both\n   Operand cases, every ConstVal, empty vs non-empty field/capture lists, and\n   the fresh/emit helpers.  A byte-match against the oracle is the check. *)\n\nfn main(io : IO) : IO =\n  (* fn add(a, b):  t0 = a + b ;  return t0        (fresh drives t0)          *)\n  let add0 = Function(\"add\", Cons(\"a\", Cons(\"b\", Nil)), Nil, 0) in\n  match tacFresh(add0, \"t\") with\n  | (t0, add1) =>\n      let add2 = tacEmit(add1, IBinOp(t0, \"+\", OTmp(Tmp(\"a\")), OTmp(Tmp(\"b\")))) in\n      let add  = tacEmit(add2, IReturn(Just(OTmp(t0)))) in\n\n      (* fn main():  every remaining instruction shape *)\n      let g0 = Function(\"main\", Nil, Nil, 0) in\n      match tacFresh(g0, \"t\") with\n      | (r, g1) =>\n          let g2  = tacEmit(g1,  ILabel(\".L0\")) in\n          let g3  = tacEmit(g2,  IAssign(r, OConst(CInt(\"42\")))) in\n          let g4  = tacEmit(g3,  ICall(Nothing, \"print\",\n                       Cons(OTmp(Tmp(\"io\")), Cons(OConst(CStr(\"hi\")), Nil)))) in\n          let g5  = tacEmit(g4,  ICall(Just(r), \"add\",\n                       Cons(OConst(CInt(\"1\")), Cons(OConst(CInt(\"2\")), Nil)))) in\n          let g6  = tacEmit(g5,  IAlloc(Tmp(\"c\"), \"Red\", Nil)) in\n          let g7  = tacEmit(g6,  IAlloc(Tmp(\"p\"), \"()\",\n                       Cons(OTmp(Tmp(\"a\")), Cons(OConst(CBool(true)), Nil)))) in\n          let g8  = tacEmit(g7,  IGetTag(Tmp(\"tg\"), OTmp(Tmp(\"c\")))) in\n          let g9  = tacEmit(g8,  IGetField(Tmp(\"fld\"), OTmp(Tmp(\"p\")), 1)) in\n          let g10 = tacEmit(g9,  ICondJump(OConst(CBool(false)), \".T\", \".F\")) in\n          let g11 = tacEmit(g10, IAllocClosure(Tmp(\"cl0\"), \"f\", Nil)) in\n          let g12 = tacEmit(g11, IAllocClosure(Tmp(\"cl1\"), \"g\",\n                       Cons(OTmp(Tmp(\"a\")), Nil))) in\n          let g13 = tacEmit(g12, IClosureCall(Tmp(\"z\"), OTmp(Tmp(\"cl1\")),\n                       OConst(CUnit))) in\n          let g14 = tacEmit(g13, IUnary(Tmp(\"n\"), \"-\", OTmp(Tmp(\"x\")))) in\n          let main = tacEmit(g14, IReturn(Nothing)) in\n\n          let prog = TAC(Cons(add, Cons(main, Nil)), Nil) in\n          print(io, tacPretty(prog))\n      end\n  end\n"}, {"path": "repo/optimize/lark/tast.lark", "group": "repo/optimize/lark", "name": "tast.lark", "text": "(* tast.lark — Lark's TYPED abstract syntax tree, written in Lark.\n   (the port of oracle/typed_tree.py.)\n\n   The type checker (infer.lark, slice 3) turns a syntactic Prog (parse.lark)\n   into a typed TProgram: every expression node carries its inferred monotype,\n   and every top-level decl carries its generalised Scheme.  The tree is\n   otherwise isomorphic to the syntactic one — node names match their untyped\n   twins with a `T` prefix, exactly as typed_tree.py mirrors tree.py.\n\n   Design notes\n   ────────────\n   • This slice is pure data + a signature printer; it has no standalone smoke\n     of its own module boundary, because it depends on the other type-checker modules and the\n     whole pipeline is assembled by CONCATENATION (a known wart of the language):\n        parse.lark  gives  Val, Maybe          (literals, optional variants)\n        types.lark  gives  Mono, Scheme, pretty (the type vocabulary)\n     So `make tastsmoke` concatenates parse + types + tast + a driver.\n   • ONE renamed constructor: typed_tree.py's `TApply` becomes `TApp` here.\n     parse.lark's *syntactic* type ADT already owns `TApply` (`TApply of String,\n     List(Ty)`), and under concatenation the two vocabularies share a namespace —\n     same reason types.lark M-prefixes its monotypes.  `TApp` also matches\n     ty.py's own abbreviation for the applied monotype.  Every other typed node\n     keeps its typed_tree.py name (TVar/TCon/TBinOp/… do NOT collide — the only\n     other T-names in scope are types.lark's *comments*, never declarations).\n   • Copy impls on every typed type: infer.lark reuses subtrees across match\n     arms / branches, which the affine checker (a known wart of the language) would otherwise\n     reject; Copy impls are name-only (no field check), so this is free — the\n     same move parse.lark makes for its AST.\n\n   Run (smoke):  see harness/tast_smoke.py  (make tastsmoke)  *)\n\nmodule Tast\n\n\n(* ── Typed expressions (port of typed_tree.py TExpr) ──────────────────────── *)\n(* Each node's LAST field is its inferred monotype `Mono`, mirroring the Python\n   dataclass `typ` field.  `Val` (from parse.lark) is the literal payload. *)\n\ntype TExpr =\n  | TLit       of Val, Mono                          (* value + type            *)\n  | TVar       of String, Mono                       (* typed variable ref      *)\n  | TCon       of String, Mono                       (* typed constructor ref   *)\n  | TTupleExpr of List(TExpr), Mono\n  | TApp       of TExpr, List(TExpr), Mono           (* was TApply (see header)  *)\n  | TBinOp     of String, TExpr, TExpr, Mono\n  | TUnaryOp   of String, TExpr, Mono\n  | TLetExpr   of String, TExpr, TExpr, Mono         (* name, value, body, typ   *)\n  | TIfExpr    of TExpr, TExpr, TExpr, Mono\n  | TMatchExpr of TExpr, List((TPat, TExpr)), Mono   (* scrutinee, arms, typ     *)\n  | TLambda    of List((String, Mono)), TExpr, Mono  (* (name,typ) params, body, overall TFn *)\n\n\n(* ── Typed patterns (port of typed_tree.py TPat) ──────────────────────────── *)\n\ntype TPat =\n  | TPWild  of Mono\n  | TPVar   of String, Mono\n  | TPLit   of Val, Mono\n  | TPCon   of String, List(TPat), Mono\n  | TPTuple of List(TPat), Mono\n\n\n(* ── Typed declarations (port of typed_tree.py TDecl) ─────────────────────── *)\n\n(* A checked variant: constructor name + field monotypes (empty = nullary). *)\ntype TVariant = | TVariant of String, List(Mono)\n\ntype TDecl =\n  (* name, (name,typ) params, body, generalised scheme, exported *)\n  | TFnDecl   of String, List((String, Mono)), TExpr, Scheme, Bool\n  (* name, value, scheme, exported *)\n  | TLetDecl  of String, TExpr, Scheme, Bool\n  (* name, type params, variants (Nothing = type alias), exported *)\n  | TTypeDecl of String, List(String), Maybe(List(TVariant)), Bool\n  (* trait name, concrete for-type, methods (each a TFnDecl) *)\n  | TImplDecl of String, String, List(TDecl)\n\n\n(* ── Typed program (port of typed_tree.py TProgram) ───────────────────────── *)\n\ntype TProgram = | TProgram of String, List(TDecl)\n\n\n(* ── Copy impls (reuse across match arms / branches — see header) ─────────── *)\n\nimpl Copy for TExpr    = {}\nimpl Copy for TPat     = {}\nimpl Copy for TVariant = {}\nimpl Copy for TDecl    = {}\nimpl Copy for TProgram = {}\n\n\n(* ── Top-level signature printer ──────────────────────────────────────────── *)\n(* This is the shape the type-checker differential compares against infer.py: one line per\n   top-level decl giving its name and inferred type.  The exact scheme rendering\n   (quantifier prefix, Copy bounds) is finalised in slice 3 against infer.py's\n   output; for now the smoke prints the generalised body via types.lark `pretty`. *)\n\nfn prettyScheme(s : Scheme) : String =\n  match s with\n  | Scheme(qs, body, _) =>\n      match qs with\n      | Nil => pretty(body)\n      | _   => \"forall. \" + pretty(body)     (* quantifier list finalised in slice 3 *)\n      end\n  end\n\nfn tDeclSig(d : TDecl) : String =\n  match d with\n  | TFnDecl(name, _, _, sc, _)   => name + \" : \" + prettyScheme(sc)\n  | TLetDecl(name, _, sc, _)     => name + \" : \" + prettyScheme(sc)\n  | TTypeDecl(name, _, _, _)     => \"type \" + name\n  | TImplDecl(tr, forty, _)      => \"impl \" + tr + \" for \" + forty\n  end\n\nfn tSigLines(ds : List(TDecl)) : String =\n  match ds with\n  | Nil           => \"\"\n  | Cons(d, rest) =>\n      match rest with\n      | Nil => tDeclSig(d)\n      | _   => tDeclSig(d) + \"\\n\" + tSigLines(rest)\n      end\n  end\n\nfn showTProgram(p : TProgram) : String =\n  match p with\n  | TProgram(m, ds) => \"(module \" + m + \")\\n\" + tSigLines(ds)\n  end\n\n\n(* ── Smoke driver (concatenated with parse + types — see tast_smoke.py) ───── *)\n(* Builds a tiny typed program by hand and prints its top-level signatures,\n   exercising every typed decl shape plus TExpr/TPat construction. *)\n\nfn main(io : IO) : IO =\n  let a  = MVar(0) in\n  (* id : a -> a  ;  body = \\x. x  *)\n  let idBody = TLambda(Cons((\"x\", a), Nil), TVar(\"x\", a), MFn(a, a)) in\n  let idFn   = TFnDecl(\"id\", Cons((\"x\", a), Nil), idBody,\n                       Scheme(Cons(0, Nil), MFn(a, a), Nil), true) in\n  (* answer = 42  ;  monomorphic Int let-decl *)\n  let ans    = TLetDecl(\"answer\", TLit(VInt(\"42\"), MCon(\"Int\")),\n                        Scheme(Nil, MCon(\"Int\"), Nil), false) in\n  (* type Color = Red | Green  *)\n  let colorT = TTypeDecl(\"Color\", Nil,\n                 Just(Cons(TVariant(\"Red\", Nil), Cons(TVariant(\"Green\", Nil), Nil))),\n                 true) in\n  (* impl Show for Color = { ... }  (methods elided in this smoke) *)\n  let showImpl = TImplDecl(\"Show\", \"Color\", Nil) in\n  let prog = TProgram(\"Demo\",\n               Cons(colorT, Cons(idFn, Cons(ans, Cons(showImpl, Nil))))) in\n  print(io, showTProgram(prog))\n"}, {"path": "repo/optimize/lark/types.lark", "group": "repo/optimize/lark", "name": "types.lark", "text": "(* types.lark — Lark's internal type representation, written in Lark.\n   (the port of oracle/ty.py.)\n\n   Monotypes, schemes, substitution, free-variable computation, unification,\n   the Copy check, and the pretty-printer — the bedrock the type checker\n   (infer.lark) stands on.  This slice is deliberately self-contained and\n   validated by a smoke `main`; the full differential (inferred types vs\n   infer.py over the corpus) arrives once infer.lark lands.\n\n   Design notes\n   ────────────\n   • Monotype constructors are M-PREFIXED (MVar/MCon/MApp/MFn/MTup) rather than\n     ty.py's TVar/TCon/TApp/TFn/TTup.  Reason: parse.lark's *syntactic* type\n     ADT already owns `TFn` (and TName/TApply/TUnit/TTuple), and the type checker's pipeline\n     is assembled by CONCATENATION (a known wart of the language) — one module, so the two\n     type vocabularies must not collide.  M = \"monotype\".\n   • A substitution `Subst` (TVar id → Mono) is the \"persistent map\" of the risk\n     note (a known wart of the language): purely functional.  Originally an assoc list; now an\n     Int-keyed Okasaki red-black tree so `substGet` is O(log n) —\n     `compose` still lets the newer map win, the immutable analogue of dict.update.\n   • Unification returns `Result(Subst, String)` instead of raising: Lark has no\n     exceptions, so every caller threads the Result (Ok = mgu, Err = reason).\n   • Dynamic string equality is CHAR-BY-CHAR (`strEq`), NOT `==`: string `==`\n     type-checks but is unimplemented in the CEK binop (a known wart of the language).\n     strEq compares codepoints via string_index/Int-== — robust on both runtimes\n     for the ASCII self-host corpus.\n   • Every function is fully annotated so infer's Pass 1.5 pre-registers the\n     mutually-recursive groups (apply/applyList, the unify family).\n\n   Run (smoke):  python3 oracle/cek.py lark/types.lark   *)\n\nmodule Types\n\n\n(* ── Monotypes (port of ty.py's Mono) ─────────────────────────────────────── *)\n\ntype Mono =\n  | MVar of Int                 (* unification variable α_i          *)\n  | MCon of String              (* nullary constructor: Int, Bool, … *)\n  | MApp of String, List(Mono)  (* applied: List(Int), Result(a, b)  *)\n  | MFn  of Mono, Mono          (* function type τ₁ → τ₂             *)\n  | MTup of List(Mono)          (* tuple type (τ₁, …)                *)\n\n(* Polytype: ∀qs. body, with the subset of qs that must be Copy at instantiation. *)\ntype Scheme = | Scheme of List(Int), Mono, List(Int)   (* qs, body, copyVars *)\n\n(* Copy impls: a value may be reused across match arms / lets (a known wart of the language). *)\nimpl Copy for Mono   = {}\nimpl Copy for Scheme = {}\n\n\n(* ── Int-set helpers (free variables, quantifier lists) ───────────────────── *)\n\nfn memberInt(x : Int, xs : List(Int)) : Bool =\n  match xs with\n  | Nil          => false\n  | Cons(y, rest) => if x == y then true else memberInt(x, rest)\n  end\n\nfn insertInt(x : Int, xs : List(Int)) : List(Int) =\n  if memberInt(x, xs) then xs else Cons(x, xs)\n\nfn unionInts(xs : List(Int), ys : List(Int)) : List(Int) =\n  match xs with\n  | Nil           => ys\n  | Cons(x, rest) => insertInt(x, unionInts(rest, ys))\n  end\n\nfn diffInts(xs : List(Int), ys : List(Int)) : List(Int) =\n  match xs with\n  | Nil           => Nil\n  | Cons(x, rest) => if memberInt(x, ys) then diffInts(rest, ys)\n                     else Cons(x, diffInts(rest, ys))\n  end\n\n\n(* ── Dynamic string equality (see header note) ────────────────────────────── *)\n\nfn strEqFrom(a : String, b : String, i : Int, n : Int) : Bool =\n  if i >= n then true\n  else if string_index(a, i) == string_index(b, i) then strEqFrom(a, b, i + 1, n)\n  else false\n\nfn strEq(a : String, b : String) : Bool =\n  let la = string_length(a) in\n  let lb = string_length(b) in\n  if la == lb then strEqFrom(a, b, 0, la) else false\n\nfn memberStr(x : String, xs : List(String)) : Bool =\n  match xs with\n  | Nil           => false\n  | Cons(y, rest) => if strEq(x, y) then true else memberStr(x, rest)\n  end\n\n\n(* ── Substitution (Int → Mono, as a red-black balanced tree) ──────────────────\n   Was an assoc list `List((Int, Mono))`; now an Int-keyed Okasaki red-black tree\n   so `substGet` is O(log n) instead of a linear scan.  Algorithm W allocates\n   fresh vars monotonically, so an assoc list / naive BST degrades to a chain on\n   exactly the keys unification looks up hardest — balancing is what kills the\n   subst-side O(n^1.9) multiplier (a residual).  The change is\n   OUTPUT-NEUTRAL: `apply` reads only the key→Mono mapping, never traversal order,\n   and `compose` preserves the same override semantics the assoc list had (s1\n   wins on shared keys; s2-only keys carry s1 applied to their value).  SLeaf is\n   the empty substitution — where the old code wrote `Nil`. *)\n\ntype SColor = | SRed | SBlack\ntype Subst  = | SLeaf | SNode of SColor, Subst, Int, Mono, Subst\nimpl Copy for SColor = {}\nimpl Copy for Subst  = {}\n\ntype Opt = | ONone | OSome of Mono\nimpl Copy for Opt = {}\n\n(* O(log n) lookup: descend by key order (was a linear assoc-list scan). *)\nfn substGet(s : Subst, i : Int) : Opt =\n  match s with\n  | SLeaf                => ONone\n  | SNode(_, l, k, v, r) =>\n      if i == k then OSome(v)\n      else if i < k then substGet(l, i)\n      else substGet(r, i)\n  end\n\n(* Okasaki's balance: repair a red-red violation under a black parent.  The four\n   rotations all rebuild the same red node over two black children; every other\n   shape is returned unchanged. *)\nfn balance(c : SColor, a : Subst, xk : Int, xv : Mono, b : Subst) : Subst =\n  match (c, a, xk, xv, b) with\n  | (SBlack, SNode(SRed, SNode(SRed, t1, k1, v1, t2), k2, v2, t3), k3, v3, t4) =>\n      SNode(SRed, SNode(SBlack, t1, k1, v1, t2), k2, v2, SNode(SBlack, t3, k3, v3, t4))\n  | (SBlack, SNode(SRed, t1, k1, v1, SNode(SRed, t2, k2, v2, t3)), k3, v3, t4) =>\n      SNode(SRed, SNode(SBlack, t1, k1, v1, t2), k2, v2, SNode(SBlack, t3, k3, v3, t4))\n  | (SBlack, t1, k1, v1, SNode(SRed, SNode(SRed, t2, k2, v2, t3), k3, v3, t4)) =>\n      SNode(SRed, SNode(SBlack, t1, k1, v1, t2), k2, v2, SNode(SBlack, t3, k3, v3, t4))\n  | (SBlack, t1, k1, v1, SNode(SRed, t2, k2, v2, SNode(SRed, t3, k3, v3, t4))) =>\n      SNode(SRed, SNode(SBlack, t1, k1, v1, t2), k2, v2, SNode(SBlack, t3, k3, v3, t4))\n  | (cc, aa, kk, vv, bb) => SNode(cc, aa, kk, vv, bb)\n  end\n\n(* insert/override key k with value v, keeping the red-black invariants. *)\nfn subIns(s : Subst, k : Int, v : Mono) : Subst =\n  match s with\n  | SLeaf => SNode(SRed, SLeaf, k, v, SLeaf)\n  | SNode(c, l, k0, v0, r) =>\n      if k < k0 then balance(c, subIns(l, k, v), k0, v0, r)\n      else if k > k0 then balance(c, l, k0, v0, subIns(r, k, v))\n      else SNode(c, l, k, v, r)\n  end\n\nfn subInsert(s : Subst, k : Int, v : Mono) : Subst =\n  match subIns(s, k, v) with\n  | SNode(_, l, k0, v0, r) => SNode(SBlack, l, k0, v0, r)   (* recolour root black *)\n  | SLeaf                  => SLeaf                          (* subIns never yields a leaf *)\n  end\n\nfn applyList(s : Subst, ts : List(Mono)) : List(Mono) =\n  match ts with\n  | Nil           => Nil\n  | Cons(t, rest) => Cons(apply(s, t), applyList(s, rest))\n  end\n\n(* apply substitution s to monotype t (chasing var chains, as ty.apply). *)\nfn apply(s : Subst, t : Mono) : Mono =\n  match t with\n  | MVar(i) =>\n    match substGet(s, i) with\n    | ONone    => t\n    | OSome(u) => apply(s, u)\n    end\n  | MCon(n)     => t\n  | MApp(h, as_) => MApp(h, applyList(s, as_))\n  | MFn(p, r)   => MFn(apply(s, p), apply(s, r))\n  | MTup(es)    => MTup(applyList(s, es))\n  end\n\n(* is t the type variable k itself? *)\nfn monoIsVarId(t : Mono, k : Int) : Bool =\n  match t with\n  | MVar(j) => j == k\n  | MCon(n) => false\n  | MApp(h, as_) => false\n  | MFn(p, r)    => false\n  | MTup(es)     => false\n  end\n\n(* fold every (k,v) of s2 into acc as (k, apply(s1, v)) — s2's range under s1.\n\n   Dropping a composed binding k |-> k, exactly as ty.compose does: it is the\n   identity map, so dropping it changes no answer, and apply/1 chases var chains,\n   so keeping it would be a chain with no end. *)\nfn subComposeRange(s1 : Subst, s2 : Subst, acc : Subst) : Subst =\n  match s2 with\n  | SLeaf => acc\n  | SNode(_, l, k, v, r) =>\n      let accL = subComposeRange(s1, l, acc) in\n      let nv   = apply(s1, v) in\n      let acc2 = if monoIsVarId(nv, k) then accL else subInsert(accL, k, nv) in\n      subComposeRange(s1, r, acc2)\n  end\n\n(* fold every (k,v) of src into acc, src overriding on shared keys. *)\nfn subUnionInto(src : Subst, acc : Subst) : Subst =\n  match src with\n  | SLeaf => acc\n  | SNode(_, l, k, v, r) => subUnionInto(r, subInsert(subUnionInto(l, acc), k, v))\n  end\n\n(* compose s1 s2 = s1 ∘ s2: apply s1 to s2's range, then let s1 override.  Same\n   mapping the assoc-list `appendSub(s1, mapApplyRange(s1, s2))` produced. *)\nfn compose(s1 : Subst, s2 : Subst) : Subst =\n  subUnionInto(s1, subComposeRange(s1, s2, SLeaf))\n\nfn subRemoveInto(src : Subst, ks : List(Int), acc : Subst) : Subst =\n  match src with\n  | SLeaf => acc\n  | SNode(_, l, k, v, r) =>\n      let acc1 = subRemoveInto(l, ks, acc) in\n      let acc2 = if memberInt(k, ks) then acc1 else subInsert(acc1, k, v) in\n      subRemoveInto(r, ks, acc2)\n  end\n\nfn removeKeys(s : Subst, ks : List(Int)) : Subst =\n  subRemoveInto(s, ks, SLeaf)\n\n(* True iff every type variable in `t` is bound by `qs`.  Allocation-free (no\n   freeVars list is built): it walks `t` and short-circuits on the first var not\n   in `qs`.  When true for a scheme's body, the scheme is CLOSED — applying any\n   substitution to it is the identity, so applyScheme can return it unchanged. *)\nfn monoVarsAllIn(t : Mono, qs : List(Int)) : Bool =\n  match t with\n  | MVar(i)      => memberInt(i, qs)\n  | MCon(n)      => true\n  | MApp(h, as_) => monoListVarsAllIn(as_, qs)\n  | MFn(p, r)    => if monoVarsAllIn(p, qs) then monoVarsAllIn(r, qs) else false\n  | MTup(es)     => monoListVarsAllIn(es, qs)\n  end\n\nfn monoListVarsAllIn(ts : List(Mono), qs : List(Int)) : Bool =\n  match ts with\n  | Nil           => true\n  | Cons(t, rest) => if monoVarsAllIn(t, qs) then monoListVarsAllIn(rest, qs) else false\n  end\n\n(* Substitution hot path.  A fully-generalised (top-level) scheme is closed, so applying a\n   substitution to it is the identity — return it unchanged, allocating nothing.\n   The frozen path (removeKeys rebuilds all of `s`, then apply rebuilds `body`)\n   only runs for the few open/local schemes that actually have free vars.  This\n   is what stops applyEnv from paying O(env × |s|) at every sub-expression: the\n   ~closed top-level environment (hundreds of schemes) becomes a walk, not a\n   rebuild.  Output-identical to the frozen definition (the else-branch). *)\nfn applyScheme(s : Subst, sc : Scheme) : Scheme =\n  match sc with\n  | Scheme(qs, body, cv) =>\n      if monoVarsAllIn(body, qs) then sc\n      else Scheme(qs, apply(removeKeys(s, qs), body), cv)\n  end\n\n\n(* ── Free variables ───────────────────────────────────────────────────────── *)\n\nfn freeVarsList(ts : List(Mono)) : List(Int) =\n  match ts with\n  | Nil           => Nil\n  | Cons(t, rest) => unionInts(freeVars(t), freeVarsList(rest))\n  end\n\nfn freeVars(t : Mono) : List(Int) =\n  match t with\n  | MVar(i)     => Cons(i, Nil)\n  | MCon(n)     => Nil\n  | MApp(h, as_) => freeVarsList(as_)\n  | MFn(p, r)   => unionInts(freeVars(p), freeVars(r))\n  | MTup(es)    => freeVarsList(es)\n  end\n\nfn freeVarsScheme(sc : Scheme) : List(Int) =\n  match sc with\n  | Scheme(qs, body, cv) => diffInts(freeVars(body), qs)\n  end\n\n\n(* ── Unification → Result(Subst, String) ──────────────────────────────────── *)\n\nfn occursMsg(i : Int, t : Mono) : String =\n  \"cannot unify \" + pretty(MVar(i)) + \" with \" + pretty(t) + \": occurs check failed\"\n\nfn bind(i : Int, t : Mono) : Result(Subst, String) =\n  match t with\n  | MVar(j) => if i == j then Ok(SLeaf)\n               else if memberInt(i, freeVars(t)) then Err(occursMsg(i, t))\n               else Ok(subInsert(SLeaf, i, t))\n  | _       => if memberInt(i, freeVars(t)) then Err(occursMsg(i, t))\n               else Ok(subInsert(SLeaf, i, t))\n  end\n\n(* Fold-based sequence unifier: accumulate s, apply it to each pair (ty._unify_seq). *)\nfn unifySeqAcc(s : Subst, xs : List(Mono), ys : List(Mono))\n    : Result(Subst, String) =\n  match (xs, ys) with\n  | (Nil, Nil) => Ok(s)\n  | (Cons(x, xr), Cons(y, yr)) =>\n    match unify(apply(s, x), apply(s, y)) with\n    | Err(e)  => Err(e)\n    | Ok(s2)  => unifySeqAcc(compose(s2, s), xr, yr)\n    end\n  | _ => Err(\"arity mismatch\")\n  end\n\nfn unifySeq(xs : List(Mono), ys : List(Mono)) : Result(Subst, String) =\n  unifySeqAcc(SLeaf, xs, ys)\n\nfn unify(a : Mono, b : Mono) : Result(Subst, String) =\n  match (a, b) with\n  | (MVar(i), MVar(j)) => if i == j then Ok(SLeaf) else bind(i, b)\n  | (MVar(i), _)       => bind(i, b)\n  | (_, MVar(j))       => bind(j, a)\n  | (MCon(n1), MCon(n2)) =>\n    if strEq(n1, n2) then Ok(SLeaf)\n    else Err(\"cannot unify \" + pretty(a) + \" with \" + pretty(b))\n  | (MApp(h1, as1), MApp(h2, as2)) =>\n    if strEq(h1, h2) then unifySeq(as1, as2)\n    else Err(\"cannot unify \" + pretty(a) + \" with \" + pretty(b))\n  | (MFn(p1, r1), MFn(p2, r2)) =>\n    match unify(p1, p2) with\n    | Err(e) => Err(e)\n    | Ok(s1) =>\n      match unify(apply(s1, r1), apply(s1, r2)) with\n      | Err(e) => Err(e)\n      | Ok(s2) => Ok(compose(s2, s1))\n      end\n    end\n  | (MTup(es1), MTup(es2)) => unifySeq(es1, es2)\n  | _ => Err(\"cannot unify \" + pretty(a) + \" with \" + pretty(b))\n  end\n\n\n(* ── Copy check (port of is_copy) ─────────────────────────────────────────── *)\n\nfn allCopy(ts : List(Mono), ct : List(String)) : Bool =\n  match ts with\n  | Nil           => true\n  | Cons(t, rest) => if isCopy(t, ct) then allCopy(rest, ct) else false\n  end\n\nfn isCopy(t : Mono, ct : List(String)) : Bool =\n  match t with\n  | MVar(i)     => true                          (* unresolved var: assume Copy *)\n  | MCon(n)     => memberStr(n, ct)\n  | MApp(h, as_) => if memberStr(h, ct) then allCopy(as_, ct) else false\n  | MFn(p, r)   => true                          (* functions are code, freely reusable *)\n  | MTup(es)    => allCopy(es, ct)\n  end\n\n\n(* ── Pretty-printer (port of ty.pretty / _pretty_inner) ───────────────────── *)\n\n(* Greek display for small var ids (ty.py's letter table, ς skipped); α<N> after. *)\nfn greek(i : Int) : String =\n  match i with\n  | 0 => \"α\" | 1 => \"β\" | 2 => \"γ\" | 3 => \"δ\" | 4 => \"ε\" | 5 => \"ζ\"\n  | 6 => \"η\" | 7 => \"θ\" | 8 => \"ι\" | 9 => \"κ\" | 10 => \"λ\" | 11 => \"μ\"\n  | 12 => \"ν\" | 13 => \"ξ\" | 14 => \"ο\" | 15 => \"π\" | 16 => \"ρ\" | 17 => \"σ\"\n  | 18 => \"τ\" | 19 => \"υ\" | 20 => \"φ\" | 21 => \"χ\" | 22 => \"ψ\" | 23 => \"ω\"\n  | _ => \"α\" + int_to_string(i)\n  end\n\nfn prettyArgs(ts : List(Mono)) : String =\n  match ts with\n  | Nil           => \"\"\n  | Cons(t, Nil)  => prettyP(t, false)\n  | Cons(t, rest) => prettyP(t, false) + \", \" + prettyArgs(rest)\n  end\n\nfn prettyInner(t : Mono) : String =\n  match t with\n  | MVar(i)     => greek(i)\n  | MCon(n)     => n\n  | MApp(h, as_) =>\n    match as_ with\n    | Nil => h\n    | _   => h + \"(\" + prettyArgs(as_) + \")\"\n    end\n  | MFn(p, r)   => prettyP(p, true) + \" -> \" + prettyP(r, false)\n  | MTup(es)    => \"(\" + prettyArgs(es) + \")\"\n  end\n\n(* paren = wrap a function type in parens (its left position needs it). *)\nfn
