nd\n\nfn checkLetDecl(decl : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : LetDeclR =\n  match decl with\n  | LetDecl(exported, name, ann, value) =>\n      match infer(env, Nil, value, f, copy) with\n      | IErr(m) => LDErr(m)\n      | IOk(tv, t0, s, f1, _) =>\n          match checkLetAnn(ann, apply(s, t0), s, f1) with\n          | RErr(e) => LDErr(e)\n          | ROk(t2, s2, f2) =>\n              let sc = generalise(applyEnv(s2, env), t2) in\n              let tv2 = applyTExpr(s2, tv) in\n              match showBounds(tv2, show) with\n              | Just(e) => LDErr(e)\n              | Nothing => LDOk(TLetDecl(name, tv2, sc, exported), sc, f2)\n              end\n          end\n      end\n  | _ => LDErr(\"not a let declaration\")\n  end\n\n\n(* ── Type / trait / impl registration (port of the Pass-1 registrars) ─────── *)\n\nfn allocParamVars(params : List(String), f : Int) : (List((String, Int)), Int) =\n  match params with\n  | Nil => (Nil, f)\n  | Cons(p, rest) => match allocParamVars(rest, f + 1) with | (pv, f2) => (Cons((p, f), pv), f2) end\n  end\n\nfn pvarMonos(pvars : List((String, Int))) : List(Mono) =\n  match pvars with | Nil => Nil | Cons((_, id), rest) => Cons(MVar(id), pvarMonos(rest)) end\n\nfn buildResultT(name : String, pvars : List((String, Int))) : Mono =\n  match pvars with | Nil => MCon(name) | _ => MApp(name, pvarMonos(pvars)) end\n\nfn curryFields(fields : List(Mono), res : Mono) : Mono =\n  match fields with | Nil => res | Cons(ft, rest) => MFn(ft, curryFields(rest, res)) end\n\nfn registerOneVariant(vn : String, payload : List(Ty), pvars : List((String, Int)),\n                      resultT : Mono, env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match payload with\n  | Nil => (envPut(env, vn, Scheme(freeVars(resultT), resultT, Nil)), f)\n  | _ =>\n      match synToMonoList(payload, pvars, f) with\n      | (fieldMonos, _, f2) =>\n          let conT = curryFields(fieldMonos, resultT) in\n          (envPut(env, vn, Scheme(freeVars(conT), conT, Nil)), f2)\n      end\n  end\n\nfn registerVariants(vs : List(Variant), pvars : List((String, Int)), resultT : Mono,\n                    env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match vs with\n  | Nil => (env, f)\n  | Cons(Variant(vn, payload), rest) =>\n      match registerOneVariant(vn, payload, pvars, resultT, env, f) with\n      | (env2, f2) => registerVariants(rest, pvars, resultT, env2, f2)\n      end\n  end\n\nfn registerTypeDecl(decl : Decl, env : List((String, Scheme)), f : Int, copy : List(String)) : (List((String, Scheme)), Int, List(String)) =\n  match decl with\n  | TypeDecl(exported, name, params, body) =>\n      match body with\n      | Alias(_) => (env, f, copy)\n      | Variants(vs) =>\n          match allocParamVars(params, f) with\n          | (pvars, f1) =>\n              match registerVariants(vs, pvars, buildResultT(name, pvars), env, f1) with\n              | (env2, f2) => (env2, f2, copy)\n              end\n          end\n      end\n  | _ => (env, f, copy)\n  end\n\nfn registerTraitMethods(methods : List(TMethod), pvars : List((String, Int)),\n                        env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match methods with\n  | Nil => (env, f)\n  | Cons(TMethod(mname, ty), rest) =>\n      match synToMono(ty, pvars, f) with\n      | (methodT, _, f2) => registerTraitMethods(rest, pvars, envPut(env, mname, Scheme(freeVars(methodT), methodT, Nil)), f2)\n      end\n  end\n\nfn registerTraitDecl(decl : Decl, env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match decl with\n  | TraitDecl(exported, name, params, methods) =>\n      match allocParamVars(params, f) with\n      | (pvars, f1) => registerTraitMethods(methods, pvars, env, f1)\n      end\n  | _ => (env, f)\n  end\n\nfn forTypeName(forty : Ty) : String =\n  match forty with | TName(n) => n | TApply(n, _) => n | _ => \"?\" end\n\nfn paramMonos(params : List(Param), tvenv : List((String, Int)), f : Int) : PMRes =\n  match params with\n  | Nil => PMSome(Nil, tvenv, f)\n  | Cons(Param(nm, ann), rest) =>\n      match ann with\n      | Nothing => PMNone(f)\n      | Just(annTy) =>\n          match synToMono(annTy, tvenv, f) with\n          | (m, tvenv2, f1) =>\n              match paramMonos(rest, tvenv2, f1) with\n              | PMNone(f2) => PMNone(f2)\n              | PMSome(ms, tvenv3, f2) => PMSome(Cons(m, ms), tvenv3, f2)\n              end\n          end\n      end\n  end\n\nfn fnTypeFromAnnotations(decl : Decl, f : Int) : (Maybe(Mono), Int) =\n  match decl with\n  | FnDecl(exported, name, bounds, params, ret, body) =>\n      match ret with\n      | Nothing => (Nothing, f)\n      | Just(retTy) =>\n          match paramMonos(params, Nil, f) with\n          | PMNone(f2) => (Nothing, f2)\n          | PMSome(monos, tvenv, f2) =>\n              match synToMono(retTy, tvenv, f2) with\n              | (retT, _, f3) => (Just(curryFields(monos, retT)), f3)\n              end\n          end\n      end\n  | _ => (Nothing, f)\n  end\n\n\n(* ── Initial environment (port of _initial_env) ───────────────────────────── *)\n\nfn eCons(name : String, sc : Scheme, rest : List((String, Scheme))) : List((String, Scheme)) =\n  Cons((name, sc), rest)\n\nfn initialEnv(dummy : Int) : (List((String, Scheme)), List(String)) =\n  let a = MVar(0) in\n  let b = MVar(1) in\n  let io = MCon(\"IO\") in\n  let str = MCon(\"String\") in\n  let int = MCon(\"Int\") in\n  let flt = MCon(\"Float\") in\n  let bool = MCon(\"Bool\") in\n  let env =\n    eCons(\"print\",           Scheme(Nil, MFn(io, MFn(str, io)), Nil),\n    eCons(\"read\",            Scheme(Nil, MFn(io, MTup(Cons(io, Cons(str, Nil)))), Nil),\n    eCons(\"read_all\",        Scheme(Nil, MFn(io, MTup(Cons(io, Cons(str, Nil)))), Nil),\n    eCons(\"show\",            Scheme(Cons(0, Nil), MFn(a, str), Nil),\n    eCons(\"int_to_float\",    Scheme(Nil, MFn(int, flt), Nil),\n    eCons(\"float_to_int\",    Scheme(Nil, MFn(flt, int), Nil),\n    eCons(\"float_to_bits\",   Scheme(Nil, MFn(flt, int), Nil),\n    eCons(\"int_to_string\",   Scheme(Nil, MFn(int, str), Nil),\n    eCons(\"float_to_string\", Scheme(Nil, MFn(flt, str), Nil),\n    eCons(\"int_abs\",         Scheme(Nil, MFn(int, int), Nil),\n    eCons(\"float_abs\",       Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"float_sqrt\",      Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"float_floor\",     Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"float_ceil\",      Scheme(Nil, MFn(flt, flt), Nil),\n    eCons(\"string_length\",   Scheme(Nil, MFn(str, int), Nil),\n    eCons(\"string_index\",    Scheme(Nil, MFn(str, MFn(int, int)), Nil),\n    eCons(\"string_slice\",    Scheme(Nil, MFn(str, MFn(int, MFn(int, str))), Nil),\n    eCons(\"char_to_string\",  Scheme(Nil, MFn(int, str), Nil),\n    eCons(\"string_to_int\",   Scheme(Nil, MFn(str, tResult(int, str)), Nil),\n    eCons(\"string_to_float\", Scheme(Nil, MFn(str, tResult(flt, str)), Nil),\n    eCons(\"Nil\",  Scheme(Cons(0, Nil), tList(a), Nil),\n    eCons(\"Cons\", Scheme(Cons(0, Nil), MFn(a, MFn(tList(a), tList(a))), Nil),\n    eCons(\"Ok\",   Scheme(Cons(0, Cons(1, Nil)), MFn(a, tResult(a, b)), Nil),\n    eCons(\"Err\",  Scheme(Cons(0, Cons(1, Nil)), MFn(b, tResult(a, b)), Nil),\n    eCons(\"True\",  Scheme(Nil, bool, Nil),\n    eCons(\"False\", Scheme(Nil, bool, Nil),\n    Nil)))))))))))))))))))))))))) in\n  (env, Cons(\"Int\", Cons(\"Float\", Cons(\"Bool\", Cons(\"String\", Cons(\"()\", Cons(\"List\", Nil)))))))\n\n\n(* ── Passes (port of typecheck) ───────────────────────────────────────────── *)\n\nfn pass1One(d : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String))\n    : (List((String, Scheme)), Int, List(String), List(String)) =\n  match d with\n  | TypeDecl(_, _, _, _) => match registerTypeDecl(d, env, f, copy) with | (e2, f2, c2) => (e2, f2, c2, show) end\n  | TraitDecl(_, _, _, _) => match registerTraitDecl(d, env, f) with | (e2, f2) => (e2, f2, copy, show) end\n  | ImplDecl(tname, _, forty, _) =>\n      if strEq(tname, \"Copy\") then (env, f, Cons(forTypeName(forty), copy), show)\n      else if strEq(tname, \"Show\") then (env, f, copy, Cons(forTypeName(forty), show))\n      else (env, f, copy, show)\n  | _ => (env, f, copy, show)\n  end\n\nfn pass1(decls : List(Decl), env : List((String, Scheme)), f : Int, copy : List(String), show : List(String))\n    : (List((String, Scheme)), Int, List(String), List(String)) =\n  match decls with\n  | Nil => (env, f, copy, show)\n  | Cons(d, rest) =>\n      match pass1One(d, env, f, copy, show) with\n      | (env2, f2, copy2, show2) => pass1(rest, env2, f2, copy2, show2)\n      end\n  end\n\nfn pass15One(d : Decl, env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match d with\n  | FnDecl(_, name, _, _, _, _) =>\n      if envHas(env, name) then (env, f)\n      else match fnTypeFromAnnotations(d, f) with\n           | (Nothing, f2) => (env, f2)\n           | (Just(annT), f2) => (envPut(env, name, Scheme(Nil, annT, Nil)), f2)\n           end\n  | _ => (env, f)\n  end\n\nfn pass15(decls : List(Decl), env : List((String, Scheme)), f : Int) : (List((String, Scheme)), Int) =\n  match decls with\n  | Nil => (env, f)\n  | Cons(d, rest) => match pass15One(d, env, f) with | (e2, f2) => pass15(rest, e2, f2) end\n  end\n\nfn checkImplMethods(methods : List(IMethod), env : List((String, Scheme)), f : Int,\n                    copy : List(String), show : List(String)) : Result(Int, String) =\n  match methods with\n  | Nil => Ok(f)\n  | Cons(IMethod(mname, params, body), rest) =>\n      match checkFnDecl(FnDecl(false, mname, Nil, params, Nothing, body), env, f, copy, show) with\n      | FDErr(m) => Err(m)\n      | FDOk(_, _, f2) => checkImplMethods(rest, env, f2, copy, show)\n      end\n  end\n\nfn sigOfFnLet(name : String, sc : Scheme) : String = name + \" : \" + normSchemeStr(sc)\n\nfn pass2One(d : Decl, env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : Pass2OneR =\n  match d with\n  | FnDecl(_, name, _, _, _, _) =>\n      match checkFnDecl(d, env, f, copy, show) with\n      | FDErr(m) => P2OErr(m)\n      | FDOk(_, sc, f2) => P2OOk(Just(sigOfFnLet(name, sc)), envPut(env, name, sc), f2)\n      end\n  | LetDecl(_, name, _, _) =>\n      match checkLetDecl(d, env, f, copy, show) with\n      | LDErr(m) => P2OErr(m)\n      | LDOk(_, sc, f2) => P2OOk(Just(sigOfFnLet(name, sc)), envPut(env, name, sc), f2)\n      end\n  | TypeDecl(_, name, _, _) => P2OOk(Just(\"type \" + name), env, f)\n  | TraitDecl(_, _, _, _) => P2OOk(Nothing, env, f)\n  | ImplDecl(tname, _, forty, methods) =>\n      match checkImplMethods(methods, env, f, copy, show) with\n      | Err(m) => P2OErr(m)\n      | Ok(f2) => P2OOk(Just(\"impl \" + tname + \" for \" + forTypeName(forty)), env, f2)\n      end\n  end\n\nfn pass2(decls : List(Decl), env : List((String, Scheme)), f : Int, copy : List(String), show : List(String)) : Pass2R =\n  match decls with\n  | Nil => P2Ok(Nil, env, f)\n  | Cons(d, rest) =>\n      match pass2One(d, env, f, copy, show) with\n      | P2OErr(m) => P2Err(m)\n      | P2OOk(mline, env2, f2) =>\n          match pass2(rest, env2, f2, copy, show) with\n          | P2Err(m) => P2Err(m)\n          | P2Ok(lines, envF, fF) =>\n              match mline with\n              | Just(l) => P2Ok(Cons(l, lines), envF, fF)\n              | Nothing => P2Ok(lines, envF, fF)\n              end\n          end\n      end\n  end\n\n\n(* ── Normalised signature printer (var ids → α,β,γ by first occurrence) ───── *)\n\nfn appendInt(xs : List(Int), x : Int) : List(Int) =\n  match xs with | Nil => Cons(x, Nil) | Cons(y, r) => Cons(y, appendInt(r, x)) end\n\nfn addVar(acc : List(Int), i : Int) : List(Int) =\n  if memberInt(i, acc) then acc else appendInt(acc, i)\n\nfn collectVarsList(ts : List(Mono), acc : List(Int)) : List(Int) =\n  match ts with | Nil => acc | Cons(t, rest) => collectVarsList(rest, collectVars(t, acc)) end\n\nfn collectVars(t : Mono, acc : List(Int)) : List(Int) =\n  match t with\n  | MVar(i)    => addVar(acc, i)\n  | MCon(_)    => acc\n  | MApp(_, as_) => collectVarsList(as_, acc)\n  | MFn(p, r)  => collectVars(r, collectVars(p, acc))\n  | MTup(es)   => collectVarsList(es, acc)\n  end\n\nfn indexOfInt(x : Int, xs : List(Int), k : Int) : Int =\n  match xs with | Nil => 0 | Cons(y, r) => if x == y then k else indexOfInt(x, r, k + 1) end\n\nfn pnArgs(ts : List(Mono), ids : List(Int)) : String =\n  match ts with\n  | Nil          => \"\"\n  | Cons(t, Nil) => pnP(t, ids, false)\n  | Cons(t, rest) => pnP(t, ids, false) + \", \" + pnArgs(rest, ids)\n  end\n\nfn pnInner(t : Mono, ids : List(Int)) : String =\n  match t with\n  | MVar(i)    => greek(indexOfInt(i, ids, 0))\n  | MCon(n)    => n\n  | MApp(h, as_) => match as_ with | Nil => h | _ => h + \"(\" + pnArgs(as_, ids) + \")\" end\n  | MFn(p, r)  => pnP(p, ids, true) + \" -> \" + pnP(r, ids, false)\n  | MTup(es)   => \"(\" + pnArgs(es, ids) + \")\"\n  end\n\nfn pnP(t : Mono, ids : List(Int), paren : Bool) : String =\n  match t with\n  | MFn(p, r) => if paren then \"(\" + pnInner(t, ids) + \")\" else pnInner(t, ids)\n  | _         => pnInner(t, ids)\n  end\n\nfn normSchemeStr(sc : Scheme) : String =\n  match sc with | Scheme(qs, body, cv) => pnP(body, collectVars(body, Nil), false) end\n\n\n(* ── Entry point ──────────────────────────────────────────────────────────── *)\n\nfn joinLines(ls : List(String)) : String =\n  match ls with\n  | Nil           => \"\"\n  | Cons(l, Nil)  => l\n  | Cons(l, rest) => l + \"\\n\" + joinLines(rest)\n  end\n\nfn checkProgram(prog : Prog) : String =\n  match prog with\n  | Prog(modName, imports, decls) =>\n      match initialEnv(0) with\n      | (env0, copy0) =>\n          let show0 = Cons(\"Int\", Cons(\"Float\", Cons(\"Bool\", Cons(\"String\", Nil)))) in\n          match pass1(decls, env0, 0, copy0, show0) with\n          | (env1, f1, copy1, show1) =>\n              match pass15(decls, env1, f1) with\n              | (env2, f2) =>\n                  match pass2(decls, env2, f2, copy1, show1) with\n                  | P2Err(m) => \"type error: \" + m\n                  | P2Ok(lines, _, _) => joinLines(Cons(\"(module \" + modName + \")\", lines))\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Typed-AST entry: produce a TProgram for the lowerer (port of infer.py's\n      `typecheck`).  checkProgram above only type-checks and prints signatures —\n      it discards the typed decls checkFnDecl/checkLetDecl build.  inferProgram\n      keeps them, assembling the TProgram the middle end (lower→opt→emit_tac_c)\n      consumes.  Mirrors typecheck's Pass 2: FnDecl/LetDecl → the checked TDecl,\n      TypeDecl → TTypeDecl (variants via synToMono — lower reads only the ctor\n      NAMES, so the payload monos need not match the oracle's fresh ids),\n      ImplDecl → TImplDecl with its methods' TFnDecls, TraitDecl → dropped.  No\n      Pass 0 (imports): the assembled compiler is a single module. ───────────── *)\n\ntype ImplCR  = | ICErr of String | ICOk of List(TDecl), Int\ntype Pass2CR = | P2CErr of String | P2COk of List(TDecl), List((String, Scheme)), Int\n\nfn buildVariants(vs : List(Variant), tve : List((String, Int)), f : Int) : (List(TVariant), Int) =\n  match vs with\n  | Nil => (Nil, f)\n  | Cons(Variant(vn, payload), rest) =>\n      match synToMonoList(payload, tve, f) with\n      | (monos, tve2, f2) =>\n          match buildVariants(rest, tve2, f2) with\n          | (tvs, f3) => (Cons(TVariant(vn, monos), tvs), f3)\n          end\n      end\n  end\n\nfn checkImplMethodsC(methods : List(IMethod), env : List((String, Scheme)), f : Int,\n                     copy : List(String), show : List(String)) : ImplCR =\n  match methods with\n  | Nil => ICOk(Nil, f)\n  | Cons(IMethod(mname, params, body), rest) =>\n      match checkFnDecl(FnDecl(false, mname, Nil, params, Nothing, body), env, f, copy, show) with\n      | FDErr(m) => ICErr(m)\n      | FDOk(tdecl, _, f2) =>\n          match checkImplMethodsC(rest, env, f2, copy, show) with\n          | ICErr(m) => ICErr(m)\n          | ICOk(tds, f3) => ICOk(Cons(tdecl, tds), f3)\n          end\n      end\n  end\n\nfn p2cCons(td : TDecl, r : Pass2CR) : Pass2CR =\n  match r with\n  | P2CErr(m) => P2CErr(m)\n  | P2COk(tds, env, f) => P2COk(Cons(td, tds), env, f)\n  end\n\nfn pass2Collect(decls : List(Decl), env : List((String, Scheme)), f : Int,\n                copy : List(String), show : List(String)) : Pass2CR =\n  match decls with\n  | Nil => P2COk(Nil, env, f)\n  | Cons(d, rest) =>\n      match d with\n      | FnDecl(_, name, _, _, _, _) =>\n          match checkFnDecl(d, env, f, copy, show) with\n          | FDErr(m) => P2CErr(m)\n          | FDOk(tdecl, sc, f2) => p2cCons(tdecl, pass2Collect(rest, envPut(env, name, sc), f2, copy, show))\n          end\n      | LetDecl(_, name, _, _) =>\n          match checkLetDecl(d, env, f, copy, show) with\n          | LDErr(m) => P2CErr(m)\n          | LDOk(tdecl, sc, f2) => p2cCons(tdecl, pass2Collect(rest, envPut(env, name, sc), f2, copy, show))\n          end\n      | TypeDecl(exported, name, params, body) =>\n          match body with\n          | Alias(_) => p2cCons(TTypeDecl(name, params, Nothing, exported), pass2Collect(rest, env, f, copy, show))\n          | Variants(vs) =>\n              match buildVariants(vs, Nil, f) with\n              | (tvs, f2) => p2cCons(TTypeDecl(name, params, Just(tvs), exported), pass2Collect(rest, env, f2, copy, show))\n              end\n          end\n      | TraitDecl(_, _, _, _) => pass2Collect(rest, env, f, copy, show)\n      | ImplDecl(tname, _, forty, methods) =>\n          match checkImplMethodsC(methods, env, f, copy, show) with\n          | ICErr(m) => P2CErr(m)\n          | ICOk(tds, f2) => p2cCons(TImplDecl(tname, forTypeName(forty), tds), pass2Collect(rest, env, f2, copy, show))\n          end\n      end\n  end\n\nfn inferProgram(prog : Prog) : Result(TProgram, String) =\n  match prog with\n  | Prog(modName, imports, decls) =>\n      match initialEnv(0) with\n      | (env0, copy0) =>\n          let show0 = Cons(\"Int\", Cons(\"Float\", Cons(\"Bool\", Cons(\"String\", Nil)))) in\n          match pass1(decls, env0, 0, copy0, show0) with\n          | (env1, f1, copy1, show1) =>\n              match pass15(decls, env1, f1) with\n              | (env2, f2) =>\n                  match pass2Collect(decls, env2, f2, copy1, show1) with\n                  | P2CErr(m) => Err(m)\n                  | P2COk(tds, _, _) => Ok(TProgram(modName, tds))\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Smoke driver (concatenated with lex+parse+types+tast — see infer_smoke) ─ *)\n\nfn main(io : IO) : IO =\n  let src = \"module Demo\\n\\nfn double(x : Int) : Int = x + x\\n\\nfn apply2(g : (Int) -> Int, y : Int) : Int = g(g(y))\\n\\nfn main(io : IO) : IO = print(io, int_to_string(apply2(double, 21)))\" in\n  print(io, checkProgram(parseProgram(tokenize(src, string_length(src), P(0, 1, 1)))))\n"}, {"path": "repo/optimize/lark/lex.lark", "group": "repo/optimize/lark", "name": "lex.lark", "text": "(* lex.lark — the Lark lexer, written in Lark.  ()\n\n   A faithful port of oracle/lexer.py: a single-pass, hand-written lexer that\n   turns source text into a flat token list.  It walks an Int cursor over the\n   (Copy) source String, classifying each codepoint by range comparison and\n   slicing whole lexemes — exactly the bet, proved out by lex_smoke.lark.\n\n   Design notes\n   ────────────\n   • State is a single Copy value `Pos(pos, line, col)` threaded through `let`\n     (Lark's `let` binds one name and cannot destructure a tuple, so multi-value\n     returns are carried as one ADT value and read back with accessors).  Int is\n     Copy, so position/line/col reuse across branches is free — no affine wart.\n   • The lexer is pure: it builds the whole token list, and `main` prints a dump\n     once.  (The affine checker sums a variable's uses across branches, so `io`\n     may not be threaded through control flow — a known wart of the language.)\n   • Validation is differential against lexer.py — see harness/lex_difftest.py.\n     The `main` here is only a smoke driver; the harness replaces it per file.\n\n   Run (smoke):  python3 oracle/cek.py lark/lex.lark  *)\n\nmodule Lex\n\n\n(* ── Token kinds (names mirror lexer.py's TK enum exactly) ────────────────── *)\n\ntype Kind =\n  | KInt | KFloat | KString | KTrue | KFalse | KUnit\n  | KName | KUpper\n  | KAnd | KElse | KEnd | KExport | KExposing | KFn | KFor | KIf | KImpl\n  | KImport | KIn | KLet | KMatch | KModule | KNot | KOf | KOr | KThen\n  | KTrait | KType | KWith\n  | KPlus | KMinus | KStar | KSlash\n  | KEqEq | KNeq | KLt | KLe | KGt | KGe\n  | KArrow | KFatArrow | KAssign | KPipe | KColon | KComma\n  | KLParen | KRParen | KLBracket | KRBracket | KLBrace | KRBrace\n  | KWildcard | KEof | KErr\n\nimpl Copy for Kind = {}\n\n\n(* A token: kind, raw lexeme text, and 1-based line/col of its first char. *)\ntype Token = | Tok of Kind, String, Int, Int\nimpl Copy for Token = {}\n\n\n(* Cursor state: byte offset, line, column (all 1-based except pos, 0-based). *)\ntype Pos = | P of Int, Int, Int\nimpl Copy for Pos = {}\n\nfn pos_of(st : Pos)  : Int = match st with | P(p, l, c) => p end\nfn line_of(st : Pos) : Int = match st with | P(p, l, c) => l end\nfn col_of(st : Pos)  : Int = match st with | P(p, l, c) => c end\n\n\n(* A read token plus the cursor state after it. *)\ntype Lexed = | Lexed of Token, Pos\nimpl Copy for Lexed = {}\n\n\ntype List a =\n  | Nil\n  | Cons of a, List(a)\n\nimpl Copy for List(Token) = {}\n\n\n(* ── Character classes: codepoint range comparison, no new prims. ─────────── *)\n\nfn is_digit(c : Int) : Bool = c >= 48 and c <= 57\nfn is_lower(c : Int) : Bool = c >= 97 and c <= 122\nfn is_upper(c : Int) : Bool = c >= 65 and c <= 90\nfn is_alpha(c : Int) : Bool = is_lower(c) or is_upper(c)\nfn is_alnum(c : Int) : Bool = is_alpha(c) or is_digit(c)\nfn is_name_cont(c : Int) : Bool = is_alnum(c) or c == 95   (* alnum or '_' *)\nfn is_ws(c : Int) : Bool = c == 32 or c == 9 or c == 13 or c == 10\n\n\n(* ── Cursor advance: consume one char, tracking line/col like lexer._advance. *)\n\nfn adv(src : String, st : Pos) : Pos =\n  let p = pos_of(st) in\n  if string_index(src, p) == 10 then P(p + 1, line_of(st) + 1, 1)\n  else P(p + 1, line_of(st), col_of(st) + 1)\n\n\n(* Scan forward from i while pred holds; return the first index where it fails.\n   Used only for single-line runs (digits, name chars) — no newline tracking. *)\nfn scan_while(src : String, n : Int, i : Int, pred : Int -> Bool) : Int =\n  if i >= n then i\n  else if pred(string_index(src, i)) then scan_while(src, n, i + 1, pred)\n  else i\n\n\n(* ── Skip whitespace and nested block comments  ───────────────────────────── *)\n\nfn scan_comment(src : String, n : Int, st : Pos, depth : Int) : Pos =\n  if depth == 0 then st\n  else\n    let p = pos_of(st) in\n    if p >= n then st                              (* unterminated; clean corpus won't hit *)\n    else\n      let c  = string_index(src, p) in\n      let c2 = string_index(src, p + 1) in\n      if c == 40 and c2 == 42 then                 (* nested opener *)\n        scan_comment(src, n, adv(src, adv(src, st)), depth + 1)\n      else if c == 42 and c2 == 41 then            (* closing delimiter *)\n        scan_comment(src, n, adv(src, adv(src, st)), depth - 1)\n      else scan_comment(src, n, adv(src, st), depth)\n\nfn skip_comment(src : String, n : Int, st : Pos) : Pos =\n  scan_comment(src, n, adv(src, adv(src, st)), 1)   (* consume opener, depth 1 *)\n\nfn skip(src : String, n : Int, st : Pos) : Pos =\n  let p = pos_of(st) in\n  if p >= n then st\n  else\n    let c = string_index(src, p) in\n    if is_ws(c) then skip(src, n, adv(src, st))\n    else if c == 40 and string_index(src, p + 1) == 42 then\n      skip(src, n, skip_comment(src, n, st))\n    else st\n\n\n(* ── Readers: each returns Lexed(token, state-after-token). ───────────────── *)\n\n(* number ::= digit+ ('.' digit+)?  — float only when '.' is followed by a digit *)\nfn read_number(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  let d1   = scan_while(src, n, sp, is_digit) in\n  if string_index(src, d1) == 46 and is_digit(string_index(src, d1 + 1)) then\n    let d2 = scan_while(src, n, d1 + 1, is_digit) in\n    Lexed(Tok(KFloat, string_slice(src, sp, d2), line, col),\n          P(d2, line, col + (d2 - sp)))\n  else\n    Lexed(Tok(KInt, string_slice(src, sp, d1), line, col),\n          P(d1, line, col + (d1 - sp)))\n\n(* string ::= '\"' ( '\\' any | ~'\"' )* '\"'  — text keeps quotes and raw escapes *)\nfn scan_string(src : String, n : Int, st : Pos) : Pos =\n  let p = pos_of(st) in\n  if p >= n then st                                (* unterminated *)\n  else\n    let c = string_index(src, p) in\n    if c == 34 then adv(src, st)                   (* closing quote consumed *)\n    else if c == 92 then                           (* backslash: skip it + next char *)\n      let st2 = adv(src, st) in\n      if pos_of(st2) >= n then st2\n      else scan_string(src, n, adv(src, st2))\n    else scan_string(src, n, adv(src, st))\n\nfn read_string(src : String, n : Int, st : Pos) : Lexed =\n  let start = pos_of(st) in\n  let line  = line_of(st) in\n  let col   = col_of(st) in\n  let endst = scan_string(src, n, adv(src, st)) in  (* adv past opening quote *)\n  Lexed(Tok(KString, string_slice(src, start, pos_of(endst)), line, col), endst)\n\nfn read_name(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  let e    = scan_while(src, n, sp, is_name_cont) in\n  let text = string_slice(src, sp, e) in\n  Lexed(Tok(keyword_kind(text), text, line, col), P(e, line, col + (e - sp)))\n\nfn read_upper(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  let e    = scan_while(src, n, sp, is_name_cont) in\n  Lexed(Tok(KUpper, string_slice(src, sp, e), line, col), P(e, line, col + (e - sp)))\n\nfn read_wildcard(src : String, n : Int, st : Pos) : Lexed =\n  let sp   = pos_of(st) in\n  let line = line_of(st) in\n  let col  = col_of(st) in\n  if is_name_cont(string_index(src, sp + 1)) then  (* names may not start with '_' *)\n    Lexed(Tok(KErr, \"_\", line, col), P(sp + 1, line, col + 1))\n  else\n    Lexed(Tok(KWildcard, \"_\", line, col), P(sp + 1, line, col + 1))\n\n\n(* ── Symbols and operators ────────────────────────────────────────────────── *)\n\nfn one(k : Kind, text : String, st : Pos) : Lexed =\n  Lexed(Tok(k, text, line_of(st), col_of(st)),\n        P(pos_of(st) + 1, line_of(st), col_of(st) + 1))\n\nfn two(k : Kind, text : String, st : Pos) : Lexed =\n  Lexed(Tok(k, text, line_of(st), col_of(st)),\n        P(pos_of(st) + 2, line_of(st), col_of(st) + 2))\n\nfn read_symbol(src : String, n : Int, st : Pos) : Lexed =\n  let p  = pos_of(st) in\n  let c  = string_index(src, p) in\n  let c2 = string_index(src, p + 1) in\n  if c == 40 then (if c2 == 41 then two(KUnit, \"()\", st) else one(KLParen, \"(\", st))\n  else if c == 45 then (if c2 == 62 then two(KArrow, \"->\", st) else one(KMinus, \"-\", st))\n  else if c == 61 then\n    (if c2 == 61 then two(KEqEq, \"==\", st)\n     else if c2 == 62 then two(KFatArrow, \"=>\", st)\n     else one(KAssign, \"=\", st))\n  else if c == 33 then (if c2 == 61 then two(KNeq, \"!=\", st) else one(KErr, \"!\", st))\n  else if c == 60 then (if c2 == 61 then two(KLe, \"<=\", st) else one(KLt, \"<\", st))\n  else if c == 62 then (if c2 == 61 then two(KGe, \">=\", st) else one(KGt, \">\", st))\n  else if c == 43 then one(KPlus, \"+\", st)\n  else if c == 42 then one(KStar, \"*\", st)\n  else if c == 47 then one(KSlash, \"/\", st)\n  else if c == 124 then one(KPipe, \"|\", st)\n  else if c == 58 then one(KColon, \":\", st)\n  else if c == 44 then one(KComma, \",\", st)\n  else if c == 91 then one(KLBracket, \"[\", st)\n  else if c == 93 then one(KRBracket, \"]\", st)\n  else if c == 123 then one(KLBrace, \"{\", st)\n  else if c == 125 then one(KRBrace, \"}\", st)\n  else if c == 41 then one(KRParen, \")\", st)\n  else one(KErr, char_to_string(c), st)\n\n\n(* ── Main dispatch and the token loop ─────────────────────────────────────── *)\n\nfn lex_step(src : String, n : Int, st : Pos) : Lexed =\n  let c = string_index(src, pos_of(st)) in\n  if is_digit(c) then read_number(src, n, st)\n  else if c == 34 then read_string(src, n, st)\n  else if is_lower(c) then read_name(src, n, st)\n  else if is_upper(c) then read_upper(src, n, st)\n  else if c == 95 then read_wildcard(src, n, st)\n  else read_symbol(src, n, st)\n\nfn tokenize(src : String, n : Int, st : Pos) : List(Token) =\n  let st2 = skip(src, n, st) in\n  if pos_of(st2) >= n then\n    Cons(Tok(KEof, \"\", line_of(st2), col_of(st2)), Nil)\n  else\n    match lex_step(src, n, st2) with\n    | Lexed(tok, st3) => Cons(tok, tokenize(src, n, st3))\n    end\n\n\n(* ── Keyword table (lowercase text -> kind), else KName. ──────────────────── *)\n\n(* NB: keyword lookup uses `match` on string literals, not the `==` operator.\n   String `==` typechecks (Eq is polymorphic) but is unimplemented in the CEK\n   `binop` — only string `+` is.  Literal patterns route through `_val_eq`,\n   which does compare strings.  (A known wart of the language.) *)\nfn keyword_kind(text : String) : Kind =\n  match text with\n  | \"and\"      => KAnd\n  | \"else\"     => KElse\n  | \"end\"      => KEnd\n  | \"export\"   => KExport\n  | \"exposing\" => KExposing\n  | \"false\"    => KFalse\n  | \"fn\"       => KFn\n  | \"for\"      => KFor\n  | \"if\"       => KIf\n  | \"impl\"     => KImpl\n  | \"import\"   => KImport\n  | \"in\"       => KIn\n  | \"let\"      => KLet\n  | \"match\"    => KMatch\n  | \"module\"   => KModule\n  | \"not\"      => KNot\n  | \"of\"       => KOf\n  | \"or\"       => KOr\n  | \"then\"     => KThen\n  | \"trait\"    => KTrait\n  | \"true\"     => KTrue\n  | \"type\"     => KType\n  | \"with\"     => KWith\n  | _          => KName\n  end\n\n\n(* ── Serialization: one canonical line per token (kind line col text). ────── *)\n\nfn kind_name(k : Kind) : String =\n  match k with\n  | KInt => \"INT\" | KFloat => \"FLOAT\" | KString => \"STRING\"\n  | KTrue => \"TRUE\" | KFalse => \"FALSE\" | KUnit => \"UNIT\"\n  | KName => \"NAME\" | KUpper => \"UPPER\"\n  | KAnd => \"AND\" | KElse => \"ELSE\" | KEnd => \"END\" | KExport => \"EXPORT\"\n  | KExposing => \"EXPOSING\" | KFn => \"FN\" | KFor => \"FOR\" | KIf => \"IF\"\n  | KImpl => \"IMPL\" | KImport => \"IMPORT\" | KIn => \"IN\" | KLet => \"LET\"\n  | KMatch => \"MATCH\" | KModule => \"MODULE\" | KNot => \"NOT\" | KOf => \"OF\"\n  | KOr => \"OR\" | KThen => \"THEN\" | KTrait => \"TRAIT\" | KType => \"TYPE\"\n  | KWith => \"WITH\"\n  | KPlus => \"PLUS\" | KMinus => \"MINUS\" | KStar => \"STAR\" | KSlash => \"SLASH\"\n  | KEqEq => \"EQEQ\" | KNeq => \"NEQ\" | KLt => \"LT\" | KLe => \"LE\"\n  | KGt => \"GT\" | KGe => \"GE\"\n  | KArrow => \"ARROW\" | KFatArrow => \"FAT_ARROW\" | KAssign => \"ASSIGN\"\n  | KPipe => \"PIPE\" | KColon => \"COLON\" | KComma => \"COMMA\"\n  | KLParen => \"LPAREN\" | KRParen => \"RPAREN\"\n  | KLBracket => \"LBRACKET\" | KRBracket => \"RBRACKET\"\n  | KLBrace => \"LBRACE\" | KRBrace => \"RBRACE\"\n  | KWildcard => \"WILDCARD\" | KEof => \"EOF\" | KErr => \"ERR\"\n  end\n\n(* Escape a lexeme so each token stays on one line: \\ n t r are the only\n   special cases; mirrors the Python side of the differential harness. *)\nfn escape(s : String, i : Int, n : Int) : String =\n  if i >= n then \"\"\n  else\n    let c    = string_index(s, i) in\n    let rest = escape(s, i + 1, n) in\n    if c == 92 then \"\\\\\\\\\" + rest\n    else if c == 10 then \"\\\\n\" + rest\n    else if c == 9 then \"\\\\t\" + rest\n    else if c == 13 then \"\\\\r\" + rest\n    else char_to_string(c) + rest\n\nfn show_token(t : Token) : String =\n  match t with\n  | Tok(k, text, line, col) =>\n    kind_name(k) + \" \" + int_to_string(line) + \" \" + int_to_string(col)\n      + \" \" + escape(text, 0, string_length(text))\n  end\n\nfn dump(ts : List(Token)) : String =\n  match ts with\n  | Nil          => \"\"\n  | Cons(t, Nil) => show_token(t)\n  | Cons(t, rest) => show_token(t) + \"\\n\" + dump(rest)\n  end\n\n\n(* ── Smoke driver (the harness replaces this main per input file). ────────── *)\n\nfn main(io : IO) : IO =\n  let src = \"fn add(x : Int) : Int = x + 1\" in\n  print(io, dump(tokenize(src, string_length(src), P(0, 1, 1))))\n"}, {"path": "repo/optimize/lark/lower.lark", "group": "repo/optimize/lark", "name": "lower.lark", "text": "(* lower.lark — Lark's typed-AST → TAC lowerer, written in Lark.\n   (the port of oracle/lower.py.)\n\n   Pipeline position (per lower.py):\n       tast.lark  →  lower.lark  →  tac.lark  →  emit_tac_c.lark  →  C text\n\n   lower.py is a mutable `Lowerer` class; this port threads that state PURELY:\n\n     • The per-Function instruction stream + fresh/label counter is threaded as\n       a `Function` (tac.lark's tacFresh/tacLabel/tacEmit return an updated one).\n     • The read-only program tables — type_tags, trait_impls, global_lets,\n       show_impls, global_arity — become an `LCtx` record, computed once up front.\n     • The genuinely-mutable lowerer state — the growing global-fnc name set, the\n       lambda counter, and the list of lifted closure functions — becomes an\n       `LSt` record, threaded through every lowering that can lift a lambda.\n\n   Every lowering therefore has the shape  (…, ctx : LCtx, fnc : Function,\n   st : LSt) -> (Operand, Function, LSt): it reads ctx, emits into fnc, and hands\n   back the updated fnc + st.  This mirrors lower.py statement-for-statement, so\n   the fresh/label counter increments and the emitted instruction order — hence\n   the byte-identical tacPretty output — match tac.py + lower.py exactly.\n\n   Design notes (the pipeline is assembled by CONCATENATION):\n     parse.lark  gives  Val / Maybe / Just / Nothing\n     types.lark  gives  Mono (MVar/MCon/MApp/MFn/MTup), strEq, memberStr\n     tast.lark   gives  the typed AST (TExpr/TPat/TDecl/TVariant/TProgram)\n     tac.lark    gives  the TAC IR + tacFresh/tacLabel/tacEmit + tacPretty\n   So the differential (lower_difftest.py) concatenates lex+parse+types+tast+\n   tac+lower.  Generic helpers are `lw`-prefixed to dodge name clashes; tac's\n   pretty was renamed `tacPretty` so types.lark's Mono `pretty` can co-exist.\n\n   Run (differential):  harness/lower_difftest.py   (make lowertest)  *)\n\nmodule Lower\n\n\n(* ── Lowerer state (the pure record replacing lower.py's mutable fields) ────── *)\n\n(* Read-only program tables, computed once by buildCtx:\n     tags       type_name  -> constructor tag names          (_type_tags)\n     traitImpls method_name -> for-types (appearance order)   (_trait_impls)\n     lets       top-level let names                           (_global_lets)\n     showImpls  type_name  -> \"show$Type\"                     (_show_impls)\n     arity      user fnc / impl-method name -> #params         (_global_arity) *)\ntype LCtx =\n  | LCtx of List((String, List(String))),\n            List((String, List(String))),\n            List(String),\n            List((String, String)),\n            List((String, Int))\n\n(* Threaded mutable state:\n     globalFns   builtins + fnc/impl/trait-method + lifted-lambda names\n     lambdaCtr   next lifted-lambda counter (drives <fnc>$lam<n>)\n     lifted      lifted closure functions, MOST-RECENT-FIRST (flushed reversed) *)\ntype LSt = | LSt of List(String), Int, List(Function)\n\nimpl Copy for LCtx = {}\nimpl Copy for LSt  = {}\n\n\n(* ── Small list/string helpers (lw-prefixed to avoid concat collisions) ─────── *)\n\nfn lwAppend(a : List(String), b : List(String)) : List(String) =\n  match a with\n  | Nil           => b\n  | Cons(x, rest) => Cons(x, lwAppend(rest, b))\n  end\n\nfn lwAppendFns(a : List(Function), b : List(Function)) : List(Function) =\n  match a with\n  | Nil           => b\n  | Cons(x, rest) => Cons(x, lwAppendFns(rest, b))\n  end\n\nfn lwAppendArity(a : List((String, Int)), b : List((String, Int))) : List((String, Int)) =\n  match a with\n  | Nil           => b\n  | Cons(x, rest) => Cons(x, lwAppendArity(rest, b))\n  end\n\nfn reverseFnsGo(a : List(Function), acc : List(Function)) : List(Function) =\n  match a with\n  | Nil           => acc\n  | Cons(x, rest) => reverseFnsGo(rest, Cons(x, acc))\n  end\n\nfn reverseFns(a : List(Function)) : List(Function) = reverseFnsGo(a, Nil)\n\nfn insertStrU(x : String, xs : List(String)) : List(String) =\n  if memberStr(x, xs) then xs else Cons(x, xs)\n\nfn unionStrU(xs : List(String), ys : List(String)) : List(String) =\n  match xs with\n  | Nil           => ys\n  | Cons(x, rest) => insertStrU(x, unionStrU(rest, ys))\n  end\n\n(* Lexicographic (code-point) string order — mirrors Python's `sorted(list[str])`\n   used for the free-variable capture order (lower.py `free = sorted(...)`). *)\nfn strLtFrom(a : String, b : String, i : Int, la : Int, lb : Int) : Bool =\n  if i >= la then (if i >= lb then false else true)\n  else if i >= lb then false\n  else\n    let ca = string_index(a, i) in\n    let cb = string_index(b, i) in\n    if ca == cb then strLtFrom(a, b, i + 1, la, lb)\n    else if ca < cb then true else false\n\nfn strLt(a : String, b : String) : Bool =\n  strLtFrom(a, b, 0, string_length(a), string_length(b))\n\nfn insSorted(x : String, xs : List(String)) : List(String) =\n  match xs with\n  | Nil           => Cons(x, Nil)\n  | Cons(h, rest) => if strLt(x, h) then Cons(x, Cons(h, rest))\n                     else Cons(h, insSorted(x, rest))\n  end\n\nfn sortStr(xs : List(String)) : List(String) =\n  match xs with\n  | Nil           => Nil\n  | Cons(x, rest) => insSorted(x, sortStr(rest))\n  end\n\n\n(* ── Builtin names (lower.py `_BUILTINS`) ─────────────────────────────────── *)\n\nlet lwBuiltins : List(String) =\n  Cons(\"print\", Cons(\"read\", Cons(\"read_all\", Cons(\"show\",\n  Cons(\"int_to_float\", Cons(\"float_to_int\", Cons(\"int_to_string\", Cons(\"float_to_string\",\n  Cons(\"__show_float\", Cons(\"__show_bool\",\n  Cons(\"__float_add\", Cons(\"__float_sub\", Cons(\"__float_mul\", Cons(\"__float_div\",\n  Cons(\"__float_lt\", Cons(\"__float_le\", Cons(\"__float_gt\", Cons(\"__float_ge\",\n  Cons(\"__str_concat\",\n  Cons(\"string_length\",\n  Cons(\"int_abs\", Cons(\"float_abs\", Cons(\"float_sqrt\", Cons(\"float_floor\", Cons(\"float_ceil\",\n  Cons(\"string_index\", Cons(\"string_slice\", Cons(\"char_to_string\", Cons(\"float_to_bits\",\n  Cons(\"string_to_int\", Cons(\"string_to_float\",\n  Nil)))))))))))))))))))))))))))))))\n\nfn isBuiltinName(n : String) : Bool = memberStr(n, lwBuiltins)\n\n\n(* ── Assoc-list accessors over the ctx tables ─────────────────────────────── *)\n\nfn lwAssocTags(xs : List((String, List(String))), n : String) : List(String) =\n  match xs with\n  | Nil            => Nil\n  | Cons((k, v), r) => if strEq(k, n) then v else lwAssocTags(r, n)\n  end\n\nfn lwAssocInt(xs : List((String, Int)), n : String) : Maybe(Int) =\n  match xs with\n  | Nil            => Nothing\n  | Cons((k, v), r) => if strEq(k, n) then Just(v) else lwAssocInt(r, n)\n  end\n\nfn lwAssocStr(xs : List((String, String)), n : String) : Maybe(String) =\n  match xs with\n  | Nil            => Nothing\n  | Cons((k, v), r) => if strEq(k, n) then Just(v) else lwAssocStr(r, n)\n  end\n\nfn lwAssocStrForce(xs : List((String, String)), n : String) : String =\n  match xs with\n  | Nil            => \"\"\n  | Cons((k, v), r) => if strEq(k, n) then v else lwAssocStrForce(r, n)\n  end\n\nfn ctxTags(ctx : LCtx, n : String) : List(String) =\n  match ctx with | LCtx(tags, _, _, _, _) => lwAssocTags(tags, n) end\n\nfn ctxArity(ctx : LCtx, n : String) : Maybe(Int) =\n  match ctx with | LCtx(_, _, _, _, ar) => lwAssocInt(ar, n) end\n\nfn ctxShowImpl(ctx : LCtx, n : String) : Maybe(String) =\n  match ctx with | LCtx(_, _, _, si, _) => lwAssocStr(si, n) end\n\nfn ctxGlobalLets(ctx : LCtx) : List(String) =\n  match ctx with | LCtx(_, _, lets, _, _) => lets end\n\nfn ctxIsGlobalLet(ctx : LCtx, n : String) : Bool = memberStr(n, ctxGlobalLets(ctx))\n\nfn ctxTraitImpls(ctx : LCtx) : List((String, List(String))) =\n  match ctx with | LCtx(_, ti, _, _, _) => ti end\n\n\n(* ── LSt accessors (LSt is Copy, so reads don't consume the threaded value) ── *)\n\nfn stGlobalFns(st : LSt) : List(String) = match st with | LSt(gf, _, _) => gf end\n\nfn stHasGlobalFn(st : LSt, n : String) : Bool = memberStr(n, stGlobalFns(st))\n\nfn stAddGlobalFn(st : LSt, n : String) : LSt =\n  match st with | LSt(gf, lc, lf) => LSt(Cons(n, gf), lc, lf) end\n\n(* Returns the CURRENT counter (lam_name uses it) and bumps for next time. *)\nfn stBumpLambda(st : LSt) : (Int, LSt) =\n  match st with | LSt(gf, lc, lf) => (lc, LSt(gf, lc + 1, lf)) end\n\nfn stAddLifted(st : LSt, f : Function) : LSt =\n  match st with | LSt(gf, lc, lf) => LSt(gf, lc, Cons(f, lf)) end\n\nfn fnNameOf(f : Function) : String = match f with | Function(nm, _, _, _) => nm end\n\n\n(* ── Literal payload → TAC constant (parse.lark Val → tac.lark ConstVal) ────── *)\n\nfn valToConst(v : Val) : ConstVal =\n  match v with\n  | VInt(s)   => CInt(s)\n  | VFloat(s) => CFloat(s)\n  | VStr(s)   => CStr(s)\n  | VBool(b)  => CBool(b)\n  | VUnit     => CUnit\n  end\n\n\n(* ── Type-directed operator routing (lower.py TBinOp arm) ─────────────────── *)\n\nfn texprTyp(e : TExpr) : Mono =\n  match e with\n  | TLit(_, t)       => t\n  | TVar(_, t)       => t\n  | TCon(_, t)       => t\n  | TTupleExpr(_, t) => t\n  | TApp(_, _, t)    => t\n  | TBinOp(_, _, _, t) => t\n  | TUnaryOp(_, _, t)  => t\n  | TLetExpr(_, _, _, t) => t\n  | TIfExpr(_, _, _, t)  => t\n  | TMatchExpr(_, _, t)  => t\n  | TLambda(_, _, t)     => t\n  end\n\nfn isMConNamed(t : Mono, name : String) : Bool =\n  match t with | MCon(n) => strEq(n, name) | _ => false end\n\nfn isFloatT(t : Mono) : Bool  = isMConNamed(t, \"Float\")\nfn isStringT(t : Mono) : Bool = isMConNamed(t, \"String\")\nfn isBoolT(t : Mono) : Bool   = isMConNamed(t, \"Bool\")\n\nfn isArithOp(op : String) : Bool =\n  strEq(op, \"+\") or strEq(op, \"-\") or strEq(op, \"*\") or strEq(op, \"/\")\n\nfn isCmpOp(op : String) : Bool =\n  strEq(op, \"<\") or strEq(op, \"<=\") or strEq(op, \">\") or strEq(op, \">=\")\n\nfn floatArithName(op : String) : String =\n  if strEq(op, \"+\") then \"__float_add\"\n  else if strEq(op, \"-\") then \"__float_sub\"\n  else if strEq(op, \"*\") then \"__float_mul\"\n  else \"__float_div\"\n\nfn floatCmpName(op : String) : String =\n  if strEq(op, \"<\") then \"__float_lt\"\n  else if strEq(op, \"<=\") then \"__float_le\"\n  else if strEq(op, \">\") then \"__float_gt\"\n  else \"__float_ge\"\n\nfn mapAndOr(op : String) : String =\n  if strEq(op, \"and\") then \"&&\" else if strEq(op, \"or\") then \"||\" else op\n\n\n(* ── Free-variable analysis (lower.py _free / _pat_bound) ─────────────────── *)\n\nfn lwParamNames(ps : List((String, Mono))) : List(String) =\n  match ps with\n  | Nil            => Nil\n  | Cons((n, _), r) => Cons(n, lwParamNames(r))\n  end\n\nfn lwPatBound(p : TPat) : List(String) =\n  match p with\n  | TPWild(_)         => Nil\n  | TPLit(_, _)       => Nil\n  | TPVar(n, _)       => Cons(n, Nil)\n  | TPCon(_, subs, _) => lwPatBoundList(subs)\n  | TPTuple(subs, _)  => lwPatBoundList(subs)\n  end\n\nfn lwPatBoundList(ps : List(TPat)) : List(String) =\n  match ps with\n  | Nil           => Nil\n  | Cons(p, rest) => unionStrU(lwPatBound(p), lwPatBoundList(rest))\n  end\n\nfn lwFreeExpr(e : TExpr, bound : List(String)) : List(String) =\n  match e with\n  | TVar(n, _)          => if memberStr(n, bound) then Nil else Cons(n, Nil)\n  | TCon(_, _)          => Nil\n  | TLit(_, _)          => Nil\n  | TTupleExpr(es, _)   => lwFreeList(es, bound)\n  | TApp(f, args, _)    => unionStrU(lwFreeExpr(f, bound), lwFreeList(args, bound))\n  | TBinOp(_, l, r, _)  => unionStrU(lwFreeExpr(l, bound), lwFreeExpr(r, bound))\n  | TUnaryOp(_, x, _)   => lwFreeExpr(x, bound)\n  | TLetExpr(n, v, b, _) =>\n      unionStrU(lwFreeExpr(v, bound), lwFreeExpr(b, Cons(n, bound)))\n  | TIfExpr(c, t, e2, _) =>\n      unionStrU(lwFreeExpr(c, bound), unionStrU(lwFreeExpr(t, bound), lwFreeExpr(e2, bound)))\n  | TMatchExpr(s, arms, _) =>\n      unionStrU(lwFreeExpr(s, bound), lwFreeArms(arms, bound))\n  | TLambda(params, b, _) =>\n      lwFreeExpr(b, lwAppend(lwParamNames(params), bound))\n  end\n\nfn lwFreeList(es : List(TExpr), bound : List(String)) : List(String) =\n  match es with\n  | Nil           => Nil\n  | Cons(e, rest) => unionStrU(lwFreeExpr(e, bound), lwFreeList(rest, bound))\n  end\n\nfn lwFreeArms(arms : List((TPat, TExpr)), bound : List(String)) : List(String) =\n  match arms with\n  | Nil                   => Nil\n  | Cons((pat, body), rest) =>\n      unionStrU(lwFreeExpr(body, lwAppend(lwPatBound(pat), bound)),\n                lwFreeArms(rest, bound))\n  end\n\n\n(* ── Env helpers ──────────────────────────────────────────────────────────── *)\n\nfn lwParamEnv(ns : List(String)) : List((String, Operand)) =\n  match ns with\n  | Nil           => Nil\n  | Cons(n, rest) => Cons((n, OTmp(Tmp(n))), lwParamEnv(rest))\n  end\n\nfn lwEnvGet(env : List((String, Operand)), n : String) : Maybe(Operand) =\n  match env with\n  | Nil            => Nothing\n  | Cons((k, v), r) => if strEq(k, n) then Just(v) else lwEnvGet(r, n)\n  end\n\n(* Two-element operand list.  Built through an annotated helper on purpose:\n   inside lowerExpr the two operands come from monomorphically-recursive self\n   calls, so their types are still unresolved variables during body inference.\n   Consing them together directly (`Cons(lv, Cons(rv, Nil))`) unifies those two\n   variables, and — because the self-call return is the same rec-var — that ties\n   the list-element type back through lowerExpr's own result, blowing inference\n   up into an ever-growing type.  Routing them through `a : Operand, b : Operand`\n   pins each to the concrete `Operand` at the call site, so the list element type\n   is fixed and the two result variables never unify.  Runtime value is identical\n   to `Cons(lv, Cons(rv, Nil))`, so emitted TAC is byte-for-byte unchanged. *)\nfn lwPair(a : Operand, b : Operand) : List(Operand) = Cons(a, Cons(b, Nil))\n\n\n(* ── Eta-expansion helpers (lower.py TVar-as-value path) ──────────────────── *)\n\nfn etaParamsGo(i : Int, k : Int) : List((String, Mono)) =\n  if i >= k then Nil\n  else Cons((\"$eta\" + int_to_string(i), MCon(\"()\")), etaParamsGo(i + 1, k))\n\nfn etaParams(k : Int) : List((String, Mono)) = etaParamsGo(0, k)\n\nfn etaArgsGo(i : Int, k : Int) : List(TExpr) =\n  if i >= k then Nil\n  else Cons(TVar(\"$eta\" + int_to_string(i), MCon(\"()\")), etaArgsGo(i + 1, k))\n\nfn etaArgs(k : Int) : List(TExpr) = etaArgsGo(0, k)\n\n\n(* ── Expression lowering (lower.py _expr) ─────────────────────────────────── *)\n\nfn lowerExpr(e : TExpr, env : List((String, Operand)), ctx : LCtx,\n             fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match e with\n\n  | TLit(v, _) => (OConst(valToConst(v)), fnc, st)\n\n  | TVar(n, _) =>\n      match lwEnvGet(env, n) with\n      | Just(v)  => (v, fnc, st)\n      | Nothing  =>\n          let arityM = ctxArity(ctx, n) in\n          let doEta  = match arityM with | Just(k) => k >= 1 | Nothing => false end in\n          if doEta then\n            match arityM with\n            | Just(k) => lowerLambda(etaParams(k),\n                            TApp(TVar(n, MCon(\"()\")), etaArgs(k), MCon(\"()\")),\n                            env, ctx, fnc, st)\n            | Nothing => (OTmp(Tmp(n)), fnc, st)\n            end\n          else if stHasGlobalFn(st, n) then\n            match tacFresh(fnc, \"fn\") with\n            | (dst, fn1) => (OTmp(dst), tacEmit(fn1, IAllocClosure(dst, n, Nil)), st)\n            end\n          else\n            (* global let (Tmp(n)) or — in the oracle — an error; the port\n               resolves it as a global-var read, which asm maps to the table. *)\n            (OTmp(Tmp(n)), fnc, st)\n      end\n\n  | TCon(n, _) =>\n      if strEq(n, \"True\") then (OConst(CBool(true)), fnc, st)\n      else if strEq(n, \"False\") then (OConst(CBool(false)), fnc, st)\n      else\n        match tacFresh(fnc, \"t\") with\n        | (dst, fn1) => (OTmp(dst), tacEmit(fn1, IAlloc(dst, n, Nil)), st)\n        end\n\n  | TTupleExpr(es, _) =>\n      match es with\n      | Nil => (OConst(CUnit), fnc, st)\n      | _   =>\n          match lowerExprs(es, env, ctx, fnc, st) with\n          | (fields, fn1, st1) =>\n              match tacFresh(fn1, \"t\") with\n              | (dst, fn2) => (OTmp(dst), tacEmit(fn2, IAlloc(dst, \"()\", fields)), st1)\n              end\n          end\n      end\n\n  | TBinOp(op0, l, r, t) =>\n      match lowerExpr(l, env, ctx, fnc, st) with\n      | (lv, fn1, st1) =>\n          match lowerExpr(r, env, ctx, fn1, st1) with\n          | (rv, fn2, st2) =>\n              match tacFresh(fn2, \"t\") with\n              | (dst, fn3) =>\n                  let op = mapAndOr(op0) in\n                  let instr =\n                    if strEq(op, \"+\") and isStringT(t) then\n                      ICall(Just(dst), \"__str_concat\", lwPair(lv, rv))\n                    else if isFloatT(t) and isArithOp(op) then\n                      ICall(Just(dst), floatArithName(op), lwPair(lv, rv))\n                    else if isBoolT(t) and isFloatT(texprTyp(l)) and isCmpOp(op) then\n                      ICall(Just(dst), floatCmpName(op), lwPair(lv, rv))\n                    else IBinOp(dst, op, lv, rv)\n                  in\n                  (OTmp(dst), tacEmit(fn3, instr), st2)\n              end\n          end\n      end\n\n  | TUnaryOp(op, x, _) =>\n      match lowerExpr(x, env, ctx, fnc, st) with\n      | (v, fn1, st1) =>\n          match tacFresh(fn1, \"t\") with\n          | (dst, fn2) => (OTmp(dst), tacEmit(fn2, IUnary(dst, op, v)), st1)\n          end\n      end\n\n  | TLetExpr(n, v, body, _) =>\n      match lowerExpr(v, env, ctx, fnc, st) with\n      | (vv, fn1, st1) => lowerExpr(body, Cons((n, vv), env), ctx, fn1, st1)\n      end\n\n  | TIfExpr(c, t, el, _) => lowerIf(c, t, el, env, ctx, fnc, st)\n\n  | TMatchExpr(s, arms, _) => lowerMatch(s, arms, env, ctx, fnc, st)\n\n  | TApp(f, args, _) => lowerApply(f, args, env, ctx, fnc, st)\n\n  | TLambda(params, body, _) => lowerLambda(params, body, env, ctx, fnc, st)\n\n  end\n\nfn lowerExprs(es : List(TExpr), env : List((String, Operand)), ctx : LCtx,\n              fnc : Function, st : LSt) : (List(Operand), Function, LSt) =\n  match es with\n  | Nil           => (Nil, fnc, st)\n  | Cons(e, rest) =>\n      match lowerExpr(e, env, ctx, fnc, st) with\n      | (v, fn1, st1) =>\n          match lowerExprs(rest, env, ctx, fn1, st1) with\n          | (vs, fn2, st2) => (Cons(v, vs), fn2, st2)\n          end\n      end\n  end\n\n\n(* ── If / else (lower.py _lower_if) ───────────────────────────────────────── *)\n\nfn lowerIf(c : TExpr, t : TExpr, el : TExpr, env : List((String, Operand)),\n           ctx : LCtx, fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match lowerExpr(c, env, ctx, fnc, st) with\n  | (cv, fn1, st1) =>\n      match tacLabel(fn1, \"then\") with\n      | (lThen, fn2) =>\n          match tacLabel(fn2, \"else\") with\n          | (lElse, fn3) =>\n              match tacLabel(fn3, \"end\") with\n              | (lEnd, fn4) =>\n                  match tacFresh(fn4, \"r\") with\n                  | (dst, fn5) =>\n                      let fn6 = tacEmit(fn5, ICondJump(cv, lThen, lElse)) in\n                      let fn7 = tacEmit(fn6, ILabel(lThen)) in\n                      match lowerExpr(t, env, ctx, fn7, st1) with\n                      | (tv, fn8, st2) =>\n                          let fn9  = tacEmit(fn8, IAssign(dst, tv)) in\n                          let fn10 = tacEmit(fn9, IJump(lEnd)) in\n                          let fn11 = tacEmit(fn10, ILabel(lElse)) in\n                          match lowerExpr(el, env, ctx, fn11, st2) with\n                          | (ev, fn12, st3) =>\n                              let fn13 = tacEmit(fn12, IAssign(dst, ev)) in\n                              let fn14 = tacEmit(fn13, IJump(lEnd)) in\n                              let fn15 = tacEmit(fn14, ILabel(lEnd)) in\n                              (OTmp(dst), fn15, st3)\n                          end\n                      end\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Match (lower.py _lower_match / _pat_check / _pat_bind) ────────────────── *)\n\nfn lowerMatch(scrut : TExpr, arms : List((TPat, TExpr)),\n              env : List((String, Operand)), ctx : LCtx,\n              fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match lowerExpr(scrut, env, ctx, fnc, st) with\n  | (sv, fn1, st1) =>\n      match tacFresh(fn1, \"r\") with\n      | (dst, fn2) =>\n          match tacLabel(fn2, \"match_end\") with\n          | (lEnd, fn3) =>\n              match lowerArms(arms, sv, dst, lEnd, env, ctx, fn3, st1) with\n              | (fn4, st2) =>\n                  let fn5 = tacEmit(fn4, ICall(Nothing, \"__lark_match_fail\", Nil)) in\n                  let fn6 = tacEmit(fn5, ILabel(lEnd)) in\n                  (OTmp(dst), fn6, st2)\n              end\n          end\n      end\n  end\n\nfn lowerArms(arms : List((TPat, TExpr)), sv : Operand, dst : Tmp, lEnd : String,\n             env : List((String, Operand)), ctx : LCtx,\n             fnc : Function, st : LSt) : (Function, LSt) =\n  match arms with\n  | Nil                     => (fnc, st)\n  | Cons((pat, body), rest) =>\n      match tacLabel(fnc, \"arm\") with\n      | (lBody, fn1) =>\n          match tacLabel(fn1, \"next\") with\n          | (lNext, fn2) =>\n              let fn3 = patCheck(pat, sv, lBody, lNext, fn2) in\n              let fn4 = tacEmit(fn3, ILabel(lBody)) in\n              match patBind(pat, sv, env, fn4) with\n              | (armEnv, fn5) =>\n                  match lowerExpr(body, armEnv, ctx, fn5, st) with\n                  | (bodyVal, fn6, st1) =>\n                      let fn7 = tacEmit(fn6, IAssign(dst, bodyVal)) in\n                      let fn8 = tacEmit(fn7, IJump(lEnd)) in\n                      let fn9 = tacEmit(fn8, ILabel(lNext)) in\n                      lowerArms(rest, sv, dst, lEnd, env, ctx, fn9, st1)\n                  end\n              end\n          end\n      end\n  end\n\nfn patCheck(pat : TPat, sv : Operand, lMatch : String, lFail : String,\n            fnc : Function) : Function =\n  match pat with\n  | TPWild(_)   => tacEmit(fnc, IJump(lMatch))\n  | TPVar(_, _) => tacEmit(fnc, IJump(lMatch))\n  | TPLit(v, _) =>\n      match tacFresh(fnc, \"eq\") with\n      | (cmp, fn1) =>\n          let fn2 = tacEmit(fn1, IBinOp(cmp, \"==\", sv, OConst(valToConst(v)))) in\n          tacEmit(fn2, ICondJump(OTmp(cmp), lMatch, lFail))\n      end\n  | TPCon(tag, subPats, _) =>\n      match subPats with\n      | Nil =>\n          if strEq(tag, \"True\") or strEq(tag, \"False\") then\n            match tacFresh(fnc, \"eq\") with\n            | (cmp, fn1) =>\n                let fn2 = tacEmit(fn1, IBinOp(cmp, \"==\", sv, OConst(CBool(strEq(tag, \"True\"))))) in\n                tacEmit(fn2, ICondJump(OTmp(cmp), lMatch, lFail))\n            end\n          else\n            match tacFresh(fnc, \"tag\") with\n            | (tagTmp, fn1) =>\n                let fn2 = tacEmit(fn1, IGetTag(tagTmp, sv)) in\n                match tacFresh(fn2, \"tag_ok\") with\n                | (tagOk, fn3) =>\n                    let fn4 = tacEmit(fn3, IBinOp(tagOk, \"==\", OTmp(tagTmp), OConst(CStr(tag)))) in\n                    tacEmit(fn4, ICondJump(OTmp(tagOk), lMatch, lFail))\n                end\n            end\n      | _ =>\n          match tacFresh(fnc, \"tag\") with\n          | (tagTmp, fn1) =>\n              let fn2 = tacEmit(fn1, IGetTag(tagTmp, sv)) in\n              match tacFresh(fn2, \"tag_ok\") with\n              | (tagOk, fn3) =>\n                  let fn4 = tacEmit(fn3, IBinOp(tagOk, \"==\", OTmp(tagTmp), OConst(CStr(tag)))) in\n                  match tacLabel(fn4, \"tag_ok\") with\n                  | (lTagOk, fn5) =>\n                      let fn6 = tacEmit(fn5, ICondJump(OTmp(tagOk), lTagOk, lFail)) in\n                      let fn7 = tacEmit(fn6, ILabel(lTagOk)) in\n                      let fn8 = patCheckFields(subPats, sv, 0, lFail, fn7) in\n                      tacEmit(fn8, IJump(lMatch))\n                  end\n              end\n          end\n      end\n  | TPTuple(subPats, _) =>\n      let fn1 = patCheckFields(subPats, sv, 0, lFail, fnc) in\n      tacEmit(fn1, IJump(lMatch))\n  end\n\nfn patCheckFields(subPats : List(TPat), sv : Operand, i : Int, lFail : String,\n                  fnc : Function) : Function =\n  match subPats with\n  | Nil            => fnc\n  | Cons(sp, rest) =>\n      match tacFresh(fnc, \"fld\") with\n      | (fld, fn1) =>\n          let fn2 = tacEmit(fn1, IGetField(fld, sv, i)) in\n          match tacLabel(fn2, \"sub\") with\n          | (lSubOk, fn3) =>\n              let fn4 = patCheck(sp, OTmp(fld), lSubOk, lFail, fn3) in\n              let fn5 = tacEmit(fn4, ILabel(lSubOk)) in\n              patCheckFields(rest, sv, i + 1, lFail, fn5)\n          end\n      end\n  end\n\nfn patBind(pat : TPat, sv : Operand, env : List((String, Operand)),\n           fnc : Function) : (List((String, Operand)), Function) =\n  match pat with\n  | TPWild(_)         => (env, fnc)\n  | TPLit(_, _)       => (env, fnc)\n  | TPVar(n, _)       => (Cons((n, sv), env), fnc)\n  | TPCon(_, subPats, _) => patBindFields(subPats, sv, 0, env, fnc)\n  | TPTuple(subPats, _)  => patBindFields(subPats, sv, 0, env, fnc)\n  end\n\nfn patBindFields(subPats : List(TPat), sv : Operand, i : Int,\n                 env : List((String, Operand)), fnc : Function)\n    : (List((String, Operand)), Function) =\n  match subPats with\n  | Nil            => (env, fnc)\n  | Cons(sp, rest) =>\n      match tacFresh(fnc, \"f\") with\n      | (fld, fn1) =>\n          let fn2 = tacEmit(fn1, IGetField(fld, sv, i)) in\n          match patBind(sp, OTmp(fld), env, fn2) with\n          | (env1, fn3) => patBindFields(rest, sv, i + 1, env1, fn3)\n          end\n      end\n  end\n\n\n(* ── Application (lower.py _lower_apply) ───────────────────────────────────── *)\n\nfn showRoute(dst : Tmp, argVals : List(Operand), typ : Mono, ctx : LCtx) : Instr =\n  if isFloatT(typ) then ICall(Just(dst), \"__show_float\", argVals)\n  else if isBoolT(typ) then ICall(Just(dst), \"__show_bool\", argVals)\n  else\n    match typ with\n    | MCon(nm) =>\n        match ctxShowImpl(ctx, nm) with\n        | Just(s) => ICall(Just(dst), s, argVals)\n        | Nothing => ICall(Just(dst), \"show\", argVals)\n        end\n    | MApp(h, _) =>\n        match ctxShowImpl(ctx, h) with\n        | Just(s) => ICall(Just(dst), s, argVals)\n        | Nothing => ICall(Just(dst), \"show\", argVals)\n        end\n    | _ => ICall(Just(dst), \"show\", argVals)\n    end\n\nfn lowerApply(fnExpr : TExpr, args : List(TExpr), env : List((String, Operand)),\n              ctx : LCtx, fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match fnExpr with\n  | TVar(n, _) =>\n      if strEq(n, \"string_to_int\") or strEq(n, \"string_to_float\") then\n        lowerStringToResult(n, args, env, ctx, fnc, st)\n      else if stHasGlobalFn(st, n) then\n        match lowerExprs(args, env, ctx, fnc, st) with\n        | (argVals, fn1, st1) =>\n            match tacFresh(fn1, \"t\") with\n            | (dst, fn2) =>\n                let instr =\n                  if strEq(n, \"show\") then\n                    match args with\n                    | Nil          => ICall(Just(dst), n, argVals)\n                    | Cons(a0, _)  => showRoute(dst, argVals, texprTyp(a0), ctx)\n                    end\n                  else ICall(Just(dst), n, argVals)\n                in\n                (OTmp(dst), tacEmit(fn2, instr), st1)\n            end\n        end\n      else\n        lowerIndirect(fnExpr, args, env, ctx, fnc, st)\n  | TCon(tag, _) =>\n      match lowerExprs(args, env, ctx, fnc, st) with\n      | (fieldVals, fn1, st1) =>\n          match tacFresh(fn1, \"t\") with\n          | (dst, fn2) => (OTmp(dst), tacEmit(fn2, IAlloc(dst, tag, fieldVals)), st1)\n          end\n      end\n  | _ => lowerIndirect(fnExpr, args, env, ctx, fnc, st)\n  end\n\nfn lowerIndirect(fnExpr : TExpr, args : List(TExpr), env : List((String, Operand)),\n                 ctx : LCtx, fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match lowerExpr(fnExpr, env, ctx, fnc, st) with\n  | (closureVal, fn1, st1) => lowerIndirectArgs(args, closureVal, env, ctx, fn1, st1)\n  end\n\nfn lowerIndirectArgs(args : List(TExpr), result : Operand,\n                     env : List((String, Operand)), ctx : LCtx,\n                     fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match args with\n  | Nil            => (result, fnc, st)\n  | Cons(arg, rest) =>\n      match lowerExpr(arg, env, ctx, fnc, st) with\n      | (argVal, fn1, st1) =>\n          match tacFresh(fn1, \"t\") with\n          | (dst, fn2) =>\n              let fn3 = tacEmit(fn2, IClosureCall(dst, result, argVal)) in\n              lowerIndirectArgs(rest, OTmp(dst), env, ctx, fn3, st1)\n          end\n      end\n  end\n\n(* string_to_int / string_to_float → Result-producing sequence (lower.py). *)\nfn lowerStringToResult(name : String, args : List(TExpr),\n                       env : List((String, Operand)), ctx : LCtx,\n                       fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match args with\n  | Cons(argExpr, _) =>\n      match lowerExpr(argExpr, env, ctx, fnc, st) with\n      | (argv, fn1, st1) =>\n          match tacFresh(fn1, \"t\") with\n          | (raw, fn2) =>\n              let fn3 = tacEmit(fn2, ICall(Just(raw), \"__\" + name + \"_raw\", Cons(argv, Nil))) in\n              match tacFresh(fn3, \"t\") with\n              | (flag, fn4) =>\n                  match tacFresh(fn4, \"t\") with\n                  | (payload, fn5) =>\n                      let fn6 = tacEmit(fn5, IGetField(flag, OTmp(raw), 0)) in\n                      let fn7 = tacEmit(fn6, IGetField(payload, OTmp(raw), 1)) in\n                      match tacLabel(fn7, \"res_ok\") with\n                      | (lOk, fn8) =>\n                          match tacLabel(fn8, \"res_err\") with\n                          | (lErr, fn9) =>\n                              match tacLabel(fn9, \"res_end\") with\n                              | (lEnd, fn10) =>\n                                  match tacFresh(fn10, \"r\") with\n                                  | (dst, fn11) =>\n                                      let fn12 = tacEmit(fn11, ICondJump(OTmp(flag), lOk, lErr)) in\n                                      let fn13 = tacEmit(fn12, ILabel(lOk)) in\n                                      match tacFresh(fn13, \"t\") with\n                                      | (okT, fn14) =>\n                                          let fn15 = tacEmit(fn14, IAlloc(okT, \"Ok\", Cons(OTmp(payload), Nil))) in\n                                          let fn16 = tacEmit(fn15, IAssign(dst, OTmp(okT))) in\n                                          let fn17 = tacEmit(fn16, IJump(lEnd)) in\n                                          let fn18 = tacEmit(fn17, ILabel(lErr)) in\n                                          match tacFresh(fn18, \"t\") with\n                                          | (erT, fn19) =>\n                                              let fn20 = tacEmit(fn19, IAlloc(erT, \"Err\", Cons(OTmp(payload), Nil))) in\n                                              let fn21 = tacEmit(fn20, IAssign(dst, OTmp(erT))) in\n                                              let fn22 = tacEmit(fn21, IJump(lEnd)) in\n                                              let fn23 = tacEmit(fn22, ILabel(lEnd)) in\n                                              (OTmp(dst), fn23, st1)\n                                          end\n                                      end\n                                  end\n                              end\n                          end\n                      end\n                  end\n              end\n          end\n      end\n  | Nil => (OConst(CUnit), fnc, st)   (* unreachable: the prim always has 1 arg *)\n  end\n\n\n(* ── Lambda / closure conversion (lower.py _lower_lambda) ─────────────────── *)\n\nfn loadCaps(free : List(String), i : Int, env : List((String, Operand)),\n            fnc : Function) : (List((String, Operand)), Function) =\n  match free with\n  | Nil            => (env, fnc)\n  | Cons(fv, rest) =>\n      match tacFresh(fnc, \"cap\") with\n      | (fld, fn1) =>\n          let fn2 = tacEmit(fn1, IGetField(fld, OTmp(Tmp(\"env\")), i)) in\n          loadCaps(rest, i + 1, Cons((fv, OTmp(fld)), env), fn2)\n      end\n  end\n\nfn lwCaptured(free : List(String), env : List((String, Operand))) : List(Operand) =\n  match free with\n  | Nil            => Nil\n  | Cons(fv, rest) =>\n      match lwEnvGet(env, fv) with\n      | Just(v)  => Cons(v, lwCaptured(rest, env))\n      | Nothing  => Cons(OTmp(Tmp(fv)), lwCaptured(rest, env))\n      end\n  end\n\nfn lowerLambda(params : List((String, Mono)), body : TExpr,\n               env : List((String, Operand)), ctx : LCtx,\n               fnc : Function, st : LSt) : (Operand, Function, LSt) =\n  match params with\n  | Cons(p0, Cons(p1, rest)) =>\n      (* Curry multi-param lambdas into nested single-param closures. *)\n      lowerLambda(Cons(p0, Nil), TLambda(Cons(p1, rest), body, MCon(\"()\")),\n                  env, ctx, fnc, st)\n  | _ =>\n      let paramNames = lwParamNames(params) in\n      let allBound = lwAppend(paramNames, lwAppend(stGlobalFns(st), ctxGlobalLets(ctx))) in\n      let free = sortStr(lwFreeExpr(body, allBound)) in\n      match stBumpLambda(st) with\n      | (ctr, st1) =>\n          let lamName = fnNameOf(fnc) + \"$lam\" + int_to_string(ctr) in\n          let st2 = stAddGlobalFn(st1, lamName) in\n          let lamParams = Cons(\"env\", paramNames) in\n          let lamFn0 = Function(lamName, lamParams, Nil, 0) in\n          match loadCaps(free, 0, lwParamEnv(lamParams), lamFn0) with\n          | (lamEnv1, lamFn1) =>\n              match lowerExpr(body, lamEnv1, ctx, lamFn1, st2) with\n              | (result, lamFn2, st3) =>\n                  let lamFn3 = tacEmit(lamFn2, IReturn(Just(result))) in\n                  let st4 = stAddLifted(st3, lamFn3) in\n                  match tacFresh(fnc, \"clos\") with\n                  | (dst, fnA) =>\n                      let captured = lwCaptured(free, env) in\n                      (OTmp(dst), tacEmit(fnA, IAllocClosure(dst, lamName, captured)), st4)\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Top-level assembly (lower.py Lowerer.lower) ──────────────────────────── *)\n\n(* One producer: a top-level fnc / impl method.  Lowers its body — lifting any\n   lambdas into st.lifted (most-recent-first) — then emits the trailing return\n   and flushes: reversed lifted fns come FIRST (as lower.py adds them before the\n   enclosing fnc), then this fnc.  st.lifted is left Nil for the next producer. *)\nfn lowerFnProducer(name : String, paramNames : List(String), body : TExpr,\n                   ctx : LCtx, st : LSt) : (List(Function), LSt) =\n  let fn0 = Function(name, paramNames, Nil, 0) in\n  match lowerExpr(body, lwParamEnv(paramNames), ctx, fn0, st) with\n  | (result, fn1, st1) =>\n      let fn2 = tacEmit(fn1, IReturn(Just(result))) in\n      match st1 with\n      | LSt(gf, lc, lifted) =>\n          (lwAppendFns(reverseFns(lifted), Cons(fn2, Nil)), LSt(gf, lc, Nil))\n      end\n  end\n\nfn lowerImplMethods(methods : List(TDecl), forType : String, ctx : LCtx,\n                    st : LSt) : (List(Function), LSt) =\n  match methods with\n  | Nil            => (Nil, st)\n  | Cons(m, rest)  =>\n      match m with\n      | TFnDecl(mname, mparams, mbody, _, _) =>\n          match lowerFnProducer(mname + \"$\" + forType, lwParamNames(mparams), mbody, ctx, st) with\n          | (fns, st1) =>\n              match lowerImplMethods(rest, forType, ctx, st1) with\n              | (restFns, st2) => (lwAppendFns(fns, restFns), st2)\n              end\n          end\n      | _ => lowerImplMethods(rest, forType, ctx, st)\n      end\n  end\n\nfn lowerOneDecl(d : TDecl, ctx : LCtx, st : LSt) : (List(Function), LSt) =\n  match d with\n  | TFnDecl(name, params, body, _, _) =>\n      lowerFnProducer(name, lwParamNames(params), body, ctx, st)\n  | TImplDecl(_, forType, methods) => lowerImplMethods(methods, forType, ctx, st)\n  | TTypeDecl(_, _, _, _)          => (Nil, st)\n  | TLetDecl(_, _, _, _)           => (Nil, st)\n  end\n\nfn lowerDecls(decls : List(TDecl), ctx : LCtx, st : LSt) : (List(Function), LSt) =\n  match decls with\n  | Nil            => (Nil, st)\n  | Cons(d, rest)  =>\n      match lowerOneDecl(d, ctx, st) with\n      | (fns, st1) =>\n          match lowerDecls(rest, ctx, st1) with\n          | (restFns, st2) => (lwAppendFns(fns, restFns), st2)\n          end\n      end\n  end\n\n(* Top-level `let`s → one __global_init__ function (lower.py). *)\nfn globalLetPairs(decls : List(TDecl)) : List((String, TExpr)) =\n  match decls with\n  | Nil            => Nil\n  | Cons(d, rest)  =>\n      match d with\n      | TLetDecl(name, value, _, _) => Cons((name, value), globalLetPairs(rest))\n      | _ => globalLetPairs(rest)\n      end\n  end\n\nfn lowerLets(lets : List((String, TExpr)), env : List((String, Operand)),\n             ctx : LCtx, fnc : Function, st : LSt) : (Function, LSt) =\n  match lets with\n  | Nil                    => (fnc, st)\n  | Cons((gname, gexpr), rest) =>\n      match lowerExpr(gexpr, env, ctx, fnc, st) with\n      | (v, fn1, st1) =>\n          let fn2 = tacEmit(fn1, IAssign(Tmp(gname), v)) in\n          lowerLets(rest, Cons((gname, OTmp(Tmp(gname))), env), ctx, fn2, st1)\n      end\n  end\n\nfn buildGlobalInit(decls : List(TDecl), ctx : LCtx, st : LSt) : (List(Function), LSt) =\n  match globalLetPairs(decls) with\n  | Nil  => (Nil, st)\n  | lets =>\n      let initFn0 = Function(\"__global_init__\", Nil, Nil, 0) in\n      match lowerLets(lets, Nil, ctx, initFn0, st) with\n      | (initFn1, st1) =>\n          let initFn2 = tacEmit(initFn1, IReturn(Just(OConst(CUnit)))) in\n          match st1 with\n          | LSt(gf, lc, lifted) =>\n              (lwAppendFns(reverseFns(lifted), Cons(initFn2, Nil)), LSt(gf, lc, Nil))\n          end\n      end\n  end\n\n\n(* ── Dispatch stubs (lower.py _make_dispatch_stub) ────────────────────────── *)\n\nfn allocArmLabels(typeNames : List(String), ctx : LCtx, fnc : Function)\n    : (List((String, String)), Function) =\n  match typeNames with\n  | Nil            => (Nil, fnc)\n  | Cons(tn, rest) =>\n      match ctxTags(ctx, tn) with\n      | Nil => allocArmLabels(rest, ctx, fnc)\n      | _   =>\n          match tacLabel(fnc, \"arm_\" + tn) with\n          | (lab, fn1) =>\n              match allocArmLabels(rest, ctx, fn1) with\n              | (labs, fn2) => (Cons((tn, lab), labs), fn2)\n              end\n          end\n      end\n  end\n\nfn emitTagChecksFor(tags : List(String), lArm : String, tagTmp : Tmp,\n                    fnc : Function) : Function =\n  match tags with\n  | Nil            => fnc\n  | Cons(tag, rest) =>\n      match tacFresh(fnc, \"eq\") with\n      | (eq, fn1) =>\n          match tacLabel(fn1, \"nxt\") with\n          | (lNext, fn2) =>\n              let fn3 = tacEmit(fn2, IBinOp(eq, \"==\", OTmp(tagTmp), OConst(CStr(tag)))) in\n              let fn4 = tacEmit(fn3, ICondJump(OTmp(eq), lArm, lNext)) in\n              let fn5 = tacEmit(fn4, ILabel(lNext)) in\n              emitTagChecksFor(rest, lArm, tagTmp, fn5)\n          end\n      end\n  end\n\nfn emitTagChecks(typeNames : List(String), armLabels : List((String, String)),\n                 tagTmp : Tmp, ctx : LCtx, fnc : Function) : Function =\n  match typeNames with\n  | Nil            => fnc\n  | Cons(tn, rest) =>\n      match ctxTags(ctx, tn) with\n      | Nil => emitTagChecks(rest, armLabels, tagTmp, ctx, fnc)\n      | tags =>\n          let fn1 = emitTagChecksFor(tags, lwAssocStrForce(armLabels, tn), tagTmp, fnc) in\n          emitTagChecks(rest, armLabels, tagTmp, ctx, fn1)\n      end\n  end\n\nfn emitArmBodies(typeNames : List(String), armLabels : List((String, String)),\n                 method : String, dst : Tmp, lEnd : String, ctx : LCtx,\n                 fnc : Function) : Function =\n  match typeNames with\n  | Nil            => fnc\n  | Cons(tn, rest) =>\n      match ctxTags(ctx, tn) with\n      | Nil => emitArmBodies(rest, armLabels, method, dst, lEnd, ctx, fnc)\n      | _   =>\n          let fn1 = tacEmit(fnc, ILabel(lwAssocStrForce(armLabels, tn))) in\n          match tacFresh(fn1, \"call_r\") with\n          | (callDst, fn2) =>\n              let fn3 = tacEmit(fn2, ICall(Just(callDst), method + \"$\" + tn, Cons(OTmp(Tmp(\"x\")), Nil))) in\n              let fn4 = tacEmit(fn3, IAssign(dst, OTmp(callDst))) in\n              let fn5 = tacEmit(fn4, IJump(lEnd)) in\n              emitArmBodies(rest, armLabels, method, dst, lEnd, ctx, fn5)\n          end\n      end\n  end\n\nfn makeDispatchStub(method : String, typeNames : List(String), ctx : LCtx) : Function =\n  let fn0 = Function(method, Cons(\"x\", Nil), Nil, 0) in\n  match tacFresh(fn0, \"r\") with\n  | (dst, fn1) =>\n      match tacLabel(fn1, \"dispatch_end\") with\n      | (lEnd, fn2) =>\n          match tacFresh(fn2, \"tag\") with\n          | (tagTmp, fn3) =>\n              let fn4 = tacEmit(fn3, IGetTag(tagTmp, OTmp(Tmp(\"x\")))) in\n              match allocArmLabels(typeNames, ctx, fn4) with\n              | (armLabels, fn5) =>\n                  let fn6 = emitTagChecks(typeNames, armLabels, tagTmp, ctx, fn5) in\n                  let fn7 = tacEmit(fn6, ICall(Nothing, \"__lark_match_fail\", Nil)) in\n                  let fn8 = emitArmBodies(typeNames, armLabels, method, dst, lEnd, ctx, fn7) in\n                  let fn9 = tacEmit(fn8, ILabel(lEnd)) in\n                  tacEmit(fn9, IReturn(Just(OTmp(dst))))\n              end\n          end\n      end\n  end\n\nfn buildDispatchStubs(ti : List((String, List(String))), ctx : LCtx) : List(Function) =\n  match ti with\n  | Nil            => Nil\n  | Cons((method, typeNames), rest) =>\n      if isBuiltinName(method) then buildDispatchStubs(rest, ctx)\n      else Cons(makeDispatchStub(method, typeNames, ctx), buildDispatchStubs(rest, ctx))\n  end\n\n\n(* ── Context construction (lower.py Lowerer.lower, setup loops) ───────────── *)\n\nfn variantNames(vs : List(TVariant)) : List(String) =\n  match vs with\n  | Nil               => Nil\n  | Cons(TVariant(n, _), r) => Cons(n, variantNames(r))\n  end\n\nfn collectTypeTags(decls : List(TDecl)) : List((String, List(String))) =\n  match decls with\n  | Nil            => Nil\n  | Cons(d, rest)  =>\n      match d with\n      | TTypeDecl(name, _, mvs, _) =>\n          match mvs with\n          | Just(vs) => Cons((name, variantNames(vs)), collectTypeTags(rest))\n          | Nothing  => collectTypeTags(rest)\n          end\n      | _ => collectTypeTags(rest)\n      end\n  end\n\nfn collectGlobalLets(decls : List(TDecl)) : List(String) =\n  match decls with\n  | Nil            => Nil\n  | Cons(d, rest)  =>\n      match d with\n      | TLetDecl(name, _, _, _) => Cons(name, collectGlobalLets(rest))\n      | _ => collectGlobalLets(rest)\n      end\n  end\n\nfn listLenP(ps : List((String, Mono))) : Int =\n  match ps with | Nil => 0 | Cons(_, r) => 1 + listLenP(r) end\n\nfn implArity(methods : List(TDecl), forType : String) : List((String, Int)) =\n  match methods with\n  | Nil           => Nil\n  | Cons(m, rest) =>\n      match m with\n      | TFnDecl(mname, mparams, _, _, _) =>\n          Cons((mname + \"$\" + forType, listLenP(mparams)), implArity(rest, forType))\n      | _ => implArity(rest, forType)\n      end\n  end\n\nfn collectArity(decls : List(TDecl)) : List((String, Int)) =\n  match decls with\n  | Nil            => Nil\n  | Cons(d, rest)  =>\n      match d with\n      | TFnDecl(name, params, _, _, _) => Cons((name, listLenP(params)), collectArity(rest))\n      | TImplDecl(_, forType, methods) => lwAppendArity(implArity(methods, forType), collectArity(rest))\n      | _ => collectArity(rest)\n      end\n  end\n\n(* setdefault+append, preserving key-appearance order and per-key order. *)\nfn tiAdd(acc : List((String, List(String))), method : String, forType : String)\n    : List((String, List(String))) =\n  match acc with\n  | Nil            => Cons((method, Cons(forType, Nil)), Nil)\n  | Cons((k, vs), rest) =>\n      if strEq(k, method) then Cons((k, tacSnocStr(vs, forType)), rest)\n      else Cons((k, vs), tiAdd(rest, method, forType))\n  end\n\nfn addImplMethods(methods : List(TDecl), forType : String,\n                  acc : List((String, List(String)))) : List((String, List(String))) =\n  match methods with\n  | Nil           => acc\n  | Cons(m, rest) =>\n      match m with\n      | TFnDecl(mname, _, _, _, _) => addImplMethods(rest, forType, tiAdd(acc, mname, forType))\n      | _ => addImplMethods(rest, forType, acc)\n      end\n  end\n\nfn collectTraitImplsGo(decls : List(TDecl), acc : List((String, List(String))))\n    : List((String, List(String))) =\n  match decls with\n  | Nil            => acc\n  | Cons(d, rest)  =>\n      match d with\n      | TImplDecl(traitName, forType, methods) =>\n          if strEq(traitName, \"Copy\") then collectTraitImplsGo(rest, acc)\n          else collectTraitImplsGo(rest, addImplMethods(methods, forType, acc))\n      | _ => collectTraitImplsGo(rest, acc)\n      end\n  end\n\nfn collectTraitImpls(decls : List(TDecl)) : List((String, List(String))) =\n  collectTraitImplsGo(decls, Nil)\n\nfn tiGet(ti : List((String, List(String))), method : String) : List(String) =\n  match ti with\n  | Nil            => Nil\n  | Cons((k, vs), r) => if strEq(k, method) then vs else tiGet(r, method)\n  end\n\nfn buildShowImpls(tns : List(String)) : List((String, String)) =\n  match tns with\n  | Nil           => Nil\n  | Cons(tn, r)   => Cons((tn, \"show$\" + tn), buildShowImpls(r))\n  end\n\nfn implMangledNames(methods : List(TDecl), forType : String) : List(String) =\n  match methods with\n  | Nil           => Nil\n  | Cons(m, rest) =>\n      match m with\n      | TFnDecl(mname, _, _, _, _) => Cons(mname + \"$\" + forType, implMangledNames(rest, forType))\n      | _ => implMangledNames(rest, forType)\n      end\n  end\n\nfn declGlobalFns(decls : List(TDecl)) : List(String) =\n  match decls with\n  | Nil            => Nil\n  | Cons(d, rest)  =>\n      match d with\n      | TFnDecl(name, _, _, _, _)      => Cons(name, declGlobalFns(rest))\n      | TImplDecl(_, forType, methods) => lwAppend(implMangledNames(methods, forType), declGlobalFns(rest))\n      | _ => declGlobalFns(rest)\n      end\n  end\n\nfn tiKeys(ti : List((String, List(String)))) : List(String) =\n  match ti with | Nil => Nil | Cons((k, _), r) => Cons(k, tiKeys(r)) end\n\nfn collectGlobalFns(decls : List(TDecl), ti : List((String, List(String)))) : List(String) =\n  lwAppend(lwBuiltins, lwAppend(declGlobalFns(decls), tiKeys(ti)))\n\nfn buildCtx(decls : List(TDecl)) : LCtx =\n  let ti = collectTraitImpls(decls) in\n  LCtx(collectTypeTags(decls), ti, collectGlobalLets(decls),\n       buildShowImpls(tiGet(ti, \"show\")), collectArity(decls))\n\n\n(* ── Entry point (lower.py `lower`) ───────────────────────────────────────── *)\n\nfn lowerProg
