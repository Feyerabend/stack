ram(tprog : TProgram) : TAC =\n  match tprog with\n  | TProgram(_, decls) =>\n      let ctx = buildCtx(decls) in\n      let st0 = LSt(collectGlobalFns(decls, ctxTraitImpls(ctx)), 0, Nil) in\n      match buildGlobalInit(decls, ctx, st0) with\n      | (initFns, st1) =>\n          match lowerDecls(decls, ctx, st1) with\n          | (declFns, st2) =>\n              let stubFns = buildDispatchStubs(ctxTraitImpls(ctx), ctx) in\n              TAC(lwAppendFns(initFns, lwAppendFns(declFns, stubFns)), ctxGlobalLets(ctx))\n          end\n      end\n  end\n"}, {"path": "repo/optimize/lark/opt.lark", "group": "repo/optimize/lark", "name": "opt.lark", "text": "(* opt.lark — Lark's TAC optimizer, written in Lark.\n   (the port of oracle/opt.py — the TAC subset.)\n\n   Pipeline position (per opt.py):\n       tast.lark → lower.lark → tac.lark → [opt.lark] → emit_tac_c.lark → C text\n\n   opt.py is a bundle of TAC→TAC passes plus a fixpoint driver.  This is a PURE\n   port of the TAC subset only — the passes named in opt.py's `PASSES` list:\n       devirt, inline (+ prune), closure_elim, const_fold, copy_prop,\n       algebraic_simplify, cse, dce, licm.\n   It deliberately does NOT port the `ASM_PASSES` (peephole / immfold /\n   branchlayout) — those rewrite RV32 assembly TEXT, irrelevant to a C emitter.\n\n   Everything opt.py does with mutation, a monotonic global site counter, and the\n   cfg/liveness helper modules is threaded PURELY here:\n\n     • Each pass is  (TAC, Int) -> (TAC, Int):  the Int is the shared site counter\n       (opt.py's `_SITE = itertools.count()`).  Only `inline` and `closure_elim`\n       mint sites; the others thread it through untouched.  optimize() starts the\n       counter at 0 and threads it across every pass AND every sweep, so a run in\n       a fresh CEK subprocess reproduces opt.py's site numbers exactly PROVIDED the\n       oracle resets `_SITE` per file (the differential does).\n     • cfg.py's `build_cfg` and liveness.py's `analyse`/`defs`/`uses` are ported\n       here (optBuildCfg / optLiveness / optDefs / optUses) — only `dce` needs the\n       full CFG + backward-dataflow liveness; `copy_prop`/`cse` need only block\n       boundaries (detected inline, no CFG); `licm` needs dominators.\n     • The inline/closure renamers memoise via dicts in opt.py, but the rename is a\n       PURE function of (site, name) — `_i{site}_{name}` / `.i{site}_{label}` — so\n       no memo threading is needed; renVal/renDst/renLab compute it directly.\n\n   Design notes (the pipeline is assembled by CONCATENATION):\n     parse.lark gives Maybe / Just / Nothing (+ Ok/Err are built-in ctors)\n     tac.lark   gives the TAC IR (Operand/ConstVal/Instr/Function/TAC) +\n                tacPretty (used as the fixpoint fingerprint) + tacSnoc* helpers\n   So the differential (opt_difftest.py) concatenates lex+parse+tac+opt.  All\n   generic helpers are `opt`-prefixed to dodge name clashes under concatenation;\n   opt.lark is otherwise self-contained (its own string-eq, set, and assoc code,\n   like emit_tac_c.lark).\n\n   The one arithmetic subtlety: const_fold folds int +,-,* under a signed 32-bit\n   truncation (opt.py `_wrap32`, matching RV32).  Lark has no `%` operator and `/`\n   truncates toward zero, so optWrap32 reconstructs `& 0xFFFFFFFF` via a floor-mod\n   built from `/`,`*`,`-` (19_intoverflow is the corpus witness at -O1+).\n\n   Run (differential):  harness/opt_difftest.py    (make opttest)      *)\n\nmodule Opt\n\n\n(* ══ String / list / set / assoc helpers (opt-prefixed, self-contained) ═════ *)\n\nfn optStrEqGo(a : String, b : String, i : Int, n : Int) : Bool =\n  if i >= n then true\n  else if string_index(a, i) == string_index(b, i) then optStrEqGo(a, b, i + 1, n)\n  else false\n\nfn optStrEq(a : String, b : String) : Bool =\n  let la = string_length(a) in\n  let lb = string_length(b) in\n  if la == lb then optStrEqGo(a, b, 0, la) else false\n\nfn optMember(x : String, xs : List(String)) : Bool =\n  match xs with\n  | Nil        => false\n  | Cons(y, r) => if optStrEq(x, y) then true else optMember(x, r)\n  end\n\n(* set insert (dedup), union, difference — String sets as lists *)\nfn optInsert(x : String, xs : List(String)) : List(String) =\n  if optMember(x, xs) then xs else Cons(x, xs)\n\nfn optUnion(xs : List(String), ys : List(String)) : List(String) =\n  match xs with\n  | Nil        => ys\n  | Cons(x, r) => optInsert(x, optUnion(r, ys))\n  end\n\nfn optDiff(xs : List(String), ys : List(String)) : List(String) =\n  match xs with\n  | Nil        => Nil\n  | Cons(x, r) => if optMember(x, ys) then optDiff(r, ys) else Cons(x, optDiff(r, ys))\n  end\n\nfn optSubset(xs : List(String), ys : List(String)) : Bool =\n  match xs with\n  | Nil        => true\n  | Cons(x, r) => if optMember(x, ys) then optSubset(r, ys) else false\n  end\n\nfn optSetEq(xs : List(String), ys : List(String)) : Bool =\n  optSubset(xs, ys) and optSubset(ys, xs)\n\n(* ══ String-keyed balanced-tree set (StrSet) ═══════════════════════════════ *)\n(* The red-black template (types.lark's Subst) adapted to a String-keyed SET.\n   Liveness/dce carry name-sets that the assoc-list `optUnion`/`optDiff`/\n   `optSetEq` rebuilt O(n) times with no GC — an O(n²) arena wall on the\n   self-hosted optimizer's own ~7300-line source.  StrSet gives\n   O(log n) member/insert; union/diff/eq are O(n log n).  Membership decisions\n   (hence dce's kept instrs) are representation-independent, so the emitted C is\n   byte-identical — the opttest differential is the guard. *)\n\nfn optStrLtGo(a : String, b : String, i : Int, la : Int, lb : Int) : Bool =\n  if i >= la then i < lb\n  else if i >= lb then false\n  else if string_index(a, i) < string_index(b, i) then true\n  else if string_index(a, i) > string_index(b, i) then false\n  else optStrLtGo(a, b, i + 1, la, lb)\n\nfn optStrLt(a : String, b : String) : Bool =\n  optStrLtGo(a, b, 0, string_length(a), string_length(b))\n\ntype OSColor = | OSRed | OSBlack\ntype StrSet  = | SsLeaf | SsNode of OSColor, StrSet, String, StrSet\nimpl Copy for OSColor = {}\nimpl Copy for StrSet  = {}\n\nfn ssMember(k : String, s : StrSet) : Bool =\n  match s with\n  | SsLeaf              => false\n  | SsNode(_, l, k0, r) =>\n      if optStrEq(k, k0) then true\n      else if optStrLt(k, k0) then ssMember(k, l)\n      else ssMember(k, r)\n  end\n\nfn ssBalance(c : OSColor, a : StrSet, xk : String, b : StrSet) : StrSet =\n  match (c, a, xk, b) with\n  | (OSBlack, SsNode(OSRed, SsNode(OSRed, t1, k1, t2), k2, t3), k3, t4) =>\n      SsNode(OSRed, SsNode(OSBlack, t1, k1, t2), k2, SsNode(OSBlack, t3, k3, t4))\n  | (OSBlack, SsNode(OSRed, t1, k1, SsNode(OSRed, t2, k2, t3)), k3, t4) =>\n      SsNode(OSRed, SsNode(OSBlack, t1, k1, t2), k2, SsNode(OSBlack, t3, k3, t4))\n  | (OSBlack, t1, k1, SsNode(OSRed, SsNode(OSRed, t2, k2, t3), k3, t4)) =>\n      SsNode(OSRed, SsNode(OSBlack, t1, k1, t2), k2, SsNode(OSBlack, t3, k3, t4))\n  | (OSBlack, t1, k1, SsNode(OSRed, t2, k2, SsNode(OSRed, t3, k3, t4))) =>\n      SsNode(OSRed, SsNode(OSBlack, t1, k1, t2), k2, SsNode(OSBlack, t3, k3, t4))\n  | (cc, aa, kk, bb) => SsNode(cc, aa, kk, bb)\n  end\n\nfn ssIns(s : StrSet, k : String) : StrSet =\n  match s with\n  | SsLeaf => SsNode(OSRed, SsLeaf, k, SsLeaf)\n  | SsNode(c, l, k0, r) =>\n      if optStrLt(k, k0) then ssBalance(c, ssIns(l, k), k0, r)\n      else if optStrLt(k0, k) then ssBalance(c, l, k0, ssIns(r, k))\n      else SsNode(c, l, k0, r)\n  end\n\nfn ssInsert(s : StrSet, k : String) : StrSet =\n  match ssIns(s, k) with\n  | SsNode(_, l, k0, r) => SsNode(OSBlack, l, k0, r)   (* recolour root black *)\n  | SsLeaf              => SsLeaf                       (* ssIns never yields a leaf *)\n  end\n\nfn ssFromList(xs : List(String), acc : StrSet) : StrSet =\n  match xs with\n  | Nil        => acc\n  | Cons(x, r) => ssFromList(r, ssInsert(acc, x))\n  end\n\n(* fold all keys of src into acc (a ∪ b = fold a into b). *)\nfn ssUnionInto(src : StrSet, acc : StrSet) : StrSet =\n  match src with\n  | SsLeaf             => acc\n  | SsNode(_, l, k, r) => ssUnionInto(r, ssInsert(ssUnionInto(l, acc), k))\n  end\nfn ssUnion(a : StrSet, b : StrSet) : StrSet = ssUnionInto(a, b)\n\n(* keys of `a` not in `b`. *)\nfn ssDiffInto(src : StrSet, b : StrSet, acc : StrSet) : StrSet =\n  match src with\n  | SsLeaf             => acc\n  | SsNode(_, l, k, r) =>\n      let acc1 = ssDiffInto(l, b, acc) in\n      let acc2 = if ssMember(k, b) then acc1 else ssInsert(acc1, k) in\n      ssDiffInto(r, b, acc2)\n  end\nfn ssDiff(a : StrSet, b : StrSet) : StrSet = ssDiffInto(a, b, SsLeaf)\n\nfn ssSubsetGo(src : StrSet, b : StrSet) : Bool =\n  match src with\n  | SsLeaf             => true\n  | SsNode(_, l, k, r) => if ssMember(k, b) then ssSubsetGo(l, b) and ssSubsetGo(r, b) else false\n  end\nfn ssEq(a : StrSet, b : StrSet) : Bool = ssSubsetGo(a, b) and ssSubsetGo(b, a)\n\n(* String → prefix test / leading-dot strip (for inline/closure label renaming) *)\nfn optStartsWithGo(s : String, p : String, i : Int, np : Int) : Bool =\n  if i >= np then true\n  else if i >= string_length(s) then false\n  else if string_index(s, i) == string_index(p, i) then optStartsWithGo(s, p, i + 1, np)\n  else false\n\nfn optStartsWith(s : String, p : String) : Bool =\n  optStartsWithGo(s, p, 0, string_length(p))\n\nfn optStripDotsGo(s : String, i : Int, n : Int) : String =\n  if i >= n then \"\"\n  else if string_index(s, i) == 46 then optStripDotsGo(s, i + 1, n)   (* '.' = 46 *)\n  else string_slice(s, i, n)\n\nfn optStripDots(s : String) : String =\n  optStripDotsGo(s, 0, string_length(s))\n\n(* Monomorphic list reverses (pinned per element type — the accumulator-reverse\n   pattern trips frozen infer's monomorphic self-recursion when polymorphic). *)\nfn optRevInstrGo(xs : List(Instr), acc : List(Instr)) : List(Instr) =\n  match xs with | Nil => acc | Cons(x, r) => optRevInstrGo(r, Cons(x, acc)) end\nfn optRevInstr(xs : List(Instr)) : List(Instr) = optRevInstrGo(xs, Nil)\n\nfn optRevStrGo(xs : List(String), acc : List(String)) : List(String) =\n  match xs with | Nil => acc | Cons(x, r) => optRevStrGo(r, Cons(x, acc)) end\nfn optRevStr(xs : List(String)) : List(String) = optRevStrGo(xs, Nil)\n\nfn optAppendInstr(a : List(Instr), b : List(Instr)) : List(Instr) =\n  match a with | Nil => b | Cons(x, r) => Cons(x, optAppendInstr(r, b)) end\n\nfn optAppendStr(a : List(String), b : List(String)) : List(String) =\n  match a with | Nil => b | Cons(x, r) => Cons(x, optAppendStr(r, b)) end\n\n(* nth element of an Operand list (closure captures indexing). *)\nfn optNthOperand(xs : List(Operand), i : Int) : Operand =\n  match xs with\n  | Nil        => OConst(CUnit)                (* out of range: unreachable on valid TAC *)\n  | Cons(x, r) => if i == 0 then x else optNthOperand(r, i - 1)\n  end\n\nfn optLenInstr(xs : List(Instr)) : Int =\n  match xs with | Nil => 0 | Cons(_, r) => 1 + optLenInstr(r) end\n\nfn optLenOperand(xs : List(Operand)) : Int =\n  match xs with | Nil => 0 | Cons(_, r) => 1 + optLenOperand(r) end\n\nfn optLenStr(xs : List(String)) : Int =\n  match xs with | Nil => 0 | Cons(_, r) => 1 + optLenStr(r) end\n\n\n(* ══ Assoc-list accessors (one per value type used) ═════════════════════════ *)\n\nfn optAssocTmp(xs : List((String, Tmp)), k : String) : Maybe(Tmp) =\n  match xs with\n  | Nil             => Nothing\n  | Cons((n, v), r) => if optStrEq(n, k) then Just(v) else optAssocTmp(r, k)\n  end\n\nfn optAssocStr(xs : List((String, String)), k : String) : Maybe(String) =\n  match xs with\n  | Nil             => Nothing\n  | Cons((n, v), r) => if optStrEq(n, k) then Just(v) else optAssocStr(r, k)\n  end\n\nfn optAssocInt(xs : List((String, Int)), k : String) : Maybe(Int) =\n  match xs with\n  | Nil             => Nothing\n  | Cons((n, v), r) => if optStrEq(n, k) then Just(v) else optAssocInt(r, k)\n  end\n\nfn optAssocOp(xs : List((String, Operand)), k : String) : Maybe(Operand) =\n  match xs with\n  | Nil             => Nothing\n  | Cons((n, v), r) => if optStrEq(n, k) then Just(v) else optAssocOp(r, k)\n  end\n\n(* Closure info: root name → (lifted-fn name, captures). *)\nfn optAssocInfo(xs : List((String, (String, List(Operand)))), k : String)\n   : Maybe((String, List(Operand))) =\n  match xs with\n  | Nil             => Nothing\n  | Cons((n, v), r) => if optStrEq(n, k) then Just(v) else optAssocInfo(r, k)\n  end\n\n(* String set → List((String,Int)) def-count increment. *)\nfn optCountBump(xs : List((String, Int)), k : String) : List((String, Int)) =\n  match xs with\n  | Nil             => Cons((k, 1), Nil)\n  | Cons((n, v), r) => if optStrEq(n, k) then Cons((n, v + 1), r)\n                       else Cons((n, v), optCountBump(r, k))\n  end\n\nfn optCountOf(xs : List((String, Int)), k : String) : Int =\n  match optAssocInt(xs, k) with | Just(v) => v | Nothing => 0 end\n\n\n(* ══ Function lookup (fnmap) ════════════════════════════════════════════════ *)\n\nfn optFnName(f : Function) : String =\n  match f with | Function(nm, _, _, _) => nm end\n\nfn optFnParams(f : Function) : List(String) =\n  match f with | Function(_, ps, _, _) => ps end\n\nfn optFnBody(f : Function) : List(Instr) =\n  match f with | Function(_, _, b, _) => b end\n\nfn optFnLookup(fns : List(Function), nm : String) : Maybe(Function) =\n  match fns with\n  | Nil        => Nothing\n  | Cons(f, r) => if optStrEq(optFnName(f), nm) then Just(f) else optFnLookup(r, nm)\n  end\n\n(* Replace a function's body, keeping name/params/counter. *)\nfn optWithBody(f : Function, body : List(Instr)) : Function =\n  match f with | Function(nm, ps, _, ctr) => Function(nm, ps, body, ctr) end\n\n\n(* ══ Operand / Tmp destructors ══════════════════════════════════════════════ *)\n\nfn optTmpName(t : Tmp) : String = match t with | Tmp(n) => n end\n\nfn optIsTmp(v : Operand) : Bool =\n  match v with | OTmp(_) => true | _ => false end\n\nfn optOperandName(v : Operand) : Maybe(String) =\n  match v with | OTmp(t) => Just(optTmpName(t)) | OConst(_) => Nothing end\n\n(* Names used by a list of operands (Tmp positions only). *)\nfn optValNames(xs : List(Operand)) : List(String) =\n  match xs with\n  | Nil        => Nil\n  | Cons(v, r) => match v with\n                  | OTmp(t)   => Cons(optTmpName(t), optValNames(r))\n                  | OConst(_) => optValNames(r)\n                  end\n  end\n\n\n(* ══ defs / uses  (port of liveness.py defs / uses) ═════════════════════════ *)\n(* defs returns 0 or 1 name; uses returns a (possibly duplicated) name list —\n   every consumer treats it with set operations, so duplicates are harmless. *)\n\nfn optDefs(i : Instr) : List(String) =\n  match i with\n  | IAssign(d, _)          => Cons(optTmpName(d), Nil)\n  | IBinOp(d, _, _, _)     => Cons(optTmpName(d), Nil)\n  | IUnary(d, _, _)        => Cons(optTmpName(d), Nil)\n  | ICall(md, _, _)        => match md with | Just(d) => Cons(optTmpName(d), Nil) | Nothing => Nil end\n  | IClosureCall(d, _, _)  => Cons(optTmpName(d), Nil)\n  | IAlloc(d, _, _)        => Cons(optTmpName(d), Nil)\n  | IGetTag(d, _)          => Cons(optTmpName(d), Nil)\n  | IGetField(d, _, _)     => Cons(optTmpName(d), Nil)\n  | IAllocClosure(d, _, _) => Cons(optTmpName(d), Nil)\n  | _                      => Nil\n  end\n\nfn optUses(i : Instr) : List(String) =\n  match i with\n  | IAssign(_, s)          => optValNames(Cons(s, Nil))\n  | IBinOp(_, _, l, r)     => optValNames(Cons(l, Cons(r, Nil)))\n  | IUnary(_, _, s)        => optValNames(Cons(s, Nil))\n  | ICall(_, _, args)      => optValNames(args)\n  | IClosureCall(_, f, a)  => optValNames(Cons(f, Cons(a, Nil)))\n  | IReturn(mv)            => match mv with | Just(v) => optValNames(Cons(v, Nil)) | Nothing => Nil end\n  | ICondJump(c, _, _)     => optValNames(Cons(c, Nil))\n  | IAlloc(_, _, fs)       => optValNames(fs)\n  | IGetTag(_, s)          => optValNames(Cons(s, Nil))\n  | IGetField(_, s, _)     => optValNames(Cons(s, Nil))\n  | IAllocClosure(_, _, cs) => optValNames(cs)\n  | _                      => Nil\n  end\n\n(* The single def name, or Nothing (liveness.py _def_name via defs). *)\nfn optDefName(i : Instr) : Maybe(String) =\n  match optDefs(i) with | Cons(n, _) => Just(n) | Nil => Nothing end\n\n(* Pure value-def destination name (opt.py _pure_def_name): a fresh-Tmp def with\n   NO effect.  Excludes ICall / IClosureCall (calls may print/read). *)\nfn optPureDefName(i : Instr) : Maybe(String) =\n  match i with\n  | IAssign(d, _)          => Just(optTmpName(d))\n  | IBinOp(d, _, _, _)     => Just(optTmpName(d))\n  | IUnary(d, _, _)        => Just(optTmpName(d))\n  | IAlloc(d, _, _)        => Just(optTmpName(d))\n  | IGetTag(d, _)          => Just(optTmpName(d))\n  | IGetField(d, _, _)     => Just(optTmpName(d))\n  | IAllocClosure(d, _, _) => Just(optTmpName(d))\n  | _                      => Nothing\n  end\n\n(* Instruction shape predicates. *)\nfn optIsLabel(i : Instr) : Bool =\n  match i with | ILabel(_) => true | _ => false end\n\nfn optIsTerm(i : Instr) : Bool =\n  match i with\n  | IJump(_)          => true\n  | ICondJump(_, _, _) => true\n  | IReturn(_)        => true\n  | _                 => false\n  end\n\n\n(* ══ 32-bit wrap (opt.py _wrap32) — no `%`, `/` truncates toward zero ═══════ *)\n(* _wrap32(n) = ((n + 0x80000000) & 0xFFFFFFFF) - 0x80000000.  `& 0xFFFFFFFF`\n   is a floor-mod by 2^32; rebuild it as trunc-div remainder + a sign fix-up. *)\n\nfn optFloorMod(x : Int, m : Int) : Int =\n  let q = x / m in            (* trunc toward zero *)\n  let r = x - q * m in        (* C-style remainder: sign of x *)\n  if r < 0 then r + m else r\n\nfn optWrap32(n : Int) : Int =\n  let half = 2147483648 in    (* 0x80000000 *)\n  let full = 4294967296 in    (* 0x100000000 *)\n  optFloorMod(n + half, full) - half\n\n\n(* ══ Constant classifiers (opt.py _is_int_const / _is_bool_const) ═══════════ *)\n\nfn optIsIntConst(v : Operand) : Bool =\n  match v with | OConst(CInt(_)) => true | _ => false end\n\nfn optIsBoolConst(v : Operand) : Bool =\n  match v with | OConst(CBool(_)) => true | _ => false end\n\nfn optIntVal(v : Operand) : Int =\n  match v with\n  | OConst(CInt(s)) => match string_to_int(s) with | Ok(n) => n | Err(_) => 0 end\n  | _               => 0\n  end\n\nfn optBoolVal(v : Operand) : Bool =\n  match v with | OConst(CBool(b)) => b | _ => false end\n\n\n(* ══ Pass: const_fold  (opt.py const_fold / _fold_instr / _fold_binop) ══════ *)\n\nfn optFoldBinop(op : String, l : Operand, r : Operand) : Maybe(ConstVal) =\n  if optIsIntConst(l) and optIsIntConst(r) then\n    let a = optIntVal(l) in\n    let b = optIntVal(r) in\n    if optStrEq(op, \"+\") then Just(CInt(int_to_string(optWrap32(a + b))))\n    else if optStrEq(op, \"-\") then Just(CInt(int_to_string(optWrap32(a - b))))\n    else if optStrEq(op, \"*\") then Just(CInt(int_to_string(optWrap32(a * b))))\n    else if optStrEq(op, \"==\") then Just(CBool(optWrap32(a) == optWrap32(b)))\n    else if optStrEq(op, \"!=\") then Just(CBool(optWrap32(a) != optWrap32(b)))\n    else if optStrEq(op, \"<\")  then Just(CBool(optWrap32(a) <  optWrap32(b)))\n    else if optStrEq(op, \"<=\") then Just(CBool(optWrap32(a) <= optWrap32(b)))\n    else if optStrEq(op, \">\")  then Just(CBool(optWrap32(a) >  optWrap32(b)))\n    else if optStrEq(op, \">=\") then Just(CBool(optWrap32(a) >= optWrap32(b)))\n    else Nothing                (* \"/\" and \"%\" never folded — ÷0 diverges from CEK *)\n  else if optIsBoolConst(l) and optIsBoolConst(r) then\n    let a = optBoolVal(l) in\n    let b = optBoolVal(r) in\n    if optStrEq(op, \"&&\") then Just(CBool(a and b))\n    else if optStrEq(op, \"||\") then Just(CBool(a or b))\n    else Nothing\n  else Nothing\n\nfn optFoldUnary(op : String, s : Operand) : Maybe(ConstVal) =\n  if optStrEq(op, \"-\") and optIsIntConst(s) then Just(CInt(int_to_string(optWrap32(0 - optIntVal(s)))))\n  else if optStrEq(op, \"not\") and optIsBoolConst(s) then Just(CBool(not optBoolVal(s)))\n  else Nothing\n\nfn optFoldInstr(i : Instr) : Instr =\n  match i with\n  | IBinOp(d, op, l, r) => match optFoldBinop(op, l, r) with\n                           | Just(c) => IAssign(d, OConst(c)) | Nothing => i end\n  | IUnary(d, op, s)    => match optFoldUnary(op, s) with\n                           | Just(c) => IAssign(d, OConst(c)) | Nothing => i end\n  | _                   => i\n  end\n\nfn optFoldBody(b : List(Instr)) : List(Instr) =\n  match b with | Nil => Nil | Cons(i, r) => Cons(optFoldInstr(i), optFoldBody(r)) end\n\nfn optConstFoldFns(fns : List(Function)) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(optWithBody(f, optFoldBody(optFnBody(f))), optConstFoldFns(r))\n  end\n\nfn optConstFold(t : TAC, site : Int) : (TAC, Int) =\n  match t with | TAC(fns, g) => (TAC(optConstFoldFns(fns), g), site) end\n\n\n(* ══ Pass: algebraic_simplify  (opt.py algebraic_simplify) ══════════════════ *)\n\nfn optAlgArith(op : String, l : Operand, r : Operand) : Maybe(Operand) =\n  let zl = optIsIntConst(l) and optIntVal(l) == 0 in\n  let zr = optIsIntConst(r) and optIntVal(r) == 0 in\n  let ol = optIsIntConst(l) and optIntVal(l) == 1 in\n  let orr = optIsIntConst(r) and optIntVal(r) == 1 in\n  if optStrEq(op, \"+\") then (if zr then Just(l) else if zl then Just(r) else Nothing)\n  else if optStrEq(op, \"-\") then (if zr then Just(l) else Nothing)\n  else if optStrEq(op, \"*\") then\n    (if orr then Just(l)\n     else if ol then Just(r)\n     else if zr or zl then Just(OConst(CInt(\"0\")))\n     else Nothing)\n  else Nothing\n\nfn optAlgBool(op : String, l : Operand, r : Operand) : Maybe(Operand) =\n  let tl = optIsBoolConst(l) and optBoolVal(l) in\n  let tr = optIsBoolConst(r) and optBoolVal(r) in\n  let fl = optIsBoolConst(l) and (not optBoolVal(l)) in\n  let fr = optIsBoolConst(r) and (not optBoolVal(r)) in\n  if optStrEq(op, \"&&\") then\n    (if tr then Just(l)\n     else if tl then Just(r)\n     else if fr or fl then Just(OConst(CBool(false)))\n     else Nothing)\n  else if optStrEq(op, \"||\") then\n    (if fr then Just(l)\n     else if fl then Just(r)\n     else if tr or tl then Just(OConst(CBool(true)))\n     else Nothing)\n  else Nothing\n\nfn optAlgBinop(op : String, l : Operand, r : Operand) : Maybe(Operand) =\n  match optAlgArith(op, l, r) with\n  | Just(v) => Just(v)\n  | Nothing => optAlgBool(op, l, r)\n  end\n\nfn optAlgInstr(i : Instr) : Instr =\n  match i with\n  | IBinOp(d, op, l, r) => match optAlgBinop(op, l, r) with\n                           | Just(v) => IAssign(d, v) | Nothing => i end\n  | _                   => i\n  end\n\nfn optAlgBody(b : List(Instr)) : List(Instr) =\n  match b with | Nil => Nil | Cons(i, r) => Cons(optAlgInstr(i), optAlgBody(r)) end\n\nfn optAlgFns(fns : List(Function)) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(optWithBody(f, optAlgBody(optFnBody(f))), optAlgFns(r))\n  end\n\nfn optAlgebraic(t : TAC, site : Int) : (TAC, Int) =\n  match t with | TAC(fns, g) => (TAC(optAlgFns(fns), g), site) end\n\n\n(* ══ Pass: copy_prop  (opt.py copy_prop / _map_uses / _def_name) ════════════ *)\n(* Block-local Tmp→Tmp copy propagation.  The per-block `copies` map is reset at\n   each block leader — detected inline (before a label, and after a terminator)\n   instead of building the CFG (opt.py uses _blocks == build_cfg, but only for the\n   block boundaries; concatenating the blocks' instrs equals fn.body). *)\n\nfn optCpVal(v : Operand, copies : List((String, Tmp))) : Operand =\n  match v with\n  | OTmp(t)   => match optAssocTmp(copies, optTmpName(t)) with\n                 | Just(s) => OTmp(s) | Nothing => v end\n  | OConst(_) => v\n  end\n\nfn optCpOps(xs : List(Operand), copies : List((String, Tmp))) : List(Operand) =\n  match xs with\n  | Nil        => Nil\n  | Cons(v, r) => Cons(optCpVal(v, copies), optCpOps(r, copies))\n  end\n\n(* _map_uses with the copy substitution (uses only; defs/labels/idx untouched). *)\nfn optCpMapUses(i : Instr, copies : List((String, Tmp))) : Instr =\n  match i with\n  | IAssign(d, ituted) instruction. *)\nfn optCpUpdate(copies : List((String, Tmp)), i : Instr) : List((String, Tmp)) =\n  let c1 = match optDefName(i) with | Just(d) => optCpKill(copies, d) | Nothing => copies end in\n  match i with\n  | IAssign(d, OTmp(s)) => Cons((optTmpName(d), s), c1)\n  | _                   => c1\n  end\n\nfn optCpBody(instrs : List(Instr), copies : List((String, Tmp))) : List(Instr) =\n  match instrs with\n  | Nil        => Nil\n  | Cons(i, r) =>\n      let copies0 = if optIsLabel(i) then Nil else copies in\n      let i2      = optCpMapUses(i, copies0) in\n      let copies1 = optCpUpdate(copies0, i2) in\n      let copiesN = if optIsTerm(i2) then Nil else copies1 in\n      Cons(i2, optCpBody(r, copiesN))\n  end\n\nfn optCpFns(fns : List(Function)) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(optWithBody(f, optCpBody(optFnBody(f), Nil)), optCpFns(r))\n  end\n\nfn optCopyProp(t : TAC, site : Int) : (TAC, Int) =\n  match t with | TAC(fns, g) => (TAC(optCpFns(fns), g), site) end\n\n\n(* ══ Pass: cse  (opt.py cse / _cse_key / _vkey) ═════════════════════════════ *)\n(* Block-local common-subexpression elimination over pure non-allocating instrs\n   (IBinOp / IUnary / IGetTag / IGetField), keyed by opcode + operands. *)\n\nfn optVKey(v : Operand) : String =\n  match v with\n  | OTmp(t)   => \"t:\" + optTmpName(t)\n  | OConst(c) => match c with\n                 | CInt(s)   => \"c:int:\" + s\n                 | CFloat(s) => \"c:float:\" + s\n                 | CStr(s)   => \"c:str:\" + s\n                 | CBool(b)  => if b then \"c:bool:1\" else \"c:bool:0\"\n                 | CUnit     => \"c:unit:\"\n                 end\n  end\n\n(* Some(key) for the four pure non-allocating shapes, else Nothing. *)\nfn optCseKey(i : Instr) : Maybe(String) =\n  match i with\n  | IBinOp(_, op, l, r)  => Just(\"b|\" + op + \"|\" + optVKey(l) + \"|\" + optVKey(r))\n  | IUnary(_, op, s)     => Just(\"u|\" + op + \"|\" + optVKey(s))\n  | IGetTag(_, s)        => Just(\"g|\" + optVKey(s))\n  | IGetField(_, s, idx) => Just(\"f|\" + optVKey(s) + \"|\" + int_to_string(idx))\n  | _                    => Nothing\n  end\n\nfn optCseDst(i : Instr) : Tmp =\n  match i with\n  | IBinOp(d, _, _, _) => d\n  | IUnary(d, _, _)    => d\n  | IGetTag(d, _)      => d\n  | IGetField(d, _, _) => d\n  | _                  => Tmp(\"\")\n  end\n\n(* avail table: key → (canonical Tmp, its use-set). *)\nfn optCseLookup(avail : List((String, (Tmp, List(String)))), k : String) : Maybe(Tmp) =\n  match avail with\n  | Nil                  => Nothing\n  | Cons((n, (tm, _)), r) => if optStrEq(n, k) then Just(tm) else optCseLookup(r, k)\n  end\n\n(* Kill entries whose canonical Tmp is `d`, or whose use-set contains `d`.\n   Structure-preserving (see optCpKill): rebuild the spine only on a real\n   match, else return the input untouched — O(1) for a fresh def. *)\nfn optCseAnyKill(avail : List((String, (Tmp, List(String)))), d : String) : Bool =\n  match avail with\n  | Nil                    => false\n  | Cons((k, (tm, us)), r) =>\n      if optStrEq(optTmpName(tm), d) then true\n      else if optMember(d, us) then true\n      else optCseAnyKill(r, d)\n  end\n\nfn optCseKillDo(avail : List((String, (Tmp, List(String)))), d : String)\n   : List((String, (Tmp, List(String)))) =\n  match avail with\n  | Nil                    => Nil\n  | Cons((k, (tm, us)), r) =>\n      if optStrEq(optTmpName(tm), d) then optCseKillDo(r, d)\n      else if optMember(d, us) then optCseKillDo(r, d)\n      else Cons((k, (tm, us)), optCseKillDo(r, d))\n  end\n\nfn optCseKill(avail : List((String, (Tmp, List(String)))), d : String)\n   : List((String, (Tmp, List(String)))) =\n  if optCseAnyKill(avail, d) then optCseKillDo(avail, d) else avail\n\nfn optCseStep(i : Instr, avail : List((String, (Tmp, List(String)))))\n   : (Instr, List((String, (Tmp, List(String))))) =\n  let k0 = optCseKey(i) in\n  (* Replace with a copy if the expression is already available. *)\  match xs with\n  | Nil        => Nothing\n  | Cons(x, r) => match r with | Nil => Just(x) | _ => optLastInstr(r) end\n  end\n\n(* Block label for a block whose first instr is `first`, at ordinal `idx`. *)\nfn optCfgLabelFor(first : Instr, idx : Int) : String =\n  match first with\n  | ILabel(nm) => nm\n  | _          => if idx == 0 then \"__entry__\" else \"__block_\" + int_to_string(idx) + \"__\"\n  end\n\n(* Close the currently-open block (first, reversed-instrs) at ordinal idx. *)\nfn optCfgClose(first : Instr, revI : List(Instr), idx : Int, doneRev : List(OptBlock))\n   : List(OptBlock) =\n  Cons(OptBlock(optCfgLabelFor(first, idx), optRevInstr(revI), Nil, Nil), doneRev)\n\n(* Forward scan producing blocks in order.  `open` carries (firstInstr, revInstrs)\n   of the block being built; `idx` is that block's ordinal.  Mirrors the leader\n   rules: index 0, every ILabel, and the instr after any terminator. *)\nfn optCfgScan(instrs : List(Instr), open : Maybe((Instr, List(Instr))),\n              idx : Int, doneRev : List(OptBlock)) : List(OptBlock) =\n  match instrs with\n  | Nil =>\n      (match open with\n       | Just((f0, revI)) => optRevBlocks(optCfgClose(f0, revI, idx, doneRev))\n       | Nothing          => optRevBlocks(doneRev)\n       end)\n  | Cons(i, rest) =>\n      (match open with\n       | Nothing =>\n           (* start a fresh block with i as first instr *)\n           let openN = Just((i, Cons(i, Nil))) in\n           if optIsTerm(i) then optCfgScan(rest, Nothing, idx + 1, optCfgClose(i, Cons(i, Nil), idx, doneRev))\n           else optCfgScan(rest, openN, idx, doneRev)\n       | Just((f0, revI)) =>\n           if optIsLabel(i) then\n             (* a label starts a new block: close current, open new at i *)\n             let doneRev1 = optCfgClose(f0, revI, idx, doneRev) in\n             optCfgScan(rest, Just((i, Cons(i, Nil))), idx + 1, doneRev1)\n           else\n             let revI1 = Cons(i, revI) in\n             if optIsTerm(i) then optCfgScan(rest, Nothing, idx + 1, optCfgClose(f0, revI1, idx, doneRev))\n             else optCfgScan(rest, Just((f0, revI1)), idx, doneRev)\n       end)\n  end\n\nfn optRevBlocksGo(xs : List(OptBlock), acc : List(OptBlock)) : List(OptBlock) =\n  match xs with | Nil => acc | Cons(x, r) => optRevBlocksGo(r, Cons(x, acc)) end\nfn optRevBlocks(xs : List(OptBlock)) : List(OptBlock) = optRevBlocksGo(xs, Nil)\n\n(* Wire successor edges (needs the next block's label for fall-through). *)\nfn optCfgSetSuccs(b : OptBlock, nextLbl : Maybe(String)) : OptBlock =\n  match b with\n  | OptBlock(l, instrs, _, _) =>\n      let succs = match optLastInstr(instrs) with\n                  | Just(IJump(t))            => Cons(t, Nil)\n                  | Just(ICondJump(_, t, f))  => Cons(t, Cons(f, Nil))\n                  | Just(IReturn(_))          => Nil\n                  | _                         => match nextLbl with | Just(nl) => Cons(nl, Nil) | Nothing => Nil end\n                  end in\n      OptBlock(l, instrs, succs, Nil)\n  end\n\nfn optCfgSuccs(blocks : List(OptBlock)) : List(OptBlock) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) =>\n      let nextLbl = match r with | Cons(nb, _) => Just(optBlkLabel(nb)) | Nil => Nothing end in\n      Cons(optCfgSetSuccs(b, nextLbl), optCfgSuccs(r))\n  end\n\n(* Predecessor edges: labels of blocks whose succs include `lbl`. *)\nfn optPredsFor(lbl : String, all : List(OptBlock)) : List(String) =\n  match all with\n  | Nil        => Nil\n  | Cons(b, r) => if optMember(lbl, optBlkSuccs(b)) then Cons(optBlkLabel(b), optPredsFor(lbl, r))\n                  else optPredsFor(lbl, r)\n  end\n\nfn optCfgPreds(blocks : List(OptBlock), all : List(OptBlock)) : List(OptBlock) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) => match b with\n                  | OptBlock(l, instrs, succs, _) =>\n                      Cons(OptBlock(l, instrs, succs, optPredsFor(l, all)), optCfgPreds(r, all))\n                  end\n  end\n\nfn optBuildCfg(f : Function) : List(OptBlock) =\n  match optFnBody(f) with\n  | Nil => Cons(OptBlock(\"__entry__\", Nil, Nil, Nil), Nil)\n  | _   => let wired = optCfgSuccs(optCfgScan(optFnBody(f), Nothing, 0, Nil)) in\n           optCfgPreds(wired, wired)\n  end\n\n\n(* ══ Liveness (port of liveness.py analyse — backward dataflow) ═════════════ *)\n(* Round-robin to a fixpoint (monotone ⇒ same least fixpoint as the worklist).\n   Represent live_in / live_out as assoc label → name-set. *)\n\n(* gen/kill for one block: gen = upward-exposed uses, kill = defined names. *)\n(* Name-sets are StrSet (balanced tree) — see the note above.  gen/kill and\n   live_in / live_out carry StrSet; the label→set maps stay assoc lists (block\n   count is small; the quadratic was in the name-sets, not the label lookup). *)\nfn optBlkGenKillGo(instrs : List(Instr), gen : StrSet, kill : StrSet)\n   : (StrSet, StrSet) =\n  match instrs with\n  | Nil        => (gen, kill)\n  | Cons(i, r) =>\n      let gen1  = ssUnion(gen, ssDiff(ssFromList(optUses(i), SsLeaf), kill)) in\n      let kill1 = ssUnion(kill, ssFromList(optDefs(i), SsLeaf)) in\n      optBlkGenKillGo(r, gen1, kill1)\n  end\n\nfn optBlkGenKill(b : OptBlock) : (StrSet, StrSet) =\n  optBlkGenKillGo(optBlkInstrs(b), SsLeaf, SsLeaf)\n\n(* Precompute (label → (gen,kill)). *)\nfn optGenKillMap(blocks : List(OptBlock)) : List((String, (StrSet, StrSet))) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) => Cons((optBlkLabel(b), optBlkGenKill(b)), optGenKillMap(r))\n  end\n\n(* liveness's own label→StrSet lookup (licm keeps its own List(String)-valued\n   lookup inline in optDomOf). *)\nfn optLiveGet(m : List((String, StrSet)), lbl : String) : StrSet =\n  match m with\n  | Nil             => SsLeaf\n  | Cons((k, v), r) => if optStrEq(k, lbl) then v else optLiveGet(r, lbl)\n  end\n\nfn optGkOf(m : List((String, (StrSet, StrSet))), lbl : String)\n   : (StrSet, StrSet) =\n  match m with\n  | Nil             => (SsLeaf, SsLeaf)\n  | Cons((k, v), r) => if optStrEq(k, lbl) then v else optGkOf(r, lbl)\n  end\n\n(* Union of live_in over a block's successors. *)\nfn optUnionSuccIn(succs : List(String), liveIn : List((String, StrSet))) : StrSet =\n  match succs with\n  | Nil        => SsLeaf\n  | Cons(s, r) => ssUnion(optLiveGet(liveIn, s), optUnionSuccIn(r, liveIn))\n  end\n\n(* One Jacobi sweep: recompute live_in for every block from the previous live_in. *)\nfn optLiveSweep(blocks : List(OptBlock),\n                gk : List((String, (StrSet, StrSet))),\n                liveIn : List((String, StrSet))) : List((String, StrSet)) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) =>\n      let lo = optUnionSuccIn(optBlkSuccs(b), liveIn) in\n      match optGkOf(gk, optBlkLabel(b)) with\n      | (gen, kill) =>\n          let li = ssUnion(gen, ssDiff(lo, kill)) in\n          Cons((optBlkLabel(b), li), optLiveSweep(r, gk, liveIn))\n      end\n  end\n\nfn optLiveInEq(a : List((String, StrSet)), b : List((String, StrSet))) : Bool =\n  match a with\n  | Nil             => true\n  | Cons((k, v), r) => ssEq(v, optLiveGet(b, k)) and optLiveInEq(r, b)\n  end\n\nfn optLiveFix(blocks : List(OptBlock),\n              gk : List((String, (StrSet, StrSet))),\n              liveIn : List((String, StrSet)), fuel : Int) : List((String, StrSet)) =\n  if fuel <= 0 then liveIn\n  else\n    let next = optLiveSweep(blocks, gk, liveIn) in\n    if optLiveInEq(next, liveIn) then next\n    else optLiveFix(blocks, gk, next, fuel - 1)\n\n(* live_out map from the fixpoint live_in map. *)\nfn optLiveOutMap(blocks : List(OptBlock), liveIn : List((String, StrSet)))\n   : List((String, StrSet)) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) => Cons((optBlkLabel(b), optUnionSuccIn(optBlkSuccs(b), liveIn)), optLiveOutMap(r, liveIn))\n  end\n\n(* analyse: returns label → live_out. *)\nfn optLiveness(blocks : List(OptBlock)) : List((String, StrSet)) =\n  let gk = optGenKillMap(blocks) in\n  let fixIn = optLiveFix(blocks, gk, Nil, 10000) in\n  optLiveOutMap(blocks, fixIn)\n\n\n(* ══ Pass: dce  (opt.py dce — global liveness, iterated to a fixpoint) ══════ *)\n\n(* Process one block's instrs backward: returns (kept-instrs-in-order,\n   live-into-block, changed).  `liveOut` is the block's live-out set. *)\nfn optDceBlock(instrs : List(Instr), liveOut : StrSet, globals : List(String))\n   : (List(Instr), StrSet, Bool) =\n  match instrs with\n  | Nil        => (Nil, liveOut, false)\n  | Cons(i, r) =>\n      match optDceBlock(r, liveOut, globals) with\n      | (keptRest, liveAfter, chRest) =>\n          let drop = match optPureDefName(i) with\n                     | Just(n) => (not ssMember(n, liveAfter)) and (not optMember(n, globals))\n                     | Nothing => false\n                     end in\n          if drop then (keptRest, liveAfter, true)\n          else\n            let liveBefore = ssUnion(ssDiff(liveAfter, ssFromList(optDefs(i), SsLeaf)), ssFromList(optUses(i), SsLeaf)) in\n            (Cons(i, keptRest), liveBefore, chRest)\n      end\n  end\n\n(* One dce pass over all blocks: concat kept instrs, track any change. *)\nfn optDceBlocks(blocks : List(OptBlock), liveOut : List((String, StrSet)),\n                globals : List(String)) : (List(Instr), Bool) =\n  match blocks with\n  | Nil        => (Nil, false)\n  | Cons(b, r) =>\n      match optDceBlock(optBlkInstrs(b), optLiveGet(liveOut, optBlkLabel(b)), globals) with\n      | (kept, _, ch) =>\n          match optDceBlocks(r, liveOut, globals) with\n          | (restKept, chRest) => (optAppendInstr(kept, restKept), ch or chRest)\n          end\n      end\n  end\n\n(* Iterate build_cfg + liveness + one dce pass on ONE function to a fixpoint. *)\nfn optDceFn(f : Function, globals : List(String), fuel : Int) : Function =\n  if fuel <= 0 then f\n  else\n    let blocks  = optBuildCfg(f) in\n    let liveOut = optLiveness(blocks) in\n    match optDceBlocks(blocks, liveOut, globals) with\n    | (newBody, changed) =>\n        let f2 = optWithBody(f, newBody) in\n        if changed then optDceFn(f2, globals, fuel - 1) else f2\n    end\n\nfn optDceFns(fns : List(Function), globals : List(String)) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(optDceFn(f, globals, 10000), optDceFns(r, globals))\n  end\n\nfn optDce(t : TAC, site : Int) : (TAC, Int) =\n  match t with | TAC(fns, g) => (TAC(optDceFns(fns, g), g), site) end\n\n\n(* ══ Pass: devirt  (opt.py devirt / _extract_dispatch) ═════════════════════ *)\n\n(* Substring test: does `s` contain a '$' (36)?  (stub names carry `m$Type`.) *)\nfn optHasDollarGo(s : String, i : Int, n : Int) : Bool =\n  if i >= n then false\n  else if string_index(s, i) == 36 then true\n  else optHasDollarGo(s, i + 1, n)\nfn optHasDollar(s : String) : Bool = optHasDollarGo(s, 0, string_length(s))\n\n(* The dst-name of the first IGetTag on Tmp `p`, or Nothing. *)\nfn optFindTagTmp(body : List(Instr), p : String) : Maybe(String) =\n  match body with\n  | Nil        => Nothing\n  | Cons(i, r) => match i with\n                  | IGetTag(d, OTmp(s)) => if optStrEq(optTmpName(s), p) then Just(optTmpName(d))\n                                           else optFindTagTmp(r, p)\n                  | _                   => optFindTagTmp(r, p)\n                  end\n  end\n\n(* One (tagValue, trueLabel) if (i0,i1) is a `tag == \"Con\"` / ICondJump pair. *)\nfn optTagArm(i0 : Instr, i1 : Instr, tagTmp : String) : Maybe((String, String)) =\n  match i0 with\n  | IBinOp(d0, op, OTmp(lt), OConst(CStr(tagv))) =>\n      if optStrEq(op, \"==\") and optStrEq(optTmpName(lt), tagTmp) then\n        (match i1 with\n         | ICondJump(OTmp(ct), tl, _) => if optStrEq(optTmpName(ct), optTmpName(d0)) then Just((tagv, tl)) else Nothing\n         | _                          => Nothing\n         end)\n      else Nothing\n  | _ => Nothing\n  end\n\nfn optTagArms(body : List(Instr), tagTmp : String) : List((String, String)) =\n  match body with\n  | Cons(i0, Cons(i1, rest)) =>\n      let here = optTagArm(i0, i1, tagTmp) in\n      let more = optTagArms(Cons(i1, rest), tagTmp) in\n      (match here with | Just(pr) => Cons(pr, more) | Nothing => more end)\n  | _ => Nil\n  end\n\n(* Following the instrs after a label (skipping further labels), is the first real\n   instr `m$Type(p)` for the given stub name?  Returns Just(target fn). *)\nfn optFirstArmCall(after : List(Instr), fnName : String, p : String) : Maybe(String) =\n  match after with\n  | Nil        => Nothing\n  | Cons(c, r) => match c with\n                  | ILabel(_) => optFirstArmCall(r, fnName, p)\n                  | ICall(_, cf, args) =>\n                      if optStartsWith(cf, fnName + \"$\") and optLenOperand(args) == 1 then\n                        (match args with\n                         | Cons(OTmp(a0), Nil) => if optStrEq(optTmpName(a0), p) then Just(cf) else Nothing\n                         | _                   => Nothing\n                         end)\n                      else Nothing\n                  | _ => Nothing\n                  end\n  end\n\nfn optArmTargets(body : List(Instr), fnName : String, p : String) : List((String, String)) =\n  match body with\n  | Nil        => Nil\n  | Cons(i, r) =>\n      let here = match i with\n                 | ILabel(nm) => match optFirstArmCall(r, fnName, p) with\n                                 | Just(t) => Just((nm, t)) | Nothing => Nothing end\n                 | _          => Nothing\n                 end in\n      let more = optArmTargets(r, fnName, p) in\n      (match here with | Just(pr) => Cons(pr, more) | Nothing => more end)\n  end\n\n(* Combine: tag → target, keeping only tags whose arm has a known target. *)\nfn optDispatchMap(tagArms : List((String, String)), armTargets : List((String, String)))\n   : List((String, String)) =\n  match tagArms with\n  | Nil             => Nil\n  | Cons((tg, arm), r) =>\n      match optAssocStr(armTargets, arm) with\n      | Just(t) => Cons((tg, t), optDispatchMap(r, armTargets))\n      | Nothing => optDispatchMap(r, armTargets)\n      end\n  end\n\n(* opt.py _extract_dispatch: Nothing unless `fn` is a trait-dispatch stub. *)\nfn optExtractDispatch(f : Function) : Maybe(List((String, String))) =\n  if optHasDollar(optFnName(f)) then Nothing\n  else match optFnParams(f) with\n       | Nil          => Nothing\n       | Cons(p, _)   =>\n           match optFindTagTmp(optFnBody(f), p) with\n           | Nothing       => Nothing\n           | Just(tagTmp)  =>\n               let mp = optDispatchMap(optTagArms(optFnBody(f), tagTmp),\n                                       optArmTargets(optFnBody(f), optFnName(f), p)) in\n               match mp with | Nil => Nothing | _ => Just(mp) end\n           end\n       end\n\n(* stubs: fn-name → (tag → target). *)\nfn optCollectStubs(fns : List(Function)) : List((String, List((String, String)))) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => match optExtractDispatch(f) with\n                  | Just(mp) => Cons((optFnName(f), mp), optCollectStubs(r))\n                  | Nothing  => optCollectStubs(r)\n                  end\n  end\n\nfn optAssocStubs(xs : List((String, List((String, String)))), k : String)\n   : Maybe(List((String, String))) =\n  match xs with\n  | Nil             => Nothing\n  | Cons((n, v), r) => if optStrEq(n, k) then Just(v) else optAssocStubs(r, k)\n  end\n\n(* Rewrite one call if its argument's constructor tag is statically known. *)\nfn optDevirtCall(i : Instr, allocTag : List((String, String)),\n                 stubs : List((String, List((String, String))))) : Instr =\n  match i with\n  | ICall(dst, cf, args) =>\n      (match optAssocStubs(stubs, cf) with\n       | Nothing => i\n       | Just(mp) =>\n           (match args with\n            | Cons(OTmp(a0), Nil) =>\n                (match optAssocStr(allocTag, optTmpName(a0)) with\n                 | Just(tg) => match optAssocStr(mp, tg) with\n                               | Just(target) => ICall(dst, target, args) | Nothing => i end\n                 | Nothing  => i\n                 end)\n            | _ => i\n            end)\n       end)\n  | _ => i\n  end\n\n(* Assoc set/remove for the block-local tag map. *)\nfn optTagPut(m : List((String, String)), k : String, v : String) : List((String, String)) =\n  Cons((k, v), optTagDrop(m, k))\nfn optTagDrop(m : List((String, String)), k : String) : List((String, String)) =\n  match m with\n  | Nil             => Nil\n  | Cons((n, v), r) => if optStrEq(n, k) then optTagDrop(r, k) else Cons((n, v), optTagDrop(r, k))\n  end\n\n(* Update tag tracking AFTER the rewrite (a def kills the old fact). *)\nfn optDevirtTrack(i : Instr, allocTag : List((String, String))) : List((String, String)) =\n  match i with\n  | IAlloc(d, tag, _)   => optTagPut(allocTag, optTmpName(d), tag)\n  | IAssign(d, OTmp(s)) =>\n      let dropped = optTagDrop(allocTag, optTmpName(d)) in\n      (match optAssocStr(allocTag, optTmpName(s)) with\n       | Just(srcTag) => optTagPut(dropped, optTmpName(d), srcTag)\n       | Nothing      => dropped\n       end)\n  | _ => match optDefs(i) with\n         | Cons(d, _) => optTagDrop(allocTag, d)\n         | Nil        => allocTag\n         end\n  end\n\nfn optDevirtBody(instrs : List(Instr), allocTag : List((String, String)),\n                 stubs : List((String, List((String, String))))) : List(Instr) =\n  match instrs with\n  | Nil        => Nil\n  | Cons(i, r) =>\n      (* entering a new block on a label: forget everything *)\n      let at0 = if optIsLabel(i) then Nil else allocTag in\n      let i2  = optDevirtCall(i, at0, stubs) in\n      let at1 = optDevirtTrack(i2, at0) in\n      (* leaving the block along an edge: forget everything *)\n      let atN = if optIsTerm(i2) then Nil else at1 in\n      Cons(i2, optDevirtBody(r, atN, stubs))\n  end\n\nfn optDevirtFns(fns : List(Function), stubs : List((String, List((String, String))))) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(optWithBody(f, optDevirtBody(optFnBody(f), Nil, stubs)), optDevirtFns(r, stubs))\n  end\n\nfn optDevirt(t : TAC, site : Int) : (TAC, Int) =\n  match t with\n  | TAC(fns, g) =>\n      let stubs = optCollectStubs(fns) in\n      match stubs with\n      | Nil => (t, site)\n      | _   => (TAC(optDevirtFns(fns, stubs), g), site)\n      end\n  end\n\n\n(* ══ Renaming for inline / closure_elim  (pure fn of site + prefix) ═════════ *)\n(* opt.py's mv/md/mlab memoise via dicts, but the mapping is deterministic:\n   a callee temp `x` (not a param, not a global) → `_{pfx}{site}_{x}`, a label\n   `l` → `.{pfx}{site}_{stripDots(l)}`.  psub maps params → argument operands. *)\n\nfn optRenVal(v : Operand, psub : List((String, Operand)), globals : List(String),\n             pfx : String, site : Int) : Operand =\n  match v with\n  | OConst(_) => v\n  | OTmp(t)   =>\n      let n = optTmpName(t) in\n      (match optAssocOp(psub, n) with\n       | Just(rep) => rep\n       | Nothing   => if optMember(n, globals) then v\n                      else OTmp(Tmp(\"_\" + pfx + int_to_string(site) + \"_\" + n))\n       end)\n  end\n\nfn optRenDst(d : Tmp, globals : List(String), pfx : String, site : Int) : Tmp =\n  let n = optTmpName(d) in\n  if optMember(n, globals) then d else Tmp(\"_\" + pfx + int_to_string(site) + \"_\" + n)\n\nfn optRenLab(l : String, pfx : String, site : Int) : String =\n  \".\" + pfx + int_to_string(site) + \"_\" + optStripDots(l)\n\nfn optRenOps(xs : List(Operand), psub : List((String, Operand)), globals : List(String),\n             pfx : String, site : Int) : List(Operand) =\n  match xs with\n  | Nil        => Nil\n  | Cons(v, r) => Cons(optRenVal(v, psub, globals, pfx, site), optRenOps(r, psub, globals, pfx, site))\n  end\n\nfn optRenMaybeDst(md : Maybe(Tmp), globals : List(String), pfx : String, site : Int) : Maybe(Tmp) =\n  match md with | Just(d) => Just(optRenDst(d, globals, pfx, site)) | Nothing => Nothing end\n\n(* opt.py _rewrite_inlined: rename uses/defs/labels; leave fn names + IReturn. *)\nfn optRewriteInlined(i : Instr, psub : List((String, Operand)), globals : List(String),\n                     pfx : String, site : Int) : Instr =\n  match i with\n  | IAssign(d, s)          => IAssign(optRenDst(d, globals, pfx, site), optRenVal(s, psub, globals, pfx, site))\n  | IBinOp(d, op, l, r)    => IBinOp(optRenDst(d, globals, pfx, site), op,\n                                     optRenVal(l, psub, globals, pfx, site), optRenVal(r, psub, globals, pfx, site))\n  | IUnary(d, op, s)       => IUnary(optRenDst(d, globals, pfx, site), op, optRenVal(s, psub, globals, pfx, site))\n  | ICall(md, fnm, args)   => ICall(optRenMaybeDst(md, globals, pfx, site), fnm, optRenOps(args, psub, globals, pfx, site))\n  | IClosureCall(d, fv, a) => IClosureCall(optRenDst(d, globals, pfx, site),\n                                           optRenVal(fv, psub, globals, pfx, site), optRenVal(a, psub, globals, pfx, site))\n  | ILabel(n)              => ILabel(optRenLab(n, pfx, site))\n  | IJump(l)               => IJump(optRenLab(l, pfx, site))\n  | ICondJump(c, t, f)     => ICondJump(optRenVal(c, psub, globals, pfx, site), optRenLab(t, pfx, site), optRenLab(f, pfx, site))\n  | IAlloc(d, tag, fs)     => IAlloc(optRenDst(d, globals, pfx, site), tag, optRenOps(fs, psub, globals, pfx, site))\n  | IGetTag(d, s)          => IGetTag(optRenDst(d, globals, pfx, site), optRenVal(s, psub, globals, pfx, site))\n  | IGetField(d, s, idx)   => IGetField(optRenDst(d, globals, pfx, site), optRenVal(s, psub, globals, pfx, site), idx)\n  | IAllocClosure(d, fnm, cs) => IAllocClosure(optRenDst(d, globals, pfx, site), fnm, optRenOps(cs, psub, globals, pfx, site))\n  | _                      => i          (* IReturn — handled by the caller loop *)\n  end\n\n(* zip params with argument operands. *)\nfn optZip(ks : List(String), vs : List(Operand)) : List((String, Operand)) =\n  match ks with\n  | Nil        => Nil\n  | Cons(k, kr) => match vs with\n                   | Cons(v, vr) => Cons((k, v), optZip(kr, vr))\n                   | Nil         => Nil\n                   end\n  end\n\n\n(* ══ Pass: inline  (opt.py inline / _inline_call / _prune_unreachable) ══════ *)\n\nlet optInlineMax : Int = 12\n\n(* eligible: small, non-recursive user fn whose body never redefines a param. *)\nfn optDefsHitParams(body : List(Instr), pset : List(String)) : Bool =\n  match body with\n  | Nil        => false\n  | Cons(i, r) =>\n      let selfRec = match i with | ICall(_, cf, _) => false | _ => false end in\n      let hit = optDefsAny(optDefs(i), pset) in\n      if hit then true else optDefsHitParams(r, pset)\n  end\n\nfn optDefsAny(ds : List(String), pset : List(String)) : Bool =\n  match ds with\n  | Nil        => false\n  | Cons(d, r) => if optMember(d, pset) then true else optDefsAny(r, pset)\n  end\n\nfn optBodyHasSelfCall(body : List(Instr), nm : String) : Bool =\n  match body with\n  | Nil        => false\n  | Cons(i, r) => match i with\n                  | ICall(_, cf, _) => if optStrEq(cf, nm) then true else optBodyHasSelfCall(r, nm)\n                  | _               => optBodyHasSelfCall(r, nm)\n                  end\n  end\n\nfn optInlineEligible(name : String, fns : List(Function)) : Bool =\n  if optStrEq(name, \"main\") or optStrEq(name, \"__global_init__\") then false\n  else match optFnLookup(fns, name) with\n       | Nothing => false\n       | Just(f) =>\n           if optLenInstr(optFnBody(f)) > optInlineMax then false\n           else if optBodyHasSelfCall(optFnBody(f), name) then false\n           else if optDefsHitParams(optFnBody(f), optFnParams(f)) then false\n           else true\n       end\n\n(* Expand one eligible static call (opt.py _inline_call). *)\nfn optInlineCall(callee : Function, dst : Maybe(Tmp), args : List(Operand),\n                 globals : List(String), site : Int) : List(Instr) =\n  let psub = optZip(optFnParams(callee), args) in\n  let retLabel = \".\" + \"i\" + int_to_string(site) + \"_ret\" in\n  optAppendInstr(optInlineCallBody(optFnBody(callee), dst, psub, globals, site, retLabel),\n                 Cons(ILabel(retLabel), Nil))\n\nfn optInlineCallBody(body : List(Instr), dst : Maybe(Tmp), psub : List((String, Operand)),\n                     globals : List(String), site : Int, retLabel : String) : List(Instr) =\n  match body with\n  | Nil        => Nil\n  | Cons(i, r) =>\n      let out = match i with\n                | IReturn(mv) =>\n                    (match dst with\n                     | Just(dd) => match mv with\n                                   | Just(v) => Cons(IAssign(dd, optRenVal(v, psub, globals, \"i\", site)), Cons(IJump(retLabel), Nil))\n                                   | Nothing => Cons(IJump(retLabel), Nil)\n                                   end\n                     | Nothing  => Cons(IJump(retLabel), Nil)\n                     end)\n                | _ => Cons(optRewriteInlined(i, psub, globals, \"i\", site), Nil)\n                end in\n      optAppendInstr(out, optInlineCallBody(r, dst, psub, globals, site, retLabel))\n  end\n\n(* Walk one function body, expanding eligible calls, threading the site counter. *)\nfn optInlineBody(instrs : List(Instr), fns : List(Function), globals : List(String), site : Int)\n   : (List(Instr), Int) =\n  match instrs with\n  | Nil        => (Nil, site)\n  | Cons(i, r) =>\n      match i with\n      | ICall(Just(dst), cf, args) =>\n          if optInlineEligible(cf, fns) and\n             (match optFnLookup(fns, cf) with | Just(f) => optLenOperand(args) == optLenStr(optFnParams(f)) | Nothing => false end)\n          then\n            (match optFnLookup(fns, cf) with\n             | Just(callee) =>\n                 let expanded = optInlineCall(callee, Just(dst), args, globals, site) in\n                 match optInlineBody(r, fns, globals, site + 1) with\n                 | (rest, site2) => (optAppendInstr(expanded, rest), site2)\n                 end\n             | Nothing => match optInlineBody(r, fns, globals, site) with\n                          | (rest, site2) => (Cons(i, rest), site2) end\n             end)\n          else match optInlineBody(r, fns, globals, site) with\n               | (rest, site2) => (Cons(i, rest), site2) end\n      | _ => match optInlineBody(r, fns, globals, site) with\n             | (rest, site2) => (Cons(i, rest), site2) end\n      end\n  end\n\n(* opt.py's `fnmap` holds LIVE references to the Function objects and mutates\n   `fn.body` in place as the pass proceeds — so a function that GROWS from inlining\n   becomes ineligible (body > INLINE_MAX) for call sites processed LATER in the same\n   pass, and if it is inlined later its GROWN body is what gets spliced.  We\n   reproduce that exactly by threading the fnmap: process functions by index, and\n   after each function's body is rewritten, REPLACE it in the map the remaining\n   functions look up against (both for eligibility length and for the inlined body).\n   17_mutual_rec is the witness: is_even inlines is_odd and grows past 12 instrs,\n   which then blocks is_odd's inline-of-is_even and main's is_even calls, leaving\n   is_odd unreachable (pruned) — a frozen snapshot would inline everything. *)\nfn optNthFn(fns : List(Function), i : Int) : Maybe(Function) =\n  match fns with\n  | Nil        => Nothing\n  | Cons(f, r) => if i == 0 then Just(f) else optNthFn(r, i - 1)\n  end\n\nfn optReplaceFn(fns : List(Function), i : Int, nf : Function) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => if i == 0 then Cons(nf, r) else Cons(f, optReplaceFn(r, i - 1, nf))\n  end\n\nfn optInlineWalk(idx : Int, fnmap : List(Function), globals : List(String), site : Int)\n   : (List(Function), Int) =\n  match optNthFn(fnmap, idx) with\n  | Nothing => (Nil, site)\n  | Just(f) =>\n      match optInlineBody(optFnBody(f), fnmap, globals, site) with\n      | (nb, site1) =>\n          let f2 = optWithBody(f, nb) in\n          let fnmap2 = optReplaceFn(fnmap, idx, f2) in\n          match optInlineWalk(idx + 1, fnmap2, globals, site1) with\n          | (rest, site2) => (Cons(f2, rest), site2)\n          end\n      end\n  end\n\n(* Reachability from {main, __global_init__} — named references only. *)\nfn optCalledNames(i : Instr) : List(String) =\n  match i with\n  | ICall(_, cf, _)          => Cons(cf, Nil)\n  | IAllocClosure(_, fnm, _)  => Cons(fnm, Nil)\n  | _                        => Nil\n  end\n\nfn optCalledInBody(body : List(Instr)) : List(String) =\n  match body with\n  | Nil        => Nil\n  | Cons(i, r) => optAppendStr(optCalledNames(i), optCalledInBody(r))\n  end\n\nfn optReachDfs(stack : List(String), seen : List(String), fns : List(Function)) : List(String) =\n  match stack with\n  | Nil        => seen\n  | Cons(n, r) =>\n      if optMember(n, seen) then optReachDfs(r, seen, fns)\n      else\n        let seen1 = Cons(n, seen) in\n        let callees = match optFnLookup(fns, n) with\n                      | Just(f) => optCalledInBody(optFnBody(f)) | Nothing => Nil end in\n        optReachDfs(optAppendStr(callees, r), seen1, fns)\n  end\n\nfn optFilterReachable(fns : List(Function), seen : List(String)) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => if optMember(optFnName(f), seen) then Cons(f, optFilterReachable(r, seen))\n                  else optFilterReachable(r, seen)\n  end\n\nfn optRootsPresent(fns : List(Function)) : List(String) =\n  let r0 = match optFnLookup(fns, \"main\") with | Just(_) => Cons(\"main\", Nil) | Nothing => Nil end in\n  match optFnLookup(fns, \"__global_init__\") with\n  | Just(_) => optAppendStr(r0, Cons(\"__global_init__\", Nil))\n  | Nothing => r0\n  end\n\nfn optPruneUnreachable(t : TAC) : TAC =\n  match t with\n  | TAC(fns, g) =>\n      match optFnLookup(fns, \"main\") with\n      | Nothing => t                        (* no entry to anchor from *)\n      | Just(_) =>\n          let seen = optReachDfs(optRootsPresent(fns), Nil, fns) in\n          TAC(optFilterReachable(fns, seen), g)\n      end\n  end\n\nfn optInline(t : TAC, site : Int) : (TAC, Int) =\n  match t with\n  | TAC(fns, g) =>\n      match optInlineWalk(0, fns, g, site) with\n      | (fns1, site1) => (optPruneUnreachable(TAC(fns1, g)), site1)\n      end\n  end\n\n\n(* ══ Pass: licm  (opt.py licm — loop-invariant code motion) ═════════════════ *)\n(* lower.py's intra-function CFGs are ACYCLIC (only forward branches), so this\n   pass finds no back-edges and is a no-op on the corpus.  It is ported through\n   back-edge detection (build_cfg + dominators): with no back-edge every function\n   is returned unchanged, matching opt.py.  The hoist itself never fires on the\n   corpus and is intentionally not reconstructed here (a faithful no-op — if a\n   loop-forming construct is ever added, the differential will flag the gap). *)\n\n(* Iterative dominators (opt.py _dominators). dom[entry]={entry};\n   dom[l] = {l} ∪ (⋂ dom[p] for preds p). *)\nfn optAllLabels(blocks : List(OptBlock)) : List(String) =\n  match blocks with | Nil => Nil | Cons(b, r) => Cons(optBlkLabel(b), optAllLabels(r)) end\n\nfn optDomOf(m : List((String, List(String))), lbl : String) : List(String) =\n  match m with\n  | Nil             => Nil\n  | Cons((k, v), r) => if optStrEq(k, lbl) then v else optDomOf(r, lbl)\n  end\n\nfn optIntersect(xs : List(String), ys : List(String)) : List(String) =\n  match xs with\n  | Nil        => Nil\n  | Cons(x, r) => if optMember(x, ys) then Cons(x, optIntersect(r, ys)) else optIntersect(r, ys)\n  end\n\nfn optPredsOf(blocks : List(OptBlock), lbl : String) : List(String) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) => if optStrEq(optBlkLabel(b), lbl) then match b with | OptBlock(_, _, _, pr) => pr end\n                  else optPredsOf(r, lbl)\n  end\n\n(* Intersection of dom over a block's preds (Nil preds ⇒ full set handled by caller). *)\nfn optDomIntersectPreds(preds : List(String), dom : List((String, List(String))), allLbls : List(String)) : List(String) =\n  match preds with\n  | Nil        => allLbls\n  | Cons(p, r) => match r with\n                  | Nil => optDomOf(dom, p)\n                  | _   => optIntersect(optDomOf(dom, p), optDomIntersectPreds(r, dom, allLbls))\n                  end\n  end\n\nfn optDomSweep(blocks : List(OptBlock), entry : String, allLbls : List(String),\n               dom : List((String, List(String)))) : List((String, List(String))) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b, r) =>\n      let l = optBlkLabel(b) in\n      let newDom = if optStrEq(l, entry) then Cons(entry, Nil)\n                   else optInsert(l, optDomIntersectPreds(optPredsOf(blocks, l), dom, allLbls)) in\n      Cons((l, newDom), optDomSweep(r, entry, allLbls, dom))\n  end\n\nfn optDomInit(allLbls : List(String), full : List(String)) : List((String, List(String))) =\n  match allLbls with\n  | Nil        => Nil\n  | Cons(l, r) => Cons((l, full), optDomInit(r, full))\n  end\n\nfn optDomEq(a : List((String, List(String))), b : List((String, List(String)))) : Bool =\n  match a with\n  | Nil             => true\n  | Cons((k, v), r) => optSetEq(v, optDomOf(b, k)) and optDomEq(r, b)\n  end\n\nfn optDomFix(blocks : List(OptBlock), entry : String, allLbls : List(String),\n             dom : List((String, List(String))), fuel : Int) : List((String, List(String))) =\n  if fuel <= 0 then dom\n  else\n    let next = optDomSweep(blocks, entry, allLbls, dom) in\n    if optDomEq(next, dom) then next else optDomFix(blocks, entry, allLbls, next, fuel - 1)\n\nfn optDominators(blocks : List(OptBlock)) : List((String, List(String))) =\n  match blocks with\n  | Nil        => Nil\n  | Cons(b0, _) =>\n      let allLbls = optAllLabels(blocks) in\n      let entry   = optBlkLabel(b0) in\n      let dom0    = optDomSweep(blocks, entry, allLbls, optDomInit(allLbls, allLbls)) in\n      optDomFix(blocks, entry, allLbls, dom0, 10000)\n  end\n\n(* A back-edge is an edge blk→s where s dominates blk. *)\nfn optHasBackEdgeIn(succs : List(String), self : String, dom : List((String, List(String)))) : Bool =\n  match succs with\n  | Nil        => false\n  | Cons(s, r) => if optMember(s, optDomOf(dom, self)) then true else optHasBackEdgeIn(r, self, dom)\n  end\n\nfn optHasBackEdge(blocks : List(OptBlock), dom : List((String, List(String)))) : Bool =\n  match blocks with\n  | Nil        => false\n  | Cons(b, r) => if optHasBackEdgeIn(optBlkSuccs(b), optBlkLabel(b), dom) then true\n                  else optHasBackEdge(r, dom)\n  end\n\n(* opt.py's licm acts only on natural loops (back-edges). Lark's functional\n   lowering compiles recursion to calls, never intra-function back-edges, so\n   every Lark-lowered CFG is a DAG and licm is a global no-op. Computing the\n   dominator relation here (O(B^2) alloc via optDomInit) was therefore dead\n   work that blew the arena on large functions; return f directly. *)\nfn optLicmFn(f : Function) : Function = f\n\nfn optLicmFns(fns : List(Function)) : List(Function) =\n  match fns with\n  | Nil        => Nil\n  | Cons(f, r) => Cons(optLicmFn(f), optLicmFns(r))\n  end\n\nfn optLicm(t : TAC, site : Int) : (TAC, Int) =\n  match t with | TAC(fns, g) => (TAC(optLicmFns(fns), g), site) end\n\n\n(* ══ Pass: closure_elim  (opt.py closure_elim — scalar-replace closures) ════ *)\n\nlet optClosureInlineMax : Int = 24\n\n(* def-count over a body (name → number of defs). *)\nfn optDefCount(body : List(Instr), acc : List((String, Int))) : List((String, Int)) =\n  match body with\n  | Nil        => acc\n  | Cons(i, r) => optDefCount(r, optBumpDefs(optDefs(i), acc))\n  end\n\nfn optBumpDefs(ds : List(String), acc : List((String, Int))) : List((String, Int)) =\n  match ds with\n  | Nil        => acc\n  | Cons(d, r) => optBumpDefs(r, optCountBump(acc, d))\n  end\n\n(* closure_roots: root name → itself for single-def IAllocClosure; alias copies\n   follow single-assignment.  info: root → (lifted fn, captures). *)\nfn optClosureSeed(body : List(Instr), defcount : List((String, Int)),\n                  root : List((String, String)),\n                  info : List((String, (String, List(Operand)))))\n   : (List((String, String)), List((String, (String, List(Operand))))) =\n  match body with\n  | Nil        => (root, info)\n  | Cons(i, r) =>\n      match i with\n      | IAllocClosure(d, fnm, caps) =>\n          if optCountOf(defcount, optTmpName(d)) == 1 then\n            optClosureSeed(r, defcount, Cons((optTmpName(d), optTmpName(d)), root),\n                           Cons((optTmpName(d), (fnm, caps)), info))\n          else optClosureSeed(r, defcount, root, info)\n      | _ => optClosureSeed(r, defcount, root, info)\n      end\n  end\n\n(* One alias-propagation sweep; returns (root, changed). *)\nfn optAliasSweep(body : List(Instr), defcount : List((String, Int)),\n                 root : List((String, String))) : (List((String, String)), Bool) =\n  match body with\n  | Nil        => (root, false)\n  | Cons(i, r) =>\n      match i with\n      | IAssign(d, OTmp(s)) =>\n          let dn = optTmpName(d) in\n          let sn = optTmpName(s) in\n          (match optAssocStr(root, sn) with\n           | Just(rt) =>\n               if (match optAssocStr(root, dn) with | Just(_) => false | Nothing => true end)\n                  and optCountOf(defcount, dn) == 1\n               then match optAliasSweep(r, defcount, Cons((dn, rt), root)) with\n                    | (root2, _) => (root2, true)\n                    end\n               else optAliasSweep(r, defcount, root)\n           | Nothing => optAliasSweep(r, defcount, root)\n           end)\n      | _ => optAliasSweep(r, defcount, root)\n      end\n  end\n\nfn optAliasFix(body : List(Instr), defcount : List((String, Int)),\n               root : List((String, String)), fuel : Int) : List((String, String)) =\n  if fuel <= 0 then root\n  else match optAliasSweep(body, defcount, root) with\n       | (root1, changed) => if changed then optAliasFix(body, defcount, root1, fuel - 1) else root1\n       end\n\nfn optClosureRoots(body : List(Instr), defcount : List((String, Int)))\n   : (List((String, String)), List((String, (String, List(Operand))))) =\n  match optClosureSeed(body, defcount, Nil, Nil) with\n  | (root0, info) => (optAliasFix(body, defcount, root0, 10000), info)\n  end\n\n(* escaped roots: a root-alias used anywhere but the fn-position of an\n   IClosureCall or the source of a followed same-root copy. *)\nfn optEscUse(i : Instr, name : String, r : String, root : List((String, String))) : Bool =\n  (* returns true if this USE of `name` (an alias of root r) is OK (non-escaping) *)\n  match i with\n  | IClosureCall(_, OTmp(fv), a) =>\n      if optStrEq(optTmpName(fv), name) then\n        (match a with\n         | OTmp(at) => not optStrEq(optTmpName(at), name)   (* ok unless also the arg *)\n         | _        => true\n         end)\n      else optEscCopyOk(i, name, r, root)\n  | _ => optEscCopyOk(i, name, r, root)\n  end\n\nfn optEscCopyOk(i : Instr, name : String, r : String, root : List((String, String))) : Bool =\n  match i with\n  | IAssign(d, OTmp(s)) =>\n      if optStrEq(optTmpName(s), name) then\n        (match optAssocStr(root, optTmpName(d)) with | Just(rd) => optStrEq(rd, r) | Nothing => false end)\n      else false\n  | _ => false\n  end\n\nfn optEscInInstr(i : Instr, uses : List(String), root : List((String, String)), acc : List(String)) : List(String) =\n  match uses with\n  | Nil        => acc\n  | Cons(nm, r) =>\n      let acc1 = match optAssocStr(root, nm) with\n                 | Nothing => acc\n                 | Just(rt) => if optEscUse(i, nm, rt, root) then acc else optInsert(rt, acc)\n                 end in\n      optEscInInstr(i, r, root, acc1)\n  end\n\nfn optClosureEscapes(body : List(Instr), root : List((String, String)), acc : List(String)) : List(String) =\n  match body with\n  | Nil        => acc\n  | Cons(i, r) => optClosureEscapes(r, root, optEscInInstr(i, optUses(i), root, acc))\n  end\n\n(* lifted-body scalar-replaceable: 2 params, small, non-recursive, env used ONLY\n   via IGetField. *)\nfn optEnvOnlyGetField(body : List(Instr), env : String, lname : String) : Bool =\n  match body with\n  | Nil        => true\n  | Cons(i, r) =>\n      match i with\n      | ICall(_, cf, _) => if optStrEq(cf, lname) then false else optEnvUsesOk(i, env) and optEnvOnlyGetField(r, env, lname)\n      | _               => optEnvUsesOk(i, env) and optEnvOnlyGetField(r, env, lname)\n      end\n  end\n\nfn optEnvUsesOk(i : Instr, env : String) : Bool =\n  (* every use of env must be as the src of an IGetField *)\n  if optMember(env, optUses(i)) then\n    (match i with\n     | IGetField(_, OTmp(s), _) => optStrEq(optTmpName(s), env)\n     | _                        => false\n     end)\n  else true\n\nfn optLiftedScalarOk(lf : Function) : Bool =\n  match optFnParams(lf) with\n  | Cons(env, Cons(_, Nil)) =>\n      if optLenInstr(optFnBody(lf)) > optClosureInlineMax then false\n      else optEnvOnlyGetField(optFnBody(lf), env, optFnName(lf))\n  | _ => false\n  end\n\nfn optCapAvailable(c : Operand, params : List(String), defcount : List((String, Int))) : Bool =\n  match c with\n  | OConst(_) => true\n  | OTmp(t)   => let n = optTmpName(t) in optMember(n, params) or optCountOf(defcount, n) == 1\n  end\n\nfn optAllCapsAvailable(caps : List(Operand), params : List(String), defcount : List((String, Int))) : Bool =\n  match caps with\n  | Nil        => true\n  | Cons(c, r) => optCapAvailable(c, params, defcount) and optAllCapsAvailable(r, params, defcount)\n  end\n\n(* Which roots to eliminate. *)\nfn optElimSet(info : List((String, (String, List(Operand)))), escaped : List(String),\n              fns : List(Function), params : List(String), defcount : List((String, Int))) : List(String) =\n  match info with\n  | Nil                    => Nil\n  | Cons((r, (fnm, caps)), rest) =>\n      let rest2 = optElimSet(rest, escaped, fns, params, defcount) in\n      if (not optMember(r, escaped)) then\n        (match optFnLookup(fns, fnm) with\n         | Just(lf) => if optLiftedScalarOk(lf) and optAllCapsAvailable(caps, params, defcount)\n                       then Cons(r, rest2) else rest2\n         | Nothing  => rest2\n         end)\n      else rest2\n  end\n\n(* Inline a lifted body at a closure-call site (opt.py _inline_closure). *)\nfn optInlineClosureBody(body : List(Instr), env : String, dst : Tmp, psub : List((String, Operand)),\n                        caps : List(Operand), globals : List(String), site : Int, retLabel : String) : List(Instr) =\n  match body with\n  | Nil        => Nil\n  | Cons(i, r) =>\n      let out = match i with\n                | IGetField(d, OTmp(s), idx) =>\n                    if optStrEq(optTmpName(s), env)\n                    then Cons(IAssign(optRenDst(d, globals, \"c\", site), optNthOperand(caps, idx)), Nil)\n                    else Cons(optRewriteInlined(i, psub, globals, \"c\", site), Nil)\n                | IReturn(mv) =>\n                    (match mv with\n                     | Just(v) => Cons(IAssign(dst, optRenVal(v, psub, globals, \"c\", site)), Cons(IJump(retLabel), Nil))\n                     | Nothing => Cons(IJump(retLabel), Nil)\n                     end)\n                | _ => Cons(optRewriteInlined(i, psub, globals, \"c\", site), Nil)\n                end in\n      optAppendInstr(out, optInlineClosureBody(r, env, dst, psub, caps, globals, site, retLabel))\n  end\n\nfn optInlineClosure(lf : Function, dst : Tmp, arg : Operand, caps : List(Operand),\n                    globals : List(String), site : Int) : List(Instr) =\n  match optFnParams(lf) with\n  | Cons(env, Cons(actual, _)) =>\n      let psub = Cons((actual, arg), Nil) in\n      let retLabel = \".\" + \"c\" + int_to_string(site) + \"_ret\" in\n      optAppendInstr(optInlineClosureBody(optFnBody(lf), env, dst, psub, caps, globals, site, retLabel),\n                     Cons(ILabel(retLabel), Nil))\n  | _ => Nil\n  end\n\n(* Rewrite one fn body, eliminating closures in `elim` and threading site. *)\nfn optClosureRewrite(body : List(Instr), elim : List(String), root : List((String, String)),\n                     info : List((String, (String, List(Operand)))), fns : List(Function),\n                     globals : List(String), site : Int) : (List(Instr), Int) =\n  match body with\n  | Nil        => (Nil, site)\n  | Cons(i, r) =>\n      (match i with\n       | IAllocClosure(d, _, _) =>\n           if optMember(optTmpName(d), elim)\n           then optClosureRewrite(r, elim, root, info, fns, globals, site)     (* dead alloc *)\n           else optClosureKeep(i, r, elim, root, info, fns, globals, site)\n       | IAssign(d, OTmp(s)) =>\n           let killd = match optAssocStr(root, optTmpName(s)) with | Just(rt) => optMember(rt, elim) | Nothing => false end in\n           let sameRoot = match optAssocStr(root, optTmpName(d)) with\n                          | Just(rd) => match optAssocStr(root, optTmpName(s)) with | Just(rs) => optStrEq(rd, rs) | Nothing => false end\n                          | Nothing  => false end in\n           if killd and sameRoot\n           then optClosureRewrite(r, elim, root, info, fns, globals, site)     (* dead alias copy *)\n           else optClosureKeep(i, r, elim, root, info, fns, globals, site)\n       | IClosureCall(dst, OTmp(fv), arg) =>\n           (match optAssocStr(root, optTmpName(fv)) with\n            | Just(rt) =>\n                if optMember(rt, elim) then\n                  (match optAssocInfo(info, rt) with\n                   | Just((fnm, caps)) =>\n                       (match optFnLookup(fns, fnm) with\n                        | Just(lf) =>\n                            let expanded = optInlineClosure(lf, dst, arg, caps, globals, site) in\n                            match optClosureRewrite(r, elim, root, info, fns, globals, site + 1) with\n                            | (rest, site2) => (optAppendInstr(expanded, rest), site2)\n                            end\n                        | Nothing => optClosureKeep(i, r, elim, root, info, fns, globals, site)\n                        end)\n                   | Nothing => optClosureKeep(i, r, elim, root, info, fns, globals, site)\n                   end)\n                else optClosureKeep(i, r, elim, root, info, fns, globals, site)\n            | Nothing => optClosureKeep(i, r, elim, root, info, fns, globals, site)\n            end)\n       | _ => optClosureKeep(i, r, elim, root, info, fns, globals, site)\n       end)\n  end\n\nfn optClosureKeep(i : Instr, r : List(Instr), elim : List(String), root : List((String, String)),\n                  info : List((String, (String, List(Operand)))), fns : List(Function),\n                  globals : List(String), site : Int) : (List(Instr), Int) =\n  match optClosureRewrite(r, elim, root, info, fns, globals, site) with\n  | (rest, site2) => (Cons(i, rest), site2)\n  end\n\nfn optClosureElimFn(f : Function, fns : List(Function), globals : List(String), site : Int)\n   : (Function, Int) =\n  let body = optFnBody(f) in\n  let defcount = optDefCount(body, Nil) in\n  match optClosureRoots(body, defcount) with\n  | (root, info) =>\n      match info with\n      | Nil => (f, site)          (* no closures here *)\n      | _   =>\n          let escaped = optClosureEscapes(body, root, Nil) in\n          let elim = optElimSet(info, escaped, fns, optFnParams(f), defcount) in\n          match elim with\n          | Nil => (f, site)\n          | _   =>\n              match optClosureRewrite(body, elim, root, info, fns, globals, site) with\n              | (nb, site1) => (optWithBody(f, nb), site1)\n              end\n          end\n      end\n  end\n\n(* Same live-fnmap threading as inline (opt.py mutates fn.body + reads a live\n   fnmap for _lifted_scalar_ok / _inline_closure). *)\nfn optClosureElimWalk(idx : Int, fnmap : List(Function), globals : List(String), site : Int)\n   : (List(Function), Int) =\n  match optNthFn(fnmap, idx) with\n  | Nothing => (Nil, site)\n  | Just(f) =>\n      match optClosureElimFn(f, fnmap, globals, site) with\n      | (f2, site1) =>\n          let fnmap2 = optReplaceFn(fnmap, idx, f2) in\n          match optClosureElimWalk(idx + 1, fnmap2, globals, site1) with\n          | (rest, site2) => (Cons(f2, rest), site2)\n          end\n      end\n  end\n\nfn optClosureElim(t : TAC, site : Int) : (TAC, Int) =\n  match t with\n  | TAC(fns, g) =>\n      match optClosureElimWalk(0, fns, g, site) with\n      | (fns1, site1) => (optPruneUnreachable(TAC(fns1, g)), site1)\n      end\n  end\n\n\n(* ══ Pass dispatch + level bundles + fixpoint driver (opt.py optimize) ══════ *)\n\n(* Apply one named pass. *)\nfn optApplyPass(name : String, t : TAC, site : Int) : (TAC, Int) =\n  if optStrEq(name, \"devirt\") then optDevirt(t, site)\n  else if optStrEq(name, \"inline\") then optInline(t, site)\n  else if optStrEq(name, \"closure_elim\") then optClosureElim(t, site)\n  else if optStrEq(name, \"const_fold\") then optConstFold(t, site)\n  else if optStrEq(name, \"copy_prop\") then optCopyProp(t, site)\n  else if optStrEq(name, \"algebraic\") then optAlgebraic(t, site)\n  else if optStrEq(name, \"cse\") then optCse(t, site)\n  else if optStrEq(name, \"dce\") then optDce(t, site)\n  else if optStrEq(name, \"licm\") then optLicm(t, site)\n  else (t, site)\n\n(* enabled passes for a level, in PASSES order (opt.py LEVELS ∩ PASSES). *)\nfn optPassesForLevel(level : Int) : List(String) =\n  if level <= 0 then Nil\n  else if level == 1 then\n    Cons(\"const_fold\", Cons(\"copy_prop\", Cons(\"algebraic\", Cons(\"cse\", Cons(\"dce\", Nil)))))\n  else if level == 2 then\n    Cons(\"devirt\", Cons(\"inline\",\n      Cons(\"const_fold\", Cons(\"copy_prop\", Cons(\"algebraic\", Cons(\"cse\", Cons(\"dce\", Cons(\"licm\", Nil))))))))\n  else\n    Cons(\"devirt\", Cons(\"inline\", Cons(\"closure_elim\",\n      Cons(\"const_fold\", Cons(\"copy_prop\", Cons(\"algebraic\", Cons(\"cse\", Cons(\"dce\", Cons(\"licm\", Nil)))))))))\n\nfn optRunPasses(t : TAC, passes : List(String), site : Int) : (TAC, Int) =\n  match passes with\n  | Nil        => (t, site)\n  | Cons(p, r) => match optApplyPass(p, t, site) with\n                  | (t1, site1) => optRunPasses(t1, r, site1)\n                  end\n  end\n\n(* ── Structural fixpoint fingerprint (opt.py _fingerprint equality) ──────────\n   opt.py compares `tuple((f.name, tuple(f.body)) for f in tac.functions)`:\n   function NAME + BODY only, ignoring params, the fresh counter, and globals.\n   This is an O(n)-time / O(1)-alloc structural check.  It replaces the old\n   `optStrEq(tacPretty(t1), before)`, whose tacPretty built an O(n^2)-join\n   string over the WHOLE 1.8 MB program each sweep (the arena wall) — it blew\n   12 GB before the first pass even ran on the self-source. *)\nfn optBoolEq(a : Bool, b : Bool) : Bool =\n  if a then b else if b then false else true\n\nfn optTmpEq(a : Tmp, b : Tmp) : Bool = optStrEq(optTmpName(a), optTmpName(b))\n\nfn optConstEq(a : ConstVal, b : ConstVal) : Bool =\n  match a with\n  | CInt(x)   => match b with | CInt(y)   => optStrEq(x, y) | _ => false end\n  | CFloat(x) => match b with | CFloat(y) => optStrEq(x, y) | _ => false end\n  | CStr(x)   => match b with | CStr(y)   => optStrEq(x, y) | _ => false end\n  | CBool(x)  => match b with | CBool(y)  => optBoolEq(x, y) | _ => false end\n  | CUnit     => match b with | CUnit     => true           | _ => false end\n  end\n\nfn optOperandEq(a : Operand, b : Operand) : Bool =\n  match a with\n  | OTmp(x)   => match b with | OTmp(y)   => optTmpEq(x, y)   | _ => false end\n  | OConst(x) => match b with | OConst(y) => optConstEq(x, y) | _ => false end\n  end\n\nfn optOperandsEq(xs : List(Operand), ys : List(Operand)) : Bool =\n  match xs with\n  | Nil        => match ys with | Nil => true | _ => false end\n  | Cons(x, r) => match ys with\n                  | Nil        => false\n                  | Cons(y, s) => if optOperandEq(x, y) then optOperandsEq(r,
