een with no other change — which is what makes it a test and not a comment.\n\n   And it RUNS.  Measures are ghost: they live in `Program.measures`, never in\n   `Program.decls`, so infer.py and the CEK machine never see one.  Erasure by\n   construction, with the corollary for free — calling `len` from real code is an\n   unbound-name error from HM, not a rule anybody had to write.\n\n   Expected output:\n     3 *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  end\n\nfn head(xs : {v : List(Int) | len(v) > 0}) : Int =\n  match xs with\n  | Nil        => 0\n  | Cons(x, _) => x\n  end\n\nfn main(io : IO) : IO =\n  print(io, show(head(Cons(3, Cons(4, Nil)))))\n"}, {"path": "repo/prove/fixtures/11_measure_clash.lark", "group": "repo/prove/fixtures", "name": "11_measure_clash.lark", "text": "module MeasureClash\n\n(* A measure that shares its name with a function.\n\n   In Lark these are two different things in two different worlds: `len` the\n   function is code that runs, `len` the measure is a symbol that erases.  In the\n   LOGIC they are one name.  The measure's equations would be asserted about `len`,\n   and every predicate that says `len(xs)` would silently mean the other one — the\n   one whose body nobody checked against those equations.  Here the two even\n   disagree, which is the point: the function counts, and the measure would claim\n   the count is always zero.  Assert both and the checker will prove that a list of\n   three elements is empty.\n\n   There is a real feature hiding behind this rejection — a measure that is\n   *implemented* by a function, with the equations discharged against the body as\n   proof obligations rather than assumed.  That is a design, not an oversight, and\n   a later version does not need it: nothing in Lark wants to run `len` at all.  Until someone\n   does, one name means one thing.\n\n   Rejected: same name as a function or value. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nfn len(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  end\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 0\n  end\n\nfn zero(xs : List(Int)) : {v : Int | v == 0} =\n  0\n"}, {"path": "repo/prove/fixtures/11_measure_fragment.lark", "group": "repo/prove/fixtures", "name": "11_measure_fragment.lark", "text": "module MeasureFragment\n\n(* An arm body outside the decidable fragment.\n\n   `len(rest) * len(rest)` is a perfectly good Lark expression and a perfectly good\n   integer.  It is not a LINEAR one, and linear integer arithmetic is the theory the\n   solver decides (pred.is_linear is the fragment's boundary; the refinement notes says that\n   when we reach past it we stop rather than improvise).\n\n   The translation of a measure's arm is therefore STRICT, exactly as the\n   translation of a predicate the programmer wrote is strict.  The lenient mode —\n   \"not expressible, so no fact\" — is for expressions the checker went LOOKING at;\n   it must never be applied to something the user declared, because the result would\n   be a measure silently weakened to nothing, and a checker that says \"proved\" about\n   a symbol it never modelled.\n\n   Rejected: not expressible in the predicate language. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure sq(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => sq(rest) * sq(rest)\n  end\n\nfn zero(xs : List(Int)) : {v : Int | v == 0} =\n  0\n"}, {"path": "repo/prove/fixtures/11_measure_nonstructural.lark", "group": "repo/prove/fixtures", "name": "11_measure_nonstructural.lark", "text": "module MeasureNonStructural\n\n(* THE FIXTURE WITH TEETH.  A measure whose recursion does not descend.\n\n   `bad`'s Cons arm calls `bad(xs)` — the whole list — where a measure may only\n   call `bad(rest)`, a field of the constructor it just took apart.  One character\n   of difference, and the difference is soundness.\n\n   Elaborated, the arms are ASSUMED.  This one asserts\n\n       bad(xs) == 1 + bad(xs)\n\n   which no integer satisfies.  It is not a weak axiom or a useless one; it is an\n   INCONSISTENT one, and from an inconsistency every goal follows.  `absurd` below\n   is the proof of that: its contract claims its result is negative, it returns 0,\n   and `0 < 0` is false.  Once a later version instantiates the equations at the terms an arm\n   mentions, the `Cons` arm's hypotheses would contain the contradiction above, and\n   the checker would cheerfully discharge `0 < 0` — reporting a false program as\n   verified, which is the one failure a verifier may not have.\n\n   So the structural check is not hygiene.  It is the reason the equations may be\n   assumed at all, and this file is where that claim is tested: the measure must be\n   REJECTED, at declaration time, before a single VC is built.\n\n   (Termination is optional for a contract and mandatory for a measure. A\n   non-terminating `fn` merely never returns — its contract is vacuously kept, and\n   the first version already leans on that. A non-terminating measure poisons the logic.) *)\n\ntype L = | Nil | Cons of Int, L\n\nmeasure bad(xs : L) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + bad(xs)\n  end\n\nfn absurd(xs : L) : {v : Int | v < 0} =\n  match xs with\n  | Nil        => 0\n  | Cons(_, _) => 0\n  end\n"}, {"path": "repo/prove/fixtures/11_measure_overlap.lark", "group": "repo/prove/fixtures", "name": "11_measure_overlap.lark", "text": "module MeasureOverlap\n\n(* Two arms for one constructor.\n\n   In a program this is harmless and even ordinary: the arms are tried in order,\n   the first one wins, the second is dead code.  In a measure it is two equations\n   about the same term —\n\n       len(Nil) == 0     and     len(Nil) == 1\n\n   — and an axiom set that can disagree with itself is an axiom set that proves\n   anything.  \"First match wins\" is an evaluation rule, and there is no evaluation\n   here.  The arms of a measure are unordered by the time the solver sees them, so\n   they must not need an order.\n\n   Rejected: constructor 'Nil' has two arms. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  | Nil           => 1\n  end\n\nfn zero(xs : List(Int)) : {v : Int | v == 0} =\n  0\n"}, {"path": "repo/prove/fixtures/11_measure_partial.lark", "group": "repo/prove/fixtures", "name": "11_measure_partial.lark", "text": "module MeasurePartial\n\n(* A measure with no arm for `Cons`.\n\n   A partial measure is not a measure that returns nothing — there is no runtime\n   here to return anything.  It is a symbol whose value at `Cons(x, rest)` no\n   equation constrains: the logic may take it to be anything at all, and a\n   different anything each time it is asked.  Nothing is unsound about that, and\n   nothing is USEFUL about it either; what is bad is that it looks like a\n   definition.  A measure must be TOTAL, and the check is exhaustiveness over the\n   declared constructors.\n\n   Rejected: `len` has no arm for Cons. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Nil => 0\n  end\n\nfn zero(xs : List(Int)) : {v : Int | v == 0} =\n  0\n"}, {"path": "repo/prove/fixtures/11_measure_sort.lark", "group": "repo/prove/fixtures", "name": "11_measure_sort.lark", "text": "module MeasureSort\n\n(* A measure into a sort the logic does not have.\n\n   The solver decides QF-UFLIA: uninterpreted functions, and LINEAR INTEGER\n   arithmetic.  It has two sorts it can reason INSIDE — Int and Bool — and one it\n   can only reason ABOUT (OTHER: equality, and application of an uninterpreted\n   symbol).  A measure exists to hand the logic a fact it can compute with, so its\n   result must land in one of the first two.\n\n   `Float` is the honest refusal here, and it is the same refusal `rtype_of_mono`\n   already makes for a Float parameter: there is no sound way to pretend a real is\n   an integer, and pretending is how a verifier ends up proving something false.  A\n   measure returning a Float would be a symbol we could name and never use — an\n   `OTHER` in a costume.\n\n   Rejected: the result type must be Int or Bool. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure total(xs : List(Float)) : Float =\n  match xs with\n  | Nil           => 0.0\n  | Cons(x, rest) => x + total(rest)\n  end\n\nfn zero(xs : List(Float)) : {v : Int | v == 0} =\n  0\n"}, {"path": "repo/prove/fixtures/11_measure_wildcard.lark", "group": "repo/prove/fixtures", "name": "11_measure_wildcard.lark", "text": "module MeasureWildcard\n\n(* A catch-all arm.\n\n   `| _ => 0` is the most natural thing in the world to write and it cannot mean\n   anything here.  An arm of a measure is an EQUATION INDEXED BY A CONSTRUCTOR;\n   a wildcard names no constructor, so it indexes nothing — to admit it we would\n   have to expand it into \"every constructor not mentioned above\", which is to say\n   we would have to give the arms an ORDER, and ordered axioms are not axioms.\n\n   The same objection kills `| ys => ...`, for the same reason.  A measure needs\n   exactly one arm per constructor, and both of these are a way of writing fewer.\n\n   Rejected: every arm must be a constructor pattern. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Cons(_, rest) => 1 + len(rest)\n  | _             => 0\n  end\n\nfn zero(xs : List(Int)) : {v : Int | v == 0} =\n  0\n"}, {"path": "repo/prove/fixtures/12_measure_safe.lark", "group": "repo/prove/fixtures", "name": "12_measure_safe.lark", "text": "module MeasureSafe\n\n(* the equations reach the solver.  This is the file where \"prove\n   programs\" stops being about arithmetic on integers the program already held and\n   starts being about the SHAPE of the data it built.\n\n   `len` is uninterpreted no longer.  Its arms are equations, and an equation is\n   instantiated at each constructor term the obligation MENTIONS — never as an axiom\n   schema, never under a quantifier, because `forall xs. len(Cons(x, xs)) == 1 +\n   len(xs)` would leave QF-UFLIA and take the decision procedure with it.  What the\n   checker does instead is the quantifier-free shadow of that axiom: it looks at the\n   terms that are actually there and writes down the equation for each.\n\n   Four obligations, and each one is a different half of the rung:\n\n     two()          BUILDING.  `Cons(a, Cons(b, Nil))` is now a TERM, so the walk\n                    finds all three constructor terms inside it and instantiates\n                    `len` at each: len(Nil) == 0, hence the inner Cons is 1, hence\n                    the outer is 2.  Arithmetic chains them.  The contract holds.\n\n     tail_of_two()  DESTRUCTING, twice over, and the Nil arm is the better half:\n\n                      | Cons(_, r) =>  the pattern says xs == Cons($f, r), so\n                                       len(xs) == 1 + len(r); with len(xs) == 2 from\n                                       the contract, len(r) == 1.  The arm returns\n                                       `r`, and `r` is still NAMED — which is why an\n                                       ADT-typed binder had to stop being opaque.\n                                       Refined products let a fact travel; a measure\n                                       creates one; a *name* is what carries it out\n                                       through the return.\n\n                      | Nil =>         len(xs) == 0 and len(xs) == 2 cannot both\n                                       hold, so the hypotheses are contradictory and\n                                       the arm is proved VACUOUSLY.  That is not the\n                                       checker cheating: it is the checker noticing\n                                       the arm is DEAD, which is a thing it could not\n                                       notice until `len(Nil) == 0` was a fact.\n\n     main()         COMPOSITION.  `head`'s precondition is `len(v) > 0`, and the\n                    argument is a call, not a constructor — so the fact comes from\n                    `two`'s CONTRACT (`len(v) == 2`), not from any term the checker\n                    can see inside it.  The measure crosses a function boundary.\n\n   Its mutant, 12_measure_unsafe.lark, breaks each of these and must fail on each.\n\n   Expected output:\n     3 *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  end\n\nfn head(xs : {v : List(Int) | len(v) > 0}) : Int =\n  match xs with\n  | Nil        => 0\n  | Cons(x, _) => x\n  end\n\nfn two(a : Int, b : Int) : {v : List(Int) | len(v) == 2} =\n  Cons(a, Cons(b, Nil))\n\nfn tail_of_two(xs : {v : List(Int) | len(v) == 2})\n             : {v : List(Int) | len(v) == 1} =\n  match xs with\n  | Nil        => Nil\n  | Cons(_, r) => r\n  end\n\nfn main(io : IO) : IO =\n  print(io, show(head(two(3, 4))))\n"}, {"path": "repo/prove/fixtures/12_measure_unsafe.lark", "group": "repo/prove/fixtures", "name": "12_measure_unsafe.lark", "text": "module MeasureUnsafe\n\n(* The mutant of 12_measure_safe.lark.  Three lies about length, one per hook, and\n   the checker must catch all three — because a verifier that only ever says \"proved\"\n   has not been tested, it has been admired.\n\n     two()          BUILDING, wrong.  Builds `Cons(a, Nil)` — a list of ONE — under a\n                    contract promising two.  The equations give len == 1, the contract\n                    demands 2, and 1 == 2 is not a thing the solver will sign.\n\n     tail_of_two()  DESTRUCTING, wrong.  Returns the WHOLE list where the contract\n                    promises the tail: len 2 offered as len 1.  Note the Nil arm of\n                    this function is still PROVED, and rightly — it is dead code under\n                    a contract that says the list has two elements, and it was dead in\n                    the safe file too.  A mutant is supposed to break one thing.\n\n     main()         COMPOSITION, wrong.  `head(Nil)` — and the obligation is\n                    `len(Nil) > 0`, which instantiates to `0 > 0`.  This is the one to\n                    read twice: under the first version this program was not *unproved*, it was\n                    unprovable, because `len` was an uninterpreted symbol and an empty\n                    list was, to the logic, a value that might have had any length at\n                    all.  Taking the head of the empty list is the oldest bug in\n                    functional programming, and this is the rung on which Lark starts\n                    to see it. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : Int =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  end\n\nfn head(xs : {v : List(Int) | len(v) > 0}) : Int =\n  match xs with\n  | Nil        => 0\n  | Cons(x, _) => x\n  end\n\nfn two(a : Int, b : Int) : {v : List(Int) | len(v) == 2} =\n  Cons(a, Nil)\n\nfn tail_of_two(xs : {v : List(Int) | len(v) == 2})\n             : {v : List(Int) | len(v) == 1} =\n  match xs with\n  | Nil        => Nil\n  | Cons(_, r) => xs\n  end\n\nfn main(io : IO) : IO =\n  print(io, show(head(Nil)))\n"}, {"path": "repo/prove/fixtures/13_float_safe.lark", "group": "repo/prove/fixtures", "name": "13_float_safe.lark", "text": "module FloatSafe\n\n(* The control for 13_float_unsafe.lark, and the point it makes is that the fix cost\n   NOTHING a program was entitled to.\n\n   A Float may not enter the logic (see the mutant for why).  It can still be a\n   parameter, be passed, be returned, be computed with — it simply says nothing to the\n   checker, and nothing is all it ever honestly had to say.  The obligation here is\n   about `d`, an Int, and it is discharged from an Int guard exactly as it was before\n   Floats were shown the door.\n\n   The rule, stated once: a Float is a value the logic may not even NAME.  `OTHER`\n   values (a String, a Buf, a List) may be named but not opened — the logic gets\n   equality and congruence on them and nothing else.  A Float cannot have that much,\n   because the logic's `==` is an equivalence relation and IEEE-754's is not.\n\n   Expected output:\n     25 *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn scale(x : Float, d : Int) : Int =\n  if d != 0 then div(100, d) else 0\n\nfn main(io : IO) : IO =\n  print(io, show(scale(1.5, 4)))\n"}, {"path": "repo/prove/fixtures/13_float_unsafe.lark", "group": "repo/prove/fixtures", "name": "13_float_unsafe.lark", "text": "module FloatUnsafe\n\n(* THE FIRST FALSE PROOF THIS CHECKER EVER PRODUCED, and the fixture that stops it\n   coming back.  Before the fix, `refine.py` reported\n\n     ok: 2 obligation(s) proved\n\n   and then the program divided by zero.\n\n   The lie is `x == x`.  In the logic that is VALID — equality is an equivalence\n   relation and congruence closure makes it reflexive, as it must be.  In IEEE-754 it\n   is FALSE when x is NaN, and Lark makes NaN the ordinary way: `0.0 / 0.0` gives one,\n   and so does `float_sqrt` of a negative.  So the checker assumed `not (x == x)` in\n   the else branch, found it contradictory, and proved the branch VACUOUSLY — while\n   the machine cheerfully ran it.\n\n   The other half of the same lie needs no NaN at all: `0.0 == -0.0` is TRUE at run\n   time and they are DIFFERENT VALUES, so congruence would conclude `f(0.0) == f(-0.0)`\n   for an `f` that can tell them apart (`1.0 / x` is +inf for one and -inf for the\n   other).  Reflexivity fails in one direction and substitutivity in the other — and\n   those two are the whole of what a sort of OTHER hands out.\n\n   So a Float now has a sort of its own (`refine.FLOAT`) at which NO TERM IS EVER\n   BUILT.  It is not opaque; it is unspeakable.  `x == x` is then not a hypothesis the\n   checker believes, it is a condition the checker cannot read — and an unreadable\n   condition constrains NOTHING (see 14_guard_unsafe.lark, which is the general form of\n   that second mistake).\n\n   Expected: 1 of 2 unproved.  The obligation on `d` cannot be discharged, and that is\n   the truth: `d` really can be zero. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn f(x : Float, d : Int) : Int =\n  if x == x then 0 else div(100, d)\n\nfn main(io : IO) : IO =\n  print(io, show(f(float_sqrt(0.0 - 1.0), 0)))\n"}, {"path": "repo/prove/fixtures/14_guard_safe.lark", "group": "repo/prove/fixtures", "name": "14_guard_safe.lark", "text": "module GuardSafe\n\n(* The control for 14_guard_unsafe.lark.  Same shape, same obligation — and a guard the\n   logic can READ.  `d > 0` is linear, so it becomes a hypothesis, and the else branch\n   gets its negation for free.  This is the behaviour the fix had to leave standing:\n   a condition the checker understands is worth exactly what it was always worth.\n\n   Expected output:\n     25 *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn g(x : Int, y : Int, d : Int) : Int =\n  if d > 0 then div(100, d) else 0\n\nfn main(io : IO) : IO =\n  print(io, show(g(2, 3, 4)))\n"}, {"path": "repo/prove/fixtures/14_guard_unsafe.lark", "group": "repo/prove/fixtures", "name": "14_guard_unsafe.lark", "text": "module GuardUnsafe\n\n(* THE DEEPER BUG, AND THERE IS NOT A FLOAT IN SIGHT.\n\n   Found while fixing 13_float_unsafe.lark — and it is the more serious of the two,\n   because it needs nothing exotic.  Both `if` sites in `refine.py` used to read\n\n     cf = formula_opt(c, env) or Top()\n\n   and that `or Top()` is a false proof with a fuse on it.  `formula_opt` returns None\n   for \"I cannot express this condition.\"  The code turned that into `true`, and then\n   the else branch assumed `not true` — i.e. **FALSE** — and from false, every\n   obligation in that branch follows.\n\n   The condition below is not strange.  It is `x * y > 0`: merely NON-LINEAR, which is\n   the ordinary, everyday way out of a linear-arithmetic fragment.  The checker read it\n   as `true`, negated it to `false`, and proved a division by zero.  Any unreadable\n   guard would have done: a Float compare, a String compare, a call through a local\n   binding.\n\n   THE RULE, and it is the first version's rule one level up from the solver: *\"I could not translate\n   this\"* IS NOT *\"this is true.\"*  A condition the logic cannot express constrains\n   NOTHING, so NEITHER branch may learn anything from it — not the positive, and above\n   all not the negation.  The cost is proofs; the alternative was a lie.  the first version made every\n   exhausted budget in the solver resolve toward \"cannot prove\"; this makes every\n   untranslatable guard in the checker do the same.\n\n   Expected: 1 of 2 unproved.  `d` really can be zero, and now the checker says so. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn g(x : Int, y : Int, d : Int) : Int =\n  if x * y > 0 then 0 else div(100, d)\n\nfn main(io : IO) : IO =\n  print(io, show(g(1, 0, 0)))\n"}, {"path": "repo/prove/fixtures/15_shadow_safe.lark", "group": "repo/prove/fixtures", "name": "15_shadow_safe.lark", "text": "module ShadowSafe\n\n(* THE CONTROL for the third false proof, and the reason to believe the fix cost\n   nothing.  A contract written against a function the program itself defines —\n   `size` — discharged by a guard at the call site that calls THE SAME `size`.  That\n   is `05_buf`'s idiom, the one the checker has had , and it still works:\n   the logic knows nothing about what `size` computes, only that equal arguments give\n   equal results, and congruence carries the guard into the    checker cannot say what a name means, it says NOTHING.  A UF symbol is a global\n   function and only that; a locally bound function is unspeakable, its applications\n   are no term at all, and a fact stated with one cannot be mistaken for a fact about\n   the other.  The verdict is now `cannot prove` — the guard says nothing, so the\n   contract on `k` is not discharged, which is the truth.\n\n   The bug is real: run this and it raises ZeroDivisionError. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn size(b : Int) : Int = 0\n\nfn take(b : Int, k : {v : Int | v != size(b)}) : Int = div(100, k - size(b))\n\nfn bad(b : Int) : Int =\n  let size = fn(x : Int) => 1 in     (* the shadow.  This `size` is not that `size`. *)\n  if 0 != size(b) then take(b, 0) else 0\n\nfn main(io : IO) : IO = print(io, show(bad(9)))\n"}, {"path": "repo/prove/fixtures/16_axiom_safe.lark", "group": "repo/prove/fixtures", "name": "16_axiom_safe.lark", "text": "module AxiomSafe\n\n(* THE CONTROL for the fourth false proof, and the file where the ONE axiom the first version has\n   about an uninterpreted symbol is doing all the work.\n\n   `string_length` is opaque: the logic cannot compute it, and congruence alone rules\n   out nothing — as far as entailment is concerned a string could have length -10, and\n   then `string_length(s) + 4` could be negative and dividing by it would be a bug.\n   The obligation is discharged by `refine.NONNEG_UF`, instantiated at the one term\n   this program mentions: `string_length(s) >= 0`, so the divisor is at least 4.\n\n   The mutant is this file plus one declaration. Keep them side by side: the axiom is\n   true of the PRIMITIVE, and the primitive is what this program calls.\n\n   Checked, and then RUN: string_length(\"abc\") is 3, so it prints 100 / 7 = 14. *)\n\nfn div(a : Int, b : {v : Int | v > 0}) : Int = a / b\n\nfn safe(s : String) : Int = div(100, string_length(s) + 4)\n\nfn main(io : IO) : IO = print(io, show(safe(\"abc\")))\n"}, {"path": "repo/prove/fixtures/16_axiom_unsafe.lark", "group": "repo/prove/fixtures", "name": "16_axiom_unsafe.lark", "text": "module AxiomUnsafe\n\n(* THE FOURTH FALSE PROOF, and the fixture that stops it coming back.  Before the fix\n   `refine.py` reported\n\n     ok: 2 obligation(s) proved\n\n   and then the program divided by zero.\n\n   The mutation is one declaration — and it is not even a mutation of the code that\n   was verified.  `safe` is `16_axiom_safe`'s function, unchanged, and its obligation\n   is discharged by the same axiom as before: `string_length(s) >= 0`, so the divisor\n   is at least 4.\n\n   Only `string_length` is no longer the primitive.  The program declares one of its\n   own, returning -4, and the declaration overrides the builtin everywhere the program\n   can see — including at run time, where the divisor is -4 + 4 = 0.\n\n   The axiom was written down about a NAME, and the name had changed hands.  That is\n   `15_shadow`'s mistake at a longer range: there a local `let` captured the symbol a\n   contract was written against, here a global `fn` captures the symbol an AXIOM was\n   written about, and an axiom is worse, because nobody has to call it for it to fire.\n   The checker now keeps `NONNEG_UF` only for names the program leaves alone, so the\n   axiom is not available here at all, and the verdict is `cannot prove` — which is the\n   truth: about this `string_length` the logic knows nothing whatever.\n\n   The bug is real: run this and it raises ZeroDivisionError. *)\n\nfn div(a : Int, b : {v : Int | v > 0}) : Int = a / b\n\n(* the capture.  A perfectly well-typed declaration, and the axiom is false of it. *)\nfn string_length(s : String) : Int = 0 - 4\n\nfn safe(s : String) : Int = div(100, string_length(s) + 4)\n\nfn main(io : IO) : IO = print(io, show(safe(\"abc\")))\n"}, {"path": "repo/prove/fixtures/17_impl_safe.lark", "group": "repo/prove/fixtures", "name": "17_impl_safe.lark", "text": "(* 17 — AN IMPL BODY IS A BODY.  (the refinement work)\n\n   `refine.py` imported `ImplDecl` and never matched it, so for four rungs an impl\n   body was never walked: put `n / 0` inside one, with nobody reading the trait, and\n   the checker printed `ok: 2 obligation(s) proved`, exit 0.  It was not a false proof\n   — the refinement on a trait method was DROPPED rather than trusted, so a lying impl\n   could not discharge anyone's goal, and the checker was sound BY LUCK.  It was\n   something a verifier is even less allowed to be: silently under-verifying.  A count\n   that does not include the obligation is a WRONG REPORT, not a weak answer.  07's own\n   corpus uses impls.\n\n   The count is the tell.  Under the old checker this file has ONE obligation — and it\n   FAILS: `share` cannot divide, because the contract it needs was thrown away.  The\n   three obligations inside the impl were never asked about at all.  Now there are four\n   and all four are proved.  Too weak outside, blind inside; both were the same bug.\n\n   The fix has two halves and they are one decision:\n\n     - `weight`'s body must MEET the trait's contract, arm by arm: 1 > 0 and 5 > 0.\n     - BECAUSE it must, a caller may READ that contract.  `share` — an ordinary\n       function, outside the impl entirely — divides by a coin's weight and is\n       believed.  A contract the callers read and nobody checks is exactly the false\n       proof a later version was about, so the reading is earned by the checking and not one\n       rung before.\n\n   And `split` is both at once: an impl body that is checked, and that discharges its\n   own division by reading the trait it is declared inside.\n\n   The `let` is not decoration either.  A call's postcondition reaches the logic\n   through a NAME — `let w = weight(c)` binds the fact `w > 0`, and it is `w` that the\n   divisor mentions.  a later version's rule, one rung down. *)\n\nmodule ImplSafe\n\ntype Coin =\n  | Penny\n  | Dime\n\nimpl Copy for Coin = {}\n\ntrait Weigh a = {\n  fn weight : a -> {v : Int | v > 0}\n  fn split  : a -> Int\n}\n\nimpl Weigh for Coin = {\n  fn weight(c) =\n    match c with\n    | Penny => 1\n    | Dime  => 5\n    end\n\n  fn split(c) =\n    let w = weight(c) in\n    100 / w\n}\n\nfn share(total : Int, c : Coin) : Int =\n  let w = weight(c) in\n  total / w\n\nfn main(io : IO) : IO =\n  print(io, show(share(50, Dime) + split(Penny)))\n"}, {"path": "repo/prove/fixtures/17_impl_unsafe.lark", "group": "repo/prove/fixtures", "name": "17_impl_unsafe.lark", "text": "(* 17 — the mutant.  It lies once per hook, and under the old checker BOTH lies were\n   invisible: the whole impl block was never walked.\n\n     (1) `weight` returns 0 for a Dime.  The trait promised `{v : Int | v > 0}`, and\n         the arm must now prove it — `0 > 0` is not provable, and the obligation fails\n         AT THE ARM.  This is the half that keeps `share` honest: `share` still proves\n         its division, from the contract, and it is entitled to because the contract is\n         no longer taken on trust.  A lie has to be caught where it is told.\n\n     (2) `split` divides by `w - 1`, and a weight of 1 makes that zero.  Nothing in\n         the trait, nothing in the contract — just an ordinary division inside an impl\n         body, of the kind the checker did not previously know existed.\n\n   Old verdict: `1 of 1 obligation(s) unproved` — and the one it named was `share`'s,\n   the only honest line in the file.  Neither lie was among the obligations, because\n   there were no obligations from inside the impl: the block was not walked.  The\n   program then divides by zero on the CEK machine (`split(Penny)`: w = 1, and 100 / 0).\n   New verdict: 2 of 4 unproved, each lie caught where it is told. *)\n\nmodule ImplUnsafe\n\ntype Coin =\n  | Penny\n  | Dime\n\nimpl Copy for Coin = {}\n\ntrait Weigh a = {\n  fn weight : a -> {v : Int | v > 0}\n  fn split  : a -> Int\n}\n\nimpl Weigh for Coin = {\n  fn weight(c) =\n    match c with\n    | Penny => 1\n    | Dime  => 0\n    end\n\n  fn split(c) =\n    let w = weight(c) in\n    100 / (w - 1)\n\n}\n\nfn share(total : Int, c : Coin) : Int =\n  let w = weight(c) in\n  total / w\n\nfn main(io : IO) : IO =\n  print(io, show(share(50, Dime) + split(Penny)))\n"}, {"path": "repo/prove/fixtures/18_divisor_safe.lark", "group": "repo/prove/fixtures", "name": "18_divisor_safe.lark", "text": "(* 18 — A DIVISOR THE LOGIC CANNOT NAME.  (found by `08/tests/adversary.py`)\n\n   a later version fixed the rule for a HYPOTHESIS: what the checker cannot read, it must not\n   assume — an unreadable guard constrains neither branch.  This pair is the same\n   sentence at the OPPOSITE POLARITY, and confusing the two is what let a division by\n   zero through:\n\n     a HYPOTHESIS it cannot read must be DROPPED.\n     a GOAL it cannot read must be ASKED ANYWAY, and then honestly go unproved.\n\n   Silence about what you may assume is modesty.  Silence about what you must prove is\n   a lie — and the checker was telling it in two places, both found by the adversary\n   within a few hundred random programs:\n\n     `100 / (x * y)`   the divisor is merely NON-LINEAR, so `term_opt` could not express\n                       it and the site raised NO OBLIGATION AT ALL.\n     `100 / h(x)`      `h` is a LOCAL lambda, which a later version rightly made unspeakable —\n                       and the site, seeing a type it did not understand, declined to ask.\n\n   Both printed `ok: 0 obligation(s) proved`, exit 0, and then divided by zero.  The\n   condition for ASKING is no longer \"do I understand the divisor\" — it is HM's: this is\n   an integer division, so there is an obligation, and the only excuse is knowing the\n   division is a Float's.\n\n   This file is what the fix leaves standing, and both halves are the same old lesson:\n\n     - `nz(x * y)` is exactly as unnameable as `x * y` was, and it PROVES.  The divisor\n       gets a SKOLEM — a name for a value the checker cannot compute — and the skolem\n       inherits the CONTRACT of the thing it stands for, just as an argument's does.\n     - `let v = x * y` is the same product, and once it has a NAME the guard can be about\n       it, and the division is proved.  a later version's rule one rung down: *a name is what carries\n       a fact.*\n\n   The capability was not lost. It was made to say where it comes from.\n\n   ⚠️ What is NOT here, deliberately: a division by a local lambda's result, `let v = h(x)\n   in if v != 0 then 100 / v`.  It cannot be proved — not because the guard is bad, but\n   because the checker has no type for `v` at all (a locally bound function is unspeakable,\n   so its result is too), and a value with no sort cannot be guarded.  That is the price of\n   a later version, it is in the sound direction, and it is the first thing a stronger checker\n   would buy back. *)\n\nmodule DivisorSafe\n\nfn nz(a : Int) : {v : Int | v != 0} =\n  if a > 0 then a else 1\n\nfn by_contract(x : Int, y : Int) : Int =\n  100 / nz(x * y)\n\nfn by_name(x : Int, y : Int) : Int =\n  let v = x * y in\n  if v != 0 then 100 / v else 0\n\nfn main(io : IO) : IO =\n  print(io, show(by_contract(0, 5) + by_name(0, 5)))\n"}, {"path": "repo/prove/fixtures/18_divisor_unsafe.lark", "group": "repo/prove/fixtures", "name": "18_divisor_unsafe.lark", "text": "(* 18 — the mutant.  The same two divisors with what earned them taken away, and both\n   of them divide by zero when run.\n\n     `x * y`   with x = 0: non-linear, so unnameable — and under the old checker, not an\n               obligation.  Now it is one, and it is unproved: `$k /= 0` with nothing\n               said about `$k`, which is the true answer.\n\n     `h(x)`    with x = -1: a local lambda, unspeakable (c) — and the old\n               checker, not understanding the divisor's type, asked nothing.\n\n   Old verdict (measured, at 5da6252): `ok: 2 obligation(s) proved`, exit 0 — and neither of\n   the two it proved was a division.  It proved `nz`'s body and `nz`'s call, the only honest\n   lines here, and about the two divisions it said nothing at all, because it had nothing to\n   say and no rule telling it to ask anyway.  New verdict: 2 of 4 unproved.\n\n   Note what the mutant is NOT.  Neither of these is an exotic term: a product of two\n   variables is the first thing that leaves a linear fragment, and a `let` bound to a\n   lambda is ordinary Lark.  The old checker was silent on the everyday case. *)\n\nmodule DivisorUnsafe\n\nfn nz(a : Int) : {v : Int | v != 0} =\n  if a > 0 then a else 1\n\nfn by_contract(x : Int, y : Int) : Int =\n  100 / (x * y)\n\nfn by_guard(x : Int) : Int =\n  let h = fn(a) => a + 1 in\n  let v = h(x) in\n  100 / v\n\nfn main(io : IO) : IO =\n  print(io, show(by_contract(0, 5) + by_guard(0 - 1)))\n"}, {"path": "repo/prove/fixtures/19_floatlit_safe.lark", "group": "repo/prove/fixtures", "name": "19_floatlit_safe.lark", "text": "(* 19 — A FLOAT IS NOT A NUMBER THE LOGIC KNOWS.  (found while fixing 18)\n\n   a later version established that a Float must never enter the logic: `x == x` is VALID in the\n   solver and FALSE at run time for NaN, and `0.0 == -0.0` is true at run time while the\n   bit patterns differ — reflexivity and substitutivity, the two things congruence closure\n   is made of, both fail.  So the sort FLOAT exists in order that NO TERM IS EVER BUILT AT\n   IT: about a Float, the checker is silent.\n\n   That fix paved the roads it could see.  A Float PARAMETER is a Float because its type\n   says so; `float_sqrt` returns one because its declaration says so.  But a Float LITERAL\n   says nothing out loud — and `0.0` synthesised to an rtype with no sort, which the checker\n   read as OTHER: the sort of an ordinary opaque value.  An OTHER-sorted value is SPEAKABLE.\n   It can be equated.  Congruence will believe `a == a` about it.  So the one Float the\n   checker could still talk about was the one nobody had to declare.\n\n   Two lines closed it, and they are the same sentence twice:\n\n     - a Float literal is a Float (`Lit(float) => ROpaque(sort=FLOAT)`), and\n     - the sort SURVIVES arithmetic: if either operand is a Float, so is the result.\n\n   The second is the one that bites.  Without it, `0.0 / 0.0` is a Float divided by a Float\n   yielding — an Int?  Which is also how a float division came to look like an INTEGER\n   division and raise a division-by-zero obligation about a value the logic cannot name.\n   One missing sort, two bugs, pointing opposite ways: an obligation invented where none was\n   owed, and a hypothesis believed that was never true.  The second one is the mutant.\n\n   This file is the shape of a Float-safe program: the Floats do what Floats do, the checker\n   says NOTHING about them, and every integer division is proved by an INTEGER fact.  A Bool\n   born from a Float carries no weight in either branch — not in the `then`, and (this is the\n   part that took a false proof to learn) not in the `else`. *)\n\nmodule FloatLitSafe\n\n(* A float division needs no proof.  `1.0 / 0.0` is not a crash — this machine answers NaN\n   (cek.py: `VFloat(_f32(lf / rf) if rf else nan)`).  It is only the LOGIC that must not\n   pretend to know what came back. *)\nfn ratio(a : Float, b : Float) : Float =\n  a / b\n\n(* NaN, made out of nothing but literals — the one road into the logic that was left open.\n   `nan == nan` is FALSE at run time, so this takes the `else`, so the `else` is the branch\n   that had better be honest. *)\nfn nan_guard(x : Int) : Int =\n  let nan = 0.0 / 0.0 in\n  if nan == nan then 0\n  else if x != 0 then 100 / x\n  else 0\n\nfn main(io : IO) : IO =\n  let io = print(io, show(ratio(7.0, 2.0))) in\n  let io = print(io, show(nan_guard(4))) in\n  print(io, show(nan_guard(0)))\n"}, {"path": "repo/prove/fixtures/19_floatlit_unsafe.lark", "group": "repo/prove/fixtures", "name": "19_floatlit_unsafe.lark", "text": "(* 19 — the mutant.  One line different from the safe file: the integer guard is gone, and\n   the `else` branch of a FLOAT comparison is left to carry the division by itself.\n\n     if nan == nan then 0 else 100 / x        with x = 0\n\n   The old checker proved it: `ok: 1 obligation(s) proved`, exit 0.  (Measured, at 5da6252.)\n\n   Not by proving `x /= 0`.  By finding the path condition ¬(nan == nan) UNSATISFIABLE.\n   Reflexivity is a theorem of equality, so an else-branch guarded by a failed\n   self-comparison is DEAD CODE in the logic — and dead code proves everything.\n\n   Then it runs.  NaN is not equal to itself.  The dead branch is the one the machine takes.\n   Lark divides 100 by 0.\n\n   This is the sharpest form of the lesson, and the reason FLOAT is a SORT rather than\n   a warning.  It was never that the checker knew something false about Floats.  It is that\n   it was ALLOWED TO SPEAK about them — and every true thing it can say about an ordinary\n   value (`a == a`; if `a /= b` then `a` and `b` differ) becomes false the moment the value\n   is a Float.  The fix is not a cleverer fact about NaN.  The fix is silence.\n\n   And silence has to reach the ELSE branch too, which is exactly what a contradiction among\n   the hypotheses quietly denies.  A checker that will not speak about a value, but still\n   believes the NEGATION of something it cannot say, has not stopped talking — it has only\n   stopped being audible.\n\n   New verdict: the guard is untranslatable, so it constrains neither branch, and the goal\n   `x /= 0` stands there with nothing to prove it — which is the truth. *)\n\nmodule FloatLitUnsafe\n\nfn ratio(a : Float, b : Float) : Float =\n  a / b\n\nfn nan_guard(x : Int) : Int =\n  let nan = 0.0 / 0.0 in\n  if nan == nan then 0\n  else 100 / x\n\nfn main(io : IO) : IO =\n  let io = print(io, show(ratio(7.0, 2.0))) in\n  print(io, show(nan_guard(0)))\n"}, {"path": "repo/prove/fixtures/20_condition_safe.lark", "group": "repo/prove/fixtures", "name": "20_condition_safe.lark", "text": "(* 20 — A CONDITION IS AN EXPRESSION.  (found by `08/tests/adversary.py`, seed 4242)\n\n   The deepest of the holes, and the one nobody would have written a test for, because\n   nothing in a Bool position LOOKS partial:\n\n     if (x / y) < x then ... else ...          with y = 0\n\n   Old verdict (measured, at 570f095): `ok: 0 obligation(s) proved`, exit 0.  Zero.  The\n   checker did not fail to prove the division — it never SAW it.\n\n   The cause is one distinction the code had stopped making:\n\n     `formula_opt` and `term_opt` TRANSLATE.  `synth` WALKS.\n     Only the walk raises obligations.  Translation is pure: it asks for nothing.\n\n   And four places translated a sub-expression INSTEAD of walking it — an `if`'s condition,\n   a comparison, a `not`, a unary minus.  Every division inside any of them vanished.  The\n   unary minus is the one that stings: it walked its operand only when `term_opt` FAILED,\n   so the better the checker understood the expression, the less of it it checked.\n\n   The rule is the impl hole's rule, one level down:\n\n     EVERY SUB-EXPRESSION IS WALKED EXACTLY ONCE, whether or not it is also translated.\n     What the checker declines to UNDERSTAND it must still LOOK AT.\n\n   And this was not a corner.  It was in 07's own sample corpus, in the primes sieve —\n   `fn divides(d, n) = n / d * d == n`, a function whose entire body is a comparison —\n   which for the whole life of this fork reported ZERO obligations.  A trial-division\n   sieve, and the checker had never once looked at the division.  (It looks now, and says\n   `unproved`, which is the truth: `d : Int` does not promise `d /= 0`.  See\n   `08/tests/robust_sweep.py`, where that verdict is pinned to the moved value.)\n\n   What this file shows is the same program, said honestly: a division in a condition owes\n   the same obligation as a division anywhere else, and it is discharged the same way — by\n   a fact the caller can read in the SIGNATURE. *)\n\nmodule ConditionSafe\n\n(* The primes sieve's `divides`, with the contract its body always needed.  The division\n   lives inside a comparison; the obligation is raised there and discharged from `d`'s own\n   refinement. *)\nfn divides(d : {v : Int | v != 0}, n : Int) : Bool =\n  n / d * d == n\n\n(* A division in an `if` condition, in a `not`, and under a unary minus:\n   the three positions that used to swallow it.  All three are proved, from one guard. *)\nfn classify(x : Int, y : Int) : Int =\n  if y == 0 then 0\n  else if (x / y) < x then 1\n  else if not ((x / y) > 100) then 2\n  else if -(x / y) < 0 then 3\n  else 4\n\nfn main(io : IO) : IO =\n  let io = print(io, show(divides(3, 9))) in\n  let io = print(io, show(classify(50, 0))) in\n  print(io, show(classify(50, 2)))\n"}, {"path": "repo/prove/fixtures/20_condition_unsafe.lark", "group": "repo/prove/fixtures", "name": "20_condition_unsafe.lark", "text": "(* 20 — the mutant.  The guard is gone, and the divisions sit where they always sat: in a\n   condition, in a `not`, under a minus.  Nothing else changes.\n\n   Old verdict (measured, at 570f095): `ok: 0 obligation(s) proved`, exit 0 — and then\n   `ZeroDivisionError`.  Not one obligation.  The checker had walked the whole program and\n   raised nothing, because every division in it was in a position it TRANSLATED rather than\n   VISITED, and a translation asks for nothing.\n\n   This is the failure mode that should frighten a verification project more than a wrong\n   proof does.  A wrong proof is a bad answer to a question that was asked.  This is the\n   question never being asked — and the report says `ok` either way.  `0 obligation(s)\n   proved` was there in the output the whole time, and it reads like success.\n\n   It is worth saying what found it.  Not a human: nobody writes `if (x / y) < x` on\n   purpose, and nobody auditing this checker (I audited it twice) thought to look in a Bool.\n   `08/tests/adversary.py`, generating programs and RUNNING the ones the checker proved,\n   found it in a few hundred cases — because a random program does not know which positions\n   are supposed to be interesting.\n\n   New verdict: 4 of 4 unproved — one per division, and every one of them `d /= 0` or\n   `y /= 0` with nothing standing behind it, which is the truth. *)\n\nmodule ConditionUnsafe\n\nfn divides(d : Int, n : Int) : Bool =\n  n / d * d == n\n\nfn classify(x : Int, y : Int) : Int =\n  if (x / y) < x then 1\n  else if not ((x / y) > 100) then 2\n  else if -(x / y) < 0 then 3\n  else 4\n\nfn main(io : IO) : IO =\n  let io = print(io, show(divides(0, 9))) in\n  print(io, show(classify(50, 0)))\n"}, {"path": "repo/prove/fixtures/21_result_safe.lark", "group": "repo/prove/fixtures", "name": "21_result_safe.lark", "text": "module ResultSafe\n\n(* a measure's own result refinement, PROVED rather than assumed.\n\n   The measure DECLARES what its result satisfies —\n\n       measure len(xs : List(Int)) : {v : Int | v >= 0}\n\n   — and the checker PROVES it, by structural induction over the very arms that\n   define it.  One obligation per constructor, and the solver learns nothing new:\n\n     arm 'Nil'    prove  len(Nil) >= 0             from  len(Nil) == 0\n     arm 'Cons'   prove  len(Cons($f, rest)) >= 0  from  len(Cons($f, rest)) == 1 + len(rest)\n                                                   and   len(rest) >= 0            (the IH)\n\n   The induction hypothesis is assumed at the RECURSIVE OCCURRENCE and nowhere else.\n   `len(rest)` is an application of the measure to a FIELD of the constructor just\n   taken apart, and a later version's structural check has already established that a field is a\n   smaller value — which is exactly what entitles the proof to assume the conclusion\n   *there* and only there.  An induction VC is not handed its own conclusion as an\n   axiom about arbitrary terms; if it were, a bogus declaration would prove itself,\n   and 21_result_unsafe.lark is what that would cost.\n\n   WHAT IT BUYS, AND WHY NOTHING ELSE COULD.  `avg` divides by `n + 1` where\n   `n == len(xs)`, and that is safe for exactly one reason: a length is not negative,\n   so the divisor is at least 1.  The equations cannot say so.  They pin `len` at the\n   constructor terms a program MENTIONS, and `xs` here is a PARAMETER — there\n   is no `Cons` and no `Nil` to instantiate at, no equation fires, and for all the\n   logic knows `len(xs)` is −1.  A fact that must survive an OPAQUE argument cannot\n   come from a term; it has to come from the declaration.  a later version is what makes the\n   declaration worth believing.\n\n   AND IT IS THE ONE THING the first version KNEW AND ADMITTED IT SHOULD NOT HAVE.  `NONNEG_UF` was\n   a set literal buried in the checker, asserting that `string_length` is never\n   negative — a fact with no proof and no home.  It is deleted.  What replaced it is\n   `refine.PRIMITIVE_AXIOMS`: one table, one line, written in the same language as the\n   declaration above, because String has no constructors, so there is nothing to\n   induct over and its non-negativity must be POSTULATED.  The difference between\n   `len` and `string_length` is now the right one, and it is legible: one is a\n   theorem, the other is an axiom, and the table is the complete list of what is\n   taken on faith.\n\n   Expected output:\n     25 *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : {v : Int | v >= 0} =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  end\n\n(* The real function, tied to the ghost one by its contract.  This is the only way a\n   measure ever reaches running code: a measure is ghost — it lives in\n   Program.measures, never in Program.decls, so HM has never heard of it and calling\n   it from an expression is an unbound-name error.  `size` is what a program may call;\n   `len` is what a contract may say. *)\nfn size(xs : List(Int)) : {v : Int | v == len(xs)} =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) =>\n      let n = size(rest) in\n      1 + n\n  end\n\n(* The divisor is `n + 1`, and it is non-zero because it is POSITIVE — which needs\n   `len(xs) >= 0` at a term the program did not build. *)\nfn avg(xs : List(Int), total : Int) : Int =\n  let n = size(xs) in\n  total / (n + 1)\n\nfn main(io : IO) : IO =\n  print(io, show(avg(Cons(3, Cons(4, Cons(5, Nil))), 100)))\n"}, {"path": "repo/prove/fixtures/21_result_unsafe.lark", "group": "repo/prove/fixtures", "name": "21_result_unsafe.lark", "text": "module ResultUnsafe\n\n(* The mutant of 21_result_safe.lark, and it is a later version's DONE-WHEN: a bogus result\n   declaration must be REJECTED.\n\n   One character moved:\n\n       measure len(xs : List(Int)) : {v : Int | v > 0}\n                                                  ^\n\n   A length is not positive.  `len(Nil)` is 0, and the arm that says so is right\n   there in the declaration, three lines down.  So the induction fails at exactly one\n   place — the 'Nil' arm, whose obligation is `len(Nil) > 0` with `len(Nil) == 0` in\n   its hypotheses — and the 'Cons' arm still proves, because `1 + len(rest) > 0`\n   follows from the induction hypothesis `len(rest) > 0`.  A false claim about a\n   recursive definition is usually false at the BASE case, and the base case is where\n   the checker catches it.\n\n   THIS IS THE DETONATION, NOT A STYLE COMPLAINT.  Admit the declaration and the\n   program is not merely over-promising: it DIVIDES BY ZERO.  `avg` divides by `n`,\n   where `n == len(xs)`, and the only thing standing between that division and a\n   crash is the claim `len(xs) > 0` — which the checker would happily assert at the\n   opaque parameter `xs`, discharging the obligation, printing `ok`, exiting 0.  Then\n   `main` passes `Nil`, `len(Nil)` is 0, and the machine divides 100 by 0.\n\n   So this file is what the induction is FOR.  It is also the reason `run()` withholds\n   a measure's own result refinement from its own induction VCs: hand the 'Nil' arm\n   the axiom it is trying to prove and it discharges itself, the declaration passes,\n   and the checker has proved a division by zero.  Assuming the conclusion is not a\n   subtle bug — it is the entire difference between an induction and a lie. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure len(xs : List(Int)) : {v : Int | v > 0} =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) => 1 + len(rest)\n  end\n\nfn size(xs : List(Int)) : {v : Int | v == len(xs)} =\n  match xs with\n  | Nil           => 0\n  | Cons(_, rest) =>\n      let n = size(rest) in\n      1 + n\n  end\n\nfn avg(xs : List(Int), total : Int) : Int =\n  let n = size(xs) in\n  total / n\n\nfn main(io : IO) : IO =\n  print(io, show(avg(Nil, 100)))\n"}, {"path": "repo/prove/fixtures/22_lambda_safe.lark", "group": "repo/prove/fixtures", "name": "22_lambda_safe.lark", "text": "(* 22 — a lambda's body is code, and code is walked.\n\n   The eighth false proof, and the first one this project found ON PURPOSE.  Every\n   earlier one turned up because someone wrote a hostile program and got lucky.  This\n   one was found by `08/tests/invariants.py`, which asks a question no test had asked\n   before — *did the checker LOOK at this node?* — of every expression in the whole\n   corpus.  Seven nodes in `07/samples/09_parser.lark` came back never-walked, and three\n   in `07/tests/10_closures.lark`, and they were all the same thing: the body of a lambda\n   bound by a `let`.\n\n   `check` walks a lambda's body, because it has an expected function type to push into\n   it.  `synth` did not — and an unannotated `let h = fn (a) => …` goes through `synth`.\n   So the body was never looked at, and:\n\n       let h = fn (a : Int) => 100 / a in h(0)\n\n   reported `ok: 0 obligation(s) proved`, exit 0, and then raised ZeroDivisionError.  It\n   is a later version(7) exactly — a piece of the program the checker never walked — wearing a hat\n   nobody had thought to check under.\n\n   Here the divisions inside the lambdas are safe, and the checker must now SEE them and\n   prove them: `d` is declared non-zero, and 2 is a literal.  A lambda's parameter carries\n   whatever its annotation says and nothing else — the checker does not know where this\n   function will be called, so it must prove the body for EVERY argument. *)\n\nmodule LambdaSafe\n\nfn apply(f : Int -> Int, x : Int) : Int = f(x)\n\nfn quotient(n : Int, d : {v : Int | v != 0}) : Int =\n  (* the divisor's non-zeroness comes from the ANNOTATION, and it has to survive the\n     trip into the lambda's body — the parameter is bound with its refinement, exactly\n     as a function's parameter is. *)\n  let go = fn (k : {v : Int | v != 0}) => n / k in\n  go(d)\n\nfn halves(n : Int) : Int =\n  (* an unannotated parameter is opaque: the checker knows nothing about `x`, which is\n     the truth.  The division is by the literal 2, so it proves anyway. *)\n  let half = fn (x) => x / 2 in\n  apply(half, n)\n\nfn main(io : IO) : IO =\n  let io = print(io, int_to_string(quotient(100, 4))) in\n  print(io, int_to_string(halves(50)))\n"}, {"path": "repo/prove/fixtures/22_lambda_unsafe.lark", "group": "repo/prove/fixtures", "name": "22_lambda_unsafe.lark", "text": "(* 22 — the mutant.  The division moves inside a lambda, and nothing else changes.\n\n   THIS IS THE WHOLE BUG, IN ONE FILE.  `100 / a` at the top of a function raised an\n   obligation and always had.  The same `100 / a` one line lower, inside `fn (a) => …`,\n   raised NOTHING — because `synth` returned `ROpaque()` for a Lambda without ever\n   looking at its body.\n\n   Old verdict (measured, before the fix):\n\n       ok: 0 obligation(s) proved          exit 0\n\n   ...and then, at run time, ZeroDivisionError.  Zero obligations is not \"there was\n   nothing to prove\".  It is \"I did not look\", printed in the words of \"there is nothing\n   wrong\" — the exact failure a later version named and this checker committed again, one hat along.\n\n   Now: one obligation, unproved.  `h` may be called with anything (the checker does not\n   track its call sites), so `a /= 0` must hold for EVERY argument, and it does not. *)\n\nmodule LambdaUnsafe\n\nfn risky(n : Int) : Int =\n  let h = fn (a : Int) => 100 / a in\n  h(n - n)                          (* h(0).  The divisor is zero, and always was. *)\n\nfn main(io : IO) : IO =\n  print(io, int_to_string(risky(7)))\n"}, {"path": "repo/prove/fixtures/23_boolmeasure_safe.lark", "group": "repo/prove/fixtures", "name": "23_boolmeasure_safe.lark", "text": "module BoolMeasureSafe\n\n(* a BOOL-VALUED measure, and the one place in the solver it needed.\n\n   `len` returns an Int, and an Int measure hangs on `==`: `len(Cons(x, xs)) == 1 +\n   len(xs)` is a term equated to a term, and congruence closure was already built to\n   decide those.  `pos` returns a Bool, and a Bool measure is not an equation but a\n   PROPOSITION — `pos(t)` is either asserted or denied, there is no `==` to hang it\n   on.  So its arm is spelled as an EQUIVALENCE, two implications (`_instantiate`),\n   and the atom it turns on is `Atom(pos(...))`.\n\n   That atom is the whole rung, and the DESTRUCTING half is where it earns its keep.\n   `root` knows `pos(t)` from its contract and learns `t == Node(l, x, r)` from the\n   pattern; the two are different terms, equal only by CONGRUENCE, and the fact it\n   wants — `x > 0` — arrives only if the atom `pos(t)` can be carried across that\n   equality to `pos(Node(l, x, r))` and there resolved through the equivalence to\n   `true`.  a later version never had to: no Int measure ever produced a `true`/`false`, so the\n   two Bool literals were never in the closure and never asserted DISTINCT.  A Bool\n   measure produces them, and the fix is one line in `Theory.consistent` — the\n   `BoolLit` an atom is bridged to must itself ENTER the closure, or `true` and\n   `false` collapse and the atom decides nothing.\n\n   The Tree is MONOMORPHIC (`Node of Tree, Int, Tree`), so the destructured `x` is\n   Int by construction — this file needs nothing from the polymorphic field-sort gap,\n   which is a separate matter left for later.\n\n   `root` owes two obligations: the 'Leaf' arm returns `1` against `{v | v > 0}`, and\n   the 'Node' arm returns `x` and must prove `x > 0` — provable ONLY from `pos(t)`.\n   `main` divides by the root of a tree it built, and the division `100 / root(...)`\n   is safe BECAUSE the result is positive.\n\n   Its mutant, 23_boolmeasure_unsafe.lark, drops the `pos` precondition and passes a\n   tree with a non-positive root: the obligation goes UNPROVED, and were it admitted,\n   `main` would divide 100 by a number that is not positive.\n\n   And it RUNS: a measure is ghost, so `pos` is a name the CEK machine never sees.\n\n   Expected output:\n     20 *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure pos(t : Tree) : Bool =\n  match t with\n  | Leaf           => true\n  | Node(l, x, r)  => x > 0 and pos(l) and pos(r)\n  end\n\nfn root(t : {v : Tree | pos(v)}) : {v : Int | v > 0} =\n  match t with\n  | Leaf          => 1\n  | Node(l, x, r) => x\n  end\n\nfn main(io : IO) : IO =\n  let x = root(Node(Leaf, 5, Leaf)) in\n  print(io, show(100 / x))\n"}, {"path": "repo/prove/fixtures/23_boolmeasure_unsafe.lark", "group": "repo/prove/fixtures", "name": "23_boolmeasure_unsafe.lark", "text": "module BoolMeasureUnsafe\n\n(* The mutant of 23_boolmeasure_safe.lark, and the bug is one character: the tree\n   `main` builds has root `0`, not `5`.\n\n   `root`'s precondition is `{v : Tree | pos(v)}`, so the call owes `pos(Node(Leaf,\n   0, Leaf))` — and that is FALSE, because the 'Node' arm of `pos` is `0 > 0 and\n   ...`.  The obligation must go UNPROVED: this is the BUILDING direction of the\n   Bool measure, a false PROPOSITION about a constructor term the program wrote, and\n   the atom `pos(Node(Leaf, 0, Leaf))` has to resolve through the equivalence to\n   `false` rather than being quietly believed.\n\n   Were it admitted, the detonation is real: `root` would return `0`, `x` would be\n   `0`, and `main` would evaluate `100 / 0`.  The measure is the only thing standing\n   between the checker and that division, which is the whole point of the rung.\n\n   Expected: 1 of 4 obligations unproved. *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure pos(t : Tree) : Bool =\n  match t with\n  | Leaf           => true\n  | Node(l, x, r)  => x > 0 and pos(l) and pos(r)\n  end\n\nfn root(t : {v : Tree | pos(v)}) : {v : Int | v > 0} =\n  match t with\n  | Leaf          => 1\n  | Node(l, x, r) => x\n  end\n\nfn main(io : IO) : IO =\n  let x = root(Node(Leaf, 0, Leaf)) in\n  print(io, show(100 / x))\n"}, {"path": "repo/prove/fixtures/24_polylist_safe.lark", "group": "repo/prove/fixtures", "name": "24_polylist_safe.lark", "text": "module PolyListSafe\n\n(* THE POLYMORPHIC-FIELD THERMOMETER (P2).  The Tree fixture wearing the hat\n   the fix is actually about: a measure over a POLYMORPHIC `List(a)`, destructured\n   at `Cons(x, rest)` where `x` is the polymorphic field `a`.\n\n   This is the same `allpos`/`head`/divide shape as `23_boolmeasure_safe.lark`, and\n   the only difference is monomorphic → polymorphic — which is the whole of P2.  In\n   `head`'s `Cons(x, rest)` arm, `infer_pat` instantiates `Cons : a, List(a) ->\n   List(a)` with a FRESH `a` and never learns the scrutinee is a `List(Int)`, so `x`\n   lands at sort OTHER.  The measure equation `allpos(Cons(x, rest)) <=> x > 0 and\n   allpos(rest)` then puts an OTHER-sorted `x` where the arm declared `Int`, and\n   `_instantiate`'s sort guard DROPS it — so `x > 0` never reaches the solver and\n   `head`'s postcondition `{v : Int | v > 0}` goes UNPROVED.  The gap is the SOUND\n   direction (a dropped fact, never a false one): before the fix this file proves\n   short, after it proves in full, and the count is the reading on the thermometer.\n\n   The fix is the ADT analog of the RTuple fix a later version made: the scrutinee has\n   already been synthesised and now CARRIES its monotype, so `_bind_pattern` unifies\n   the pattern's type against `List(Int)` and `x` is pinned to `Int` — no measure is\n   trusted, no field sort is guessed, the scrutinee's own type says `a := Int`.\n\n   It RUNS: head(Cons(5, Cons(3, Nil))) = 5, and 100 / 5 = 20. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure allpos(xs : List(Int)) : Bool =\n  match xs with\n  | Nil           => true\n  | Cons(x, rest) => x > 0 and allpos(rest)\n  end\n\nfn head(xs : {v : List(Int) | allpos(v)}) : {v : Int | v > 0} =\n  match xs with\n  | Nil           => 1\n  | Cons(x, rest) => x\n  end\n\nfn main(io : IO) : IO =\n  let x = head(Cons(5, Cons(3, Nil))) in\n  print(io, show(100 / x))\n"}, {"path": "repo/prove/fixtures/24_polylist_unsafe.lark", "group": "repo/prove/fixtures", "name": "24_polylist_unsafe.lark", "text": "module PolyListUnsafe\n\n(* The mutant of 24_polylist_safe.lark, one character: the list `main` builds has\n   head `0`, not `5`.\n\n   `head`'s precondition is `{v : List(Int) | allpos(v)}`, so the call owes\n   `allpos(Cons(0, Nil))` — and that is FALSE, because the `Cons` arm of `allpos` is\n   `0 > 0 and ...`.  The obligation must go UNPROVED.  This is the same proposition-\n   about-a-constructor-term the Bool-measure rung checks, now over a POLYMORPHIC list:\n   the P2 fix must pin `x : Int` at the DEFINITION of `head` without also making the\n   false precondition provable at its CALL.\n\n   Were it admitted, `head` would return `0`, `x` would be `0`, and `main` would\n   evaluate `100 / 0`.\n\n   Expected: 1 of 4 obligations unproved. *)\n\ntype List a = | Nil | Cons of a, List(a)\n\nmeasure allpos(xs : List(Int)) : Bool =\n  match xs with\n  | Nil           => true\n  | Cons(x, rest) => x > 0 and allpos(rest)\n  end\n\nfn head(xs : {v : List(Int) | allpos(v)}) : {v : Int | v > 0} =\n  match xs with\n  | Nil           => 1\n  | Cons(x, rest) => x\n  end\n\nfn main(io : IO) : IO =\n  let x = head(Cons(0, Nil)) in\n  print(io, show(100 / x))\n"}, {"path": "repo/prove/fixtures/25_minimum_redef.lark", "group": "repo/prove/fixtures", "name": "25_minimum_redef.lark", "text": "module MinimumRedef\n\n(* THE SOUNDNESS GUARD OF THE min/max RUNG — `16_axiom`'s rule, re-run for `min`.\n\n   An axiom is about a FUNCTION, not about a NAME.  `min`'s three facts are true of\n   the BUILTIN, because the builtin returns the smaller argument.  A program is free to\n   declare a function it also calls `min`, and then the symbol `min` in a VC is THAT\n   one — so asserting the builtin's axiom about it is a false proof, and it would be a\n   bad one: this `min` is the SUM, and `min(1, 1)` is `2`, which is not `<= 1`.\n\n   `Refiner.__init__` intersects `PRIMITIVE_AXIOMS` with the names the program leaves\n   alone, so a declared `min` DROPS the axiom.  `min` is then uninterpreted — the\n   program's own function, with no contract to read off — and `bad`'s return obligation\n   `min(a, b) <= a` is unprovable, which is the true answer.  Were the axiom asserted\n   anyway, the checker would prove `bad` returns something `<= a` when it returns `a + b`.\n\n   This file is the reason the axiom lives in `PRIMITIVE_AXIOMS` (one auditable table,\n   guarded once in `__init__`) rather than being wired in ad hoc at the min/max sites:\n   the guard is a property of every primitive axiom, and there is exactly one of it.\n\n   Expected: 1 of 1 obligations unproved — the axiom is correctly withheld. *)\n\nfn min(a : Int, b : Int) : Int = a + b\n\nfn bad(a : Int, b : Int) : {v : Int | v <= a} =\n  min(a, b)\n\nfn main(io : IO) : IO =\n  print(io, show(bad(1, 1)))\n"}, {"path": "repo/prove/fixtures/25_minimum_safe.lark", "group": "repo/prove/fixtures", "name": "25_minimum_safe.lark", "text": "module MinimumSafe\n\n(* `min` and `max` as UNINTERPRETED symbols with their defining\n   axioms, and NOTHING more.  This is the smallest sound rung of the min/max fork: no\n   new decision procedure, no str n(5, 0)` is `0` and `main` would divide 100 by it.\n\n   It RUNS: `min`/`max` are ordinary builtins at run time, and the refinement is ghost.\n\n   Expected output:\n     50 *)\n\nfn min_le(a : Int, b : Int) : {v : Int | v <= a and v <= b} =\n  min(a, b)\n\nfn min_pos(a : {v : Int | v > 0}, b : {v : Int | v > 0}) : {v : Int | v > 0} =\n  min(a, b)\n\nfn max_ge(a : Int, b : Int) : {v : Int | v >= a and v >= b} =\n  max(a, b)\n\nfn main(io : IO) : IO =\n  let m = min_pos(5, 2) in\n  print(io, show(100 / m))\n"}, {"path": "repo/prove/fixtures/25_minimum_unsafe.lark", "group": "repo/prove/fixtures", "name": "25_minimum_unsafe.lark", "text": "module MinimumUnsafe\n\n(* The mutant of 25_minimum_safe.lark, and the change is one argument: `main` calls\n   `min_pos(5, 0)` rather than `min_pos(5, 2)`.\n\n   `min_pos`'s second parameter is `{v : Int | v > 0}`, so the call owes `0 > 0` — and\n   that is FALSE.  The obligation must go UNPROVED.  This is the false-PRECONDITION\n   direction, the same shape as the Bool-measure and polymorphic-list rungs: the axiom\n   over `min` is honest in the BODY of `min_pos` (its result really is positive when\n   both arguments are), and the only way to reach a non-positive minimum is to lie at\n   the CALL about what you are handing it.\n\n   Were it admitted, the detonation is real: `min(5, 0)` is `0`, `m` is `0`, and `main`\n   would evaluate `100 / 0`.  The `{v > 0}` precondition is the only thing standing\n   between the checker and that division.\n\n   The other five obligations are unchanged and still prove — `min_le`, `min_pos`'s own\n   body, `max_ge`, the first argument `5 > 0`, and the division `100 / m` (which reads\n   `min_pos`'s declared `{v > 0}` result) — so exactly one obligation flips, which is\n   what makes the pair a thermometer and not a coin flip.\n\n   Expected: 1 of 6 obligations unproved. *)\n\nfn min_le(a : Int, b : Int) : {v : Int | v <= a and v <= b} =\n  min(a, b)\n\nfn min_pos(a : {v : Int | v > 0}, b : {v : Int | v > 0}) : {v : Int | v > 0} =\n  min(a, b)\n\nfn max_ge(a : Int, b : Int) : {v : Int | v >= a and v >= b} =\n  max(a, b)\n\nfn main(io : IO) : IO =\n  let m = min_pos(5, 0) in\n  print(io, show(100 / m))\n"}, {"path": "repo/prove/fixtures/26_ifpred_drop.lark", "group": "repo/prove/fixtures", "name": "26_ifpred_drop.lark", "text": "module IfPredDrop\n\n(* The soundness sentinel for a later version — the analog of 25_minimum_redef.lark.\n\n   A guarded predicate is admitted ONLY when all three of c, p, q translate.  Here\n   the else branch is `v == x * x * x`, and `x * x * x` is NON-LINEAR — the ordinary\n   way out of the fragment.  So `q` is untranslatable, the whole `if`-predicate is\n   None, and the STRICT `formula()` at the declaration site rejects the contract.\n\n   This file must stay REJECTED even AFTER step 2 lands.  If the new `IfExpr` case\n   ever `or Top()`-ed an untranslatable branch — the shape of false proofs #2 and\n   #7 — this contract would be silently admitted with a `true` where the source said\n   `v == x * x * x`, and `f` could then claim anything on its negative inputs.  The\n   rule is the one the first version installed for the solver and `_branch` installed for a\n   program-position `if`: where the checker cannot translate, it says NOTHING.\n\n   Expected: rejected at the declaration (\"not a predicate in the decidable\n   fragment: if ...\"), never proved. *)\n\nfn f(x : Int) : {v : Int | if x >= 0 then v == x else v == x * x * x} =\n  x\n\nfn main(io : IO) : IO =\n  print(io, show(f(3)))\n"}, {"path": "repo/prove/fixtures/26_ifpred_safe.lark", "group": "repo/prove/fixtures", "name": "26_ifpred_safe.lark", "text": "module IfPredSafe\n\n(* `if` in PREDICATE position, and nothing more.\n\n   Until now a guarded predicate was UNSPEAKABLE: `formula_opt` had no `IfExpr`\n   case, so `{v : Int | if c then p else q}` returned None and the STRICT\n   `formula()` at the declaration site rejected the whole contract.  Step 2 gives\n   the predicate language exactly one new shape:\n\n       if c then p else q   ==>   (c => p)  and  (not c => q)\n\n   and ONLY when c, p and q all translate.  If any of the three is untranslatable\n   the whole predicate is None again — which at a declaration means REJECTED, never\n   silently `true`.  That is a later version's law one level up (`_branch` already enforces it\n   for an `if` in PROGRAM position): a checker that cannot say something says\n   NOTHING — never its negation, and never Top.  No solver change: `Implies`, `And`\n   and `Not` are already decided.  No term-level `if`: a conditional in INT position\n   (inside a comparison) stays untranslatable, which is sound.\n\n   `abs` is the fixture because it needs the guard in BOTH directions and on BOTH\n   sides of the checker:\n\n     - CHECKING abs's body proves the guarded postcondition once per branch: the\n       then-branch (value `x`, under `x >= 0`) owes `x == x`; the else-branch (value\n       `0 - x`, under `not (x >= 0)`) owes `(0 - x) == 0 - x` and `(0 - x) >= 0`.\n       Both hold, and neither could without the guard sorting them out.\n\n     - USING it, `main` calls `abs(0 - 4)`: the postcondition instantiates its guard\n       at `x = -4`, so `-4 >= 0` is FALSE, the else disjunct fires, and the caller\n       learns `a == 0 - (-4)`, i.e. `a == 4`.  That is what discharges `100 / a`.\n\n   Three obligations, all proved: two from abs's body (one per branch), one for the\n   division in `main`.\n\n   Its mutant, 26_ifpred_unsafe.lark, calls `abs(0)`: the guard is TRUE, so `a == 0`,\n   the division `100 / a` goes UNPROVED, and were it admitted `abs(0)` is `0` and\n   `main` would divide 100 by it.\n\n   It RUNS: the refinement is ghost; `abs` is ordinary arithmetic at run time.\n\n   Expected output:\n     25 *)\n\nfn abs(x : Int) : {v : Int | v >= 0 and (if x >= 0 then v == x else v == 0 - x)} =\n  if x >= 0 then x else 0 - x\n\nfn main(io : IO) : IO =\n  let a = abs(0 - 4) in\n  print(io, show(100 / a))\n"}, {"path": "repo/prove/fixtures/26_ifpred_unsafe.lark", "group": "repo/prove/fixtures", "name": "26_ifpred_unsafe.lark", "text": "module IfPredUnsafe\n\n(* The mutant of 26_ifpred_safe.lark.  `abs` and its guarded postcondition are\n   UNCHANGED and still honest — the lie is at the call.  `main` divides by `abs(0)`.\n\n   The postcondition's guard instantiates at `x = 0`: `0 >= 0` is TRUE, so the THEN\n   disjunct fires and the caller learns `a == 0` (and `a >= 0`).  The division\n   `100 / a` then owes `a != 0`, which is FALSE, so it goes UNPROVED — exactly one of\n   the three obligations.  abs's own two body obligations still prove.\n\n   This is the mutant a broken `if`-translation would wave through: if the else\n   branch collapsed to `true`, or the guard were dropped, the checker could conclude\n   `a != 0` from the wrong disjunct.  It does not — the guard at `x = 0` selects the\n   then-disjunct and `a == 0` stands.\n\n   Were the division admitted, it would divide 100 by 0 at run time. *)\n\nfn abs(x : Int) : {v : Int | v >= 0 and (if x >= 0 then v == x else v == 0 - x)} =\n  if x >= 0 then x else 0 - x\n\nfn main(io : IO) : IO =\n  let a = abs(0) in\n  print(io, show(100 / a))\n"}, {"path": "repo/prove/fixtures/27_lambdapre_safe.lark", "group": "repo/prove/fixtures", "name": "27_lambdapre_safe.lark", "text": "(* 27 — a lambda's PARAMETER is a contract, and a contract is discharged at the call.\n\n   The ninth false proof, and the sibling of 22.  22 fixed the OTHER half: a lambda's\n   body is code, so `synth` must WALK it — a division inside `fn (a) => 100 / a` now\n   raises its obligation.  But walking the body left a hole one step along.  The body is\n   walked with the parameter bound to WHAT ITS ANNOTATION SAYS: `fn (k : {v | v != 0})`\n   assumes `k != 0` while checking `100 / k`, and so proves it.  That assumption is only\n   honest if every CALL is made to keep it — and `synth` returned `ROpaque()`, which\n   carries no parameter contract, so the application discharged NOTHING:\n\n       let g = fn (k : {v : Int | v != 0}) => 100 / k in g(0)\n\n   reported `ok: 1 obligation(s) proved`, exit 0, and then raised ZeroDivisionError.  The\n   body's `k != 0` was proved from an assumption the call never had to earn.  Found by the\n   adversary, which speaks refined lambdas and then RUNS what the checker proves.\n\n   The fix is the one 22's comment pointed at without taking: a lambda synthesises an\n   `RFun` carrying its parameters' refinements, exactly as a top-level `fn` does, so the\n   existing call-site machinery (`_apply`) raises the precondition obligation — and the\n   body may go on assuming the parameter BECAUSE the caller is now made to establish it.\n\n   Here every call keeps the contract, so the safe file proves and runs: the divisor `k`\n   is non-zero on the ANNOTATION, the caller passes `d` which is non-zero on ITS\n   annotation, and `main` passes the literal 4. *)\n\nmodule LambdaPreSafe\n\nfn use(d : {v : Int | v != 0}) : Int =\n  (* `g`'s parameter demands a non-zero divisor.  The body proves `100 / k` from that\n     demand; the call `g(d)` is now made to MEET it, and does, because `d` is non-zero. *)\n  let g = fn (k : {v : Int | v != 0}) => 100 / k in\n  g(d)\n\nfn main(io : IO) : IO =\n  print(io, int_to_string(use(4)))\n"}, {"path": "repo/prove/fixtures/27_lambdapre_unsafe.lark", "group": "repo/prove/fixtures", "name": "27_lambdapre_unsafe.lark", "text": "(* 27 — the mutant.  The lambda is unchanged; the call breaks its contract.\n\n   THIS IS THE NINTH FALSE PROOF, IN ONE FILE.  `g`'s parameter is `{v | v != 0}`, and its\n   body proves `100 / k` from that.  The call then passes ZERO.  Under the old checker the\n   lambda's type was `ROpaque()` — it carried no parameter contract — so the application\n   discharged nothing, and the verdict was the body's obligation alone:\n\n       ok: 1 obligation(s) proved          exit 0\n\n   ...and then, at run time, ZeroDivisionError.  One obligation proved is not \"the program\n   is safe\".  It is \"the body is safe IF the parameter is non-zero\" — a promise the call\n   was never asked to keep.  It is 22 one step along: 22 made `synth` LOOK at the body;\n   this makes the call PAY for what the body assumed.\n\n   Now: two obligations, one unproved.  The body still proves `k != 0` (it may assume its\n   parameter), and the call `g(x - x)` owes `0 != 0`, which is false. *)\n\nmodule LambdaPreUnsafe\n\nfn use(x : Int) : Int =\n  let g = fn (k : {v : Int | v != 0}) => 100 / k in\n  g(x - x)                          (* g(0).  The divisor is zero, and always was. *)\n\nfn main(io : IO) : IO =\n  print(io, int_to_string(use(7)))\n"}, {"path": "repo/prove/fixtures/28_minmax_untranslatable.lark", "group": "repo/prove/fixtures", "name": "28_minmax_untranslatable.lark", "text": "(* 28 — a min/max axiom the checker cannot STATE, and so must decline, not raise.\n\n   The adversary that speaks `min`/`max` found this the moment it\n   could say it.  `min`/`max` carry an axiom about their result — `min(a, b) <= a`, and the\n   rest — instantiated at every application an obligation mentions (step 1).  But an\n   argument the logic cannot NAME is skolemised, and a skolem for a term-level `if` (which\n   is untranslatable, a later version) lands at sort OTHER.  The axiom then reads\n   `min($k1, $k2) <= $k1` — an ORDER comparison on a non-integer term — and the solver\n   RAISED `comparison on non-integer terms`, turning a legal program into no answer at all.\n\n   That is the failure `torture` names: the only failing grade is no verdict.  The fix is\n   `_instantiate`'s rule one table over — `result_axioms` now takes the sort context and\n   DROPS an instantiation whose order-comparisons are not both integers, exactly as the\n   solver's own `arith` bucket would demand.  Where the checker cannot speak, it says\n   NOTHING: `min`'s result stays opaque, and the division by it goes honestly unproved.\n\n   Both arguments to `min` here are term-level `if`s (untranslatable), so the axiom cannot\n   fire; the divisor `min(...)` is opaque; `100 / min(...)` is UNPROVED.  It is safe at run\n   time (`min(5, 5)` is 5), which makes it the good half of the pair: the checker is too\n   weak here, and too weak is allowed — RAISING is not. *)\n\nmodule MinMaxUntranslatable\n\nfn f(x : Int) : Int =\n  100 / min((if x != 0 then x else 1), (if x > 0 then x else 1))\n\nfn main(io : IO) : IO =\n  print(io, int_to_string(f(5)))\n"}, {"path": "repo/prove/fixtures/29_floatfield_safe.lark", "group": "repo/prove/fixtures", "name": "29_floatfield_safe.lark", "text": "module FloatFieldSafe\n\n(* THE FOURTH ROAD INTO A FLOAT, and the control for its mutant.  a later version paved three\n   roads into a Float's type — a Float PARAMETER (its type says so), a `float_sqrt`\n   RESULT (its declaration says so), and a Float LITERAL (19_floatlit).  A Float\n   carried in a CONSTRUCTOR FIELD is a fourth, and until this pair nothing in the\n   suite drove it: no type in prove/ had a Float field at all.\n\n   The point this file makes is 13_float_safe's, one road along: silence about a Float\n   costs a program NOTHING it was entitled to.  `Box` carries a Float `f` and an Int\n   `n` side by side.  The division is about `n`, an Int, and it is discharged from an\n   Int guard exactly as if the Float were not there — because to the checker it is not.\n\n   The mutant is one field away (29_floatfield_unsafe): move the guard from the Int\n   field to the Float field, and the guard stops speaking.  That is the whole rung —\n   a Float reaches the logic through a constructor exactly as it reaches it anywhere\n   else, which is to say NOT AT ALL, and the guard's proof stands or falls on which\n   field it reads.\n\n   Expected: proved 2, runs → 25. *)\n\ntype Box = | B of Float, Int\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn get(box : Box) : Int =\n  match box with\n  | B(f, n) => if n != 0 then div(100, n) else 0\n  end\n\nfn main(io : IO) : IO =\n  print(io, show(get(B(1.5, 4))))\n"}, {"path": "repo/prove/fixtures/29_floatfield_unsafe.lark", "group": "repo/prove/fixtures", "name": "29_floatfield_unsafe.lark", "text": "module FloatFieldUnsafe\n\n(* THE MUTANT — and a false proof that would have slipped through a suite that only\n   ever put a Float in a PARAMETER.  One field different from 29_floatfield_safe: the\n   guard now reads the Float field `f` instead of the Int field `n`.\n\n     match box with | B(f, n) => if f == f then 0 else div(100, d) end\n\n   `f == f` is the same lie as 13_float_unsafe's `x == x`, only now the Float arrived\n   through a constructor.  In the logic equality is reflexive — congruence closure\n   makes it so, as it must.  At run time `f == f` is FALSE when `f` is NaN, and `main`\n   builds exactly that: `B(0.0 / 0.0, 0)`.  So the machine takes the `else` and divides\n   100 by 0.\n\n   Were the field speakable, the checker would assume `not (f == f)` in the `else`,\n   find it unsatisfiable, and prove the branch VACUOUSLY — `ok: 2 obligation(s) proved`,\n   exit 0, then the divide-by-zero.  This is not hypothetical: delete the FLOAT-silence\n   guard in `term_opt` (make a Float speakable again) and this file flips from `1 of 2\n   unproved` to `2 proved`.  It is 13's regression, guarded on a road 13 does not walk.\n\n   The fix is the same one, and it needs nothing new: a Float has a sort at which no\n   term is ever built, so `f` — however it entered — is unnameable, `f == f` is a\n   condition the checker cannot read, and an unreadable condition constrains NEITHER\n   branch.  The `else`'s division stands with nothing to prove `d != 0`, which is the\n   truth: `d` really is 0.\n\n   Expected: 1 of 2 unproved. *)\n\ntype Box = | B of Float, Int\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn get(box : Box, d : Int) : Int =\n  match box with\n  | B(f, n) => if f == f then 0 else div(100, d)\n  end\n\nfn main(io :
