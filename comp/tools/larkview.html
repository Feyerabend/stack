 IO) : IO =\n  print(io, show(get(B(0.0 / 0.0, 0), 0)))\n"}, {"path": "repo/prove/fixtures/30_floatpred_reject.lark", "group": "repo/prove/fixtures", "name": "30_floatpred_reject.lark", "text": "module FloatPredReject\n\n(* A DIFFERENT CONTEXT, A DIFFERENT REFUSAL.  13, 19 and 29 all show a Float going\n   silent in PROGRAM position — a guard that constrains nothing, a division that goes\n   honestly unproved.  Silence is the right answer there because a program-position\n   condition is allowed to say nothing.\n\n   A REFINEMENT is not.  `{v : Float | v > 0.0}` is a CLAIM the checker would have to\n   read and carry as a hypothesis at every call — and a Float is precisely the value it\n   may not read.  So here the checker does not go silent; it REJECTS the declaration.\n   The two are the same principle (a Float is unspeakable) reached by two different\n   roads: in program position the road is `term_opt`, which returns None and lets the\n   obligation go unproved; in a predicate the road is the STRICT `formula()` at the\n   declaration site, which has no None to fall back on and raises.\n\n   This is the pedagogical half of the interlude: there is no single \"Float rule.\"\n   The one fact — no term is ever built at sort FLOAT — surfaces as SILENCE where a\n   formula is optional and as an ERROR where a formula is mandatory.  A checker that\n   returned `true` here instead of raising would be the `or Top()` mistake (false\n   proofs #2/#7) in the refinement language itself.\n\n   Note the predicate mentions the float literal `0.0`, but it need not: `{v : Float |\n   v == v}` is rejected for the same reason, because the BINDER is a Float and the\n   binder alone is already unspeakable.\n\n   Expected: refinement error — the predicate is not in the decidable fragment. *)\n\nfn scale(x : {v : Float | v > 0.0}) : Int = 7\n\nfn main(io : IO) : IO =\n  print(io, show(scale(1.5)))\n"}, {"path": "repo/prove/fixtures/31_substitutivity_safe.lark", "group": "repo/prove/fixtures", "name": "31_substitutivity_safe.lark", "text": "module SubstSafe\n\n(* THE OTHER HALF OF THE LIE — and its control.  13_float_unsafe is REFLEXIVITY: the\n   logic believes `x == x`, which NaN denies.  This pair is the twin failure,\n   SUBSTITUTIVITY: from `a == b` the logic would conclude `g(a) == g(b)` for any `g` —\n   and IEEE-754 has values that are `==` at run time yet distinguishable (`0.0` and\n   `-0.0` compare equal, but `1.0 / x` is `+inf` for one and `-inf` for the other).\n   Reflexivity and substitutivity are the two things congruence closure IS, and a Float\n   breaks BOTH — which is the whole reason a Float gets a sort rather than a warning.\n\n   This control shows, as 13_float_safe does, that closing the door costs nothing.  A\n   Float `a` is a parameter; it is passed and ignored; the division is about `d`, an\n   Int, discharged from an Int guard.  The point of the pair is the mutant next door\n   (31_substitutivity_unsafe), which tries to launder a division's safety through the\n   equality of two Floats and is correctly left unproved.\n\n   Expected: proved 2, runs → 25. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn f(a : Float, d : Int) : Int =\n  if d != 0 then div(100, d) else 0\n\nfn main(io : IO) : IO =\n  print(io, show(f(1.5, 4)))\n"}, {"path": "repo/prove/fixtures/31_substitutivity_unsafe.lark", "group": "repo/prove/fixtures", "name": "31_substitutivity_unsafe.lark", "text": "module SubstUnsafe\n\n(* SUBSTITUTIVITY, WEAPONISED — the mutant, and a demonstration that the ONE guard\n   closes BOTH halves of the lie.  13's mutant needs a NaN; this one needs no NaN at\n   all, only that a Float can be equal to something it differs from.\n\n     if a == b then div(100, tag(a) - tag(b) + 1) else 0\n\n   Read it in a logic where a Float is speakable (an ordinary OTHER value).  The guard\n   `a == b` is now a hypothesis.  `tag` is a function, so congruence closure derives\n   `tag(a) == tag(b)`, hence `tag(a) - tag(b) == 0`, hence the divisor `tag(a) - tag(b)\n   + 1 == 1` — provably non-zero, and the division is PROVED.  This is not the reflexive\n   lie; it is the substitutive one: the checker never says `a == a`, it says `equals\n   have equal images`, which is the other axiom congruence is built from.\n\n   And it is a real regression, not decoration: delete the FLOAT-silence guard in\n   `term_opt` and this file flips from `1 of 2 unproved` to `2 proved` — a false proof,\n   caught here by exactly the same fix that catches 13.  That is the lesson of the\n   interlude in one line: reflexivity (13) and substitutivity (31) are the two doors of\n   congruence closure, and BOTH are shut by a single guard — no Float term is ever\n   built, so `a == b` over Floats is itself unreadable and asserts nothing to close on.\n\n   A note on run time, and it is the honest one.  This particular call, `f(0.0, 0.0)`,\n   does not divide by zero: `tag` is constant and the arguments are the same value, so\n   the divisor is 1.  The danger is not that THIS instance detonates — it is that the\n   checker would have PROVED the division for every `tag`, including a `tag` that reads\n   the sign of a zero, where `a == b` holds and `tag(a) - tag(b)` is `-1`.  The sound\n   answer is to prove nothing about a value whose equality the machine does not share.\n   So the division goes unproved, which is the truth about what the logic can know.\n\n   Expected: 1 of 2 unproved. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn tag(x : Float) : Int = 0\n\nfn f(a : Float, b : Float) : Int =\n  if a == b then div(100, tag(a) - tag(b) + 1) else 0\n\nfn main(io : IO) : IO =\n  print(io, show(f(0.0, 0.0)))\n"}, {"path": "repo/prove/fixtures/32_floatmeasure_reject.lark", "group": "repo/prove/fixtures", "name": "32_floatmeasure_reject.lark", "text": "module FloatMeasureReject\n\n(* A THIRD CONTEXT, A THIRD REFUSAL — and the one that is doubly barred.  A measure's\n   arm becomes an AXIOM the checker instantiates at concrete terms; its\n   body must therefore be a term the logic can name.  A measure that RETURNS a Float\n   field asks the logic to name a Float, and the logic will not.\n\n     measure bx(b : Box) : Int = match b with | B(g) => g end\n\n   The arm `g` is a Float, so it is not expressible in the predicate language, and the\n   measure is rejected where it is declared — the same principle as 30, one context\n   over.  The suite already pins this message once (11_measure_fragment, a non-Float\n   arm outside the fragment); this file is the FLOAT face of it, kept for the interlude\n   because a Float-in-a-measure is the pedagogically clearest case and because it names\n   the contexts side by side: a Float is refused in a predicate (30), refused in a\n   measure arm (here), and silenced in a program (13, 19, 29).\n\n   This one is belt-and-suspenders, and that is worth seeing: even if a Float were made\n   speakable, this arm would not become a false proof — it would only trade one refusal\n   for another (\"not an integer\"), because a measure's result must be Int or Bool and a\n   Float is neither.  Two independent guards stand between a Float and a measure axiom,\n   which is the right number for a statement the checker takes ON FAITH.\n\n   Expected: refinement error — the arm is not expressible in the predicate language. *)\n\ntype Box = | B of Float\n\nmeasure bx(b : Box) : Int =\n  match b with\n  | B(g) => g\n  end\n\nfn main(io : IO) : IO =\n  print(io, show(0))\n"}, {"path": "repo/prove/fixtures/33_eqseam_control.lark", "group": "repo/prove/fixtures", "name": "33_eqseam_control.lark", "text": "module EqSeamControl\n\n(* THE CONTROL for the equality seam — what a String CAN do, so that the two seam\n   files beside it (33_eqseam_string, 33_eqseam_fun) are read as a boundary and not a\n   bug.  A String is an OTHER value: the checker cannot look inside it, but it is a\n   first-class citizen of the logic all the same — nameable, congruent, and reasoned\n   about THROUGH THE OPERATIONS THE MACHINE ACTUALLY IMPLEMENTS.  `string_length` is\n   one of those: it returns an Int, the checker knows it is non-negative (a primitive\n   axiom), and a guard on it discharges a division exactly as an Int guard would.\n\n     if string_length(s) != 0 then div(100, string_length(s)) else dflt\n\n   The two occurrences of `string_length(s)` are ONE uninterpreted term, so the guard's\n   `!= 0` is the divisor's `!= 0` by congruence — the same term, not two.  This proves\n   AND runs (string_length(\"abc\") is 3, so 100 / 3 is 33), which is the whole point of a\n   control: the seam is not that Strings are second-class.  Strings flow, carry facts,\n   and pay their way.  The seam is one operation only — `==` — and the next two files\n   are exactly that operation.\n\n   Expected: proved (2), and it runs → 33. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn len_div(s : String, dflt : Int) : Int =\n  if string_length(s) != 0 then div(100, string_length(s)) else dflt\n\nfn main(io : IO) : IO =\n  print(io, show(len_div(\"abc\", 0)))\n"}, {"path": "repo/prove/fixtures/33_eqseam_fun.lark", "group": "repo/prove/fixtures", "name": "33_eqseam_fun.lark", "text": "module EqSeamFun\n\n(* THE SEAM AT ITS SHARPEST — `==` on a FUNCTION.  Everything in 33_eqseam_string holds\n   here, and one thing more: for closures the equality the logic grants is not merely\n   unimplemented, it is UNDECIDABLE.  There is no algorithm that decides whether two\n   functions are equal (extensional equality of functions is not computable; it is not\n   even semidecidable), so the machine's refusal is not a missing feature the way String\n   `==` is — there is nothing to implement.\n\n     HM        `g == g` type-checks: `==` is `forall a. a -> a -> Bool`, and a closure\n               is a perfectly good `a`.\n\n     the logic a closure is OTHER, congruence makes `g == g` reflexively VALID, the\n               `else` is dead, the division is proved: 2 proved.\n\n     the machine cek.py's `binop` has no arrow arm; `g == g` raises\n               `cannot apply '=='` before either branch.\n\n   So the same boundary as the String file, and the reason it deserves its own fixture:\n   it is the case where \"the machine does not implement `==`\" is not an accident of\n   scope but a fact of computability.  The logic's reflexivity is sound as an axiom about\n   an abstract value; it is simply not a value the machine can compare, and here it never\n   could be.  Making the runtime `==` route through structural comparison — the escape\n   hatch that would let the String file run — cannot save this one: two closures have no\n   structural equality a machine can compute.\n\n   The lesson the two seam files share: the refinement checker's `==` is the LOGIC's\n   equality (reflexive, congruent, total), not the MACHINE's (`==` is a partial operator,\n   defined on Int and Float).  Where a program compares values the machine can compare,\n   the two agree.  Where it compares Strings, they agree in RESULT (both would say two\n   equal strings are equal) but disagree in EXISTENCE (the operator is not wired up).\n   Where it compares functions, they disagree in PRINCIPLE.  A proved program is safe in\n   the checker's stated sense on all three; it is a runnable program only on the first.\n\n   Expected: proved (2).  DELIBERATELY NOT IN RUNS — running it raises\n   `cannot apply '=='`. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn f(d : Int) : Int =\n  let g = fn (x : Int) => x in\n  if g == g then 0 else div(100, d)\n\nfn main(io : IO) : IO =\n  print(io, show(f(0)))\n"}, {"path": "repo/prove/fixtures/33_eqseam_string.lark", "group": "repo/prove/fixtures", "name": "33_eqseam_string.lark", "text": "module EqSeamString\n\n(* THE EQUALITY SEAM, and the mirror image of the Float story.  This file is PROVED by\n   the checker and REFUSED by the machine — and, unusually for this suite, that is not a\n   bug on either side.  It is a boundary, written down here as a program so it can be\n   read, and pinned in the harness as `proved` with NO entry in RUNS, because it does\n   not run.\n\n   Three layers disagree about `==`, each correctly on its own terms:\n\n     HM        types `==` as `forall a. a -> a -> Bool` — fully polymorphic (infer.py,\n               `_binop_type`: the comparison operators are `t_fn(a, a, T_BOOL)`).  So\n               `s == s` on two Strings type-checks.\n\n     the logic treats a String as OTHER: a value with no interior the checker can name,\n               but an ordinary inhabitant of congruence closure, where equality is\n               REFLEXIVE because congruence makes it so — as it must, or the theory is\n               unsound.  So `s == s` is VALID, its negation is UNSAT, and the `else`\n               branch below is dead code in the logic.  Dead code proves everything,\n               including `d != 0` for the division it guards.  Hence: 2 proved.\n\n     the machine implements `==` for Int and Float and NOTHING ELSE (cek.py, `binop`:\n               the Int and Float arms, then `raise RuntimeError(\"cannot apply '=='\")`).\n               There is a `_val_eq` that would compare Strings structurally, but it\n               serves `match`, not the `==` operator.  So at run time `s == s` does not\n               return `true` — it RAISES, before either branch is taken.\n\n   Put the three together and the seam is exact:\n\n     the checker proves the division by believing `s == s`;\n     the machine never reaches the division, because `s == s` is not a thing it can do.\n\n   So there is no ZeroDivisionError — the narrow promise this checker makes (a proved\n   program does not divide by zero, index out of bounds, ...) is KEPT.  The `cannot apply\n   '=='` crash preempts the branch.  But the proof rested on an equality the machine does\n   not provide, and honesty requires saying so: this is `proved` in a strictly weaker\n   sense than every other proved row in the suite, and the difference is the seam.\n\n   Contrast the Float files (13, 29, 31): Float's `==` EXISTS and LIES (NaN breaks\n   reflexivity, so `x == x` is valid in the logic and FALSE on the machine, and that IS\n   a false proof — hence Floats are made unspeakable).  String's `==` does not exist,\n   and the logic believes in it anyway.  Opposite polarities of the same three-layer\n   fact: what HM admits, the logic reasons about, and the machine implements are three\n   different sets, and `==` is where they come apart.\n\n   Why not simply close it?  Two roads, both real, both declined here for the interlude:\n   route the runtime `==`/`!=` through `_val_eq` (then `s == s` is `true` and this file\n   RUNS, returning 0), or make String `==` untranslatable in the logic the way Float is\n   (then this file's division goes honestly UNPROVED).  The first is a language change to\n   the CEK machine — shared with 07, out of scope for a checker interlude; the second\n   throws away sound String congruence (33_eqseam_control depends on it) to guard a case\n   that already cannot produce a false proof.  The seam is documented rather than closed;\n   the refinement notes carries it as a boundary beside the Z-vs-32-bit and partial-correctness ones.\n\n   Expected: proved (2).  DELIBERATELY NOT IN RUNS — running it raises\n   `cannot apply '=='`. *)\n\nfn div(a : Int, b : {v : Int | v != 0}) : Int = a / b\n\nfn f(s : String, d : Int) : Int =\n  if s == s then 0 else div(100, d)\n\nfn main(io : IO) : IO =\n  print(io, show(f(\"x\", 0)))\n"}, {"path": "repo/prove/fixtures/34_nestedmeasure_safe.lark", "group": "repo/prove/fixtures", "name": "34_nestedmeasure_safe.lark", "text": "module NestedMeasureSafe\n\n(* a NESTED MATCH in a measure.\n\n   Every measure before this took its argument apart exactly once: `match xs with\n   | Nil | Cons(_, rest)`.  A BST needs more.  `maxv`/`minv` — a tree's rightmost /\n   leftmost value — are defined by looking at a CHILD's shape: the max of a node is\n   its own value when the right child is a Leaf, and the right subtree's max\n   otherwise.  You cannot write that without a second match, on a FIELD of the first.\n\n   `rdepth` here, the length of the right spine, needs the same move for the same\n   reason: at a Node it must ask whether the right child is a Leaf (the spine ends,\n   depth 2) or a Node (descend).  The nested match FLATTENS into one equation per\n   (outer constructor x inner constructor) path —\n\n       rdepth(Leaf)                          == 1\n       rdepth(Node(l, v, Leaf))              == 2\n       rdepth(Node(l, v, Node(rl, rv, rr)))  == 1 + rdepth(Node(rl, rv, rr))\n\n   — and those equations FIRE AT CONCRETE SUBFIELDS: the middle one only where the\n   right child is literally a `Leaf`, the last only where it is literally a `Node`.\n   A `rdepth(t)` for an opaque `t` fires nothing at all, which is the sound silence a\n   flat measure already keeps at an opaque argument.\n\n   TWO things earn their keep here, one per direction of the rung:\n\n   THE DECLARED RESULT, PROVED BY NESTED INDUCTION.  `{v : Int | v >= 1}` is proved\n   one arm at a time, and the nested arm is where the induction has to reach a\n   CONCRETE-subfield target: `rdepth(Node(l, v, Node(rl, rv, rr))) >= 1` from the\n   equation `== 1 + rdepth(Node(rl, rv, rr))` and the induction hypothesis\n   `rdepth(Node(rl, rv, rr)) >= 1`.  This is what lets `use` divide by `d` over an\n   OPAQUE tree: `d == rdepth(t)` and a right-spine depth is at least 1, so `d != 0` —\n   a fact about a tree the checker never took apart, exactly as `21_result`'s `avg`\n   divides by `len(xs) + 1` for an opaque list.\n\n   THE EQUATIONS, FIRING AT THE BUILT TREES.  Each call in `main` supplies the depth\n   its concrete tree has, and the call's obligation — `2 == rdepth(Node(Leaf, 5,\n   Leaf))`, `3 == rdepth(Node(Leaf, 1, Node(Leaf, 2, Leaf)))` — is discharged only\n   because the nested equations fire at those literal shapes and chain by arithmetic.\n\n   And it RUNS: a measure is ghost, so `rdepth` is a name the CEK machine never sees;\n   `d` is an ordinary Int the caller passes.\n\n   Expected output:\n     50\n     33 *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure rdepth(t : Tree) : {v : Int | v >= 1} =\n  match t with\n  | Leaf => 1\n  | Node(l, v, r) =>\n      match r with\n      | Leaf             => 2\n      | Node(rl, rv, rr) => 1 + rdepth(r)\n      end\n  end\n\n(* The division is safe over an OPAQUE tree: `d` is tied to its right-spine depth,\n   and a depth is at least 1 — the declared result, proved by the nested induction. *)\nfn use(t : Tree, d : {v : Int | v == rdepth(t)}) : Int =\n  100 / d\n\nfn main(io : IO) : IO =\n  let io = print(io, show(use(Node(Leaf, 5, Leaf), 2))) in\n  print(io, show(use(Node(Leaf, 1, Node(Leaf, 2, Leaf)), 3)))\n"}, {"path": "repo/prove/fixtures/34_nestedmeasure_unsafe.lark", "group": "repo/prove/fixtures", "name": "34_nestedmeasure_unsafe.lark", "text": "module NestedMeasureUnsafe\n\n(* the mutant, with teeth.\n\n   Identical to `34_nestedmeasure_safe` but for the second call in `main`: it claims\n   the concrete tree `Node(Leaf, 5, Leaf)` has right-spine depth 0.  The nested\n   equation fires at that literal shape and says otherwise — `rdepth(Node(Leaf, 5,\n   Leaf)) == 2` — so the obligation `0 == rdepth(Node(Leaf, 5, Leaf))` is `0 == 2`,\n   which does not hold: 1 of 6 obligations unproved.\n\n   Were it admitted, `use` would run `100 / 0`.  This fixture is checked but NOT run —\n   the point is that the checker stops it before the CEK machine can detonate. *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure rdepth(t : Tree) : {v : Int | v >= 1} =\n  match t with\n  | Leaf => 1\n  | Node(l, v, r) =>\n      match r with\n      | Leaf             => 2\n      | Node(rl, rv, rr) => 1 + rdepth(r)\n      end\n  end\n\nfn use(t : Tree, d : {v : Int | v == rdepth(t)}) : Int =\n  100 / d\n\nfn main(io : IO) : IO =\n  let io = print(io, show(use(Node(Leaf, 5, Leaf), 2))) in\n  print(io, show(use(Node(Leaf, 5, Leaf), 0)))\n"}, {"path": "repo/prove/fixtures/35_bst_safe.lark", "group": "repo/prove/fixtures", "name": "35_bst_safe.lark", "text": "module BstSafe\n\n(* the BINARY SEARCH TREE invariant, the piece the whole PROVE\n   axis was pointed at.  It is ASSEMBLY: it introduces no new checker mechanism.  It\n   is Part B's nested match (now TWO deep, on both children), a later version's Bool measure, and\n   one thing Part B quietly already allowed — a measure body that MENTIONS ANOTHER\n   measure (`bst` calls `minv`/`maxv` on a child).\n\n   `minv`/`maxv` are a tree's leftmost / rightmost value.  A max looks at the RIGHT\n   child's shape — its own value if the right child is a Leaf, the right subtree's max\n   otherwise — which is exactly why a flat measure could never write it and Part B is\n   the enabling rung.  Their `Leaf` arm is a SENTINEL (`0`); it is never consulted,\n   because `bst` only asks for `maxv(l)`/`minv(r)` inside the arm where that child is\n   already known to be a `Node`.\n\n       maxv(Node(l, v, Leaf))              == v\n       maxv(Node(l, v, Node(rl, rv, rr)))  == maxv(Node(rl, rv, rr))\n       minv(Node(Leaf, v, r))              == v\n       minv(Node(Node(ll, lv, lr), v, r))  == minv(Node(ll, lv, lr))\n\n   `bst` matches BOTH children (a nested match, two deep) and at each leaf combines the\n   ordering facts with the recursive calls:\n\n       bst(Leaf)                              <=> true\n       bst(Node(Leaf,          v, Leaf))      <=> true\n       bst(Node(Leaf,          v, Node r…))   <=> v < minv(r) and bst(r)\n       bst(Node(Node l…,       v, Leaf))      <=> maxv(l) < v and bst(l)\n       bst(Node(Node l…,       v, Node r…))   <=> maxv(l) < v and v < minv(r)\n                                                   and bst(l) and bst(r)\n\n   THE DIRECTION THIS PROVES is BUILDING: that a tree the program CONSTRUCTS satisfies\n   `bst`.  The nested equations fire at the concrete subfields of the built tree, and\n   the cross-measure `maxv(l)`/`minv(r)` fire because `l`/`r` are physical subterms of\n   it — the single-pass closure reaches them for free.  Over an OPAQUE tree the guards\n   decline (Part B's sound silence), so a consumer cannot READ the order back out of an\n   abstract `bst(t)`; that destructing direction needs `minv`/`maxv` to carry declared\n   lower/upper-bound invariants, a separate and larger rung, and is left open on\n   purpose (documented in the refinement notes beside the other boundaries).\n\n   `use` requires a `bst`, and `main` builds one and passes it — the whole obligation\n   is that the built tree really is ordered.  And it RUNS: `bst`/`minv`/`maxv` are\n   ghost, names the CEK machine never sees; `use` returns an ordinary Int.\n\n   Expected output:\n     3 *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure maxv(t : Tree) : Int =\n  match t with\n  | Leaf => 0\n  | Node(l, v, r) =>\n      match r with\n      | Leaf             => v\n      | Node(rl, rv, rr) => maxv(r)\n      end\n  end\n\nmeasure minv(t : Tree) : Int =\n  match t with\n  | Leaf => 0\n  | Node(l, v, r) =>\n      match l with\n      | Leaf             => v\n      | Node(ll, lv, lr) => minv(l)\n      end\n  end\n\nmeasure bst(t : Tree) : Bool =\n  match t with\n  | Leaf => true\n  | Node(l, v, r) =>\n      match l with\n      | Leaf =>\n          match r with\n          | Leaf             => true\n          | Node(rl, rv, rr) => v < minv(r) and bst(r)\n          end\n      | Node(ll, lv, lr) =>\n          match r with\n          | Leaf             => maxv(l) < v and bst(l)\n          | Node(rl, rv, rr) => maxv(l) < v and v < minv(r) and bst(l) and bst(r)\n          end\n      end\n  end\n\nfn use(t : {v : Tree | bst(v)}) : Int =\n  match t with\n  | Leaf          => 0\n  | Node(l, v, r) => v\n  end\n\nfn main(io : IO) : IO =\n  let ordered =\n    Node(Node(Leaf, 1, Node(Leaf, 2, Leaf)),\n         3,\n         Node(Node(Leaf, 4, Leaf), 5, Node(Leaf, 6, Leaf))) in\n  print(io, show(use(ordered)))\n"}, {"path": "repo/prove/fixtures/35_bst_unsafe.lark", "group": "repo/prove/fixtures", "name": "35_bst_unsafe.lark", "text": "module BstUnsafe\n\n(* The mutant of 35_bst_safe.lark, and the bug is one value: the left subtree's inner\n   node is `9`, not `2`.  The left subtree is still internally ordered (1 < 9), so the\n   lie is exactly at the ROOT: `maxv(left)` is now 9, and `bst`'s deepest arm asks\n   `maxv(l) < v` — `9 < 3` — which is false.  The whole tree's `bst` resolves through\n   the nested equivalences to `false`, so the call `use(disordered)` owes a `bst` it\n   cannot have: 1 of 1 obligation unproved.\n\n   Nothing detonates at run time — a `bst` is a fact about ORDER, not a divisor — so\n   this fixture is checked but not run.  The teeth are that the BUILDING direction\n   refuses to certify an out-of-order tree as a search tree.\n\n   Expected: 1 of 1 obligation unproved. *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure maxv(t : Tree) : Int =\n  match t with\n  | Leaf => 0\n  | Node(l, v, r) =>\n      match r with\n      | Leaf             => v\n      | Node(rl, rv, rr) => maxv(r)\n      end\n  end\n\nmeasure minv(t : Tree) : Int =\n  match t with\n  | Leaf => 0\n  | Node(l, v, r) =>\n      match l with\n      | Leaf             => v\n      | Node(ll, lv, lr) => minv(l)\n      end\n  end\n\nmeasure bst(t : Tree) : Bool =\n  match t with\n  | Leaf => true\n  | Node(l, v, r) =>\n      match l with\n      | Leaf =>\n          match r with\n          | Leaf             => true\n          | Node(rl, rv, rr) => v < minv(r) and bst(r)\n          end\n      | Node(ll, lv, lr) =>\n          match r with\n          | Leaf             => maxv(l) < v and bst(l)\n          | Node(rl, rv, rr) => maxv(l) < v and v < minv(r) and bst(l) and bst(r)\n          end\n      end\n  end\n\nfn use(t : {v : Tree | bst(v)}) : Int =\n  match t with\n  | Leaf          => 0\n  | Node(l, v, r) => v\n  end\n\nfn main(io : IO) : IO =\n  let disordered =\n    Node(Node(Leaf, 1, Node(Leaf, 9, Leaf)),\n         3,\n         Node(Node(Leaf, 4, Leaf), 5, Node(Leaf, 6, Leaf))) in\n  print(io, show(use(disordered)))\n"}, {"path": "repo/prove/fixtures/36_bstdestruct_safe.lark", "group": "repo/prove/fixtures", "name": "36_bstdestruct_safe.lark", "text": "module BstDestructSafe\n\n(* the DESTRUCTING binary search tree, the rung 35 left open.\n\n   35 proved a bst only in the BUILDING direction: its `bst` matched both children\n   (a nested match, two deep), so its equation fired only at the CONCRETE subfields of\n   a constructed tree.  Over an OPAQUE `bst(t)` the nested guards declined, and a\n   consumer could read no order back out — the destructing elegance of `23_boolmeasure`\n   was blocked, and 35 named that a boundary.\n\n   The way past it is not bound invariants on `minv`/`maxv` (those would have to hold of\n   EVERY tree, and `minv(t) <= maxv(t)` is false for an unordered one).  It is to make\n   `bst` a SINGLE match on `t`, pushing \"every value in the left child is below the\n   root\" into an EXTRA-PARAMETER measure:\n\n       lt(t, b)  <=>  every value in t is < b\n       gt(t, b)  <=>  every value in t is > b\n       bst(Node(l, x, r))  <=>  lt(l, x) and gt(r, x) and bst(l) and bst(r)\n\n   `bst` is now unguarded, so its equation fires on `Node(l, x, r)` even when l, x, r\n   are OPAQUE match binders — and out come `bst(l)`, `bst(r)`, `lt(l, x)`, `gt(r, x)`,\n   the facts a consumer descends on.  The price is `lt`/`gt`: an extra-parameter\n   measure's equation is about an APPLICATION (the bound `b` lives only there), so it\n   fires DEMAND-DRIVEN, following the first argument's structure with `b` fixed.\n\n   This file proves BOTH directions:\n     • build      — a constructed six-node tree satisfies `bst` (building, as 35).\n     • leftsub    — from an OPAQUE `bst(t)`, the left child is itself a `bst`\n                    (destructing: the sub-structure `bst(l)` read out of the whole).\n     • descend    — and it is recursive: peeling the left spine needs `bst(l)` at\n                    every step, which only the destructing direction supplies.\n\n   And it RUNS: `lt`/`gt`/`bst` are ghost, erased before the CEK machine sees a thing.\n\n   Expected output:\n     3\n     1 *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure lt(t : Tree, b : Int) : Bool =\n  match t with\n  | Leaf            => true\n  | Node(l, x, r)   => x < b and lt(l, b) and lt(r, b)\n  end\n\nmeasure gt(t : Tree, b : Int) : Bool =\n  match t with\n  | Leaf            => true\n  | Node(l, x, r)   => x > b and gt(l, b) and gt(r, b)\n  end\n\nmeasure bst(t : Tree) : Bool =\n  match t with\n  | Leaf            => true\n  | Node(l, x, r)   => lt(l, x) and gt(r, x) and bst(l) and bst(r)\n  end\n\n(* BUILDING: a constructed ordered tree is a bst. *)\nfn build(t : {q : Tree | bst(q)}) : Int =\n  match t with\n  | Leaf          => 0\n  | Node(l, x, r) => x\n  end\n\n(* DESTRUCTING: from an opaque bst, the left child is a bst — bst(l) read out of it. *)\nfn leftsub(t : {q : Tree | bst(q)}) : {r : Tree | bst(r)} =\n  match t with\n  | Leaf          => Leaf\n  | Node(l, x, r) => l\n  end\n\n(* DESTRUCTING, recursively: descend the left spine, counting depth.  Each step owes a\n   bst for the child it recurses on, and that bst is the one the parent's opaque bst\n   yields on the way in. *)\nfn descend(t : {q : Tree | bst(q)}) : Int =\n  match t with\n  | Leaf          => 0\n  | Node(l, x, r) => 1 + descend(l)\n  end\n\nfn main(io : IO) : IO =\n  let a =\n    Node(Node(Leaf, 1, Node(Leaf, 2, Leaf)),\n         3,\n         Node(Node(Leaf, 4, Leaf), 5, Node(Leaf, 6, Leaf))) in\n  let b =\n    Node(Node(Leaf, 1, Node(Leaf, 2, Leaf)),\n         3,\n         Node(Node(Leaf, 4, Leaf), 5, Node(Leaf, 6, Leaf))) in\n  let io = print(io, show(build(a))) in\n  print(io, show(descend(leftsub(b))))\n"}, {"path": "repo/prove/fixtures/36_bstdestruct_unsafe.lark", "group": "repo/prove/fixtures", "name": "36_bstdestruct_unsafe.lark", "text": "module BstDestructUnsafe\n\n(* The mutant of 36_bstdestruct_safe.lark, and its lie is in the DESTRUCTING direction —\n   the direction 35 could not even attempt.\n\n   `swap` takes an opaque `bst(t)` and claims to return a `bst`, but rebuilds the node\n   with its children exchanged: `Node(l, x, r)` becomes `Node(r, x, l)`.  From the\n   incoming `bst(t)` the single-match `bst` yields `lt(l, x)`, `gt(r, x)`, `bst(l)`,\n   `bst(r)` — every value left of x is below it, every value right of x above it.  The\n   return type owes `bst(Node(r, x, l))`, which unfolds to\n\n       lt(r, x) and gt(l, x) and bst(r) and bst(l).\n\n   `bst(r)` and `bst(l)` are in hand, but `lt(r, x)` asks that every value of the RIGHT\n   child fall below x — the exact negation of the `gt(r, x)` we were handed — and\n   likewise `gt(l, x)` contradicts `lt(l, x)`.  The order facts point the wrong way, so\n   the obligation is unprovable: 1 of 1 unproved.\n\n   That the swap is caught is the whole rung.  In 35 `bst` matched both children, so it\n   said nothing about an opaque tree and there was no destructing claim to refute; here\n   the single-match `bst` hands its order facts out, and they are precisely what convict\n   the swap.  Nothing detonates at run time — order is not a divisor — so this file is\n   checked, not run.\n\n   Expected: 1 of 1 obligation unproved. *)\n\ntype Tree = | Leaf | Node of Tree, Int, Tree\n\nmeasure lt(t : Tree, b : Int) : Bool =\n  match t with\n  | Leaf            => true\n  | Node(l, x, r)   => x < b and lt(l, b) and lt(r, b)\n  end\n\nmeasure gt(t : Tree, b : Int) : Bool =\n  match t with\n  | Leaf            => true\n  | Node(l, x, r)   => x > b and gt(l, b) and gt(r, b)\n  end\n\nmeasure bst(t : Tree) : Bool =\n  match t with\n  | Leaf            => true\n  | Node(l, x, r)   => lt(l, x) and gt(r, x) and bst(l) and bst(r)\n  end\n\n(* The false destructing claim: swapping the children of a bst is not a bst. *)\nfn swap(t : {q : Tree | bst(q)}) : {r : Tree | bst(r)} =\n  match t with\n  | Leaf          => Leaf\n  | Node(l, x, r) => Node(r, x, l)\n  end\n\nfn main(io : IO) : IO =\n  let t =\n    Node(Node(Leaf, 1, Node(Leaf, 2, Leaf)),\n         3,\n         Node(Node(Leaf, 4, Leaf), 5, Node(Leaf, 6, Leaf))) in\n  print(io, show(build(swap(t))))\n\nfn build(t : {q : Tree | bst(q)}) : Int =\n  match t with\n  | Leaf          => 0\n  | Node(l, x, r) => x\n  end\n"}, {"path": "repo/self/lark/cek.lark", "group": "repo/self/lark", "name": "cek.lark", "text": "(* cek.lark — Lark's CEK evaluator, written in Lark.\n   (first light toward the meta-circular interpreter.)\n\n   Port of oracle/cek.py: a small-step CEK machine over the (untyped) AST that\n   parse.lark produces.  The evaluator never inspects type annotations, so it\n   runs directly on parse.lark's `Expr` — infer.lark is NOT on the evaluator's\n   critical path.  `lex → parse → cek`, all in Lark, is a working interpreter.\n\n   Design notes\n   ────────────\n   • This is a COMPONENT.  It does not redefine the AST (Expr/Val/Pat/Arm/Param/\n     Prog/Decl/TyBody/Variant/Maybe) — those come from parse.lark, and the tokens\n     (Tok/Token/P) + tokenize come from lex.lark.  As with the parser and type checker, the differential\n     harness assembles the pipeline by CONCATENATION (lex + parse + cek + a\n     generated main), so all three share one module and one top-level typecheck.\n     Consequence: cek.lark does NOT type-check standalone (Expr etc. are absent).\n     Its only run path is `python3 tests/cek_difftest.py`.\n   • Runtime values are R-PREFIXED (RInt/RClosure/…), NOT parse.lark's `Val`\n     constructors (VInt/VStr/…).  Same namespace-collision dodge as types.lark's\n     M-prefix: under concatenation parse.lark's `Val` (VInt of *String* lexeme)\n     and the machine's runtime values coexist and must not clash.\n   • OUTPUT is accumulated, not side-effected.  A pure Lark function cannot print\n     mid-evaluation, so the object program's `print(io, s)` appends s+\"\\n\" to an\n     output String threaded in the machine State; the real driver `main` prints\n     the whole thing once (the \"build the output, print once\" idiom, here made\n     to carry the *object* program's IO).\n   • ENVIRONMENT is two-level: a local assoc list `List((String, RVal))` plus the\n     globals `g` threaded through every step.  `Var` looks up local then g.  This\n     resolves mutual recursion with NO backpatch (cek.py mutates closure envs;\n     we simply keep g in scope), so top-level closures capture an EMPTY local env.\n   • Dynamic string equality is `strEq` (char-by-char), not `==` (unimplemented in\n     the CEK binop — a known wart of the language).  Constructor-name + keyword compares use it.\n   • Every function is fully annotated so infer's Pass 1.5 pre-registers the big\n     mutually-recursive step/apply/run group.\n\n   SLICE-1 SCOPE (this file).  Covers the integer/bool/string/list/tuple/ADT/\n   recursion + FLOAT arithmetic fragment.  KNOWN GAPS, all deferred (a known wart of the language):\n     - Float support: literals convert to real `Float` via the `string_to_float`\n       prim (added alongside this slice); +,-,*,/, comparisons and unary `-` go\n       through the host on real Floats (so `_f32` truncation matches the oracle),\n       show via `float_to_string`.  The non-arith float builtins are wired too:\n       int_to_float / float_to_int / float_abs / float_sqrt / float_floor /\n       float_ceil all call the host prim on a real Float, so `_f32` truncation\n       matches byte-for-byte (needed once `import Stdlib` resolves — 16_stdlib).\n     - `import` IS resolved by the differential harness (it inlines each imported\n       module's decls into the object source before evaluation — see\n       cek_difftest.py), so multi-module programs (16_stdlib, 09_modules) run.\n       runProgram itself still ignores the AST's import list (the harness has\n       already flattened them away).\n     - `read` (stdin) IS supported: the IO token `RIO` carries the pending\n       stdin string, threaded by the program's own `io` sequencing; `read`\n       splits off the next line (dropping the '\\n') exactly like the oracle's\n       `sys.stdin.readline().rstrip(\"\\n\")`, returning \"\" at EOF.  runProgram\n       takes the program's `input` (the harness supplies it as a String literal,\n       and feeds the SAME bytes to the oracle's stdin — see cek_difftest.py's\n       read parity check).  Empty for the whole corpus, since no test reads.\n\n   Run:  python3 tests/cek_difftest.py     (concatenates lex + parse + cek)  *)\n\nmodule Cek\n\n\n(* ── Runtime values (port of cek.py's Value; R-prefixed, see header) ───────── *)\n\ntype RVal =\n  | RInt     of Int\n  | RFloat   of Float                               (* real float (via string_to_float) *)\n  | RBool    of Bool\n  | RStr     of String\n  | RUnit\n  | RTuple   of List(RVal)\n  | RCon     of String, List(RVal)                  (* fully-applied constructor  *)\n  | RPartCon of String, Int, List(RVal)             (* tag, arity, args-so-far    *)\n  | RClosure of String, Expr, List((String, RVal))  (* param, body, captured env  *)\n  | RBuiltin  of String, List(RVal)                 (* name, args-so-far          *)\n  | RDispatch of String                             (* trait method: dispatch by arg type *)\n  | RPrintIO  of RVal                               (* print applied to its io    *)\n  | RIO       of String                             (* the IO token; carries pending stdin *)\n\n(* ── Continuation frames (port of cek.py's Frame) ─────────────────────────── *)\n\ntype Frame =\n  | ApplyFnF  of List(Expr), List((String, RVal))\n  | ApplyArgF of RVal, List(Expr), List((String, RVal))\n  | LetF      of String, Expr, List((String, RVal))\n  | IfF       of Expr, Expr, List((String, RVal))\n  | MatchF    of List(Arm), List((String, RVal))\n  | BinOpLF   of String, Expr, List((String, RVal))\n  | BinOpRF   of String, RVal\n  | UnaryF    of String\n  | TupleF    of List(Expr), List(RVal), List((String, RVal))\n\n(* ── Machine state.  The trailing String is the accumulated program output. ── *)\n\ntype State =\n  | SEval of Expr, List((String, RVal)), List(Frame), String\n  | SRet  of RVal, List(Frame), String\n\n(* Small result carriers (Lark has no exceptions / built-in Option). *)\ntype ROpt  = | RNone | RSome of RVal\ntype MRes  = | NoMatch | Yes of List((String, RVal))\ntype VOut  = | VOut of RVal, String                 (* value + accumulated output *)\ntype RLine = | RLine of String, String              (* a read line + the rest of stdin *)\n\nimpl Copy for RVal  = {}\nimpl Copy for Frame = {}\nimpl Copy for State = {}\nimpl Copy for ROpt  = {}\nimpl Copy for MRes  = {}\nimpl Copy for VOut  = {}\nimpl Copy for RLine = {}\n\n\n(* ── Generic list helpers ─────────────────────────────────────────────────── *)\n\nfn ckLen(xs : List(a)) : Int =\n  match xs with\n  | Nil          => 0\n  | Cons(_, rest) => 1 + ckLen(rest)\n  end\n\n(* Monomorphic on RVal: the frozen infer.py loops on a *generic* function that\n   builds a `List(a)` from a polymorphic element `a` (occurs-check gap in\n   compose — a known wart of the language).  ckSnoc is only ever used on List(RVal), so we\n   specialise it and sidestep the gap.  ckLen stays generic (List(a)->Int is\n   fine — it never constructs an `a`). *)\nfn ckSnoc(xs : List(RVal), x : RVal) : List(RVal) =\n  match xs with\n  | Nil          => Cons(x, Nil)\n  | Cons(h, rest) => Cons(h, ckSnoc(rest, x))\n  end\n\n\n(* ── Dynamic string equality (see header note) ───────────────────────────── *)\n\nfn strEqFrom(a : String, b : String, i : Int, n : Int) : Bool =\n  if i >= n then true\n  else if string_index(a, i) == string_index(b, i) then strEqFrom(a, b, i + 1, n)\n  else false\n\nfn strEq(a : String, b : String) : Bool =\n  let la = string_length(a) in\n  let lb = string_length(b) in\n  if la == lb then strEqFrom(a, b, 0, la) else false\n\n\n(* ── Line reader for `read` (port of cek.py's readline().rstrip(\"\\n\")) ──────────\n   Splits off the next line (up to the first '\\n' = codepoint 10) from the\n   pending-stdin string carried in the RIO value; the '\\n' itself is dropped.\n   A pending string with no newline yields the whole string (last unterminated\n   line); an EMPTY pending yields \"\" — matching the oracle at EOF, where\n   sys.stdin.readline() returns \"\".  See the `read` builtin. *)\nfn firstNL(s : String, i : Int, n : Int) : Int =\n  if i >= n then 0 - 1\n  else if string_index(s, i) == 10 then i\n  else firstNL(s, i + 1, n)\n\nfn readLine(pending : String) : RLine =\n  let n = string_length(pending) in\n  let k = firstNL(pending, 0, n) in\n  if k < 0 then RLine(pending, \"\")\n  else RLine(string_slice(pending, 0, k), string_slice(pending, k + 1, n))\n\n\n(* ── Environment lookup (assoc list) ──────────────────────────────────────── *)\n\nfn envGet(env : List((String, RVal)), n : String) : ROpt =\n  match env with\n  | Nil                => RNone\n  | Cons((k, v), rest) => if strEq(k, n) then RSome(v) else envGet(rest, n)\n  end\n\n\n(* ── Runtime type name (port of cek.py runtime_type) ──────────────────────────\n   Used only for trait dispatch: given a value, name the type whose impl we look\n   up.  Constructors resolve their owning type via the con→type map, which the\n   loader stashes in the globals `g` under keys \"#type#<Tag>\" (the '#' can never\n   appear in a Lark identifier, so these entries never collide with real names).*)\nfn runtimeType(v : RVal, g : List((String, RVal))) : String =\n  match v with\n  | RInt(_)      => \"Int\"\n  | RFloat(_)    => \"Float\"\n  | RBool(_)     => \"Bool\"\n  | RStr(_)      => \"String\"\n  | RUnit        => \"()\"\n  | RCon(tag, _) => match envGet(g, \"#type#\" + tag) with\n                    | RSome(RStr(tn)) => tn\n                    | _               => tag\n                    end\n  | _            => \"?\"\n  end\n\n\n(* ── Literals: parse.lark's `Val` (VInt carries lexeme) → runtime `RVal` ───── *)\n\nfn litVal(v : Val) : RVal =\n  match v with\n  | VInt(t)   => match string_to_int(t) with\n                 | Ok(n)  => RInt(n)\n                 | Err(_) => RInt(0)\n                 end\n  | VFloat(t) => match string_to_float(t) with\n                 | Ok(f)  => RFloat(f)\n                 | Err(_) => RFloat(0.0)\n                 end\n  | VStr(s)   => RStr(s)\n  | VBool(b)  => RBool(b)\n  | VUnit     => RUnit\n  end\n\n\n(* ── Value equality (port of cek.py _val_eq) ──────────────────────────────── *)\n\nfn boolEq(x : Bool, y : Bool) : Bool = if x then y else if y then false else true\n\nfn valEq(a : RVal, b : RVal) : Bool =\n  match (a, b) with\n  | (RInt(x),   RInt(y))   => x == y\n  | (RFloat(x), RFloat(y)) => x == y\n  | (RBool(x),  RBool(y))  => boolEq(x, y)\n  | (RStr(x),   RStr(y))   => strEq(x, y)\n  | (RUnit,     RUnit)     => true\n  | _                      => false\n  end\n\n\n(* ── Show (port of cek.py show) ───────────────────────────────────────────── *)\n\nfn showItems(xs : List(RVal)) : String =\n  match xs with\n  | Nil            => \"\"\n  | Cons(x, Nil)   => showVal(x)\n  | Cons(x, rest)  => showVal(x) + \", \" + showItems(rest)\n  end\n\nfn showVal(v : RVal) : String =\n  match v with\n  | RInt(n)     => int_to_string(n)\n  | RFloat(f)   => float_to_string(f)\n  | RBool(b)    => if b then \"true\" else \"false\"\n  | RStr(s)     => s\n  | RUnit       => \"()\"\n  | RTuple(es)  => \"(\" + showItems(es) + \")\"\n  | RCon(t, p)  => match p with\n                   | Nil => t\n                   | _   => t + \"(\" + showItems(p) + \")\"\n                   end\n  | RPartCon(t, _, _) => \"<partial \" + t + \">\"\n  | RClosure(_, _, _)   => \"<closure>\"\n  | RBuiltin(nm, _)    => \"<\" + nm + \">\"\n  | RDispatch(nm)        => \"<\" + nm + \">\"\n  | RPrintIO(_)          => \"<printio>\"\n  | RIO(_)                 => \"<IO>\"\n  end\n\n\n(* ── Arithmetic / logic (port of cek.py binop/unaryop) ────────────────────── *)\n\nfn intBin(op : String, a : Int, b : Int) : RVal =\n  match op with\n  | \"+\"  => RInt(a + b)\n  | \"-\"  => RInt(a - b)\n  | \"*\"  => RInt(a * b)\n  | \"/\"  => RInt(a / b)                (* Lark / truncates toward zero, per cek.binop *)\n  | \"==\" => RBool(a == b)\n  | \"!=\" => RBool(a != b)\n  | \"<\"  => RBool(a < b)\n  | \"<=\" => RBool(a <= b)\n  | \">\"  => RBool(a > b)\n  | \">=\" => RBool(a >= b)\n  | _    => RUnit\n  end\n\nfn boolBin(op : String, a : Bool, b : Bool) : RVal =\n  match op with\n  | \"and\" => RBool(if a then b else false)\n  | \"or\"  => RBool(if a then true else b)\n  | _     => RUnit\n  end\n\n(* Float ops go through the host's `+ - * / < …` on real Floats, so the oracle's\n   _f32 truncation applies identically (byte-parity). *)\nfn floatBin(op : String, a : Float, b : Float) : RVal =\n  match op with\n  | \"+\"  => RFloat(a + b)\n  | \"-\"  => RFloat(a - b)\n  | \"*\"  => RFloat(a * b)\n  | \"/\"  => RFloat(a / b)\n  | \"==\" => RBool(a == b)\n  | \"!=\" => RBool(a != b)\n  | \"<\"  => RBool(a < b)\n  | \"<=\" => RBool(a <= b)\n  | \">\"  => RBool(a > b)\n  | \">=\" => RBool(a >= b)\n  | _    => RUnit\n  end\n\nfn binop(op : String, l : RVal, r : RVal) : RVal =\n  match (l, r) with\n  | (RStr(a),   RStr(b))   => RStr(a + b)         (* only + is defined for strings *)\n  | (RInt(a),   RInt(b))   => intBin(op, a, b)\n  | (RFloat(a), RFloat(b)) => floatBin(op, a, b)\n  | (RBool(a),  RBool(b))  => boolBin(op, a, b)\n  | _                      => RUnit\n  end\n\nfn unaryop(op : String, v : RVal) : RVal =\n  match v with\n  | RInt(n)   => if strEq(op, \"-\")   then RInt(0 - n) else RUnit\n  | RFloat(f) => if strEq(op, \"-\")   then RFloat(0.0 - f) else RUnit\n  | RBool(b)  => if strEq(op, \"not\") then RBool(if b then false else true) else RUnit\n  | _         => RUnit\n  end\n\n\n(* ── Pattern matching (port of cek.py match_pat) ──────────────────────────── *)\n\nfn matchList(subs : List(Pat), vals : List(RVal), env : List((String, RVal))) : MRes =\n  match (subs, vals) with\n  | (Nil, Nil) => Yes(env)\n  | (Cons(sp, sr), Cons(sv, vr)) =>\n      match matchPat(sp, sv, env) with\n      | NoMatch  => NoMatch\n      | Yes(e2)  => matchList(sr, vr, e2)\n      end\n  | _ => NoMatch\n  end\n\nfn matchPat(pat : Pat, val : RVal, env : List((String, RVal))) : MRes =\n  match pat with\n  | PWild   => Yes(env)\n  | PVar(n) => Yes(Cons((n, val), env))\n  | PLit(v) => if valEq(val, litVal(v)) then Yes(env) else NoMatch\n  | PCon(n, subs) =>\n      if strEq(n, \"True\") then\n        match val with | RBool(b) => if b then Yes(env) else NoMatch | _ => NoMatch end\n      else if strEq(n, \"False\") then\n        match val with | RBool(b) => if b then NoMatch else Yes(env) | _ => NoMatch end\n      else\n        match val with\n        | RCon(tag, payload) => if strEq(tag, n) then matchList(subs, payload, env) else NoMatch\n        | _                  => NoMatch\n        end\n  | PTuple(subs) =>\n      match val with\n      | RTuple(es) => matchList(subs, es, env)\n      | _          => NoMatch\n      end\n  end\n\n\n(* ── Built-ins (port of cek.py builtin / builtin_multi) ───────────────────── *)\n\nfn builtinArity(name : String) : Int =\n  if strEq(name, \"string_index\") then 2\n  else if strEq(name, \"string_slice\") then 3\n  else 1\n\nfn builtin(name : String, arg : RVal, kont : List(Frame), out : String) : State =\n  if strEq(name, \"print\") then SRet(RPrintIO(arg), kont, out)\n  else if strEq(name, \"show\") then SRet(RStr(showVal(arg)), kont, out)\n  else if strEq(name, \"int_to_string\") then SRet(RStr(showVal(arg)), kont, out)\n  else if strEq(name, \"float_to_string\") then SRet(RStr(showVal(arg)), kont, out)\n  else if strEq(name, \"string_length\") then\n    match arg with | RStr(s) => SRet(RInt(string_length(s)), kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"char_to_string\") then\n    match arg with | RInt(n) => SRet(RStr(char_to_string(n)), kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"int_abs\") then\n    match arg with | RInt(n) => SRet(RInt(if n < 0 then 0 - n else n), kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"string_to_int\") then\n    match arg with\n    | RStr(s) => match string_to_int(s) with\n                 | Ok(n)  => SRet(RCon(\"Ok\",  Cons(RInt(n), Nil)), kont, out)\n                 | Err(e) => SRet(RCon(\"Err\", Cons(RStr(e), Nil)), kont, out)\n                 end\n    | _ => SRet(RUnit, kont, out)\n    end\n  else if strEq(name, \"string_to_float\") then\n    match arg with\n    | RStr(s) => match string_to_float(s) with\n                 | Ok(f)  => SRet(RCon(\"Ok\",  Cons(RFloat(f), Nil)), kont, out)\n                 | Err(e) => SRet(RCon(\"Err\", Cons(RStr(e),   Nil)), kont, out)\n                 end\n    | _ => SRet(RUnit, kont, out)\n    end\n  else if strEq(name, \"int_to_float\") then\n    match arg with | RInt(n)   => SRet(RFloat(int_to_float(n)), kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"float_to_int\") then\n    match arg with | RFloat(f) => SRet(RInt(float_to_int(f)),   kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"float_to_bits\") then\n    match arg with | RFloat(f) => SRet(RInt(float_to_bits(f)),  kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"float_abs\") then\n    match arg with | RFloat(f) => SRet(RFloat(float_abs(f)),    kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"float_sqrt\") then\n    match arg with | RFloat(f) => SRet(RFloat(float_sqrt(f)),   kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"float_floor\") then\n    match arg with | RFloat(f) => SRet(RFloat(float_floor(f)),  kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"float_ceil\") then\n    match arg with | RFloat(f) => SRet(RFloat(float_ceil(f)),   kont, out) | _ => SRet(RUnit, kont, out) end\n  else if strEq(name, \"read\") then\n    match arg with\n    | RIO(pending) =>\n        match readLine(pending) with\n        | RLine(line, rest) => SRet(RTuple(Cons(RIO(rest), Cons(RStr(line), Nil))), kont, out)\n        end\n    | _ => SRet(RTuple(Cons(arg, Cons(RStr(\"\"), Nil))), kont, out)\n    end\n  else if strEq(name, \"read_all\") then\n    (* whole-stdin slurp: return all pending input verbatim, leaving none behind. *)\n    match arg with\n    | RIO(pending) => SRet(RTuple(Cons(RIO(\"\"), Cons(RStr(pending), Nil))), kont, out)\n    | _            => SRet(RTuple(Cons(arg, Cons(RStr(\"\"), Nil))), kont, out)\n    end\n  else SRet(RUnit, kont, out)                                    (* unknown builtin *)\n\nfn builtinMulti(name : String, args : List(RVal), kont : List(Frame), out : String) : State =\n  if strEq(name, \"string_index\") then\n    match args with\n    | Cons(RStr(s), Cons(RInt(i), Nil)) => SRet(RInt(string_index(s, i)), kont, out)\n    | _ => SRet(RUnit, kont, out)\n    end\n  else if strEq(name, \"string_slice\") then\n    match args with\n    | Cons(RStr(s), Cons(RInt(lo), Cons(RInt(hi), Nil))) => SRet(RStr(string_slice(s, lo, hi)), kont, out)\n    | _ => SRet(RUnit, kont, out)\n    end\n  else SRet(RUnit, kont, out)\n\n\n(* ── Application (port of cek.py apply) ───────────────────────────────────── *)\n\nfn apply(fv : RVal, arg : RVal, kont : List(Frame),\n         g : List((String, RVal)), out : String) : State =\n  match fv with\n  | RClosure(p, body, cenv) => SEval(body, Cons((p, arg), cenv), kont, out)\n  | RPartCon(tag, arity, args) =>\n      let na = ckSnoc(args, arg) in\n      if ckLen(na) == arity then SRet(RCon(tag, na), kont, out)\n      else SRet(RPartCon(tag, arity, na), kont, out)\n  | RBuiltin(name, collected) =>\n      let na = ckSnoc(collected, arg) in\n      let ar = builtinArity(name) in\n      if ckLen(na) < ar then SRet(RBuiltin(name, na), kont, out)\n      else if ar == 1 then builtin(name, arg, kont, out)\n      else builtinMulti(name, na, kont, out)\n  | RDispatch(meth) =>                                (* trait method: pick impl by arg type *)\n      let tn = runtimeType(arg, g) in\n      match envGet(g, meth + \"#\" + tn) with\n      | RSome(fnv2) => apply(fnv2, arg, kont, g, out)\n      | RNone       => SRet(RUnit, kont, out)          (* no impl for this type *)\n      end\n  | RPrintIO(io) =>\n      match arg with\n      | RStr(s) => SRet(io, kont, out + s + \"\\n\")   (* the object program's output *)\n      | _       => SRet(io, kont, out)\n      end\n  | _ => SRet(RUnit, kont, out)\n  end\n\n\n(* ── CEK steps (port of cek.py step_eval / step_ret) ──────────────────────── *)\n\nfn stepEval(expr : Expr, env : List((String, RVal)), kont : List(Frame),\n            g : List((String, RVal)), out : String) : State =\n  match expr with\n  | Lit(v)  => SRet(litVal(v), kont, out)\n  | Var(n)  => match envGet(env, n) with\n               | RSome(v) => SRet(v, kont, out)\n               | RNone    => match envGet(g, n) with\n                             | RSome(v) => SRet(v, kont, out)\n                             | RNone    => SRet(RUnit, kont, out)\n                             end\n               end\n  | Con(n)  => match envGet(env, n) with\n               | RSome(v) => SRet(v, kont, out)\n               | RNone    => match envGet(g, n) with\n                             | RSome(v) => SRet(v, kont, out)\n                             | RNone    => SRet(RUnit, kont, out)\n                             end\n               end\n  | TupleExpr(elems) =>\n      match elems with\n      | Nil            => SRet(RUnit, kont, out)\n      | Cons(e0, rest) => SEval(e0, env, Cons(TupleF(rest, Nil, env), kont), out)\n      end\n  | Apply(fe, args)   => SEval(fe, env, Cons(ApplyFnF(args, env), kont), out)\n  | BinOp(op, l, r)   => SEval(l, env, Cons(BinOpLF(op, r, env), kont), out)\n  | UnaryOp(op, e)    => SEval(e, env, Cons(UnaryF(op), kont), out)\n  | LetExpr(n, _, v, body) => SEval(v, env, Cons(LetF(n, body, env), kont), out)\n  | IfExpr(c, t, e)   => SEval(c, env, Cons(IfF(t, e, env), kont), out)\n  | MatchExpr(s, arms) => SEval(s, env, Cons(MatchF(arms, env), kont), out)\n  | Lambda(params, body) =>\n      match params with\n      | Cons(Param(p0, _), rest) =>\n          match rest with\n          | Nil => SRet(RClosure(p0, body, env), kont, out)\n          | _   => SRet(RClosure(p0, Lambda(rest, body), env), kont, out)\n          end\n      | Nil => SRet(RUnit, kont, out)\n      end\n  end\n\nfn tryArms(arms : List(Arm), val : RVal, env : List((String, RVal)),\n           rest : List(Frame), out : String) : State =\n  match arms with\n  | Nil => SRet(RUnit, rest, out)                    (* non-exhaustive: shouldn't happen *)\n  | Cons(Arm(pat, body), more) =>\n      match matchPat(pat, val, env) with\n      | Yes(e2) => SEval(body, e2, rest, out)\n      | NoMatch => tryArms(more, val, env, rest, out)\n      end\n  end\n\nfn stepRet(val : RVal, frame : Frame, rest : List(Frame),\n           g : List((String, RVal)), out : String) : State =\n  match frame with\n  | TupleF(remaining, done, env) =>\n      match remaining with\n      | Nil            => SRet(RTuple(ckSnoc(done, val)), rest, out)\n      | Cons(nxt, rem) => SEval(nxt, env, Cons(TupleF(rem, ckSnoc(done, val), env), rest), out)\n      end\n  | ApplyFnF(args, env) =>\n      match args with\n      | Nil          => SRet(RUnit, rest, out)\n      | Cons(a, rem) => SEval(a, env, Cons(ApplyArgF(val, rem, env), rest), out)\n      end\n  | ApplyArgF(fnv, remaining, env) =>\n      match remaining with\n      | Nil => apply(fnv, val, rest, g, out)\n      | Cons(nxt, rem) =>\n          match runToVal(apply(fnv, val, Nil, g, out), g) with\n          | VOut(partial, out2) => SEval(nxt, env, Cons(ApplyArgF(partial, rem, env), rest), out2)\n          end\n      end\n  | LetF(n, body, env) => SEval(body, Cons((n, val), env), rest, out)\n  | IfF(t, e, env) =>\n      match val with\n      | RBool(b) => SEval(if b then t else e, env, rest, out)\n      | _        => SRet(RUnit, rest, out)\n      end\n  | MatchF(arms, env)   => tryArms(arms, val, env, rest, out)\n  | BinOpLF(op, r, env) => SEval(r, env, Cons(BinOpRF(op, val), rest), out)\n  | BinOpRF(op, lv)     => SRet(binop(op, lv, val), rest, out)\n  | UnaryF(op)          => SRet(unaryop(op, val), rest, out)\n  end\n\nfn step(state : State, g : List((String, RVal))) : State =\n  match state with\n  | SEval(e, env, kont, out) => stepEval(e, env, kont, g, out)\n  | SRet(v, Nil, out)        => SRet(v, Nil, out)          (* terminal; run stops here *)\n  | SRet(v, Cons(f, r), out) => stepRet(v, f, r, g, out)\n  end\n\n\n(* ── Drivers (port of cek.py run) ─────────────────────────────────────────── *)\n\nfn run(st : State, g : List((String, RVal))) : String =\n  match st with\n  | SRet(_, Nil, out) => out\n  | _                  => run(step(st, g), g)\n  end\n\nfn runToVal(st : State, g : List((String, RVal))) : VOut =\n  match st with\n  | SRet(v, Nil, out) => VOut(v, out)\n  | _                 => runToVal(step(st, g), g)\n  end\n\n\n(* ── Program evaluation (port of cek.py eval_program) ─────────────────────── *)\n\n(* The initial environment: built-in functions + built-in constructors.\n   (dummy param because Lark functions take at least one argument.) *)\nfn initialEnv(dummy : Int) : List((String, RVal)) =\n  Cons((\"print\",           RBuiltin(\"print\", Nil)),\n  Cons((\"read\",            RBuiltin(\"read\", Nil)),\n  Cons((\"read_all\",        RBuiltin(\"read_all\", Nil)),\n  Cons((\"show\",            RBuiltin(\"show\", Nil)),\n  Cons((\"int_to_string\",   RBuiltin(\"int_to_string\", Nil)),\n  Cons((\"float_to_string\", RBuiltin(\"float_to_string\", Nil)),\n  Cons((\"string_length\",   RBuiltin(\"string_length\", Nil)),\n  Cons((\"string_index\",    RBuiltin(\"string_index\", Nil)),\n  Cons((\"string_slice\",    RBuiltin(\"string_slice\", Nil)),\n  Cons((\"char_to_string\",  RBuiltin(\"char_to_string\", Nil)),\n  Cons((\"string_to_int\",   RBuiltin(\"string_to_int\", Nil)),\n  Cons((\"string_to_float\", RBuiltin(\"string_to_float\", Nil)),\n  Cons((\"int_abs\",         RBuiltin(\"int_abs\", Nil)),\n  Cons((\"int_to_float\",    RBuiltin(\"int_to_float\", Nil)),\n  Cons((\"float_to_int\",    RBuiltin(\"float_to_int\", Nil)),\n  Cons((\"float_to_bits\",   RBuiltin(\"float_to_bits\", Nil)),\n  Cons((\"float_abs\",       RBuiltin(\"float_abs\", Nil)),\n  Cons((\"float_sqrt\",      RBuiltin(\"float_sqrt\", Nil)),\n  Cons((\"float_floor\",     RBuiltin(\"float_floor\", Nil)),\n  Cons((\"float_ceil\",      RBuiltin(\"float_ceil\", Nil)),\n  Cons((\"Nil\",  RCon(\"Nil\", Nil)),\n  Cons((\"Cons\", RPartCon(\"Cons\", 2, Nil)),\n  Cons((\"Ok\",   RPartCon(\"Ok\", 1, Nil)),\n  Cons((\"Err\",  RPartCon(\"Err\", 1, Nil)),\n  Cons((\"True\",  RBool(true)),\n  Cons((\"False\", RBool(false)),\n  (* con→type map for the built-in ADTs (cek.py seeds List/Result). *)\n  Cons((\"#type#Nil\",  RStr(\"List\")),\n  Cons((\"#type#Cons\", RStr(\"List\")),\n  Cons((\"#type#Ok\",   RStr(\"Result\")),\n  Cons((\"#type#Err\",  RStr(\"Result\")),\n  Nil))))))))))))))))))))))))))))))\n\n(* Register the constructors of one ADT declaration, plus each constructor's\n   con→type entry (\"#type#<Tag>\") used by runtimeType for trait dispatch. *)\nfn addVariants(tyname : String, vs : List(Variant), env : List((String, RVal))) : List((String, RVal)) =\n  match vs with\n  | Nil => env\n  | Cons(Variant(nm, payload), rest) =>\n      let ar = ckLen(payload) in\n      let cval = if ar == 0 then RCon(nm, Nil) else RPartCon(nm, ar, Nil) in\n      let env2 = Cons((\"#type#\" + nm, RStr(tyname)), Cons((nm, cval), env)) in\n      addVariants(tyname, rest, env2)\n  end\n\n(* Name of the type an `impl` is FOR (parse.lark's Ty → its head name). *)\nfn tyName(t : Ty) : String =\n  match t with\n  | TName(n)     => n\n  | TApply(n, _) => n\n  | TUnit        => \"()\"\n  | _            => \"?\"\n  end\n\n(* First impl of a method that shadows a builtin (e.g. show): seed the primitive\n   types so calls on Int/Float/… keep routing to the original builtin. *)\nfn seedPrim(nm : String, bname : String, env : List((String, RVal))) : List((String, RVal)) =\n  Cons((nm + \"#Int\",    RBuiltin(bname, Nil)),\n  Cons((nm + \"#Float\",  RBuiltin(bname, Nil)),\n  Cons((nm + \"#Bool\",   RBuiltin(bname, Nil)),\n  Cons((nm + \"#String\", RBuiltin(bname, Nil)),\n  Cons((nm + \"#()\",     RBuiltin(bname, Nil)),\n  env)))))\n\n(* Register each impl method: dispatch entry \"<meth>#<type>\", plus rebind the\n   method name to RDispatch (port of cek.py eval_program's TImplDecl case). *)\nfn addImplMethods(methods : List(IMethod), tyname : String,\n                  env : List((String, RVal))) : List((String, RVal)) =\n  match methods with\n  | Nil => env\n  | Cons(IMethod(nm, params, body), rest) =>\n      let clos = mkClosure(params, body, Nil) in\n      let e1   = Cons((nm + \"#\" + tyname, clos), env) in\n      let e2   = match envGet(env, nm) with\n                 | RSome(RBuiltin(bname, _)) => seedPrim(nm, bname, e1)\n                 | _                         => e1\n                 end in\n      addImplMethods(rest, tyname, Cons((nm, RDispatch(nm)), e2))\n  end\n\n(* Build a (curried) closure from a function's params + body.  Top-level\n   closures capture an empty local env — mutual recursion resolves via g. *)\nfn mkClosure(params : List(Param), body : Expr, env : List((String, RVal))) : RVal =\n  match params with\n  | Cons(Param(p0, _), rest) =>\n      match rest with\n      | Nil => RClosure(p0, body, env)\n      | _   => RClosure(p0, Lambda(rest, body), env)\n      end\n  | Nil => RClosure(\"_\", body, env)\n  end\n\n(* Pass 1: install every top-level function closure + every ADT constructor. *)\nfn addDecls(decls : List(Decl), env : List((String, RVal))) : List((String, RVal)) =\n  match decls with\n  | Nil => env\n  | Cons(d, rest) =>\n      match d with\n      | FnDecl(_, nm, _, params, _, body) =>\n          addDecls(rest, Cons((nm, mkClosure(params, body, Nil)), env))\n      | TypeDecl(_, tyname, _, tbody) =>\n          match tbody with\n          | Variants(vs) => addDecls(rest, addVariants(tyname, vs, env))\n          | Alias(_)    => addDecls(rest, env)\n          end\n      | ImplDecl(_, _, forty, methods) =>\n          addDecls(rest, addImplMethods(methods, tyName(forty), env))\n      | _ => addDecls(rest, env)\n      end\n  end\n\n(* Pass 2: evaluate top-level `let` declarations against the full globals g. *)\nfn addLets(decls : List(Decl), g : List((String, RVal))) : List((String, RVal)) =\n  match decls with\n  | Nil => g\n  | Cons(d, rest) =>\n      match d with\n      | LetDecl(_, nm, _, valExpr) =>\n          match runToVal(SEval(valExpr, Nil, Nil, \"\"), g) with\n          | VOut(v, _) => addLets(rest, Cons((nm, v), g))\n          end\n      | _ => addLets(rest, g)\n      end\n  end\n\nfn applyMain(g : List((String, RVal)), input : String) : State =\n  match envGet(g, \"main\") with\n  | RSome(mainv) => apply(mainv, RIO(input), Nil, g, \"\")   (* IO token carries stdin *)\n  | RNone        => SRet(RStr(\"(no main)\"), Nil, \"\")\n  end\n\n(* Drop one trailing newline: our accumulator ends every printed line with \"\\n\",\n   and the driver's real `print` re-adds one, so we'd otherwise double it. *)\nfn stripTrailingNL(s : String) : String =\n  let n = string_length(s) in\n  if n == 0 then s\n  else if string_index(s, n - 1) == 10 then string_slice(s, 0, n - 1)\n  else s\n\n(* `input` is the program's stdin, threaded into main's IO token so `read`\n   can consume it line by line (empty for the whole corpus — no test reads). *)\nfn runProgram(prog : Prog, input : String) : String =\n  match prog with\n  | Prog(_, _, decls) =>\n      let g0 = addDecls(decls, initialEnv(0)) in\n      let g  = addLets(decls, g0) in\n      stripTrailingNL(run(applyMain(g, input), g))\n  end\n\n\n(* ── Component marker main (stripped by the differential harness) ─────────── *)\n\nfn main(io : IO) : IO =\n  print(io, \"cek.lark is a component — run via tests/cek_difftest.py\")\n"}, {"path": "repo/self/lark/emit_c.lark", "group": "repo/self/lark", "name": "emit_c.lark", "text": "(* emit_c.lark — Lark's C-AST emitter, written in Lark.\n   (the emit half of true self-hosting.)\n\n   Port of oracle/emit_c_ast.py: traverse a program's AST and print a C source\n   file that defines `LkProg lk_program` (plus every static LkExpr/LkPat/LkDecl\n   node it references), compilable together with cek.c/larkrun.c into a binary.\n\n   Design notes\n   ────────────\n   • This is a COMPONENT.  It does not redefine the AST (Expr/Val/Pat/Arm/Param/\n     Prog/Decl/TyBody/Variant/Ty) — those come from parse.lark.  As with the parser and evaluator,\n     the differential harness assembles the pipeline by CONCATENATION (lex +\n     parse + emit_c + a generated main) under one module, so it does NOT\n     type-check standalone.  Run path: `python3 tests/emit_c_difftest.py`.\n   • emit_c IGNORES types.  The oracle emits from infer.py's *typed* AST, but\n     emit_c_ast.py never reads a node's inferred type (only its structure, names\n     and literal values), and the typed AST is a 1:1 structural copy of the\n     syntactic one (verified against infer.py).  So this port emits straight\n     from parse.lark's `Prog` — infer.lark is NOT on the emitter's critical path.  Traits\n     carry no runtime representation, so a `trait` decl emits nothing (matching\n     infer.py, which drops trait decls from the typed program).\n   • PURE, no mutation.  The Python Emitter mutates four counters (_ec/_pc/_dc/\n     _ac) and appends to a line buffer.  Here both live in a threaded `Emit`\n     value: the four counters + the emitted lines, newest-first (O(1) prepend;\n     reversed once at the end).  Every emit* function returns (result, Emit).\n   • COUNTER/LINE ORDER is the whole game — it must match the oracle byte for\n     byte.  Python allocates a node's C name at function ENTRY (pre-order) but\n     appends its line only AFTER its children (post-order).  So each emitExpr/\n     emitPat here allocates `name` first (freshE/freshP), threads the children,\n     then emits its own line last.  The `id()` memo in the oracle never fires on\n     a tree (no shared subtrees), so it is dropped.\n   • MULTI-PARAM desugaring has TWO shapes that number nodes differently, both\n     reproduced faithfully: a function/impl-method with n>1 params desugars via\n     `ecWrap` (nested single-param `Lambda` nodes, each numbered before its body\n     — the _emit_fn_decl path), whereas a SOURCE multi-param lambda numbers its\n     body before the wrapper lambdas (the emit_expr TLambda loop, ecLamInner).\n   • The one runtime touch: `float_to_bits : Float -> Int` (added to cek.py/.c +\n     infer.py alongside this module) yields a FLOAT literal's IEEE-754 f32 bit\n     pattern for `LIT_FLOAT`.  FLOAT literals are non-negative, so the pattern is\n     always < 2^31 (C int32 == Python unsigned), keeping runtime parity. *)\n\nmodule EmitC\n\n(* ── Emitter state ────────────────────────────────────────────────────────── *)\n\n(* counters: expr, pat, decl, arr ; then the emitted lines, newest-first. *)\ntype Emit = | Emit of Int, Int, Int, Int, List(String)\n\n(* Emit is threaded linearly, but the affine checker sums uses across match\n   arms / if-branches (a known wart of the language); mark it Copy so reuse per-arm is legal.\n   Copy is name-only in infer, so this is free — mirrors parse.lark's AST types. *)\nimpl Copy for Emit = {}\n\nfn freshE(em : Emit) : (String, Emit) =\n  match em with | Emit(ec, pc, dc, ac, ls) => (\"_e\" + int_to_string(ec), Emit(ec + 1, pc, dc, ac, ls)) end\n\nfn freshP(em : Emit) : (String, Emit) =\n  match em with | Emit(ec, pc, dc, ac, ls) => (\"_p\" + int_to_string(pc), Emit(ec, pc + 1, dc, ac, ls)) end\n\nfn freshD(em : Emit) : (String, Emit) =\n  match em with | Emit(ec, pc, dc, ac, ls) => (\"_d\" + int_to_string(dc), Emit(ec, pc, dc + 1, ac, ls)) end\n\nfn freshA(em : Emit) : (String, Emit) =\n  match em with | Emit(ec, pc, dc, ac, ls) => (\"_a\" + int_to_string(ac), Emit(ec, pc, dc, ac + 1, ls)) end\n\nfn emitLine(em : Emit, s : String) : Emit =\n  match em with | Emit(ec, pc, dc, ac, ls) => Emit(ec, pc, dc, ac, Cons(s, ls)) end\n\n\n(* ── List helpers (String-monomorphic reverse/append dodge the occurs gap) ─ *)\n\nfn ecLen(xs : List(a)) : Int =\n  match xs with | Nil => 0 | Cons(_, r) => 1 + ecLen(r) end\n\nfn ecRev(xs : List(String), acc : List(String)) : List(String) =\n  match xs with | Nil => acc | Cons(x, r) => ecRev(r, Cons(x, acc)) end\n\nfn ecApp(a : List(String), b : List(String)) : List(String) =\n  match a with | Nil => b | Cons(x, r) => Cons(x, ecApp(r, b)) end\n\n(* Join one round of adjacent pairs with \"\\n\"; an odd trailing element is\n   carried unchanged.  Repeated (ecJoinNL) this halves the list each pass, so\n   the whole join allocates O(S log N) arena bytes for S bytes of output over N\n   lines instead of the O(S N) a right-fold spends re-copying the growing\n   suffix at every step (the no-GC bump arena never frees).  Output-identical:\n   string concatenation is associative, and every \"\\n\" still lands between the\n   same two originally-adjacent lines. *)\nfn ecJoinPairs(ls : List(String)) : List(String) =\n  match ls with\n  | Nil                    => Nil\n  | Cons(a, Nil)           => Cons(a, Nil)\n  | Cons(a, Cons(b, rest)) => Cons(a + \"\\n\" + b, ecJoinPairs(rest))\n  end\n\nfn ecJoinNL(ls : List(String)) : String =\n  match ls with\n  | Nil          => \"\"\n  | Cons(l, Nil) => l\n  | _            => ecJoinNL(ecJoinPairs(ls))\n  end\n\n(* \"&n0, &n1, …\" — pointer-array element list *)\nfn ecAmp(ns : List(String)) : String =\n  match ns with\n  | Nil           => \"\"\n  | Cons(n, Nil)  => \"&\" + n\n  | Cons(n, rest) => \"&\" + n + \", \" + ecAmp(rest)\n  end\n\n(* \"n0, n1, …\" — value list (LkArm[] / LkMethod[]) *)\nfn ecComma(ns : List(String)) : String =\n  match ns with\n  | Nil           => \"\"\n  | Cons(n, Nil)  => n\n  | Cons(n, rest) => n + \", \" + ecComma(rest)\n  end\n\nfn emitPtrArray(em : Emit, elemTy : String, names : List(String)) : (String, Emit) =\n  match freshA(em) with\n  | (arr, em1) => (arr, emitLine(em1, \"static const \" + elemTy + \"* \" + arr + \"[] = { \" + ecAmp(names) + \" };\"))\n  end\n\n\n(* ── Hex + C string escaping (mirror emit_c_ast._c_str / _lit_init) ──────────── *)\n\nfn ecHexDigit(d : Int, upper : Bool) : String =\n  if d < 10 then char_to_string(48 + d)\n  else if upper then char_to_string(55 + d) else char_to_string(87 + d)\n\n(* Lark has no `%` operator, so remainder is n - (n/16)*16 (n >= 0 here). *)\nfn ecHexRaw(n : Int, upper : Bool) : String =\n  if n < 16 then ecHexDigit(n, upper)\n  else ecHexRaw(n / 16, upper) + ecHexDigit(n - (n / 16) * 16, upper)\n\nfn ecPadZero(s : String, width : Int) : String =\n  if string_length(s) >= width then s else ecPadZero(\"0\" + s, width)\n\nfn ecHexW(n : Int, width : Int, upper : Bool) : String = ecPadZero(ecHexRaw(n, upper), width)\n\nfn ecCChar(c : Int) : String =\n  if c == 92 then \"\\\\\\\\\"            (* backslash  → \\\\   *)\n  else if c == 34 then \"\\\\\\\"\"       (* quote      → \\\"   *)\n  else if c == 10 then \"\\\\n\"\n  else if c == 13 then \"\\\\r\"\n  else if c == 9  then \"\\\\t\"\n  else if c < 32  then \"\\\\x\" + ecHexW(c, 2, false)   (* control → \\xHH (lower) *)\n  else char_to_string(c)\n\nfn ecCStrGo(s : String, i : Int, n : Int, acc : String) : String =\n  if i >= n then acc\n  else ecCStrGo(s, i + 1, n, acc + ecCChar(string_index(s, i)))\n\nfn ecCStr(s : String) : String = \"\\\"\" + ecCStrGo(s, 0, string_length(s), \"\") + \"\\\"\"\n\nfn ecFloatBits(txt : String) : Int =\n  match string_to_float(txt) with | Ok(f) => float_to_bits(f) | Err(_) => 0 end\n\nfn ecLitInit(v : Val) : String =\n  match v with\n  | VUnit     => \"LIT_UNIT\"\n  | VBool(b)  => \"LIT_BOOL, .b=\" + (if b then \"1\" else \"0\")\n  | VInt(t)   => \"LIT_INT, .i=\" + t                              (* lexeme round-trips str(int) *)\n  | VFloat(t) => \"LIT_FLOAT, .f=0x\" + ecHexW(ecFloatBits(t), 8, true) + \"u\"\n  | VStr(s)   => \"LIT_STR, .s=\" + ecCStr(s)\n  end\n\n\n(* ── Misc AST helpers ─────────────────────────────────────────────────────── *)\n\nfn ecParamName(p : Param) : String = match p with | Param(n, _) => n end\n\n(* Desugar [p1..pn] into nested single-param Lambdas (innermost = pn), the\n   _wrap_lambdas path: Lambda([p1], Lambda([p2], … body)). *)\nfn ecWrap(params : List(Param), body : Expr) : Expr =\n  match params with\n  | Nil          => body\n  | Cons(p, rest) => Lambda(Cons(p, Nil), ecWrap(rest, body))\n  end\n\nfn ecForType(forty : Ty) : String =\n  match forty with | TName(n) => n | TApply(n, _) => n | _ => \"?\" end\n\nfn ecVariantInit(vv : Variant) : String =\n  match vv with | Variant(n, tys) => \"{ \" + ecCStr(n) + \", \" + int_to_string(ecLen(tys)) + \" }\" end\n\nfn ecVariantInits(vs : List(Variant)) : String =\n  match vs with\n  | Nil           => \"\"\n  | Cons(v, Nil)  => ecVariantInit(v)\n  | Cons(v, rest) => ecVariantInit(v) + \", \" + ecVariantInits(rest)\n  end\n\n\n(* ── Expressions ──────────────────────────────────────────────────────────── *)\n\nfn emitExprList(em : Emit, es : List(Expr)) : (List(String), Emit) =\n  match es with\n  | Nil          => (Nil, em)\n  | Cons(e, rest) =>\n      match emitExpr(em, e) with\n      | (n, em1) =>\n          match emitExprList(em1, rest) with\n          | (ns, em2) => (Cons(n, ns), em2)\n          end\n      end\n  end\n\n(* Each arm: emit pat, emit body, then an LkArm _a; returns the arm names. *)\nfn emitArms(em : Emit, arms : List(Arm)) : (List(String), Emit) =\n  match arms with\n  | Nil => (Nil, em)\n  | Cons(Arm(pat, body), rest) =>\n      match emitPat(em, pat) with\n      | (pn, em1) =>\n          match emitExpr(em1, body) with\n          | (bn, em2) =>\n              match freshA(em2) with\n              | (an, em3) =>\n                  let em4 = emitLine(em3, \"static const LkArm \" + an + \" = { &\" + pn + \", &\" + bn + \" };\") in\n                  match emitArms(em4, rest) with\n                  | (ns, em5) => (Cons(an, ns), em5)\n                  end\n              end\n          end\n      end\n  end\n\n(* Wrap `curr` in one EXPR_LAMBDA per remaining param, LAST param numbered first\n   (reversed(params[1:]) in the oracle). *)\nfn ecLamInner(em : Emit, tail : List(Param), curr : String) : (String, Emit) =\n  match tail with\n  | Nil => (curr, em)\n  | Cons(p, rest) =>\n      match ecLamInner(em, rest, curr) with\n      | (curr2, em1) =>\n          match freshE(em1) with\n          | (inner, em2) =>\n              (inner, emitLine(em2, \"static const LkExpr \" + inner + \" = { .kind=EXPR_LAMBDA, .lam={\" + ecCStr(ecParamName(p)) + \", &\" + curr2 + \"} };\"))\n          end\n      end\n  end\n\nfn emitExpr(em : Emit, node : Expr) : (String, Emit) =\n  match freshE(em) with\n  | (name, em0) =>\n      match node with\n      | Lit(v) => (name, emitLine(em0, \"static const LkExpr \" + name + \" = { .kind=EXPR_LIT, .lit={\" + ecLitInit(v) + \"} };\"))\n      | Var(n) => (name, emitLine(em0, \"static const LkExpr \" + name + \" = { .kind=EXPR_VAR, .name=\" + ecCStr(n) + \" };\"))\n      | Con(n) => (name, emitLine(em0, \"static const LkExpr \" + name + \" = { .kind=EXPR_CON, .name=\" + ecCStr(n) + \" };\"))\n      | TupleExpr(es) =>\n          match es with\n          | Nil => (name, emitLine(em0, \"static const LkExpr \" + name + \" = { .kind=EXPR_TUPLE, .tup={NULL, 0} };\"))\n          | Cons(_, _) =>\n              match emitExprList(em0, es) with\n              | (ns, em1) =>\n                  match emitPtrArray(em1, \"LkExpr\", ns) with\n                  | (arr, em2) => (name, emitLine(em2, \"static const LkExpr \" + name + \" = { .kind=EXPR_TUPLE, .tup={\" + arr + \", \" + int_to_string(ecLen(es)) + \"} };\"))\n                  end\n              end\n          end\n      | Apply(fe, args) =>\n          match emitExpr(em0, fe) with\n          | (fnn, em1) =>\n              match emitExprList(em1, args) with\n              | (argns, em2) =>\n                  match emitPtrArray(em2, \"LkExpr\", argns) with\n                  | (arr, em3) => (name, emitLine(em3, \"static const LkExpr \" + name + \" = { .kind=EXPR_APPLY, .app={&\" + fnn + \", \" + arr + \", \" + int_to_string(ecLen(args)) + \"} };\"))\n                  end\n              end\n          end\n      | BinOp(op, l, r) =>\n          match emitExpr(em0, l) with\n          | (ln, em1) =>\n              match emitExpr(em1, r) with\n              | (rn, em2) => (name, emitLine(em2, \"static const LkExpr \" + name + \" = { .kind=EXPR_BINOP, .binop={\" + ecCStr(op) + \", &\" + ln + \", &\" + rn + \"} };\"))\n              end\n          end\n      | UnaryOp(op, x) =>\n          match emitExpr(em0, x) with\n          | (xn, em1) => (name, emitLine(em1, \"static const LkExpr \" + name + \" = { .kind=EXPR_UNARY, .unary={\" + ecCStr(op) + \", &\" + xn + \"} };\"))\n          end\n      | LetExpr(vn0, _, val, body) =>\n          match emitExpr(em0, val) with\n          | (vn, em1) =>\n              match emitExpr(em1, body) with\n              | (bn, em2) => (name, emitLine(em2, \"static const LkExpr \" + name + \" = { .kind=EXPR_LET, .let={\" + ecCStr(vn0) + \", &\" + vn + \", &\" + bn + \"} };\"))\n              end\n          end\n      | IfExpr(c, t, e) =>\n          match emitExpr(em0, c) with\n          | (cn, em1) =>\n              match emitExpr(em1, t) with\n              | (tn, em2) =>\n                  match emitExpr(em2, e) with\n                  | (en, em3) => (name, emitLine(em3, \"static const LkExpr \" + name + \" = { .kind=EXPR_IF, .if_={&\" + cn + \", &\" + tn + \", &\" + en + \"} };\"))\n                  end\n              end\n          end\n      | MatchExpr(scrut, arms) =>\n          match emitExpr(em0, scrut) with\n          | (sn, em1) =>\n              match emitArms(em1, arms) with\n              | (armns, em2) =>\n                  match freshA(em2) with\n                  | (arr, em3) =>\n                      let em4 = emitLine(em3, \"static const LkArm \" + arr + \"[] = { \" + ecComma(armns) + \" };\") in\n                      (name, emitLine(em4, \"static const LkExpr \" + name + \" = { .kind=EXPR_MATCH, .match={&\" + sn + \", \" + arr + \", \" + int_to_string(ecLen(arms)) + \"} };\"))\n                  end\n              end\n          end\n      | Lambda(ps, b) =>\n          match emitExpr(em0, b) with           (* body numbered FIRST (source-lambda shape) *)\n          | (bn, em1) =>\n              match ps with\n              | Nil => (name, emitLine(em1, \"static const LkExpr \" + name + \" = { .kind=EXPR_LAMBDA, .lam={\\\"?\\\", &\" + bn + \"} };\"))\n              | Cons(p0, ptail) =>\n                  match ecLamInner(em1, ptail, bn) with\n                  | (curr, em2) => (name, emitLine(em2, \"static const LkExpr \" + name + \" = { .kind=EXPR_LAMBDA, .lam={\" + ecCStr(ecParamName(p0)) + \", &\" + curr + \"} };\"))\n                  end\n              end\n          end\n      end\n  end\n\n\n(* ── Patterns ─────────────────────────────────────────────────────────────── *)\n\nfn emitPatList(em : Emit, ps : List(Pat)) : (List(String), Emit) =\n  match ps with\n  | Nil          => (Nil, em)\n  | Cons(p, rest) =>\n      match emitPat(em, p) with\n      | (n, em1) =>\n          match emitPatList(em1, rest) with\n          | (ns, em2) => (Cons(n, ns), em2)\n          end\n      end\n  end\n\nfn emitPat(em : Emit, node : Pat) : (String, Emit) =\n  match freshP(em) with\n  | (name, em0) =>\n      match node with\n      | PWild   => (name, emitLine(em0, \"static const LkPat \" + name + \" = { .kind=PAT_WILD };\"))\n      | PVar(n) => (name, emitLine(em0, \"static const
