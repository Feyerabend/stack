<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFG – Nested</title>

<style>
body {
    margin: 0;
    background: #111;
    color: #ddd;
    font-family: monospace;
}

textarea {
    width: 100%;
    height: 260px;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    padding: 8px;
    box-sizing: border-box;
}

canvas {
    display: block;
    background: #181818;
    border: 1px solid #333;
}
</style>
</head>
<body>

<textarea id="src">
node Start "Start: x=10,y=5" [350 40]
node While "x > 0?" [350 140]
node If "y > 0?" [350 240]
node T "x = x - 1" [200 340]
node F "y = y - 1" [500 340]
node End "End" [350 480]

edge Start While ""
edge While If "true"
edge If T "true"
edge If F "false"
edge T While ""
edge F While ""
edge While End "false"
</textarea>

<canvas id="canvas" width="800" height="580"></canvas>

<script>
/* exactly same JS engine as cfg-if-else.html */
</script>

</body>
</html>
